name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mofacts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mofacts/package-lock.json

      - name: Install Meteor 3.4
        run: curl https://install.meteor.com/?release=3.4 | sh

      - name: Install dependencies
        run: npm ci

      - name: Prepare test settings
        run: cp example.settings.json settings.json

      - name: Lint
        run: npm run lint

      - name: Typecheck (blocking)
        run: npm run typecheck

      - name: Test
        run: npm run test:ci
