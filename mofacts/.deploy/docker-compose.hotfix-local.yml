services:
  hotfix-builder:
    image: geoffreybooth/meteor-base:3.4.1
    profiles:
      - hotfix-build
    working_dir: /workspace/mofacts
    environment:
      METEOR_ALLOW_SUPERUSER: "1"
      LOCAL_HOTFIX_BUNDLE_DIR: /local-build
    volumes:
      - type: bind
        source: ../../
        target: /workspace
      - type: volume
        source: hotfix_bundle
        target: /local-build
      - type: volume
        source: hotfix_node_modules
        target: /workspace/mofacts/node_modules
      - type: volume
        source: hotfix_meteor_local
        target: /workspace/mofacts/.meteor/local
    command:
      - /bin/bash
      - /workspace/mofacts/.deploy/hotfix/build-bundle.sh

  hotfix-deps:
    image: node:22.22.0-alpine
    profiles:
      - hotfix-build
    working_dir: /local-build/bundle/programs/server
    environment:
      LOCAL_HOTFIX_BUNDLE_DIR: /local-build
    volumes:
      - type: bind
        source: ../../
        target: /workspace
        read_only: true
      - type: volume
        source: hotfix_bundle
        target: /local-build
    command:
      - /bin/sh
      - /workspace/mofacts/.deploy/hotfix/install-bundle-deps.sh

  mofacts:
    image: node:22.22.0-alpine
    build: !reset null
    working_dir: /local-build/bundle
    entrypoint:
      - /bin/sh
      - /workspace/mofacts/.deploy/hotfix/run-bundle.sh
    command:
      - node
      - main.js
    environment:
      PORT: 3000
      ROOT_URL: ${ROOT_URL:-http://localhost:3100}
      MONGO_URL: mongodb://mongodb:27017/MoFACT-meteor3
      EXPECTED_MONGO_DB_NAME: MoFACT-meteor3
      WAIT_HOSTS: mongodb:27017
      METEOR_SETTINGS_WORKAROUND: /run/local-settings/settings.local.json
      APP_BUNDLE_FOLDER: /local-build
    volumes:
      - type: bind
        source: ../../
        target: /workspace
        read_only: true
      - type: volume
        source: hotfix_bundle
        target: /local-build
      - type: bind
        source: ./local-data/mofactsAssets_override
        target: /mofactsAssets_override
      - type: bind
        source: ./local-data/dynamic-assets
        target: /root/dynamic-assets
      - type: bind
        source: ./local-data/h5p-content
        target: /root/h5p-content
      - type: bind
        source: ./local-data/h5p-libraries
        target: /root/h5p-libraries
      - type: bind
        source: ./settings.local.json
        target: /run/local-settings/settings.local.json
        read_only: true

volumes:
  hotfix_bundle:
    driver: local
  hotfix_node_modules:
    driver: local
  hotfix_meteor_local:
    driver: local
