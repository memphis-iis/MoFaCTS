services:
  mofacts:
    container_name: mofacts
    restart: always
    image: ${DOCKER_REGISTRY:-ppavlikmemphis}/${IMAGE_NAME:-mofacts-mini}:${IMAGE_TAG:-upgrades}
    build:
      context: ../../
      dockerfile: Dockerfile
    volumes:
      # Runtime override directory for deploy-time assets that should not be baked
      # into the image, including Memphis SAML PEM files.
      - type: bind
        source: /mofactsAssets_override
        target: /mofactsAssets_override
        bind:
          create_host_path: true
      - type: bind
        source: /dynamic-assets
        target: /root/dynamic-assets
        bind:
          create_host_path: true
    ports:
      - '3000:3000'
    depends_on:
      - mongodb
    environment:
      ROOT_URL: ${ROOT_URL:-https://staging.optimallearning.org}
      MONGO_URL: ${MONGO_URL:-mongodb://mongodb:27017/MoFACT-meteor3}
      EXPECTED_MONGO_DB_NAME: ${EXPECTED_MONGO_DB_NAME:-MoFACT-meteor3}
      PORT: ${PORT:-3000}
      WAIT_HOSTS: mongodb:27017
      # Settings are baked into the image at /app/settings.json (outside the
      # /mofactsAssets bind mount so deploys are self-contained).
      METEOR_SETTINGS_WORKAROUND: '${METEOR_SETTINGS_PATH:-/app/settings.json}'
    networks:
      - mofacts

  mongodb:
    image: mongo:8.0
    restart: always
    command:
      - --storageEngine=wiredTiger
    volumes:
      - data:/data/db
    networks:
      - mofacts

volumes:
  data:
    driver: local

networks:
  mofacts:
    driver: bridge


