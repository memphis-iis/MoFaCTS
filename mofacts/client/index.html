<head>
  <meta charset="utf-8">
  <title>mofacts_app</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, interactive-widget=resizes-content">
    <meta name="theme-color" content="#F2F2F2">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

    <!-- Favicon - uses dedicated favicon if available, falls back to logo -->
    <link rel="icon" type="image/png" sizes="32x32" href="/images/themes/brain-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/themes/brain-16.png">
    <link rel="icon" type="image/png" href="/images/themes/brain-logo.png">

    <!-- DNS prefetch for external resources -->
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">

    <!-- Critical CSS - Inlined for instant first paint (prevents FOUC) -->
    <style>
    /* Keep page hidden until theme loads */
    body{margin:0;padding:0;}.page-loading{opacity:0!important;visibility:hidden!important;}.page-loaded{opacity:1;visibility:visible;transition:opacity 0.15s ease-in;}
    </style>

  <!-- External CDN resources - Bootstrap loaded first -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.6-rc.0/css/select2.min.css" rel="stylesheet" />
  <!-- Font Awesome 4.7.0 - Using cdnjs (no CORS issues) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/plyr/3.7.8/plyr.min.css" />

  <!-- JSON Editor for TDF editing (schema-driven form generation) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@json-editor/json-editor@2.15.2/dist/css/jsoneditor.min.css" />

  <!-- Local CSS loaded last to override Bootstrap defaults -->
  <link href="/styles/classic.css" rel="stylesheet">
</head>

<body>
  <!-- Mobile Debug Console - eruda provides DevTools-like interface on mobile -->
  <!-- <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>if (typeof eruda !== 'undefined') eruda.init();</script> -->

  <!-- MO9: Performance - Scripts moved to end of body to prevent render blocking -->
  <!-- Defer attribute ensures scripts execute after DOM is parsed but maintain dependency order -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/plyr/3.7.8/plyr.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous" defer></script>
  <!-- JSON Editor for TDF editing (schema-driven form generation) -->
  <script src="https://cdn.jsdelivr.net/npm/@json-editor/json-editor@2.15.2/dist/jsoneditor.min.js" defer></script>
</body>


<template name="DefaultLayout">
  <!-- Global Loading Spinner - Persists across route transitions for elegant UX -->
  {{#if appLoading}}
  <div class="position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center" style="background-color: var(--loading-overlay-color, rgba(245,245,245,0.95)); z-index: 10000; transition: opacity var(--transition-smooth, 200ms) ease-in-out;">
    <div class="text-center">
      <div class="spinner-border" role="status" style="width: 3rem; height: 3rem; color: var(--brand-primary-color, var(--accent-color, #7ed957));">
        <span class="sr-only">Loading...</span>
      </div>
      <div class="mt-3" style="color: var(--text-color, #333);">{{appLoadingMessage}}</div>
    </div>
  </div>
  {{/if}}

  {{#if isLoggedIn}}
    {{> nav}}
    {{#if showPageNumbers}}
      {{> curPageNumbers}}
      <br>
    {{/if}}
  {{/if}}
  {{#if uiMessage}}
  <div class="container mt-3">
    <div class="alert alert-{{uiMessage.variant}} d-flex align-items-center justify-content-between" role="alert">
      <div>{{uiMessage.text}}</div>
      <button type="button" class="btn-close" aria-label="Close" data-ui-message-clear="true"></button>
    </div>
  </div>
  {{/if}}
  <!-- main page content -->
  {{#if currentTemplate}}
    {{> Template.dynamic template=currentTemplate}}
  {{else}}
    {{#if main}}
      {{> Template.dynamic template=main}}
    {{/if}}
    {{#if content}}
      {{> Template.dynamic template=content}}
    {{/if}}
    {{#if yield}}
      {{> Template.dynamic template=yield}}
    {{else}}
      {{> yield}}
    {{/if}}
  {{/if}}
