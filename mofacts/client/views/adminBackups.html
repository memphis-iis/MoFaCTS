<template name="adminBackups">
  <div class="container admin-page admin-backups-page">
    <h3 class="page-header-title">{{backupText 'admin.backups'}}</h3>

    {{#if backupMessage}}
      <div class="admin-status admin-status-{{backupMessage.level}} admin-message" role="status" aria-live="polite">
        <i class="fa {{backupMessage.icon}}" aria-hidden="true"></i>
        <div class="admin-status-text">{{backupMessage.text}}</div>
      </div>
    {{/if}}

    {{#if isInRole 'admin'}}
      <div class="admin-section">
        <div class="card admin-card backup-warning-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-exclamation-triangle admin-section-icon"></i>
              <h5>{{backupText 'admin.backupWarningTitle'}}</h5>
            </div>
            <p>
              {{backupText 'admin.backupWarningDescription'}}
            </p>
            {{#if backupConfig}}
              <div class="backup-config-grid">
                <div><strong>{{backupText 'admin.statusLabel'}}</strong> {{enabledLabel backupConfig.enabled}}</div>
                <div><strong>{{backupText 'admin.destinationLabel'}}</strong> {{destinationLabel backupConfig.destination}}</div>
                <div><strong>{{backupText 'admin.settingsLabel'}}</strong> {{enabledLabel backupConfig.includeSettings}}</div>
                <div><strong>{{backupText 'admin.keyMaterialLabel'}}</strong> {{enabledLabel backupConfig.includeKeyMaterial}}</div>
              </div>
            {{/if}}
          </div>
        </div>
      </div>

      <div class="admin-section">
        <div class="card admin-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-archive admin-section-icon"></i>
              <h5>{{backupText 'admin.createBackup'}}</h5>
            </div>
            <button type="button" id="createBackupButton" class="btn btn-primary" disabled="{{isBusy}}">
              <i class="fa fa-plus-circle"></i> {{backupText 'admin.createBackup'}}
            </button>
          </div>
        </div>
      </div>

      <div class="admin-section">
        <div class="card admin-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-history admin-section-icon"></i>
              <h5>{{backupText 'admin.backupHistory'}}</h5>
            </div>

            {{#if hasBackupJobs}}
              <div class="backup-history-list">
                {{#each backupJobs}}
                  <div class="backup-history-row">
                    <div class="backup-history-main">
                      <div class="backup-history-title">{{archiveFileName}}</div>
                      <div class="backup-history-meta">
                        {{jobType}}
                        <span class="admin-badge admin-badge-{{statusLevel status}}">{{status}}</span>
                        {{formatDate createdAt}} · {{formatBytes archiveSizeBytes}}
                      </div>
                      {{#if error}}
                        <div class="backup-history-error">{{error.phase}}: {{error.message}}</div>
                      {{/if}}
                    </div>
                    <div class="backup-history-actions">
                      <button type="button" class="btn btn-secondary btn-sm viewManifestButton" data-job-id="{{_id}}">
                        <i class="fa fa-file-text-o"></i> {{backupText 'admin.manifest'}}
                      </button>
                      {{#if canVerify jobType status}}
                        <button type="button" class="btn btn-secondary btn-sm verifyBackupButton" data-job-id="{{_id}}" disabled="{{../isBusy}}">
                          <i class="fa fa-check-circle-o"></i> {{backupText 'admin.verifyBackup'}}
                        </button>
                      {{/if}}
                      {{#if canRestore jobType status}}
                        <button type="button" class="btn btn-secondary btn-sm downloadBackupButton" data-job-id="{{_id}}" disabled="{{../isBusy}}">
                          <i class="fa fa-download"></i> {{backupText 'admin.download'}}
                        </button>
                        <button type="button" class="btn btn-danger btn-sm restoreBackupButton" data-job-id="{{_id}}" disabled="{{../isBusy}}">
                          <i class="fa fa-warning"></i> {{backupText 'admin.restore'}}
                        </button>
                      {{/if}}
                      {{#if canDelete jobType status archiveFileName}}
                        <button type="button" class="btn btn-danger btn-sm deleteBackupButton" data-job-id="{{_id}}" disabled="{{../isBusy}}">
                          <i class="fa fa-trash"></i> {{backupText 'admin.delete'}}
                        </button>
                      {{/if}}
                    </div>
                  </div>
                {{/each}}
              </div>
            {{else}}
              <p class="text-muted">{{backupText 'admin.noBackupJobs'}}</p>
            {{/if}}
          </div>
        </div>
      </div>

      {{#if selectedManifest}}
        <div class="admin-section">
          <div class="card admin-card">
            <div class="card-body">
              <div class="admin-section-heading">
                <i class="fa fa-list-alt admin-section-icon"></i>
                <h5>{{backupText 'admin.selectedManifest'}}</h5>
              </div>
              <pre class="backup-manifest-view">{{selectedManifest}}</pre>
            </div>
          </div>
        </div>
      {{/if}}

      {{#if selectedRestoreJob}}
        <div class="admin-section">
          <div class="card admin-card backup-restore-card">
            <div class="card-body">
              <div class="admin-section-heading">
                <i class="fa fa-warning admin-section-icon"></i>
                <h5>{{backupText 'admin.confirmRestore'}}</h5>
              </div>
              <p class="admin-status admin-status-error">
                <i class="fa fa-warning" aria-hidden="true"></i>
                <span class="admin-status-text">
                {{backupText 'admin.restoreWarningDescription'}}
                </span>
              </p>
              <div class="backup-restore-controls">
                <input type="text" id="restoreConfirmationInput" class="form-control" autocomplete="off" aria-label="{{backupText 'admin.restoreConfirmationPhrase'}}">
                <button type="button" class="btn btn-danger confirmRestoreButton" data-job-id="{{selectedRestoreJob._id}}" disabled="{{isBusy}}">
                  <i class="fa fa-warning"></i> {{backupText 'admin.restore'}}
                </button>
                <button type="button" class="btn btn-secondary cancelRestoreButton" disabled="{{isBusy}}">
                  {{backupText 'content.cancel'}}
                </button>
              </div>
            </div>
          </div>
        </div>
      {{/if}}

      {{#if selectedDeleteJob}}
        <div class="admin-section">
          <div class="card admin-card backup-delete-card">
            <div class="card-body">
              <div class="admin-section-heading">
                <i class="fa fa-trash admin-section-icon"></i>
                <h5>{{backupText 'admin.confirmDelete'}}</h5>
              </div>
              <p class="admin-status admin-status-warning">
                <i class="fa fa-exclamation-triangle" aria-hidden="true"></i>
                <span class="admin-status-text">
                {{backupText 'admin.deleteWarningDescription'}}
                </span>
              </p>
              <div class="backup-restore-controls">
                <input type="text" id="deleteConfirmationInput" class="form-control" autocomplete="off" aria-label="{{backupText 'admin.deleteConfirmationPhrase'}}">
                <button type="button" class="btn btn-danger confirmDeleteButton" data-job-id="{{selectedDeleteJob._id}}" disabled="{{isBusy}}">
                  <i class="fa fa-trash"></i> {{backupText 'admin.confirm'}}
                </button>
                <button type="button" class="btn btn-secondary cancelDeleteButton" disabled="{{isBusy}}">
                  {{backupText 'content.cancel'}}
                </button>
              </div>
            </div>
          </div>
        </div>
      {{/if}}
    {{else}}
      <div class="admin-status admin-status-error" role="alert">
        <i class="fa fa-times-circle" aria-hidden="true"></i>
        <div class="admin-status-text">{{backupText 'admin.adminAccessRequired'}}</div>
      </div>
    {{/if}}
  </div>
</template>
