<template name="adminBackups">
  <div class="admin-backups-page">
    {{#if isInRole 'admin'}}
      <div class="admin-section">
        <div class="card admin-card backup-warning-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-exclamation-triangle admin-section-icon"></i>
              <h5>{{backupText 'admin.backupWarningTitle'}}</h5>
            </div>
            <p>
              {{backupText 'admin.backupWarningDescription'}}
            </p>
            {{#if backupConfig}}
              <div class="backup-config-grid">
                <div><strong>{{backupText 'admin.statusLabel'}}</strong> {{enabledLabel backupConfig.enabled}}</div>
                <div><strong>{{backupText 'admin.destinationLabel'}}</strong> {{destinationLabel backupConfig.destination}}</div>
                <div><strong>{{backupText 'admin.settingsLabel'}}</strong> {{enabledLabel backupConfig.includeSettings}}</div>
                <div><strong>{{backupText 'admin.keyMaterialLabel'}}</strong> {{enabledLabel backupConfig.includeKeyMaterial}}</div>
              </div>
            {{/if}}
          </div>
        </div>
      </div>

      <div class="admin-section">
        <div class="card admin-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-archive admin-section-icon"></i>
              <h5>{{backupText 'admin.createBackup'}}</h5>
            </div>
            <button type="button" id="createBackupButton" class="btn btn-primary" {{backupCommandAttrs 'create'}}>
              <i class="fa fa-plus-circle"></i> {{backupText 'admin.createBackup'}}
            </button>
            {{#with (backupMessage 'create')}}
              {{> adminStatus variant=level text=text}}
            {{/with}}
          </div>
        </div>
      </div>

      <div class="admin-section">
        <div class="card admin-card">
          <div class="card-body">
            <div class="admin-section-heading" data-confirmation-return-fallback="true" tabindex="-1">
              <i class="fa fa-history admin-section-icon"></i>
              <h5>{{backupText 'admin.backupHistory'}}</h5>
            </div>

            {{> adminAsyncRegion busy=backupAsyncBusy contentTemplate="adminBackupsAsyncContent"}}
            {{#with backupHistoryMessage}}{{> adminStatus variant=level text=text}}{{/with}}
            <div class="{{backupParentReadyClass}}">
              <div class="backup-history-list">
                {{#each parentBackupJobs}}
                  <div class="backup-history-row">
                    <div class="backup-history-main">
                      <div class="backup-history-title">{{archiveFileName}}</div>
                      <div class="backup-history-meta">
                        {{jobType}}
                        <span class="admin-badge admin-badge-{{statusLevel status}}">{{status}}</span>
                        {{formatDate createdAt}} · {{formatBytes archiveSizeBytes}}
                      </div>
                      {{#if error}}
                        <div class="backup-history-error">{{error.phase}}: {{error.message}}</div>
                      {{/if}}
                    </div>
                    <div class="backup-history-actions">
                      <button type="button" class="btn btn-secondary btn-sm viewManifestButton" data-job-id="{{_id}}" {{backupCommandAttrs 'manifest' _id}}>
                        <i class="fa fa-file-text-o" aria-hidden="true"></i> {{backupText 'admin.manifest'}}
                      </button>
                      {{#if canVerify jobType status}}
                        <button type="button" class="btn btn-secondary btn-sm verifyBackupButton" data-job-id="{{_id}}" {{backupCommandAttrs 'verify' _id}}>
                          <i class="fa fa-check-circle-o" aria-hidden="true"></i> {{backupText 'admin.verifyBackup'}}
                        </button>
                      {{/if}}
                      {{#if canRestore jobType status}}
                        <button type="button" class="btn btn-secondary btn-sm downloadBackupButton" data-job-id="{{_id}}" {{backupCommandAttrs 'download' _id}}>
                          <i class="fa fa-download" aria-hidden="true"></i> {{backupText 'admin.download'}}
                        </button>
                        <button type="button" class="btn btn-danger btn-sm restoreBackupButton" data-job-id="{{_id}}" {{backupCommandAttrs 'restore' _id}}>
                          <i class="fa fa-warning" aria-hidden="true"></i> {{backupText 'admin.restore'}}
                        </button>
                      {{/if}}
                      {{#if canDelete jobType status archiveFileName}}
                        <button type="button" class="btn btn-danger btn-sm deleteBackupButton" data-job-id="{{_id}}" {{backupCommandAttrs 'delete' _id}}>
                          <i class="fa fa-trash" aria-hidden="true"></i> {{backupText 'admin.delete'}}
                        </button>
                      {{/if}}
                    </div>
                    {{#each (backupRowMessages _id)}}{{> adminStatus variant=level text=text}}{{/each}}
                    {{> adminInlineConfirmation confirmation=(backupRowConfirmation _id)}}
                    {{#with (backupRowManifest _id)}}
                      <div class="backup-history-detail">
                        <h6>{{backupText 'admin.selectedManifest'}}</h6>
                        <pre class="backup-manifest-view">{{this}}</pre>
                      </div>
                    {{/with}}
                  </div>
                {{/each}}
              </div>
            </div>
          </div>
        </div>
      </div>

    {{else}}
      <div class="admin-status admin-status-error" role="alert">
        <i class="fa fa-times-circle" aria-hidden="true"></i>
        <div class="admin-status-text">{{backupText 'admin.adminAccessRequired'}}</div>
      </div>
    {{/if}}
  </div>
</template>

<template name="adminBackupsAsyncContent">
  <div class="{{backupLoadingClass}}">
    {{> adminStatus variant="info" text=(backupText 'common.loading')}}
  </div>
  <div class="{{backupErrorClass}}">
    {{> adminStatus variant="error" text=backupLoadError urgent=true}}
    <button type="button" class="btn btn-outline-danger admin-async-retry">
      {{backupText 'common.tryAgain'}}
    </button>
  </div>
  <div class="{{backupEmptyClass}}">
    {{> adminEmptyState text=(backupText 'admin.noBackupJobs') icon="fa-archive"}}
  </div>
  <div class="{{backupRefreshingClass}}">
    {{> adminStatus variant="info" text=(backupText 'common.loading')}}
  </div>
  <div class="{{backupRefreshErrorClass}}">
    {{> adminStatus variant="warning" text=backupLoadError}}
  </div>
</template>
