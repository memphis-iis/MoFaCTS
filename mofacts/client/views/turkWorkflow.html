<!-- Turk Workflow Template -->

<template name="turkWorkflow">
    <div>
    <!-- AWS Login Data -->
    <div class="admin-section">
        <div class="card admin-card">
            <div class="card-body">
                <div class="admin-section-heading">
                    <i class="fa fa-key admin-section-icon"></i>
                    <h5>{{turkText 'turk.awsLoginData'}}</h5>
                </div>

    <div class="row" id="profileContainer">
        <div class="col-lg-6 col-md-8 offset-lg-3 offset-md-2">
                <div class="form-group admin-form-row">
                    <label for="profileAWSID" class="form-label">{{awsIdPlaceholder}}</label>
                    <input type="text"
                        id="profileAWSID" name="profileAWSID"
                        class="form-control clearOnSave"
                        maxlength="40"
                        placeholder="{{awsIdPlaceholder}}"
                    >
                </div>
                <div class="form-group admin-form-row">
                    <label for="profileAWSSecret" class="form-label">{{awsSecretPlaceholder}}</label>
                    <input type="password"
                        id="profileAWSSecret" name="profileAWSSecret"
                        class="form-control clearOnSave"
                        maxlength="60"
                        placeholder="{{awsSecretPlaceholder}}"
                    >
                </div>
                <div class="form-group text-center admin-form-row">
                    <div class="form-check d-inline-block">
                        <input type="checkbox" class="form-check-input" id="profileUseSandbox" name="profileUseSandbox" checked={{use_sandbox}}>
                        <label class="form-check-label" for="profileUseSandbox">{{turkText 'turk.useSandbox'}} <span class="text-muted small">({{turkText 'turk.awsCredentialsHidden'}})</span></label>
                    </div>
                </div>
                <div class="form-group text-center">
                    <button type='button' id='saveProfile' class='btn btn-fix'>
                        <i class="fa fa-save admin-button-icon"></i>{{turkText 'turk.saveProfileData'}}
                    </button>
                    <button type='button' id='testConfirmProfile' class='btn btn-fix btn-primary admin-inline-action'>
                        <i class="fa fa-check-circle admin-button-icon"></i>{{turkText 'turk.testAndConfirm'}}
                    </button>
                </div>
                <div class="form-group admin-form-row-top">
                    <div class="small text-muted">
                        <strong>{{turkText 'turk.savedProfileState'}}:</strong> {{savedAwsProfileSummary}}
                    </div>
                    {{#if profileInlineStatus}}
                    <div class="admin-status admin-status-{{profileInlineStatusClass}} admin-form-row-top admin-alert-flush" role="status">
                        <i class="fa {{profileInlineStatusIcon}}"></i>
                        <div class="admin-status-text">
                            <pre class="admin-scroll-output admin-empty-text">{{profileInlineStatus}}</pre>
                        </div>
                    </div>
                    {{/if}}
                </div>
        </div>
    </div>

            </div>
        </div>
    </div>

    <!-- Experiment Logs -->
    <div class="admin-section">
        <div class="card admin-card">
            <div class="card-body">
                <div class="admin-section-heading">
                    <i class="fa fa-list-alt admin-section-icon"></i>
                    <h5>{{turkText 'turk.experimentLogs'}}</h5>
                </div>

    <div id="turkLogEntireWorkflow">
        <div class="row">
            <div class="col-md-6 text-center offset-md-3" id="turkLogSelectContainer">
                <label for="tdf-select" class="form-label text-muted admin-form-row-sm">{{turkText 'turk.selectTdfForLog'}}</label>
                {{#if logExperimentsError}}
                {{> adminStatus variant="error" text=logExperimentsError urgent=true}}
                <button type="button" class="btn btn-outline-secondary btn-sm admin-form-row-sm" data-turk-experiments-retry="true">
                    {{turkText 'common.tryAgain'}}
                </button>
                {{/if}}
                {{#if logExperimentsLoading}}
                {{> adminStatus variant="info" text=(turkText 'common.loading')}}
                {{/if}}
                
                <select id="tdf-select" class="form-select" disabled="{{logExperimentsLoading}}">
                    <option value="">{{turkText 'turk.selectLesson'}}</option>
                    {{#each logExperiments}}
                    <option value="{{selectorKey}}" selected={{isSelectedLogExperiment selectorKey}}>{{displayLabel}}</option>
                    {{/each}}
                </select>
            </div>
        </div>
        {{#if turkExperimentLogToShow}}
        <div id="turkLogAll" class="admin-form-row-top">
            <div class="row">
                <div class="col-md-12">
                    <h5 class="text-center admin-form-row-sm">
                        {{turkText 'turk.experimentLogHeading'}} <span id="turkExpTitle" class="text-muted"></span>
                    </h5>

                    <div class="form-group admin-form-row">
                        <label for="turklog-filt" class="form-label">{{turkText 'turk.trialFilterPlaceholder'}}</label>
                        <input type="text" class="form-control" name="turklog-filt" id="turklog-filt" value="" placeholder="{{turkText 'turk.trialFilterPlaceholder'}}">
                    </div>


                    <div class="admin-table-wrapper">
                        <div class="table-responsive" role="region" aria-label="{{turkText 'turk.experimentLogHeading'}}" tabindex="0">
                            <table class="table table-striped table-bordered table-sm">
                                <thead class="table-light">
                                    <tr>
                                        <th scope="col" class="table-col-narrow">{{turkText 'turk.userMongoId'}}</th>
                                        <th scope="col" class="table-col-narrow">{{turkText 'turk.userNameTurk'}}</th>
                                        <th scope="col" class="table-col-small">{{turkText 'turk.emailSched'}}</th>
                                        <th scope="col" class="table-col-icon text-center">{{turkText 'turk.correct'}}</th>
                                        <th scope="col" class="table-col-small">{{turkText 'turk.approval'}}</th>
                                        <th scope="col" class="table-col-small">{{turkText 'turk.emailSent'}}</th>
                                        <th scope="col" class="table-col-small">{{turkText 'turk.delivery'}}</th>
                                        <th scope="col" class="table-col-icon text-center">{{turkText 'turk.currentUnit'}}</th>
                                        <th scope="col" class="table-col-narrow">{{turkText 'turk.lastActionTime'}}</th>
                                        <th scope="col" class="table-col-icon text-center">{{turkText 'turk.questionsSeen'}}</th>
                                        <th scope="col" class="table-col-icon text-center">{{turkText 'turk.posttestCorrect'}}</th>
                                        <th scope="col" class="table-col-small">{{turkText 'turk.bonus'}}</th>
                                    </tr>
                                </thead>

                        <tbody>
                        {{#if turkExperimentLogEmpty}}
                            <tr>
                                <td colspan="12" class="text-center text-muted admin-empty-state">
                                    <i class="fa fa-info-circle admin-button-icon"></i>{{turkText 'turk.noExperimentUsers'}}
                                </td>
                            </tr>
                        {{/if}}
                        {{#each turkExperimentLog}}
                            <tr>
                                <td class="small text-break">{{userId}}</td>
                                <th scope="row">{{turk_username}}</th>
                                <td>
                                    {{#if haveEmailSched}}
                                    <button type="button"
                                        class="btn btn-fix btn-primary btn-xs btn-sched-detail"
                                        data-idx="{{idx}}"
                                        aria-label="{{turkText 'turk.emailSched'}}: {{turk_username}}"
                                    ><i class="fa fa-search-plus" aria-hidden="true"></i>&nbsp;{{turkEmailSchedule}}
                                    </button>
                                    {{else}}
                                    <span class="text-muted small">{{turkText 'turk.notScheduled'}}</span>
                                    {{/if}}
                                </td>
                                <td class="text-center">{{answersCorrect}}</td>
                                <td>
                                    {{#if needPay}}
                                        <button type="button"
                                            class="btn btn-fix btn-success btn-xs btn-pay-action"
                                            data-idx="{{idx}}"
                                            {{turkRowCommandAttrs idx}}
                                            aria-label="{{turkText 'turk.approvePay'}}: {{turk_username}}"
                                        ><span class="fa fa-usd" aria-hidden="true"></span>&nbsp;{{turkText 'turk.approvePay'}}
                                        </button>
                                    {{else}}
                                        <button type="button"
                                            class="btn btn-fix btn-primary btn-xs btn-pay-detail"
                                            data-idx="{{idx}}"
                                            aria-label="{{turkText 'turk.approval'}}: {{turk_username}}"
                                        ><span class="fa fa-search-plus" aria-hidden="true"></span>&nbsp;
                                        {{turkpay}}
                                        </button>
                                    {{/if}}
                                </td>
                                <td>
                                    {{#if haveEmailSend}}
                                    <button type="button"
                                        class="btn btn-fix btn-primary btn-xs btn-send-detail"
                                        data-idx="{{idx}}"
                                        aria-label="{{turkText 'turk.emailSent'}}: {{turk_username}}"
                                    ><span class="fa fa-search-plus" aria-hidden="true"></span>&nbsp;{{turkEmailSend}}
                                    </button>
                                    {{else}}
                                    <span class="text-muted small">{{turkText 'turk.notSent'}}</span>
                                    {{/if}}
                                </td>
                                <td>
                                    {{#if haveDeliveryDetails}}
                                    <button type="button"
                                        class="btn btn-fix btn-primary btn-xs btn-delivery-detail"
                                        data-idx="{{idx}}"
                                        aria-label="{{turkText 'turk.delivery'}}: {{turk_username}}"
                                    ><span class="fa fa-search-plus" aria-hidden="true"></span>&nbsp;<span class="{{emailDeliveryBadgeClass}}">{{emailDeliveryStatus}}</span>&nbsp;({{emailDeliveryAttempts}})
                                    </button>
                                    <div class="small text-muted">{{turkText 'turk.last'}}: {{emailDeliveryLastAttemptDisplay}}</div>
                                    {{else}}
                                    <span class="text-muted small">{{turkText 'turk.noStatus'}}</span>
                                    {{/if}}
                                </td>
                                <td class="text-center">{{currentUnitDisplay}}</td>
                                <td>{{lastAction}}</td>
                                <td class="text-center">{{questionsSeen}}</td>
                                <td class="text-center">{{posttestCorrect}}</td>
                                <td>
                                    {{#if needBonus}}
                                        <button type="button" class="btn btn-fix btn-warning btn-xs btn-bonus-action" data-idx="{{idx}}" aria-label="{{turkText 'turk.sendBonus'}}: {{turk_username}}" {{turkRowCommandAttrs idx}}>
                                            <span class="fa fa-usd" aria-hidden="true"></span>&nbsp;{{turkText 'turk.sendBonus'}}
                                        </button>
                                    {{else}}
                                        <button type="button" class="btn btn-fix btn-primary btn-xs btn-bonus-detail" data-idx="{{idx}}" aria-label="{{turkText 'turk.bonus'}}: {{turk_username}}">
                                            <span class="fa fa-search-plus" aria-hidden="true"></span>&nbsp;{{turkbonus}}
                                        </button>
                                    {{/if}}
                                    </td>
                                </tr>
                                {{#if turkRowMessage idx}}
                                <tr class="admin-feedback-row">
                                    <td colspan="12"><div class="admin-table-feedback">
                                        {{#with turkRowMessage idx}}{{> adminStatus variant=level text=text urgent=(equals level "error")}}{{/with}}
                                    </div></td>
                                </tr>
                                {{/if}}
                            {{/each}}
                            </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div> <!-- /turkLogAll -->
        {{/if}}
        {{#with turkScopedMessage 'log'}}
        <div class="admin-inline-feedback admin-form-row-top">{{> adminStatus variant=level text=text urgent=(equals level "error")}}</div>
        {{/with}}
    </div>

            </div>
        </div>
    </div>

    <!-- Assignment Details -->
    <div class="admin-section">
        <div class="card admin-card">
            <div class="card-body">
                <div class="admin-section-heading">
                    <i class="fa fa-clipboard admin-section-icon"></i>
                    <h5>{{turkText 'turk.assignmentDetails'}}</h5>
                </div>
                <div class="row">
                    <div class="col-md-6 offset-md-3 text-center" id="turk-assignment-details">
                        <label for="turk-assignid" class="form-label">{{turkText 'turk.assignmentIdPlaceholder'}}</label>
                        <div class="input-group admin-form-row-sm">
                            <input type="text" class="form-control" name="turk-assignid" id="turk-assignid" value="" placeholder="{{turkText 'turk.assignmentIdPlaceholder'}}">
                            <button type="button" id="turk-show-assign" class="btn btn-fix"><i class="fa fa-search admin-button-icon"></i>{{turkText 'turk.getAssignment'}}</button>
                        </div>
                        <pre id="turk-assign-results" class="text-start admin-alert-compact rounded admin-preformatted-output"></pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Send Turk Message -->
    <div class="admin-section">
        <div class="card admin-card">
            <div class="card-body">
                <div class="admin-section-heading">
                    <i class="fa fa-envelope admin-section-icon"></i>
                    <h5>{{turkText 'turk.sendTurkMessage'}}</h5>
                </div>
                <div class="row">
                    <div class="col-md-6 offset-md-3" id="turk-send-message">
                        <div class="form-group admin-form-row">
                            <label for="turk-workerid" class="form-label">{{turkText 'turk.workerIdPlaceholder'}}</label>
                            <input type="text" class="form-control" name="turk-workerid" id="turk-workerid" value="" placeholder="{{turkText 'turk.workerIdPlaceholder'}}">
                        </div>
                        <div class="form-group admin-form-row">
                            <label for="turk-msg" class="form-label">{{turkText 'turk.messagePlaceholder'}}</label>
                            <textarea name="turk-msg" id="turk-msg" class="form-control" rows="8" placeholder="{{turkText 'turk.messagePlaceholder'}}"></textarea>
                        </div>
                        <div class="text-center">
                            <button type="button" id="turk-send-msg" class="btn btn-fix btn-primary" {{turkCommandAttrs 'send-message'}}>
                                <i class="fa fa-paper-plane admin-button-icon"></i>{{turkText 'turk.sendMessage'}}
                            </button>
                        </div>
                        {{#with turkScopedMessage 'send-message'}}
                        <div class="admin-inline-feedback admin-form-row-top">{{> adminStatus variant=level text=text urgent=(equals level "error")}}</div>
                        {{/with}}
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Remove Turk User -->
    <div class="admin-section">
        <div class="card admin-card">
            <div class="card-body">
                <div class="admin-section-heading">
                    <i class="fa fa-user-times admin-section-icon"></i>
                    <h5>{{turkText 'turk.removeTurkUser'}}</h5>
                </div>
                <div class="row text-center">
                    <div class="col-md-6 offset-md-3" id="turk-assignment-removal-container">
                        <p class="text-muted admin-form-row-sm">{{turkText 'turk.selectExperimentAndUser'}}</p>
                        <div class="form-group admin-form-row-sm">
                            {{#if logExperimentsError}}
                            {{> adminStatus variant="error" text=logExperimentsError urgent=true}}
                            {{/if}}
                            {{#if logExperimentsLoading}}
                            {{> adminStatus variant="info" text=(turkText 'common.loading')}}
                            {{/if}}
                            <label for="experiment-select" class="form-label">{{turkText 'turk.selectExperiment'}}</label>
                            <select id="experiment-select" class="form-select" disabled="{{logExperimentsLoading}}">
                                <option selected="selected" value="{{INVALID}}" disabled="true">{{turkText 'turk.selectExperiment'}}</option>
                                {{#each experiments}}
                                    <option value="{{_id}}">{{lessonName}}</option>
                                {{/each}}
                            </select>
                        </div>
                        <div class="form-group admin-form-row-sm">
                            {{#if removalUsersError}}
                            {{> adminStatus variant="error" text=removalUsersError urgent=true}}
                            {{/if}}
                            {{#if removalUsersLoading}}
                            {{> adminStatus variant="info" text=(turkText 'common.loading')}}
                            {{/if}}
                            <label for="user-select" class="form-label">{{turkText 'turk.selectUser'}}</label>
                            <select id="user-select" disabled="{{removalUserSelectDisabled}}" class="form-select">
                                <option selected="selected" value="{{INVALID}}" disabled="true">{{turkText 'turk.selectUser'}}</option>
                                {{#each turkIds}}
                                    <option value="{{this.userId}}">{{this.userName}}</option>
                                {{/each}}
                            </select>
                        </div>
                        <button type="button" id="turk-assignment-removal" class="btn btn-fix btn-danger" disabled="{{removalButtonDisabled}}" aria-busy="{{#if removalCommandBusy}}true{{else}}false{{/if}}">
                            <i class="fa fa-trash admin-button-icon"></i>{{turkText 'turk.removeTurkUser'}}
                        </button>
                        {{> adminInlineConfirmation confirmation=turkRemovalConfirmationView}}
                        {{#with turkScopedMessage 'removal'}}
                        <div class="admin-inline-feedback admin-form-row-top">{{> adminStatus variant=level text=text urgent=(equals level "error")}}</div>
                        {{/with}}
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div> <!-- /container -->

    <div class="modal fade" id="turkModal" tabindex="-1" role="dialog" aria-labelledby="turkModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="turkModalLabel"><i class="fa fa-spinner fa-spin admin-inline-icon"></i>{{turkText 'turk.pleaseWait'}}</h5>
                </div>
                <div class="modal-body">
                    <div class="admin-modal-body-row">
                        <img src="/styles/mofacts_waiting.gif"
                             alt="{{turkText 'turk.loadingPleaseWait'}}"
                             class="img-fluid admin-loading-image"
                             loading="lazy"
                             decoding="async"
                             fetchpriority="low"/>
                        <p class="admin-empty-text" id="turkModalMessage">{{turkText 'turk.pleaseWaitEllipsis'}}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="profileWorkModal" tabindex="-1" role="dialog" aria-labelledby="profileWorkModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="profileWorkModalLabel"><i class="fa fa-spinner fa-spin admin-inline-icon"></i>{{turkText 'turk.pleaseWait'}}</h5>
                </div>
                <div class="modal-body">
                    <div class="admin-modal-body-row">
                        <img src="/styles/mofacts_waiting.gif"
                             alt="{{turkText 'turk.loadingPleaseWait'}}"
                             class="img-fluid admin-loading-image"
                             loading="lazy"
                             decoding="async"
                             fetchpriority="low"/>
                        <p class="admin-empty-text" id="profileWorkModalMessage">{{profileWorkModalMessage}}</p>
                    </div>
                </div>
                {{#if saveComplete}}
                    <div class="modal-footer">
                        <button id="profileWorkModalDissmiss" type="button" class="btn btn-secondary" data-bs-dismiss="modal">{{turkText 'common.close'}}</button>
                    </div>
                {{/if}}
            </div>
        </div>
    </div>
    <div class="modal fade" id="detailsModal" tabindex="-1" role="dialog" aria-labelledby="detailsModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="detailsModalLabel"><i class="fa fa-info-circle admin-inline-icon"></i>{{turkText 'turk.detailsTitle'}}</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="{{turkText 'common.close'}}"></button>
                </div>
                <div class="modal-body">
                    <div id="detailsModalListing" class="admin-scroll-output"></div>
                </div>
            </div>
        </div>
    </div>

</template>
