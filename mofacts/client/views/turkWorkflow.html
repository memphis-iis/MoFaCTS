<!-- Turk Workflow Template -->

<template name="turkWorkflow">
    <style>
        /* Turk workflow modal overrides */
        #turkModal .modal-title,
        #profileWorkModal .modal-title {
            margin-left: 0;
            display: flex;
            align-items: center;
        }

        #turkModal .modal-body,
        #profileWorkModal .modal-body {
            padding: 1rem 1.25rem;
        }
    </style>
    <div class="container" style="margin-top: 1rem;">
        <h3 style="margin-top: 0; text-align: center;">Mechanical Turk</h3>

    <!-- AWS Login Data -->
    <div class="admin-section">
        <div class="card mb-4">
            <div class="card-body">
                <div class="d-flex align-items-center mb-3">
                    <i class="fa fa-key me-2" style="font-size: 1.25rem; color: var(--accent-color);"></i>
                    <h5 class="m-0">AWS Login Data</h5>
                </div>

    <div class="row" id="profileContainer">
        <div class="col-lg-6 col-md-8 offset-lg-3 offset-md-2">
                <div class="form-group mb-3">
                    <input type="text"
                        id="profileAWSID" name="profileAWSID"
                        class="form-control clearOnSave"
                        maxlength="40"
                        placeholder="{{#if have_aws_id}}Overwrite{{else}}Enter{{/if}} your AWS ID"
                    >
                </div>
                <div class="form-group mb-3">
                    <input type="password"
                        id="profileAWSSecret" name="profileAWSSecret"
                        class="form-control clearOnSave"
                        maxlength="60"
                        placeholder="{{#if have_aws_secret}}Overwrite{{else}}Enter{{/if}} your AWS Secret Key"
                    >
                </div>
                <div class="form-group text-center mb-3">
                    <div class="form-check d-inline-block">
                        <input type="checkbox" class="form-check-input" id="profileUseSandbox" name="profileUseSandbox" checked={{use_sandbox}}>
                        <label class="form-check-label" for="profileUseSandbox">Use Sandbox <span class="text-muted small">(Your AWS credentials are never shown)</span></label>
                    </div>
                </div>
                <div class="form-group text-center">
                    <button type='button' id='saveProfile' class='btn btn-fix'>
                        <i class="fa fa-save me-1"></i>Save Profile Data
                    </button>
                    <button type='button' id='testConfirmProfile' class='btn btn-fix btn-primary ms-2'>
                        <i class="fa fa-check-circle me-1"></i>Test and Confirm
                    </button>
                </div>
                <div class="form-group mt-3">
                    <div class="small text-muted">
                        <strong>Saved profile state:</strong> {{savedAwsProfileSummary}}
                    </div>
                    {{#if profileInlineStatus}}
                    <div class="alert {{profileInlineStatusClass}} mt-2 mb-0" role="alert">
                        <pre class="mb-0" style="white-space: pre-wrap;">{{profileInlineStatus}}</pre>
                    </div>
                    {{/if}}
                </div>
        </div>
    </div>

            </div>
        </div>
    </div>

    <!-- Experiment Logs -->
    <div class="admin-section">
        <div class="card mb-4">
            <div class="card-body">
                <div class="d-flex align-items-center mb-3">
                    <i class="fa fa-list-alt me-2" style="font-size: 1.25rem; color: var(--accent-color);"></i>
                    <h5 class="m-0">Experiment Logs</h5>
                </div>

    <div id="turkLogEntireWorkflow">
        <div class="row">
            <div class="col-md-6 text-center offset-md-3" id="turkLogSelectContainer">
                <p class="text-muted mb-2">Select a TDF to see the Turk Log</p>
                
                <select id="tdf-select" class="form-select">
                    <option value="">Select a lesson</option>
                    {{#each logExperiments}}
                    <option value="{{selectorKey}}" selected={{isSelectedLogExperiment selectorKey}}>{{displayLabel}}</option>
                    {{/each}}
                </select>
            </div>
        </div>
        {{#if turkExperimentLogToShow}}
        <div id="turkLogAll" class="mt-3">
            <div class="row">
                <div class="col-md-12">
                    <h5 class="text-center mb-2">
                        Turk Experiment Log <span id="turkExpTitle" class="text-muted"></span>
                    </h5>

                    <div class="form-group mb-3">
                        <input type="text" class="form-control" name="turklog-filt" id="turklog-filt" value="" placeholder="Only show users with this many trials">
                    </div>


                    <div class="admin-table-wrapper">
                        <div class="table-responsive">
                            <table class="table table-striped table-bordered table-sm">
                                <thead class="table-light">
                                    <tr>
                                        <th class="table-col-narrow">User MongoDB ID</th>
                                        <th class="table-col-narrow">User Name (Turk)</th>
                                        <th class="table-col-small">Email Sched</th>
                                        <th class="table-col-icon text-center">Correct</th>
                                        <th class="table-col-small">Approval</th>
                                        <th class="table-col-small">Email Sent</th>
                                        <th class="table-col-small">Delivery</th>
                                        <th class="table-col-icon text-center">Current Unit</th>
                                        <th class="table-col-narrow">Last Action Time</th>
                                        <th class="table-col-icon text-center">Q Seen</th>
                                        <th class="table-col-icon text-center">Posttest Correct</th>
                                        <th class="table-col-small">Bonus</th>
                                    </tr>
                                </thead>

                        <tbody>
                        {{#if turkExperimentLogEmpty}}
                            <tr>
                                <td colspan="12" class="text-center text-muted py-4">
                                    <i class="fa fa-info-circle me-1"></i>No experiment-mode users found for this TDF.
                                </td>
                            </tr>
                        {{/if}}
                        {{#each turkExperimentLog}}
                            <tr>
                                <td class="small text-break">{{userId}}</td>
                                <td>{{turk_username}}</td>
                                <td>
                                    {{#if haveEmailSched}}
                                    <button type="button"
                                        class="btn btn-fix btn-primary btn-xs btn-sched-detail"
                                        data-idx="{{idx}}"
                                    ><i class="fa fa-search-plus"></i>&nbsp;{{turkEmailSchedule}}
                                    </button>
                                    {{else}}
                                    <span class="text-muted small">Not scheduled</span>
                                    {{/if}}
                                </td>
                                <td class="text-center">{{answersCorrect}}</td>
                                <td>
                                    {{#if needPay}}
                                        <button type="button"
                                            class="btn btn-fix btn-success btn-xs btn-pay-action"
                                            data-idx="{{idx}}"
                                        ><span class="fa fa-usd" aria-hidden="true"></span>&nbsp;Approve/Pay
                                        </button>
                                    {{else}}
                                        <button type="button"
                                            class="btn btn-fix btn-primary btn-xs btn-pay-detail"
                                            data-idx="{{idx}}"
                                        ><span class="fa fa-search-plus" aria-hidden="true"></span>&nbsp;
                                        {{turkpay}}
                                        </button>
                                    {{/if}}
                                </td>
                                <td>
                                    {{#if haveEmailSend}}
                                    <button type="button"
                                        class="btn btn-fix btn-primary btn-xs btn-send-detail"
                                        data-idx="{{idx}}"
                                    ><span class="fa fa-search-plus" aria-hidden="true"></span>&nbsp;{{turkEmailSend}}
                                    </button>
                                    {{else}}
                                    <span class="text-muted small">Not sent</span>
                                    {{/if}}
                                </td>
                                <td>
                                    {{#if haveDeliveryDetails}}
                                    <button type="button"
                                        class="btn btn-fix btn-primary btn-xs btn-delivery-detail"
                                        data-idx="{{idx}}"
                                    ><span class="fa fa-search-plus" aria-hidden="true"></span>&nbsp;<span class="{{emailDeliveryBadgeClass}}">{{emailDeliveryStatus}}</span>&nbsp;({{emailDeliveryAttempts}})
                                    </button>
                                    <div class="small text-muted">Last: {{emailDeliveryLastAttemptDisplay}}</div>
                                    {{else}}
                                    <span class="text-muted small">No status</span>
                                    {{/if}}
                                </td>
                                <td class="text-center">{{currentUnitDisplay}}</td>
                                <td>{{lastAction}}</td>
                                <td class="text-center">{{questionsSeen}}</td>
                                <td class="text-center">{{posttestCorrect}}</td>
                                <td>
                                    {{#if needBonus}}
                                        <button type="button" class="btn btn-fix btn-warning btn-xs btn-bonus-action" data-idx="{{idx}}">
                                            <span class="fa fa-usd" aria-hidden="true"></span>&nbsp;Send Bonus
                                        </button>
                                    {{else}}
                                        <button type="button" class="btn btn-fix btn-primary btn-xs btn-bonus-detail" data-idx="{{idx}}">
                                            <span class="fa fa-search-plus" aria-hidden="true"></span>&nbsp;{{turkbonus}}
                                        </button>
                                    {{/if}}
                                    </td>
                                </tr>
                            {{/each}}
                            </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div> <!-- /turkLogAll -->
        {{/if}}
    </div>

            </div>
        </div>
    </div>

    <!-- Assignment Details -->
    <div class="admin-section">
        <div class="card mb-4">
            <div class="card-body">
                <div class="d-flex align-items-center mb-3">
                    <i class="fa fa-clipboard me-2" style="font-size: 1.25rem; color: var(--accent-color);"></i>
                    <h5 class="m-0">Assignment Details</h5>
                </div>
                <div class="row">
                    <div class="col-md-6 offset-md-3 text-center" id="turk-assignment-details">
                        <div class="input-group mb-2">
                            <input type="text" class="form-control" name="turk-assignid" id="turk-assignid" value="" placeholder="Mechanical Turk AssignmentID">
                            <button id="turk-show-assign" class="btn btn-fix"><i class="fa fa-search me-1"></i>Get Assignment</button>
                        </div>
                        <pre id="turk-assign-results" class="text-start bg-light p-2 rounded" style="width:100%; max-height: 300px; overflow-y: auto;"></pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Send Turk Message -->
    <div class="admin-section">
        <div class="card mb-4">
            <div class="card-body">
                <div class="d-flex align-items-center mb-3">
                    <i class="fa fa-envelope me-2" style="font-size: 1.25rem; color: var(--accent-color);"></i>
                    <h5 class="m-0">Send Turk Message</h5>
                </div>
                <div class="row">
                    <div class="col-md-6 offset-md-3" id="turk-send-message">
                        <div class="form-group mb-3">
                            <input type="text" class="form-control" name="turk-workerid" id="turk-workerid" value="" placeholder="Mechanical Turk WorkerID">
                        </div>
                        <div class="form-group mb-3">
                            <textarea name="turk-msg" id="turk-msg" class="form-control" rows="8" placeholder="Message text goes here"></textarea>
                        </div>
                        <div class="text-center">
                            <button id="turk-send-msg" class="btn btn-fix btn-primary">
                                <i class="fa fa-paper-plane me-1"></i>Send Message
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Remove Turk User -->
    <div class="admin-section">
        <div class="card mb-4">
            <div class="card-body">
                <div class="d-flex align-items-center mb-3">
                    <i class="fa fa-user-times me-2" style="font-size: 1.25rem; color: var(--accent-color);"></i>
                    <h5 class="m-0">Remove Turk User</h5>
                </div>
                <div class="row text-center">
                    <div class="col-md-6 offset-md-3" id="turk-assignment-removal-container">
                        <p class="text-muted mb-2">Select an Experiment and User to remove from Mechanical Turk</p>
                        <div class="form-group mb-2">
                            <select id="experiment-select" class="form-select">
                                <option selected="selected" value="{{INVALID}}" disabled="true">Select an Experiment</option>
                                {{#each experiments}}
                                    <option value="{{this._id}}">{{this.content.tdfs.tutor.setspec.lessonname}}</option>
                                {{/each}}
                            </select>
                        </div>
                        <div class="form-group mb-2">
                            <select id="user-select" disabled="true" class="form-select">
                                <option selected="selected" value="{{INVALID}}" disabled="true">Select a User</option>
                                {{#each turkIds}}
                                    <option value="{{this.userId}}">{{this.userName}}</option>
                                {{/each}}
                            </select>
                        </div>
                        <button id="turk-assignment-removal" class="btn btn-fix btn-danger">
                            <i class="fa fa-trash me-1"></i>Remove Turk User
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div> <!-- /container -->

    <div class="modal fade" id="turkModal" tabindex="-1" role="dialog" aria-labelledby="turkModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="turkModalLabel"><i class="fa fa-spinner fa-spin me-2"></i>Please Wait</h5>
                </div>
                <div class="modal-body">
                    <div class="d-flex align-items-center gap-3">
                        <img src="/styles/mofacts_waiting.gif"
                             alt="Loading, please wait"
                             class="img-fluid"
                             style="max-width: 80px;"
                             loading="lazy"
                             decoding="async"
                             fetchpriority="low"/>
                        <p class="m-0" id="turkModalMessage">Please wait&hellip;</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="profileWorkModal" tabindex="-1" role="dialog" aria-labelledby="profileWorkModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="profileWorkModalLabel"><i class="fa fa-spinner fa-spin me-2"></i>Please Wait</h5>
                </div>
                <div class="modal-body">
                    <div class="d-flex align-items-center gap-3">
                        <img src="/styles/mofacts_waiting.gif"
                             alt="Loading, please wait"
                             class="img-fluid"
                             style="max-width: 80px;"
                             loading="lazy"
                             decoding="async"
                             fetchpriority="low"/>
                        <p class="m-0" id="profileWorkModalMessage">{{profileWorkModalMessage}}</p>
                    </div>
                </div>
                {{#if saveComplete}}
                    <div class="modal-footer">
                        <button id="profileWorkModalDissmiss" type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    </div>
                {{/if}}
            </div>
        </div>
    </div>
    <div class="modal fade" id="detailsModal" tabindex="-1" role="dialog" aria-labelledby="detailsModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="detailsModalLabel"><i class="fa fa-info-circle me-2"></i>Turk Experiment Log Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="detailsModalListing" style="white-space: pre-wrap; max-height: 60vh; overflow-y: auto;"></div>
                </div>
            </div>
        </div>
    </div>

</template>
