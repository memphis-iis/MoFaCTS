<template name="instructions">
    {{#unless isLeavingInstructions}}
    {{#if UISettings.displayInstructionsTitle}}
    <div class="header-box">
        {{curTdfName}}:
        {{#if UISettings.displayUnitNameInInstructions}}
            {{curTdfName}}:
        {{/if}}
        Instructions
    </div>
    {{/if}}
    <div class="container instructions-container">
        <div class="card mb-4 instructions-card">
            <div class="card-body">
                <div class="row">
                    {{#if backgroundImage}}
                    <div class="col-lg-12">
                        <img src="{{backgroundImage}}"
                             alt=""
                             loading="lazy"
                             decoding="async"
                             fetchpriority="low">
                    </div>
                    {{/if}}
                </div>
                {{#if instructionText}}
                    <div class="row">
                        <div class="col-12 instructions-content">{{{instructionText}}}</div>
                    </div>
                {{/if}}
                {{#if allowcontinue}}
                    <div class="text-center mt-4"><span id="lockoutTimeRemaining"></span></div>
                    <div id="continueBar" class="full-width text-center" >
                        <span id="displayTimeoutMsg"></span>
                        {{#if islockout}}
                            <div class="row">
                                <div class="col-6 offset-3">
                                    <button type="button" id="continueButton" class="btn width-80-percent mx-auto" disabled>
                                    {{UIsettings.continueButtonText}}
                                    </button>
                                </div>
                            {{#if allowGoBack}}
                                <div class="col-1 offset-1">
                                    <button type="button" id="stepBackButton" class="btn width-80-percent mx-auto" disabled aria-label="Go back to previous question">
                                    <!-- back icon -->
                                    <i class="fa fa-arrow-left" aria-hidden="true"></i>
                                    </button>
                                </div>
                            {{/if}}
                            </div>
                        {{else}}
                            <div class="row">
                                <div class="col-6 offset-3">
                                    <button type="button" id="continueButton" class="btn width-80-percent mx-auto" disabled>
                                    {{UIsettings.continueButtonText}}
                                    </button>
                                </div>
                            {{#if allowGoBack}}
                                <div class="col-1 offset-1">
                                    <button type="button" id="stepBackButton" class="btn width-80-percent mx-auto" aria-label="Go back to previous question">
                                    <!-- back icon -->
                                    <i class="fa fa-arrow-left" aria-hidden="true"></i>
                                    </button>
                                </div>
                            {{/if}}
                            </div>
                        {{/if}}
                    </div>
                {{/if}}
            </div>
        </div>
    </div>
    {{/unless}}
</template>
