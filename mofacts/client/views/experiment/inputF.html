<template name="inputF">
    <div class="text-center w-80">
        <label for="userAnswer" class="sr-only">
            Enter your answer
        </label>
        <input type="text"
               id="userAnswer"
               class="w-100"
               autocomplete="off"
               autocorrect="off"
               autocapitalize="off"
               spellcheck="false"
               placeholder="{{UISettings.inputPlaceholder}}"
               aria-required="true">
    </div>

</template>

<template name="inputForceCorrect">
    <div style="{{getFontSizeStyle}}">
    <p id="forceCorrectGuidance" style="{{getFontSizeStyle}}"></p>
        <label for="userForceCorrect" class="sr-only">
            Enter the correct answer
        </label>
        <input type="text"
               id="userForceCorrect"
               class="alert alert-warning w-100"
               autocomplete="off"
               autocorrect="off"
               autocapitalize="off"
               spellcheck="false"
               aria-required="true"
               aria-describedby="forceCorrectGuidance">
    </div>
</template>
