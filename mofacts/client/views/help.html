<template name="help">
  <style>
    #helpContent.help-markdown h1,
    #helpContent.help-markdown h2,
    #helpContent.help-markdown h3,
    #helpContent.help-markdown h4,
    #helpContent.help-markdown h5,
    #helpContent.help-markdown h6 {
      line-height: 1.25;
      font-weight: 600;
      margin-top: 1.4rem;
      margin-bottom: 0.65rem;
    }

    #helpContent.help-markdown h1 {
      font-size: 2rem;
    }

    #helpContent.help-markdown h2 {
      font-size: 1.55rem;
    }

    #helpContent.help-markdown h3 {
      font-size: 1.3rem;
    }

    #helpContent.help-markdown h4 {
      font-size: 1.15rem;
    }

    #helpContent.help-markdown h5,
    #helpContent.help-markdown h6 {
      font-size: 1rem;
    }

    #helpContent.help-markdown img {
      height: auto;
      max-width: 100%;
    }

    #helpContent.help-markdown a {
      overflow-wrap: anywhere;
    }
  </style>
  <div class="page-container page-loading" id="helpContainer">
    <div class="card mb-4">
      <div class="card-body">
        <div class="d-flex align-items-center mb-3">
          <i class="fa fa-question-circle me-2" style="font-size: 1.25rem; color: var(--accent-color);"></i>
          <h5 class="m-0">Student Help Guide</h5>
        </div>

        {{#if ownerContact}}
        <p class="text-center mb-4">
          <em>If you experience any issues or need assistance, please contact the web administrator: <strong>{{ownerContact}}</strong></em>
        </p>
        {{/if}}

        <div id="helpContent" class="mt-4 help-markdown">
        </div>
      </div>
    </div>
  </div>
</template>
