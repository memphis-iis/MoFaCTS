<template name="help">
  <style>
    #helpContent.help-markdown h1,
    #helpContent.help-markdown h2,
    #helpContent.help-markdown h3,
    #helpContent.help-markdown h4,
    #helpContent.help-markdown h5,
    #helpContent.help-markdown h6 {
      line-height: 1.25;
      font-weight: 600;
      margin-top: calc(1.4rem * var(--app-density-scale));
      margin-bottom: calc(0.65rem * var(--app-density-scale));
    }

    #helpContent.help-markdown h1 {
      font-size: calc(var(--app-font-size-base) * 2);
    }

    #helpContent.help-markdown h2 {
      font-size: calc(var(--app-font-size-base) * 1.55);
    }

    #helpContent.help-markdown h3 {
      font-size: calc(var(--app-font-size-base) * 1.3);
    }

    #helpContent.help-markdown h4 {
      font-size: calc(var(--app-font-size-base) * 1.15);
    }

    #helpContent.help-markdown h5,
    #helpContent.help-markdown h6 {
      font-size: var(--app-font-size-base);
    }

    #helpContent.help-markdown img {
      height: auto;
      max-width: 100%;
    }

    #helpContent.help-markdown a {
      overflow-wrap: anywhere;
    }
  </style>
  <div class="page-container page-loading" id="helpContainer">
    <div class="card admin-card">
      <div class="card-body">
        <div class="admin-section-heading">
          <i class="fa fa-question-circle admin-section-icon"></i>
          <h5>{{t 'help.studentHelpGuide'}}</h5>
        </div>

        {{#if ownerContact}}
        <p class="text-center admin-card">
          <em>{{t 'help.contactAdministrator' ownerContact=ownerContact}}</em>
        </p>
        {{/if}}

        <div id="helpContent" class="help-content help-markdown">
        </div>
      </div>
    </div>
  </div>
</template>
