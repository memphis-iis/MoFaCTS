<template name="help">
  <style>
    #helpContent.help-markdown h1,
    #helpContent.help-markdown h2,
    #helpContent.help-markdown h3,
    #helpContent.help-markdown h4,
    #helpContent.help-markdown h5,
    #helpContent.help-markdown h6 {
      line-height: 1.25;
      font-weight: 600;
      margin-top: 1.4rem;
      margin-bottom: 0.65rem;
    }

    #helpContent.help-markdown h1 {
      font-size: 2rem;
    }

    #helpContent.help-markdown h2 {
      font-size: 1.55rem;
    }

    #helpContent.help-markdown h3 {
      font-size: 1.3rem;
    }

    #helpContent.help-markdown h4 {
      font-size: 1.15rem;
    }

    #helpContent.help-markdown h5,
    #helpContent.help-markdown h6 {
      font-size: 1rem;
    }

    #helpContent.help-markdown img {
      height: auto;
      max-width: 100%;
    }

    #helpContent.help-markdown a {
      overflow-wrap: anywhere;
    }
  </style>
  <div class="page-container page-loading" id="helpContainer">
    <h3 style="margin-top: 0; text-align: center;">Student Help Guide</h3>
    {{#if ownerContact}}
    <p style="text-align: center; margin-bottom: 20px;">
      <em>If you experience any issues or need assistance, please contact the web administrator: <strong>{{ownerContact}}</strong></em>
    </p>
    {{/if}}

    <div id="helpContent" class="mt-4 help-markdown">
    </div>
  </div>
</template>
