<template name="home">
  <div class="welcome">
    {{{homeWelcomeHtml}}}
  </div>
  {{> learningDashboard}}

  <div id="mainMenuReturnTour" class="main-menu-return-tour" role="status" aria-live="polite" hidden>
    <span class="main-menu-return-tour-arrow" aria-hidden="true"></span>
    <span class="main-menu-return-tour-text">{{t 'home.startPracticeFromMenu'}}</span>
  </div>
</template>

<template name="appSidebar">
  <aside class="sidebar" id="sidebar" aria-label="{{t 'home.practiceMenu'}}">
      <div class="sidebar-header">
        <div class="logo">
          {{#if currentTheme.properties.brand_logo_url}}
            <span
              class="navbar-brand-icon"
              aria-hidden="true"
              style="--navbar-brand-icon-image: url('{{currentTheme.properties.brand_logo_url}}');"></span>
          {{else}}
            <span class="fa fa-graduation-cap" aria-hidden="true"></span>
          {{/if}}
          <span>{{systemName}}</span>
        </div>
        <button class="icon-btn" id="sidebarToggle" type="button" aria-label="{{t 'home.toggleSidebar'}}" title="{{t 'home.collapseSidebar'}}">
          <span class="header-action-icon header-action-icon-sidebar" aria-hidden="true"></span>
        </button>
      </div>

      <nav class="sidebar-nav">
        <div class="section">
          <div class="section-title">{{t 'home.learn'}}</div>
          <button type="button" class="nav-item {{sidebarActiveClass 'home'}}" data-label="{{t 'home.practice'}}" id="homePracticeButton">
            <span class="fa fa-play-circle" aria-hidden="true"></span>
            <span>{{t 'home.practice'}}</span>
          </button>
          <button type="button" class="nav-item {{sidebarActiveClass 'courses'}}" data-label="{{t 'home.courses'}}" id="coursesButton">
            <span class="fa fa-list-alt" aria-hidden="true"></span>
            <span>{{t 'home.courses'}}</span>
          </button>
          <button type="button" class="nav-item {{sidebarActiveClass 'content'}}" data-label="{{t 'home.content'}}" id="contentUploadButton">
            <span class="fa fa-folder-open" aria-hidden="true"></span>
            <span>{{t 'home.content'}}</span>
          </button>
          <button type="button" class="nav-item {{sidebarActiveClass 'data'}}" data-label="{{t 'home.data'}}" id="dataDownloadButton">
            <span class="fa fa-download" aria-hidden="true"></span>
            <span>{{t 'home.data'}}</span>
          </button>
        </div>

        {{#if isInRole 'teacher'}}
          <div class="section">
            <div class="section-title">{{t 'home.teacher'}}</div>
            <button type="button" class="nav-item {{sidebarActiveClass 'classEdit'}}" data-label="{{t 'home.courses'}}" id="classEditButton">
              <span class="fa fa-users" aria-hidden="true"></span>
              <span>{{t 'home.courses'}}</span>
            </button>
            <button type="button" class="nav-item {{sidebarActiveClass 'instructorReporting'}}" data-label="{{t 'home.grades'}}" id="instructorReportingButton">
              <span class="fa fa-bar-chart" aria-hidden="true"></span>
              <span>{{t 'home.grades'}}</span>
            </button>
            <button type="button" class="nav-item {{sidebarActiveClass 'tdfAssignmentEdit'}}" data-label="{{t 'home.assignments'}}" id="tdfAssignmentEditButton">
              <span class="fa fa-tasks" aria-hidden="true"></span>
              <span>{{t 'home.assignments'}}</span>
            </button>
          </div>
        {{/if}}

        {{#if isInRole 'admin'}}
          <div class="section">
            <div class="section-title">{{t 'home.admin'}}</div>
            <button type="button" class="nav-item {{sidebarActiveClass 'adminControls'}}" data-label="{{t 'home.adminControlPanel'}}" id="adminControlsBtn">
              <span class="fa fa-cogs" aria-hidden="true"></span>
              <span>{{t 'home.adminControlPanel'}}</span>
            </button>
            <button type="button" class="nav-item {{sidebarActiveClass 'userAdmin'}}" data-label="{{t 'home.userAdmin'}}" id="userAdminButton">
              <span class="fa fa-user" aria-hidden="true"></span>
              <span>{{t 'home.userAdmin'}}</span>
            </button>
            <button type="button" class="nav-item {{sidebarActiveClass 'turkWorkflow'}}" data-label="{{t 'home.mechanicalTurk'}}" id="mechTurkButton">
              <span class="fa fa-wrench" aria-hidden="true"></span>
              <span>{{t 'home.mechanicalTurk'}}</span>
            </button>
            <button type="button" class="nav-item {{sidebarActiveClass 'theme'}}" data-label="{{t 'home.theme'}}" id="themeButton">
              <span class="fa fa-paint-brush" aria-hidden="true"></span>
              <span>{{t 'home.theme'}}</span>
            </button>
            <button type="button" class="nav-item {{sidebarActiveClass 'adminTests'}}" data-label="{{t 'home.adminTests'}}" id="adminTestsButton">
              <span class="fa fa-flask" aria-hidden="true"></span>
              <span>{{t 'home.adminTests'}}</span>
            </button>
            <button type="button" class="nav-item {{sidebarActiveClass 'adminBackups'}}" data-label="{{t 'home.backups'}}" id="adminBackupsButton">
              <span class="fa fa-archive" aria-hidden="true"></span>
              <span>{{t 'home.backups'}}</span>
            </button>
          </div>
        {{/if}}
      </nav>

      <div class="sidebar-collapsed-brand" aria-hidden="true">
        {{#if currentTheme.properties.brand_logo_url}}
          <span
            class="navbar-brand-icon"
            style="--navbar-brand-icon-image: url('{{currentTheme.properties.brand_logo_url}}');"></span>
        {{else}}
          <span class="fa fa-graduation-cap"></span>
        {{/if}}
      </div>
    </aside>
</template>

<template name="appAccountMenu">
  <div class="user-area" id="userAccountArea">
    <button type="button" class="user-toggle" id="userToggle" aria-haspopup="true" aria-expanded="{{#if accountMenuOpen}}true{{else}}false{{/if}}" aria-controls="userDropdown">
      <span class="avatar {{userAvatarClass}}">
        {{#if userAvatarIsImage}}
          <img src="{{userAvatarImageData}}" alt="" aria-hidden="true">
        {{else}}
          {{#if userAvatarIsIcon}}
            <span class="fa {{userAvatarIconClass}}" aria-hidden="true"></span>
          {{else}}
            {{userInitials}}
          {{/if}}
        {{/if}}
      </span>
      <span class="user-info">
        <span class="user-email">{{userDisplayName}}</span>
        <span class="user-role">{{userRoleLabel}}</span>
      </span>
      <span class="fa fa-chevron-down caret" aria-hidden="true"></span>
    </button>
    <div class="home-user-menu {{#if accountMenuOpen}}open{{/if}}" id="userDropdown">
      <button type="button" class="dropdown-item" data-home-action="profile">{{t 'home.profile'}}</button>
      <button type="button" class="dropdown-item dropdown-item-with-caret" data-home-action="toggleLocale" aria-expanded="{{#if localeMenuOpen}}true{{else}}false{{/if}}" aria-controls="localeSelectionMenu">
        <span>{{t 'home.language'}}</span>
        <span class="fa fa-chevron-right theme-menu-caret" aria-hidden="true"></span>
      </button>
      <div class="locale-selection-menu {{#if localeMenuOpen}}open{{/if}}" id="localeSelectionMenu">
        {{#each availableUiLocales}}
          <button type="button" class="dropdown-item locale-selection-item {{localeSelectionActiveClass locale}}" data-ui-locale="{{locale}}">
            <span>{{label}}</span>
            {{#if isSelectedUiLocale locale}}
              <span class="fa fa-check theme-selection-check" aria-hidden="true"></span>
            {{/if}}
          </button>
        {{/each}}
      </div>
      <button type="button" class="dropdown-item" data-home-action="audioSettings">{{t 'home.audioSettings'}}</button>
      <button type="button" class="dropdown-item dropdown-item-with-caret" data-home-action="toggleTheme" aria-expanded="{{#if themeMenuOpen}}true{{else}}false{{/if}}" aria-controls="themeSelectionMenu">
        <span>{{t 'home.toggleTheme'}}</span>
        <span class="fa fa-chevron-right theme-menu-caret" aria-hidden="true"></span>
      </button>
      <div class="theme-selection-menu {{#if themeMenuOpen}}open{{/if}}" id="themeSelectionMenu">
        {{#if themeLibraryLoading}}
          <div class="theme-selection-empty" role="status">{{t 'common.loading'}}</div>
        {{else}}
          {{#if themeLibraryError}}
            <div class="theme-selection-empty" role="alert">{{themeLibraryError}}</div>
          {{else}}
            {{#if hasAvailableThemes}}
              {{#each availableUserThemes}}
                <button type="button" class="dropdown-item theme-selection-item {{themeSelectionActiveClass id}}" data-theme-id="{{id}}">
                  <span>{{themeSelectionName this}}</span>
                  {{#if isSelectedTheme id}}
                    <span class="fa fa-check theme-selection-check" aria-hidden="true"></span>
                  {{/if}}
                </button>
              {{/each}}
            {{else}}
              <div class="theme-selection-empty">{{t 'home.noThemesConfigured'}}</div>
            {{/if}}
          {{/if}}
        {{/if}}
      </div>
      <div class="dropdown-divider"></div>
      <button type="button" class="dropdown-item" data-home-action="help">{{t 'home.help'}}</button>
      <button type="button" class="dropdown-item" data-home-action="tour">{{t 'home.tour'}}</button>
      <button type="button" class="dropdown-item" data-home-action="documentation">{{t 'home.documentation'}}</button>
      <div class="dropdown-divider"></div>
      <button type="button" class="dropdown-item" data-home-action="logout">{{t 'home.logOut'}}</button>
    </div>
  </div>
</template>

<template name="appPracticeMenu">
  <aside class="app-practice-menu {{#if practiceMenuOpen}}is-open{{/if}}" aria-label="{{t 'home.practiceTools'}}">
    <button type="button" class="app-practice-menu-toggle" id="practiceMenuToggle" aria-expanded="{{#if practiceMenuOpen}}true{{else}}false{{/if}}">
      <span class="app-practice-menu-toggle-icon" aria-hidden="true"></span>
      <span class="app-practice-menu-toggle-text">{{t 'home.menu'}}</span>
    </button>
    <div class="app-practice-menu-panel">
      <button type="button" data-practice-menu-action="home"><span class="fa fa-play-circle" aria-hidden="true"></span> {{t 'home.practice'}}</button>
      <button type="button" data-practice-menu-action="courses"><span class="fa fa-list-alt" aria-hidden="true"></span> {{t 'home.courses'}}</button>
      <button type="button" data-practice-menu-action="contentUpload"><span class="fa fa-folder-open" aria-hidden="true"></span> {{t 'home.content'}}</button>
      <button type="button" data-practice-menu-action="dataDownload"><span class="fa fa-download" aria-hidden="true"></span> {{t 'home.detailedData'}}</button>
      {{#if isInRole 'teacher'}}
        <button type="button" data-practice-menu-action="classEdit"><span class="fa fa-users" aria-hidden="true"></span> {{t 'home.courses'}}</button>
        <button type="button" data-practice-menu-action="instructorReporting"><span class="fa fa-bar-chart" aria-hidden="true"></span> {{t 'home.grades'}}</button>
        <button type="button" data-practice-menu-action="tdfAssignmentEdit"><span class="fa fa-tasks" aria-hidden="true"></span> {{t 'home.assignments'}}</button>
      {{/if}}
      {{#if isInRole 'admin'}}
        <button type="button" data-practice-menu-action="adminControls"><span class="fa fa-cogs" aria-hidden="true"></span> {{t 'home.adminControlPanel'}}</button>
        <button type="button" data-practice-menu-action="userAdmin"><span class="fa fa-user" aria-hidden="true"></span> {{t 'home.userAdmin'}}</button>
        <button type="button" data-practice-menu-action="turkWorkflow"><span class="fa fa-wrench" aria-hidden="true"></span> {{t 'home.mechanicalTurk'}}</button>
        <button type="button" data-practice-menu-action="theme"><span class="fa fa-paint-brush" aria-hidden="true"></span> {{t 'home.theme'}}</button>
        <button type="button" data-practice-menu-action="adminTests"><span class="fa fa-flask" aria-hidden="true"></span> {{t 'home.adminTests'}}</button>
        <button type="button" data-practice-menu-action="adminBackups"><span class="fa fa-archive" aria-hidden="true"></span> {{t 'home.backups'}}</button>
      {{/if}}
    </div>
  </aside>
</template>
