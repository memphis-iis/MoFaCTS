<template name="learningDashboard">
  <div class="practice-menu-container" id="learningDashboardContainer">
    {{#with recentUsedTdf}}
      <section class="resume-card" aria-label="{{t 'dashboard.resumeRecentLesson'}}">
        <div class="resume-bg" aria-hidden="true"></div>
        <div class="thumb" aria-hidden="true">
          <span class="fa fa-book"></span>
        </div>
        <div class="resume-content">
          <div class="resume-title">{{displayLabel}}</div>
          <div class="resume-metrics">
            <div class="metric">
              <div class="metric-value">{{this.totalTrials}}</div>
              <div class="metric-label">{{t 'dashboard.totalTrials'}}</div>
            </div>
            <div class="metric">
              <div class="metric-value">{{accuracyDisplay}}</div>
              {{#if this.isUsed}}
                <div class="accuracy-bar resume-accuracy-bar"><div class="accuracy-fill" style="width:{{accuracyBarWidth}}"></div></div>
              {{/if}}
              <div class="metric-label">{{t 'dashboard.overallAccuracy'}}</div>
            </div>
            <div class="metric">
              <div class="metric-value">{{itemsPracticedDisplay}}</div>
              <div class="metric-label">{{t 'dashboard.itemsPracticed'}}</div>
            </div>
            <div class="metric">
              <div class="metric-value">{{this.totalSessions}}</div>
              <div class="metric-label">{{t 'dashboard.daysWithSessions'}}</div>
            </div>
            <div class="metric">
              <div class="metric-value">{{this.totalTimeMinutes}}</div>
              <div class="metric-label">{{t 'dashboard.timeMinutes'}}</div>
            </div>
          </div>
        </div>
        <button class="btn btn-primary learning-dashboard-action-button btn-continue continue-lesson"
          data-tdfid="{{this.TDFId}}"
          data-lessonname="{{this.displayName}}"
          data-currentstimulisetid="{{this.currentStimuliSetId}}"
          data-ismultitdf="{{this.isMultiTdf}}">
          {{t 'dashboard.continue'}}
        </button>
      </section>
    {{/with}}

    <div class="learning-dashboard-practice-area">
      <section class="table-card learning-dashboard-toolbar-card">
      <div class="table-toolbar">
        <div class="toolbar-search">
          <span class="fa fa-search" aria-hidden="true"></span>
          <input id="learningDashboardSearch" type="text" placeholder="{{t 'dashboard.searchPlaceholder'}}" value="{{searchQuery}}" disabled="{{#if loadingShellBusy}}disabled{{/if}}" aria-disabled="{{#if loadingShellBusy}}true{{else}}false{{/if}}">
          {{#if hasSearchQuery}}
            <button type="button" class="learning-dashboard-search-clear" aria-label="{{t 'dashboard.clearSearch'}}" title="{{t 'dashboard.clearSearch'}}" disabled="{{#if isLoading}}disabled{{/if}}">
              <span class="fa fa-times" aria-hidden="true"></span>
            </button>
          {{/if}}
        </div>
        <div class="toolbar-filters" aria-live="polite">
          <button type="button" class="filter">{{lessonSummaryText}}</button>
        </div>
      </div>
      </section>

      <div class="learning-dashboard-content-shell {{#if loadingShellBusy}}is-loading{{else}}is-ready{{/if}}" aria-busy="{{#if loadingShellBusy}}true{{else}}false{{/if}}">
        {{#if showLoadingFeedback}}
          <section class="table-card learning-dashboard-loading-card-shell">
          {{#if showSlowLoading}}
          <div class="learning-dashboard-slow-loading" role="status" aria-live="polite">
            <span class="fa fa-wifi" aria-hidden="true"></span>
            <span>{{t 'common.loadingTakingLonger'}}</span>
          </div>
          {{else}}
          <div class="learning-dashboard-loading-preview" aria-hidden="true">
            <div class="learning-dashboard-loading-section">
              <div class="learning-dashboard-loading-heading">
                <span class="learning-dashboard-skeleton learning-dashboard-skeleton--heading"></span>
              </div>
              <div class="learning-dashboard-loading-table">
                <div class="learning-dashboard-loading-header">
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                </div>
                {{#each loadingRows}}
                  <div class="learning-dashboard-loading-row">
                    <span class="learning-dashboard-skeleton learning-dashboard-skeleton--button"></span>
                    <span class="learning-dashboard-skeleton learning-dashboard-skeleton--icon"></span>
                    <span class="learning-dashboard-skeleton learning-dashboard-skeleton--title"></span>
                    <span class="learning-dashboard-skeleton learning-dashboard-skeleton--short"></span>
                    <span class="learning-dashboard-skeleton learning-dashboard-skeleton--meter"></span>
                    <span class="learning-dashboard-skeleton learning-dashboard-skeleton--short"></span>
                  </div>
                  <div class="learning-dashboard-loading-card">
                    <span class="learning-dashboard-skeleton learning-dashboard-skeleton--title"></span>
                    <span class="learning-dashboard-skeleton learning-dashboard-skeleton--meta"></span>
                    <div class="learning-dashboard-loading-card-actions">
                      <span class="learning-dashboard-skeleton learning-dashboard-skeleton--button"></span>
                      <span class="learning-dashboard-skeleton learning-dashboard-skeleton--button"></span>
                    </div>
                  </div>
                {{/each}}
              </div>
            </div>
            <div class="learning-dashboard-loading-section learning-dashboard-loading-section--secondary">
              <div class="learning-dashboard-loading-heading">
                <span class="learning-dashboard-skeleton learning-dashboard-skeleton--heading learning-dashboard-skeleton--heading-short"></span>
              </div>
              <div class="learning-dashboard-loading-table">
                {{#each loadingRowsShort}}
                  <div class="learning-dashboard-loading-row">
                    <span class="learning-dashboard-skeleton learning-dashboard-skeleton--button"></span>
                    <span class="learning-dashboard-skeleton learning-dashboard-skeleton--icon"></span>
                    <span class="learning-dashboard-skeleton learning-dashboard-skeleton--title"></span>
                    <span class="learning-dashboard-skeleton learning-dashboard-skeleton--short"></span>
                    <span class="learning-dashboard-skeleton learning-dashboard-skeleton--meter"></span>
                    <span class="learning-dashboard-skeleton learning-dashboard-skeleton--short"></span>
                  </div>
                  <div class="learning-dashboard-loading-card">
                    <span class="learning-dashboard-skeleton learning-dashboard-skeleton--title"></span>
                    <span class="learning-dashboard-skeleton learning-dashboard-skeleton--meta"></span>
                    <div class="learning-dashboard-loading-card-actions">
                      <span class="learning-dashboard-skeleton learning-dashboard-skeleton--button"></span>
                    </div>
                  </div>
                {{/each}}
              </div>
            </div>
          </div>
          <div class="sr-only" role="status" aria-live="polite">{{t 'dashboard.loadingLessons'}}</div>
          {{/if}}
          </section>
        {{else}}
          {{#unless isLoading}}
          {{#if hasTdfs}}
            <div class="learning-dashboard-sections learning-dashboard-content-ready">
              {{#if hasUsedTdfs}}
                <section class="table-card practice-section">
                  <div class="practice-section-heading">{{t 'dashboard.continuePracticing'}}</div>
                  {{> learningDashboardLessonTable tdfs=usedTdfsList learnerConfigState=learnerConfigState allowStatistics=true statisticsExpanded=statisticsExpanded}}
                  {{> learningDashboardLessonCards tdfs=usedTdfsList learnerConfigState=learnerConfigState}}
                </section>
              {{/if}}
              {{#if hasUnusedTdfs}}
                <section class="table-card practice-section">
                  <div class="practice-section-heading">{{t 'dashboard.newLessons'}}</div>
                  {{> learningDashboardLessonTable tdfs=unusedTdfsList learnerConfigState=learnerConfigState allowStatistics=false statisticsExpanded=false}}
                  {{> learningDashboardLessonCards tdfs=unusedTdfsList learnerConfigState=learnerConfigState}}
                </section>
              {{/if}}
            </div>
          {{else}}
            <div class="table-card practice-empty-state">
              <p class="learning-dashboard-flush">{{t 'dashboard.noLessonsFound'}}</p>
            </div>
          {{/if}}
          {{/unless}}
        {{/if}}
      </div>
    </div>
  </div>
</template>

<template name="learningDashboardLessonTable">
  <div class="learning-dashboard-table-shell">
    <div class="table-wrap">
      <table class="practice-table learning-dashboard-table {{statisticsTableClass}}">
        <colgroup>
          <col class="learning-dashboard-col-action">
          <col class="practice-col-icon">
          <col class="learning-dashboard-col-lesson">
          {{#if statisticsExpanded}}
            <col class="learning-dashboard-col-stat">
            <col class="learning-dashboard-col-stat">
            <col class="learning-dashboard-col-stat">
            <col class="learning-dashboard-col-stat">
            <col class="learning-dashboard-col-stat">
            <col class="learning-dashboard-col-last-practice">
          {{/if}}
        </colgroup>
        <thead>
          <tr>
            <th scope="col" class="actions-heading">{{t 'dashboard.actions'}}</th>
            <th scope="col" class="features-heading">{{t 'dashboard.features'}}</th>
            <th scope="col" class="study-set-heading">
              <div class="learning-dashboard-study-set-heading-content">
                <span>{{t 'dashboard.studySet'}}</span>
                {{#if statisticsAvailable}}
                  <button type="button"
                    class="learning-dashboard-statistics-toggle"
                    aria-expanded="{{#if statisticsExpanded}}true{{else}}false{{/if}}"
                    title="{{statisticsToggleLabel}}">
                    <span>{{statisticsToggleLabel}}</span>
                    <span class="fa {{statisticsToggleIconClass}}" aria-hidden="true"></span>
                  </button>
                {{/if}}
              </div>
            </th>
            {{#if statisticsExpanded}}
              <th scope="col" class="num learning-dashboard-statistics-cell learning-dashboard-statistics-cell--first">{{t 'dashboard.totalTrials'}}</th>
              <th scope="col" class="learning-dashboard-statistics-cell">{{t 'dashboard.overallAccuracy'}}</th>
              <th scope="col" class="num learning-dashboard-statistics-cell">{{t 'dashboard.itemsPracticed'}}</th>
              <th scope="col" class="num learning-dashboard-statistics-cell">{{t 'dashboard.daysWithSessions'}}</th>
              <th scope="col" class="num learning-dashboard-statistics-cell">{{t 'dashboard.timeMinutes'}}</th>
              <th scope="col" class="learning-dashboard-statistics-cell">{{t 'courses.lastPractice'}}</th>
            {{/if}}
          </tr>
        </thead>
        <tbody>
          {{#each tdfs}}
            <tr class="learning-dashboard-row {{#if this.isUsed}}learning-dashboard-row--used{{else}}learning-dashboard-row--unused{{/if}}">
              <td class="learning-dashboard-cell learning-dashboard-cell--action" data-label="{{t 'dashboard.action'}}">
                <div class="learning-dashboard-cell__value learning-dashboard-action">
                  {{#if this.conditions}}
                    <div class="learning-dashboard-action-group">
                      <button class="btn btn-sm btn-success learning-dashboard-action-button start-condition-root">{{t 'dashboard.start'}}</button>
                      {{#if showSettingsButton}}
                        <button class="btn btn-sm btn-outline-secondary learning-dashboard-action-button configure-lesson" data-tdfid="{{this.TDFId}}">{{t 'dashboard.settings'}}</button>
                      {{/if}}
                    </div>
                  {{else if this.isUsed}}
                    <div class="learning-dashboard-action-group">
                      <button class="btn btn-sm btn-primary learning-dashboard-action-button continue-lesson"
                        data-tdfid="{{this.TDFId}}"
                        data-lessonname="{{this.displayName}}"
                        data-currentstimulisetid="{{this.currentStimuliSetId}}"
                        data-ismultitdf="{{this.isMultiTdf}}">{{t 'dashboard.continue'}}</button>
                      {{#if showSettingsButton}}
                        <button class="btn btn-sm btn-outline-secondary learning-dashboard-action-button configure-lesson" data-tdfid="{{this.TDFId}}">{{t 'dashboard.settings'}}</button>
                      {{/if}}
                    </div>
                  {{else}}
                    <div class="learning-dashboard-action-group">
                      <button class="btn btn-sm btn-success learning-dashboard-action-button start-lesson"
                        data-tdfid="{{this.TDFId}}"
                        data-lessonname="{{this.displayName}}"
                        data-currentstimulisetid="{{this.currentStimuliSetId}}"
                        data-ismultitdf="{{this.isMultiTdf}}">{{t 'dashboard.start'}}</button>
                      {{#if showSettingsButton}}
                        <button class="btn btn-sm btn-outline-secondary learning-dashboard-action-button configure-lesson" data-tdfid="{{this.TDFId}}">{{t 'dashboard.settings'}}</button>
                      {{/if}}
                    </div>
                  {{/if}}
                </div>
              </td>
              <td class="learning-dashboard-cell practice-icon-cell" data-label="{{t 'dashboard.features'}}">
                <span class="practice-feature-icons" aria-label="{{t 'dashboard.lessonFeatures'}}">
                  {{#if firstContentUnitIconClass}}
                    <span class="fa {{firstContentUnitIconClass}} content-unit-icon" title="{{firstContentUnitIconTitle}}"></span>
                  {{/if}}
                  {{#if showTtsIcon}}
                    <span class="fa fa-headphones {{ttsIconClass}}" title="{{ttsIconTitle}}"></span>
                  {{/if}}
                  {{#if showSrIcon}}
                    <span class="fa fa-microphone {{srIconClass}}" title="{{srIconTitle}}"></span>
                  {{/if}}
                </span>
              </td>
              <th scope="row" class="learning-dashboard-cell learning-dashboard-cell--lesson" data-label="{{t 'dashboard.studySet'}}">
                <div class="learning-dashboard-cell__value learning-dashboard-lesson">
                  <div class="d-flex align-items-center gap-2 flex-wrap">
                    <span class="set-name" title="{{displayLabel}}">{{displayLabel}}</span>
                    {{#if this.conditions}}
                      <select class="form-select form-select-sm condition-tdf-selector learning-dashboard-condition-selector"
                        data-roottdfid="{{this.TDFId}}">
                        <option value="{{this.TDFId}}">{{this.displayName}} ({{t 'dashboard.autoAssign'}})</option>
                        {{#each this.conditions}}
                          <option value="{{this.tdfId}}">{{this.fileName}} ({{this.count}})</option>
                        {{/each}}
                      </select>
                    {{/if}}
                  </div>
                  {{#if this.languageMetadataRows}}
                    <div class="learning-dashboard-language-metadata text-muted small">
                      {{#each this.languageMetadataRows}}
                        <span class="learning-dashboard-language-metadata-item"><b>{{label}}:</b> {{value}}</span>
                      {{/each}}
                    </div>
                  {{/if}}
                </div>
              </th>
              {{#if statisticsExpanded}}
                <td class="learning-dashboard-cell learning-dashboard-cell--stat num learning-dashboard-statistics-cell learning-dashboard-statistics-cell--first" data-label="{{t 'dashboard.totalTrials'}}">
                  <span class="learning-dashboard-cell__value">{{#if this.isUsed}}{{this.totalTrials}}{{else}}-{{/if}}</span>
                </td>
                <td class="learning-dashboard-cell learning-dashboard-cell--stat accuracy-cell learning-dashboard-statistics-cell" data-label="{{t 'dashboard.overallAccuracy'}}">
                  <div class="accuracy-pct">{{accuracyDisplay}}</div>
                  {{#if this.isUsed}}
                    <div class="accuracy-bar"><div class="accuracy-fill" style="width:{{accuracyBarWidth}}"></div></div>
                  {{/if}}
                </td>
                <td class="learning-dashboard-cell learning-dashboard-cell--stat num learning-dashboard-statistics-cell" data-label="{{t 'dashboard.itemsPracticed'}}">
                  <span class="learning-dashboard-cell__value">{{itemsPracticedDisplay}}</span>
                </td>
                <td class="learning-dashboard-cell learning-dashboard-cell--stat num learning-dashboard-statistics-cell" data-label="{{t 'dashboard.daysWithSessions'}}">
                  <span class="learning-dashboard-cell__value">{{#if this.isUsed}}{{this.totalSessions}}{{else}}-{{/if}}</span>
                </td>
                <td class="learning-dashboard-cell learning-dashboard-cell--stat num learning-dashboard-statistics-cell" data-label="{{t 'dashboard.timeMinutes'}}">
                  <span class="learning-dashboard-cell__value">{{#if this.isUsed}}{{this.totalTimeMinutes}}{{else}}-{{/if}}</span>
                </td>
                <td class="learning-dashboard-cell learning-dashboard-cell--last-practice learning-dashboard-statistics-cell" data-label="{{t 'courses.lastPractice'}}">
                  <span class="learning-dashboard-cell__value">{{#if this.isUsed}}{{this.lastPracticeDate}}{{else}}-{{/if}}</span>
                </td>
              {{/if}}
            </tr>
            {{#with configForTableRow}}
              <tr class="learner-config-row">
                <td colspan="{{tableColumnCount}}">
                  {{> learnerTdfConfigPanel}}
                </td>
              </tr>
            {{/with}}
          {{/each}}
        </tbody>
      </table>
    </div>
  </div>
</template>

<template name="learningDashboardLessonCards">
  {{#each tdfs}}
    <div class="learning-dashboard-card border rounded shadow-sm {{#unless this.isUsed}}lesson-card-unused{{/unless}}">
      <div class="learning-dashboard-card-title">
        {{displayLabel}}
        {{#if this.conditions}}
          <select class="form-select form-select-sm condition-tdf-selector"
            data-roottdfid="{{this.TDFId}}">
            <option value="{{this.TDFId}}">{{this.displayName}} ({{t 'dashboard.autoAssign'}})</option>
            {{#each this.conditions}}
              <option value="{{this.tdfId}}">{{this.fileName}} ({{this.count}})</option>
            {{/each}}
          </select>
        {{/if}}
      </div>
      {{#if this.languageMetadataRows}}
        <div class="learning-dashboard-language-metadata text-muted small">
          {{#each this.languageMetadataRows}}
            <span class="learning-dashboard-language-metadata-item"><b>{{label}}:</b> {{value}}</span>
          {{/each}}
        </div>
      {{/if}}

      <div class="d-flex align-items-center learning-dashboard-card-features-row">
        <div class="learning-dashboard-card-feature-icons">
          {{#if firstContentUnitIconClass}}
            <span class="fa {{firstContentUnitIconClass}} content-unit-icon" title="{{firstContentUnitIconTitle}}"></span>
          {{/if}}
          {{#if showTtsIcon}}
            <span class="fa fa-headphones {{ttsIconClass}}" title="{{ttsIconTitle}}"></span>
          {{/if}}
          {{#if showSrIcon}}
            <span class="fa fa-microphone {{srIconClass}}" title="{{srIconTitle}}"></span>
          {{/if}}
          {{#unless showTtsIcon}}
            {{#unless showSrIcon}}
              {{#unless firstContentUnitIconClass}}
                <span class="learning-dashboard-empty-value">{{t 'dashboard.none'}}</span>
              {{/unless}}
            {{/unless}}
          {{/unless}}

          {{#if this.isUsed}}
            <span class="badge {{accuracyBadgeClass}}"><span class="learning-dashboard-card-badge-text">{{accuracyBadgeLabel}}</span></span>
          {{else}}
            <span class="badge bg-secondary"><span class="learning-dashboard-card-badge-text">{{t 'dashboard.new'}}</span></span>
          {{/if}}
        </div>
      </div>

      {{#if this.conditions}}
        {{!-- Owner of a condition-pool root TDF: selector is in the card title; just show Start --}}
        <div class="learning-dashboard-card-actions">
          <button class="btn btn-sm btn-success start-condition-root learning-dashboard-card-button">{{t 'dashboard.start'}}</button>
          {{#if showSettingsButton}}
            <button class="btn btn-sm btn-outline-secondary configure-lesson learning-dashboard-card-button" data-tdfid="{{this.TDFId}}">{{t 'dashboard.settings'}}</button>
          {{/if}}
        </div>
      {{else if this.isUsed}}
        <div class="learning-dashboard-card-actions">
          <button class="btn btn-sm btn-primary continue-lesson learning-dashboard-card-button"
            data-tdfid="{{this.TDFId}}"
            data-lessonname="{{this.displayName}}"
            data-currentstimulisetid="{{this.currentStimuliSetId}}"
            data-ismultitdf="{{this.isMultiTdf}}">
            {{t 'dashboard.continue'}}
          </button>
          <button class="btn btn-sm btn-primary learning-dashboard-card-button"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#details-{{this.TDFId}}"
            aria-expanded="false"
            aria-controls="details-{{this.TDFId}}">
            {{t 'dashboard.details'}}
            <span class="fa fa-chevron-down card-expand-icon"></span>
          </button>
          {{#if showSettingsButton}}
            <button class="btn btn-sm btn-outline-secondary configure-lesson learning-dashboard-card-button" data-tdfid="{{this.TDFId}}">
              {{t 'dashboard.settings'}}
            </button>
          {{/if}}
        </div>
      {{else}}
        <div class="learning-dashboard-card-actions">
          <button class="btn btn-sm btn-success start-lesson learning-dashboard-card-button"
            data-tdfid="{{this.TDFId}}"
            data-lessonname="{{this.displayName}}"
            data-currentstimulisetid="{{this.currentStimuliSetId}}"
            data-ismultitdf="{{this.isMultiTdf}}">
            {{t 'dashboard.start'}}
          </button>
          {{#if showSettingsButton}}
            <button class="btn btn-sm btn-outline-secondary configure-lesson learning-dashboard-card-button" data-tdfid="{{this.TDFId}}">
              {{t 'dashboard.settings'}}
            </button>
          {{/if}}
        </div>
      {{/if}}

      {{#with configForCardRow}}
        {{> learnerTdfConfigPanel}}
      {{/with}}

      {{#if this.isUsed}}
        <div id="details-{{this.TDFId}}" class="collapse">
          <div class="learning-dashboard-details border-top">
            <div class="learning-dashboard-detail-row border-bottom">
              <span>{{t 'dashboard.totalTrials'}}:</span>
              <span class="fw-bold">{{this.totalTrials}}</span>
            </div>
            <div class="learning-dashboard-detail-row border-bottom">
              <span>{{t 'dashboard.timeSpent'}}</span>
              <span class="fw-bold">{{timeMinutesDisplay}}</span>
            </div>
            <div class="learning-dashboard-detail-row border-bottom">
              <span>{{t 'dashboard.itemsPracticed'}}:</span>
              <span class="fw-bold">{{itemsPracticedDisplay}}</span>
            </div>
            <div class="learning-dashboard-detail-row border-bottom">
              <span>{{t 'dashboard.daysWithSessions'}}:</span>
              <span class="fw-bold">{{this.totalSessions}}</span>
            </div>
            <div class="learning-dashboard-detail-row">
              <span>{{t 'courses.lastPractice'}}:</span>
              <span class="fw-bold">{{this.lastPracticeDate}}</span>
            </div>
          </div>
        </div>
      {{/if}}
    </div>
  {{/each}}
</template>

<template name="learnerTdfConfigPanel">
  <div class="{{learnerConfigPanelClass}}">
    <div class="learner-config-panel-clip">
      <div class="learner-config-panel-card">
        {{#if this.loading}}
          <div class="text-muted">{{t 'dashboard.loadingSettings'}}</div>
        {{else}}
          {{#if this.error}}
            <div class="alert alert-warning learner-config-alert">{{this.error}}</div>
          {{/if}}

          {{#if isConfigStep "settings"}}
            <form class="learner-config-form">
              <div class="small text-muted learner-config-label">{{selectedConfigLabel}}</div>
              {{#if hasSettingFields}}
                <div class="learner-config-fields-grid">
                {{#each settingFields}}
                  <div class="learner-config-field">
                    <div class="learner-config-field-label">
                      <span>{{this.label}}</span>
                      {{#if this.isSlider}}
                        <span class="learner-config-current-value" data-config-value-for="{{this.id}}">{{this.displayValue}}</span>
                      {{/if}}
                      {{#if this.customized}}
                        <button type="button" class="btn btn-sm btn-link learner-config-reset-field"
                          data-fieldid="{{this.id}}"
                          data-defaultvalue="{{this.defaultInputValue}}">
                          {{t 'dashboard.reset'}}
                        </button>
                      {{/if}}
                    </div>

                    {{#if this.isToggle}}
                      <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" data-config-field="{{this.id}}" checked="{{#if this.checked}}checked{{/if}}">
                      </div>
                    {{/if}}

                    {{#if this.isSelect}}
                      <select class="form-select form-select-sm" data-config-field="{{this.id}}">
                        {{#each this.options}}
                          <option value="{{this.value}}" selected="{{#if this.selected}}selected{{/if}}">{{this.label}}</option>
                        {{/each}}
                      </select>
                    {{/if}}

                    {{#if this.isSlider}}
                      <input class="form-range learner-config-slider" type="range" min="{{this.inputMin}}" max="{{this.inputMax}}" step="{{this.inputStep}}" value="{{this.value}}" data-config-field="{{this.id}}" data-value-suffix="{{this.displaySuffix}}">
                      {{#if this.lowerLabel}}
                        <div class="learner-config-slider-labels">
                          <span>{{this.lowerLabel}}</span>
                          <span>{{this.upperLabel}}</span>
                        </div>
                      {{/if}}
                    {{/if}}

                    {{#if this.isNumber}}
                      <input class="form-control form-control-sm" type="number" min="{{this.inputMin}}" max="{{this.inputMax}}" step="{{this.inputStep}}" value="{{this.value}}" data-config-field="{{this.id}}">
                    {{/if}}

                    {{#if this.isText}}
                      <input class="form-control form-control-sm" type="text" value="{{this.value}}" data-config-field="{{this.id}}">
                    {{/if}}
                  </div>
                {{/each}}
                </div>
              {{/if}}
              <div class="learner-config-footer">
                {{#if currentUserIsAdmin}}
                  <div class="learner-config-admin-reset">
                    {{#if this.resetConfirming}}
                      <button type="button" class="btn btn-sm btn-link learner-config-reset-progress-cancel" disabled="{{#if this.resettingProgress}}disabled{{/if}}">
                        {{t 'dashboard.cancel'}}
                      </button>
                    {{/if}}
                    <button type="button" class="btn btn-sm btn-outline-danger learner-config-reset-progress" disabled="{{#if this.resettingProgress}}disabled{{/if}}">
                      {{resetProgressButtonLabel}}
                    </button>
                  </div>
                {{/if}}
                {{#if hasSettingFields}}
                  <span class="small text-muted">{{learnerConfigSaveStatus}}</span>
                {{/if}}
              </div>
            </form>
          {{/if}}
        {{/if}}
      </div>
    </div>
  </div>
</template>
