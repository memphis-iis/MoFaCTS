<template name="learningDashboard">
  <div class="practice-menu-container" id="learningDashboardContainer">
    {{#with recentUsedTdf}}
      <section class="resume-card" aria-label="Resume recent lesson">
        <div class="resume-bg" aria-hidden="true"></div>
        <div class="thumb" aria-hidden="true">
          <span class="fa fa-book"></span>
        </div>
        <div class="resume-content">
          <div class="resume-title">{{displayLabel}}</div>
          <div class="resume-metrics">
            <div class="metric">
              <div class="metric-value">{{this.totalTrials}}</div>
              <div class="metric-label">total trials</div>
            </div>
            <div class="metric">
              <div class="metric-value">{{accuracyDisplay}}</div>
              <div class="metric-label">overall accuracy</div>
            </div>
            <div class="metric">
              <div class="metric-value">{{this.itemsPracticed}}</div>
              <div class="metric-label">items practiced</div>
            </div>
            <div class="metric">
              <div class="metric-value">{{this.totalSessions}}</div>
              <div class="metric-label">days w/ sessions</div>
            </div>
            <div class="metric">
              <div class="metric-value">{{this.totalTimeMinutes}}</div>
              <div class="metric-label">time (min)</div>
            </div>
          </div>
        </div>
        <button class="btn-continue continue-lesson"
          data-tdfid="{{this.TDFId}}"
          data-lessonname="{{this.displayName}}"
          data-currentstimulisetid="{{this.currentStimuliSetId}}"
          data-ismultitdf="{{this.isMultiTdf}}">
          Continue
        </button>
      </section>
    {{/with}}

    <section class="table-card">
      <div class="table-toolbar">
        <div class="toolbar-search">
          <span class="fa fa-search" aria-hidden="true"></span>
          <input id="learningDashboardSearch" type="text" placeholder="Search your study sets..." disabled="{{#if isLoading}}disabled{{/if}}" aria-disabled="{{#if isLoading}}true{{else}}false{{/if}}">
        </div>
        <div class="toolbar-filters" aria-live="polite">
          <button type="button" class="filter">{{lessonSummaryText}}</button>
        </div>
      </div>

      <div class="learning-dashboard-content-shell {{#if isLoading}}is-loading{{else}}is-ready{{/if}}" aria-busy="{{#if isLoading}}true{{else}}false{{/if}}">
        {{#if isLoading}}
          <div class="learning-dashboard-placeholder" aria-hidden="true"></div>
          <div class="sr-only" role="status" aria-live="polite">Loading lessons...</div>
        {{else}}
          {{#if hasTdfs}}
            <div class="learning-dashboard-sections learning-dashboard-content-ready">
              {{#if hasUsedTdfs}}
                <div class="practice-section">
                  <div class="practice-section-heading">Continue practicing</div>
                  {{> learningDashboardLessonTable tdfs=usedTdfsList learnerConfigState=learnerConfigState}}
                  {{> learningDashboardLessonCards tdfs=usedTdfsList learnerConfigState=learnerConfigState}}
                </div>
              {{/if}}
              {{#if hasUnusedTdfs}}
                <div class="practice-section">
                  <div class="practice-section-heading">New lessons</div>
                  {{> learningDashboardLessonTable tdfs=unusedTdfsList learnerConfigState=learnerConfigState}}
                  {{> learningDashboardLessonCards tdfs=unusedTdfsList learnerConfigState=learnerConfigState}}
                </div>
              {{/if}}
            </div>
          {{else}}
            <div class="practice-empty-state">
              <p class="mb-0">No lessons found. Please contact your administrator.</p>
            </div>
          {{/if}}
        {{/if}}
      </div>
    </section>
  </div>
</template>

<template name="learningDashboardLessonTable">
  <div class="learning-dashboard-table-shell">
    <div class="table-wrap">
      <table class="practice-table learning-dashboard-table">
        <colgroup>
          <col class="practice-col-icon">
          <col class="learning-dashboard-col-lesson">
          <col class="learning-dashboard-col-stat">
          <col class="learning-dashboard-col-stat">
          <col class="learning-dashboard-col-stat">
          <col class="learning-dashboard-col-stat">
          <col class="learning-dashboard-col-stat">
          <col class="learning-dashboard-col-last-practice">
          <col class="learning-dashboard-col-action">
        </colgroup>
        <thead>
          <tr>
            <th scope="col" aria-label="Lesson type"></th>
            <th scope="col">Study Set</th>
            <th scope="col" class="num">Total Trials</th>
            <th scope="col">Overall Accuracy</th>
            <th scope="col" class="num">Items Practiced</th>
            <th scope="col" class="num">Days w/ Sessions</th>
            <th scope="col" class="num">Time (min)</th>
            <th scope="col">Last Practice</th>
            <th scope="col" class="actions-heading">Actions</th>
          </tr>
        </thead>
        <tbody>
          {{#each tdfs}}
            <tr class="learning-dashboard-row {{#if this.isUsed}}learning-dashboard-row--used{{else}}learning-dashboard-row--unused{{/if}}">
              <td class="learning-dashboard-cell practice-icon-cell" data-label="Type">
                <button type="button" class="icon-btn-set" aria-label="{{displayLabel}}">
                  {{#if this.conditions}}
                    <span class="fa fa-sitemap" aria-hidden="true"></span>
                  {{else if this.isUsed}}
                    <span class="fa fa-globe" aria-hidden="true"></span>
                  {{else}}
                    <span class="fa fa-book" aria-hidden="true"></span>
                  {{/if}}
                </button>
                <span class="practice-feature-icons" aria-label="Audio features">
                  {{#if this.enableAudioPromptAndFeedback}}
                    <span class="fa fa-headphones {{ttsIconClass}}" title="Text-to-Speech {{#if this.hasTTSAPIKey}}(API key available){{else}}(needs API key in Audio Settings){{/if}}"></span>
                  {{/if}}
                  {{#if this.audioInputEnabled}}
                    <span class="fa fa-microphone {{srIconClass}}" title="Speech Recognition {{#if this.hasSpeechAPIKey}}(API key available){{else}}(needs API key in Audio Settings){{/if}}"></span>
                  {{/if}}
                </span>
              </td>
              <th scope="row" class="learning-dashboard-cell learning-dashboard-cell--lesson" data-label="Study Set">
                <div class="learning-dashboard-cell__value learning-dashboard-lesson">
                  <div class="d-flex align-items-center gap-2 flex-wrap">
                    <span class="set-name" title="{{displayLabel}}">{{displayLabel}}</span>
                    {{#if this.conditions}}
                      <select class="form-select form-select-sm condition-tdf-selector learning-dashboard-condition-selector"
                        data-roottdfid="{{this.TDFId}}">
                        <option value="{{this.TDFId}}">{{this.displayName}} (auto-assign)</option>
                        {{#each this.conditions}}
                          <option value="{{this.tdfId}}">{{this.fileName}} ({{this.count}})</option>
                        {{/each}}
                      </select>
                    {{/if}}
                  </div>
                </div>
              </th>
              <td class="learning-dashboard-cell learning-dashboard-cell--stat num" data-label="Total Trials">
                <span class="learning-dashboard-cell__value">{{#if this.isUsed}}{{this.totalTrials}}{{else}}-{{/if}}</span>
              </td>
              <td class="learning-dashboard-cell learning-dashboard-cell--stat accuracy-cell" data-label="Overall Accuracy">
                <div class="accuracy-pct">{{accuracyDisplay}}</div>
                {{#if this.isUsed}}
                  <div class="accuracy-bar"><div class="accuracy-fill" style="width:{{accuracyBarWidth}}"></div></div>
                {{/if}}
              </td>
              <td class="learning-dashboard-cell learning-dashboard-cell--stat num" data-label="Items Practiced">
                <span class="learning-dashboard-cell__value">{{#if this.isUsed}}{{this.itemsPracticed}}{{else}}-{{/if}}</span>
              </td>
              <td class="learning-dashboard-cell learning-dashboard-cell--stat num" data-label="Days with Sessions">
                <span class="learning-dashboard-cell__value">{{#if this.isUsed}}{{this.totalSessions}}{{else}}-{{/if}}</span>
              </td>
              <td class="learning-dashboard-cell learning-dashboard-cell--stat num" data-label="Time (min)">
                <span class="learning-dashboard-cell__value">{{#if this.isUsed}}{{this.totalTimeMinutes}}{{else}}-{{/if}}</span>
              </td>
              <td class="learning-dashboard-cell learning-dashboard-cell--last-practice" data-label="Last Practice">
                <span class="learning-dashboard-cell__value">{{#if this.isUsed}}{{this.lastPracticeDate}}{{else}}-{{/if}}</span>
              </td>
              <td class="learning-dashboard-cell learning-dashboard-cell--action" data-label="Action">
                <div class="learning-dashboard-cell__value learning-dashboard-action">
                  {{#if this.conditions}}
                    <div class="learning-dashboard-action-group">
                      <button class="btn btn-sm btn-success learning-dashboard-action-button start-condition-root">Start</button>
                      {{#if this.hasConfigurableSettings}}
                        <button class="btn btn-sm btn-outline-secondary learning-dashboard-action-button configure-lesson" data-tdfid="{{this.TDFId}}">Settings</button>
                      {{/if}}
                    </div>
                  {{else if this.isUsed}}
                    <div class="learning-dashboard-action-group">
                      <button class="btn btn-sm btn-primary learning-dashboard-action-button continue-lesson"
                        data-tdfid="{{this.TDFId}}"
                        data-lessonname="{{this.displayName}}"
                        data-currentstimulisetid="{{this.currentStimuliSetId}}"
                        data-ismultitdf="{{this.isMultiTdf}}">Continue</button>
                      {{#if this.hasConfigurableSettings}}
                        <button class="btn btn-sm btn-outline-secondary learning-dashboard-action-button configure-lesson" data-tdfid="{{this.TDFId}}">Settings</button>
                      {{/if}}
                    </div>
                  {{else}}
                    <div class="learning-dashboard-action-group">
                      <button class="btn btn-sm btn-success learning-dashboard-action-button start-lesson"
                        data-tdfid="{{this.TDFId}}"
                        data-lessonname="{{this.displayName}}"
                        data-currentstimulisetid="{{this.currentStimuliSetId}}"
                        data-ignoreoutofgrammarresponses="{{this.ignoreOutOfGrammarResponses}}"
                        data-speechoutofgrammarfeedback="{{this.speechOutOfGrammarFeedback}}"
                        data-ismultitdf="{{this.isMultiTdf}}">Start</button>
                      {{#if this.hasConfigurableSettings}}
                        <button class="btn btn-sm btn-outline-secondary learning-dashboard-action-button configure-lesson" data-tdfid="{{this.TDFId}}">Settings</button>
                      {{/if}}
                    </div>
                  {{/if}}
                </div>
              </td>
            </tr>
            {{#with configForTableRow}}
              <tr class="learner-config-row">
                <td colspan="9">
                  {{> learnerTdfConfigPanel}}
                </td>
              </tr>
            {{/with}}
          {{/each}}
        </tbody>
      </table>
    </div>
  </div>
</template>

<template name="learningDashboardLessonCards">
  {{#each tdfs}}
    <div class="learning-dashboard-card border rounded p-3 mb-3 shadow-sm {{#unless this.isUsed}}lesson-card-unused{{/unless}}">
      <div class="learning-dashboard-card-title">
        {{displayLabel}}
        {{#if this.conditions}}
          <select class="form-select form-select-sm mt-1 condition-tdf-selector"
            data-roottdfid="{{this.TDFId}}">
            <option value="{{this.TDFId}}">{{this.displayName}} (auto-assign)</option>
            {{#each this.conditions}}
              <option value="{{this.tdfId}}">{{this.fileName}} ({{this.count}})</option>
            {{/each}}
          </select>
        {{/if}}
      </div>

      <div class="d-flex justify-content-between align-items-center py-1 learning-dashboard-card-features-row">
        <div class="d-flex gap-1 align-items-center">
          {{#if this.enableAudioPromptAndFeedback}}
            <span class="fa fa-headphones {{ttsIconClass}}" title="Text-to-Speech {{#if this.hasTTSAPIKey}}(API key available){{else}}(needs API key in Audio Settings){{/if}}"></span>
          {{/if}}
          {{#if this.audioInputEnabled}}
            <span class="fa fa-microphone {{srIconClass}}" title="Speech Recognition {{#if this.hasSpeechAPIKey}}(API key available){{else}}(needs API key in Audio Settings){{/if}}"></span>
          {{/if}}
          {{#unless this.enableAudioPromptAndFeedback}}
            {{#unless this.audioInputEnabled}}
              <span class="learning-dashboard-empty-value">None</span>
            {{/unless}}
          {{/unless}}
        </div>

        <div>
          {{#if this.isUsed}}
            <span class="badge {{accuracyBadgeClass}}">{{accuracyBadgeLabel}}</span>
          {{else}}
            <span class="badge bg-secondary">New</span>
          {{/if}}
        </div>
      </div>

      {{#if this.conditions}}
        {{!-- Owner of a condition-pool root TDF: selector is in the card title; just show Start --}}
        <div class="learning-dashboard-card-actions">
          <button class="btn btn-sm btn-success start-condition-root learning-dashboard-card-button">Start</button>
          {{#if this.hasConfigurableSettings}}
            <button class="btn btn-sm btn-outline-secondary configure-lesson learning-dashboard-card-button" data-tdfid="{{this.TDFId}}">Settings</button>
          {{/if}}
        </div>
      {{else if this.isUsed}}
        <div class="learning-dashboard-card-actions">
          <button class="btn btn-sm btn-primary continue-lesson learning-dashboard-card-button"
            data-tdfid="{{this.TDFId}}"
            data-lessonname="{{this.displayName}}"
            data-currentstimulisetid="{{this.currentStimuliSetId}}"
            data-ismultitdf="{{this.isMultiTdf}}">
            Continue
          </button>
          <button class="btn btn-sm btn-primary learning-dashboard-card-button"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#details-{{this.TDFId}}"
            aria-expanded="false"
            aria-controls="details-{{this.TDFId}}">
            Details
            <span class="fa fa-chevron-down card-expand-icon ms-1"></span>
          </button>
          {{#if this.hasConfigurableSettings}}
            <button class="btn btn-sm btn-outline-secondary configure-lesson learning-dashboard-card-button" data-tdfid="{{this.TDFId}}">
              Settings
            </button>
          {{/if}}
        </div>
      {{else}}
        <div class="learning-dashboard-card-actions">
          <button class="btn btn-sm btn-success start-lesson learning-dashboard-card-button"
            data-tdfid="{{this.TDFId}}"
            data-lessonname="{{this.displayName}}"
            data-currentstimulisetid="{{this.currentStimuliSetId}}"
            data-ignoreoutofgrammarresponses="{{this.ignoreOutOfGrammarResponses}}"
            data-speechoutofgrammarfeedback="{{this.speechOutOfGrammarFeedback}}"
            data-ismultitdf="{{this.isMultiTdf}}">
            Start
          </button>
          {{#if this.hasConfigurableSettings}}
            <button class="btn btn-sm btn-outline-secondary configure-lesson learning-dashboard-card-button" data-tdfid="{{this.TDFId}}">
              Settings
            </button>
          {{/if}}
        </div>
      {{/if}}

      {{#with configForCardRow}}
        {{> learnerTdfConfigPanel}}
      {{/with}}

      {{#if this.isUsed}}
        <div id="details-{{this.TDFId}}" class="collapse">
          <div class="border-top pt-1 mt-1">
            <div class="d-flex justify-content-between py-1 border-bottom">
              <span>Total Trials:</span>
              <span class="fw-bold">{{this.totalTrials}}</span>
            </div>
            <div class="d-flex justify-content-between py-1 border-bottom">
              <span>Time Spent:</span>
              <span class="fw-bold">{{this.totalTimeMinutes}} min</span>
            </div>
            <div class="d-flex justify-content-between py-1 border-bottom">
              <span>Items Practiced:</span>
              <span class="fw-bold">{{this.itemsPracticed}}</span>
            </div>
            <div class="d-flex justify-content-between py-1 border-bottom">
              <span>Days with Sessions:</span>
              <span class="fw-bold">{{this.totalSessions}}</span>
            </div>
            <div class="d-flex justify-content-between py-1">
              <span>Last Practice:</span>
              <span class="fw-bold">{{this.lastPracticeDate}}</span>
            </div>
          </div>
        </div>
      {{/if}}
    </div>
  {{/each}}
</template>

<template name="learnerTdfConfigPanel">
  <div class="{{learnerConfigPanelClass}}">
    <div class="learner-config-panel-clip">
      <div class="learner-config-panel-card">
        {{#if this.loading}}
          <div class="text-muted">Loading settings...</div>
        {{else}}
          {{#if this.error}}
            <div class="alert alert-warning py-2 mb-2">{{this.error}}</div>
          {{/if}}

          {{#if isConfigStep "settings"}}
            <form class="learner-config-form">
              <div class="small text-muted mb-2">{{selectedConfigLabel}}</div>
              {{#if hasSettingFields}}
                <div class="learner-config-fields-grid">
                {{#each settingFields}}
                  <div class="learner-config-field">
                    <div class="learner-config-field-label">
                      <span>{{this.label}}</span>
                      {{#if this.isSlider}}
                        <span class="learner-config-current-value" data-config-value-for="{{this.id}}">{{this.displayValue}}</span>
                      {{/if}}
                      {{#if this.customized}}
                        <button type="button" class="btn btn-sm btn-link learner-config-reset-field"
                          data-fieldid="{{this.id}}"
                          data-defaultvalue="{{this.defaultInputValue}}">
                          Reset
                        </button>
                      {{/if}}
                    </div>

                    {{#if this.isToggle}}
                      <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" data-config-field="{{this.id}}" checked="{{#if this.checked}}checked{{/if}}">
                      </div>
                    {{/if}}

                    {{#if this.isSelect}}
                      <select class="form-select form-select-sm" data-config-field="{{this.id}}">
                        {{#each this.options}}
                          <option value="{{this.value}}" selected="{{#if this.selected}}selected{{/if}}">{{this.label}}</option>
                        {{/each}}
                      </select>
                    {{/if}}

                    {{#if this.isSlider}}
                      <input class="form-range learner-config-slider" type="range" min="{{this.inputMin}}" max="{{this.inputMax}}" step="{{this.inputStep}}" value="{{this.value}}" data-config-field="{{this.id}}" data-value-suffix="{{this.displaySuffix}}">
                      {{#if this.lowerLabel}}
                        <div class="learner-config-slider-labels">
                          <span>{{this.lowerLabel}}</span>
                          <span>{{this.upperLabel}}</span>
                        </div>
                      {{/if}}
                    {{/if}}

                    {{#if this.isNumber}}
                      <input class="form-control form-control-sm" type="number" min="{{this.inputMin}}" max="{{this.inputMax}}" step="{{this.inputStep}}" value="{{this.value}}" data-config-field="{{this.id}}">
                    {{/if}}

                    {{#if this.isText}}
                      <input class="form-control form-control-sm" type="text" value="{{this.value}}" data-config-field="{{this.id}}">
                    {{/if}}
                  </div>
                {{/each}}
                </div>
              {{/if}}
              <div class="d-flex gap-2 justify-content-end align-items-center learner-config-footer">
                {{#if currentUserIsAdmin}}
                  <div class="learner-config-admin-reset">
                    {{#if this.resetConfirming}}
                      <button type="button" class="btn btn-sm btn-link learner-config-reset-progress-cancel" disabled="{{#if this.resettingProgress}}disabled{{/if}}">
                        Cancel
                      </button>
                    {{/if}}
                    <button type="button" class="btn btn-sm btn-outline-danger learner-config-reset-progress" disabled="{{#if this.resettingProgress}}disabled{{/if}}">
                      {{resetProgressButtonLabel}}
                    </button>
                  </div>
                {{/if}}
                {{#if hasSettingFields}}
                  <span class="small text-muted">{{learnerConfigSaveStatus}}</span>
                {{/if}}
              </div>
            </form>
          {{/if}}
        {{/if}}
      </div>
    </div>
  </div>
</template>
