<template name="courses">
  <div class="courses-page practice-menu-container">
    <section class="table-card courses-table-card">
      <div class="table-toolbar">
        <div class="toolbar-search">
          <span class="fa fa-search" aria-hidden="true"></span>
          <input id="coursesSearch" type="text" placeholder="{{t 'courses.searchPlaceholder'}}" disabled="{{#if isLoading}}disabled{{/if}}">
        </div>
        <div class="toolbar-filters">
          <select id="coursesSort" class="form-select form-select-sm">
            <option value="course">{{t 'courses.sortCourse'}}</option>
            <option value="due">{{t 'courses.sortDueDate'}}</option>
            <option value="recent">{{t 'courses.sortLastPractice'}}</option>
          </select>
        </div>
      </div>

      {{#if errorMessage}}
        <div class="alert alert-danger" role="alert">{{errorMessage}}</div>
      {{/if}}

      <div class="learning-dashboard-content-shell {{#if isLoading}}is-loading{{else}}is-ready{{/if}}" aria-busy="{{#if isLoading}}true{{else}}false{{/if}}">
        {{#if isLoading}}
          <div class="learning-dashboard-loading-preview" aria-hidden="true">
            <div class="learning-dashboard-loading-section">
              <div class="learning-dashboard-loading-heading">
                <span class="learning-dashboard-skeleton learning-dashboard-skeleton--heading"></span>
              </div>
              <div class="learning-dashboard-loading-table">
                <div class="learning-dashboard-loading-header">
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                </div>
                {{#each loadingRows}}
                  <div class="learning-dashboard-loading-row">
                    <span class="learning-dashboard-skeleton learning-dashboard-skeleton--button"></span>
                    <span class="learning-dashboard-skeleton learning-dashboard-skeleton--title"></span>
                    <span class="learning-dashboard-skeleton learning-dashboard-skeleton--short"></span>
                    <span class="learning-dashboard-skeleton learning-dashboard-skeleton--short"></span>
                    <span class="learning-dashboard-skeleton learning-dashboard-skeleton--meter"></span>
                    <span class="learning-dashboard-skeleton learning-dashboard-skeleton--short"></span>
                  </div>
                  <div class="learning-dashboard-loading-card">
                    <span class="learning-dashboard-skeleton learning-dashboard-skeleton--title"></span>
                    <span class="learning-dashboard-skeleton learning-dashboard-skeleton--meta"></span>
                    <div class="learning-dashboard-loading-card-actions">
                      <span class="learning-dashboard-skeleton learning-dashboard-skeleton--button"></span>
                    </div>
                  </div>
                {{/each}}
              </div>
            </div>
          </div>
          <div class="sr-only" role="status" aria-live="polite">{{t 'courses.loadingCourses'}}</div>
        {{else}}
          <div class="learning-dashboard-sections learning-dashboard-content-ready">
            {{#if hasAssignedAssignments}}
              <div class="practice-section">
                <div class="practice-section-heading">{{t 'courses.assignedCourses'}}</div>
                {{> courseAssignmentTable courses=assignedCourses}}
                {{> courseAssignmentCards courses=assignedCourses}}
              </div>
            {{/if}}

            <div class="practice-section">
              <div class="practice-section-heading">{{t 'courses.publicCourses'}}</div>
              {{#if hasPublicAssignments}}
                {{> courseAssignmentTable courses=publicCourses}}
                {{> courseAssignmentCards courses=publicCourses}}
              {{else}}
                <div class="practice-empty-state">
                  <p class="learning-dashboard-flush">{{t 'courses.noPublicCourses'}}</p>
                </div>
              {{/if}}
            </div>
          </div>
        {{/if}}
      </div>
    </section>
  </div>
</template>

<template name="courseAssignmentTable">
  <div class="learning-dashboard-table-shell course-assignment-table-shell">
    <div class="table-wrap">
      <table class="practice-table learning-dashboard-table course-assignment-table" role="treegrid">
        <colgroup>
          <col class="course-assignment-col-course">
          <col class="course-assignment-col-assignment">
          <col class="course-assignment-col-action">
          <col class="course-assignment-col-status">
          <col class="course-assignment-col-date">
          <col class="course-assignment-col-stat">
          <col class="course-assignment-col-stat">
          <col class="course-assignment-col-stat">
          <col class="course-assignment-col-stat">
          <col class="course-assignment-col-stat">
          <col class="course-assignment-col-date">
        </colgroup>
        <thead>
          <tr>
            <th scope="col">{{t 'courses.course'}}</th>
            <th scope="col">{{t 'courses.assignment'}}</th>
            <th scope="col" class="actions-heading">{{t 'courses.actions'}}</th>
            <th scope="col">{{t 'courses.status'}}</th>
            <th scope="col">{{t 'courses.due'}}</th>
            <th scope="col" class="num">{{t 'courses.trials'}}</th>
            <th scope="col">{{t 'courses.accuracy'}}</th>
            <th scope="col" class="num">{{t 'courses.items'}}</th>
            <th scope="col" class="num">{{t 'courses.days'}}</th>
            <th scope="col" class="num">{{t 'courses.time'}}</th>
            <th scope="col">{{t 'courses.lastPractice'}}</th>
          </tr>
        </thead>
        <tbody>
          {{#each courses}}
            {{> courseTreeCourseRow}}
            {{#if expanded}}
              {{#each assignments}}
                {{> courseAssignmentTableRow}}
              {{/each}}
            {{/if}}
          {{/each}}
        </tbody>
      </table>
    </div>
  </div>
</template>

<template name="courseTreeCourseRow">
  <tr id="{{rowId}}" class="learning-dashboard-row course-tree-course-row" role="row" aria-level="1" aria-expanded="{{#if expanded}}true{{else}}false{{/if}}">
    <th scope="row" class="learning-dashboard-cell course-assignment-cell--course" data-label="{{t 'courses.course'}}">
      <button type="button" class="course-tree-toggle toggle-course-tree"
        data-courseid="{{courseId}}"
        aria-expanded="{{#if expanded}}true{{else}}false{{/if}}">
        <span class="fa {{#if expanded}}fa-chevron-down{{else}}fa-chevron-right{{/if}}" aria-hidden="true"></span>
        <span class="course-assignment-course">
          <span class="set-name course-assignment-course-name" title="{{courseName}}">{{courseName}}</span>
          <span class="course-assignment-subline">{{teacherDisplayName}}</span>
        </span>
      </button>
    </th>
    <td class="learning-dashboard-cell course-assignment-cell--assignment" data-label="{{t 'courses.assignment'}}">
      <span class="learning-dashboard-cell__value course-tree-assignment-count">{{assignmentCountLabel}} <span class="course-assignment-timezone">{{timezoneLabel}}</span></span>
    </td>
    <td class="learning-dashboard-cell learning-dashboard-cell--action" data-label="{{t 'courses.action'}}">
      <span class="learning-dashboard-cell__value course-tree-parent-action">-</span>
    </td>
    <td class="learning-dashboard-cell course-assignment-cell--status" data-label="{{t 'courses.status'}}">
      <span class="learning-dashboard-cell__value">-</span>
    </td>
    <td class="learning-dashboard-cell course-assignment-cell--date" data-label="{{t 'courses.due'}}">
      <span class="learning-dashboard-cell__value">-</span>
    </td>
    <td class="learning-dashboard-cell learning-dashboard-cell--stat num" data-label="{{t 'courses.trials'}}">
      <span class="learning-dashboard-cell__value">-</span>
    </td>
    <td class="learning-dashboard-cell learning-dashboard-cell--stat accuracy-cell" data-label="{{t 'courses.accuracy'}}">
      <span class="learning-dashboard-cell__value">-</span>
    </td>
    <td class="learning-dashboard-cell learning-dashboard-cell--stat num" data-label="{{t 'courses.items'}}">
      <span class="learning-dashboard-cell__value">-</span>
    </td>
    <td class="learning-dashboard-cell learning-dashboard-cell--stat num" data-label="{{t 'courses.days'}}">
      <span class="learning-dashboard-cell__value">-</span>
    </td>
    <td class="learning-dashboard-cell learning-dashboard-cell--stat num" data-label="{{t 'courses.time'}}">
      <span class="learning-dashboard-cell__value">-</span>
    </td>
    <td class="learning-dashboard-cell course-assignment-cell--date" data-label="{{t 'courses.lastPractice'}}">
      <span class="learning-dashboard-cell__value">-</span>
    </td>
  </tr>
</template>

<template name="courseAssignmentTableRow">
  <tr id="{{rowId}}" class="learning-dashboard-row course-assignment-row course-tree-assignment-row {{#if isLocked}}course-assignment-row--locked{{else if isUsed}}learning-dashboard-row--used{{else}}learning-dashboard-row--unused{{/if}}" role="row" aria-level="2">
    <th scope="row" class="learning-dashboard-cell course-assignment-cell--course" data-label="{{t 'courses.course'}}" aria-label="{{t 'courses.assignment'}}"></th>
    <td class="learning-dashboard-cell course-assignment-cell--assignment" data-label="{{t 'courses.assignment'}}">
      <div class="learning-dashboard-cell__value course-assignment-lesson">
        <span class="course-assignment-title" title="{{title}}">{{title}}</span>
        {{#if hasReleaseLabel}}
          <span class="course-assignment-subline">{{releaseLabel}}</span>
        {{/if}}
        {{#if languageMetadataRows}}
          <span class="course-assignment-language-metadata">
            {{#each languageMetadataRows}}
              <span class="course-assignment-language-metadata-item"><b>{{label}}:</b> {{value}}</span>
            {{/each}}
          </span>
        {{/if}}
      </div>
    </td>
    <td class="learning-dashboard-cell learning-dashboard-cell--action" data-label="{{t 'courses.action'}}">
      <div class="learning-dashboard-cell__value learning-dashboard-action">
        <button type="button" class="btn btn-sm learning-dashboard-action-button {{#if isLocked}}btn-outline-secondary{{else}}{{actionButtonClass}}{{/if}} launch-course-assignment"
          data-assignmentid="{{assignmentId}}"
          data-courseid="{{courseId}}"
          data-tdfid="{{TDFId}}"
          disabled="{{#if isLocked}}disabled{{/if}}">
          {{actionLabel}}
        </button>
      </div>
    </td>
    <td class="learning-dashboard-cell course-assignment-cell--status" data-label="{{t 'courses.status'}}">
      <span class="learning-dashboard-cell__value course-assignment-status {{statusClass}}">{{statusLabel}}</span>
    </td>
    <td class="learning-dashboard-cell course-assignment-cell--date" data-label="{{t 'courses.due'}}">
      <span class="learning-dashboard-cell__value">{{dueLabel}}</span>
    </td>
    <td class="learning-dashboard-cell learning-dashboard-cell--stat num" data-label="{{t 'courses.trials'}}">
      <span class="learning-dashboard-cell__value">{{trialsValue}}</span>
    </td>
    <td class="learning-dashboard-cell learning-dashboard-cell--stat accuracy-cell" data-label="{{t 'courses.accuracy'}}">
      <div class="accuracy-pct">{{accuracyValue}}</div>
      {{#if showAccuracyBar}}
        <div class="accuracy-bar"><div class="accuracy-fill" style="width:{{accuracyBarWidth}}"></div></div>
      {{/if}}
    </td>
    <td class="learning-dashboard-cell learning-dashboard-cell--stat num" data-label="{{t 'courses.items'}}">
      <span class="learning-dashboard-cell__value">{{itemsValue}}</span>
    </td>
    <td class="learning-dashboard-cell learning-dashboard-cell--stat num" data-label="{{t 'courses.days'}}">
      <span class="learning-dashboard-cell__value">{{sessionDaysValue}}</span>
    </td>
    <td class="learning-dashboard-cell learning-dashboard-cell--stat num" data-label="{{t 'courses.time'}}">
      <span class="learning-dashboard-cell__value">{{timeValue}}</span>
    </td>
    <td class="learning-dashboard-cell course-assignment-cell--date" data-label="{{t 'courses.lastPractice'}}">
      <span class="learning-dashboard-cell__value">{{lastPracticeValue}}</span>
    </td>
  </tr>
</template>

<template name="courseAssignmentCards">
  <div class="course-assignment-card-list">
    {{#each courses}}
      {{> courseAssignmentCourseCard}}
    {{/each}}
  </div>
</template>

<template name="courseAssignmentCourseCard">
  <div class="learning-dashboard-card course-assignment-course-card border rounded shadow-sm">
    <button type="button" class="course-tree-card-toggle toggle-course-tree"
      data-courseid="{{courseId}}"
      aria-expanded="{{#if expanded}}true{{else}}false{{/if}}">
      <span class="course-assignment-card-title course-assignment-card-title--toggle">
        <span class="course-tree-card-title-main">
          <span class="fa {{#if expanded}}fa-chevron-down{{else}}fa-chevron-right{{/if}}" aria-hidden="true"></span>
          <span>{{courseName}}</span>
        </span>
      </span>
      <span class="course-assignment-card-meta">{{teacherDisplayName}}</span>
      <span class="course-assignment-card-meta">{{assignmentCountLabel}} · {{timezoneLabel}}</span>
    </button>
    {{#if expanded}}
      <div id="{{rowId}}-assignments" class="course-assignment-card-children">
        {{#each assignments}}
          {{> courseAssignmentCard}}
        {{/each}}
      </div>
    {{/if}}
  </div>
</template>

<template name="courseAssignmentCard">
  <div class="learning-dashboard-card course-assignment-card border rounded shadow-sm {{#if isLocked}}course-assignment-row--locked{{/if}}">
    <div class="learning-dashboard-card-title course-assignment-card-title">
      <span>{{title}}</span>
      <span class="course-assignment-card-meta">{{statusLabel}}</span>
    </div>
    <div class="course-assignment-card-meta">
      {{#if hasReleaseLabel}}{{releaseLabel}} · {{/if}}{{dueWithDateLabel}}
    </div>
    {{#if languageMetadataRows}}
      <div class="course-assignment-language-metadata course-assignment-card-meta">
        {{#each languageMetadataRows}}
          <span class="course-assignment-language-metadata-item"><b>{{label}}:</b> {{value}}</span>
        {{/each}}
      </div>
    {{/if}}
    <div class="course-assignment-card-grid">
      <div>
        <span>{{t 'courses.trials'}}</span>
        <strong>{{trialsValue}}</strong>
      </div>
      <div>
        <span>{{t 'courses.accuracy'}}</span>
        <strong>{{accuracyValue}}</strong>
      </div>
      <div>
        <span>{{t 'courses.items'}}</span>
        <strong>{{itemsValue}}</strong>
      </div>
      <div>
        <span>{{t 'courses.days'}}</span>
        <strong>{{sessionDaysValue}}</strong>
      </div>
      <div>
        <span>{{t 'courses.time'}}</span>
        <strong>{{timeValue}}</strong>
      </div>
      <div>
        <span>{{t 'courses.last'}}</span>
        <strong>{{lastPracticeValue}}</strong>
      </div>
    </div>
    <div class="learning-dashboard-card-actions">
      <button type="button" class="btn btn-sm learning-dashboard-card-button {{#if isLocked}}btn-outline-secondary{{else}}{{actionButtonClass}}{{/if}} launch-course-assignment"
        data-assignmentid="{{assignmentId}}"
        data-courseid="{{courseId}}"
        data-tdfid="{{TDFId}}"
        disabled="{{#if isLocked}}disabled{{/if}}">
        {{actionLabel}}
      </button>
    </div>
  </div>
</template>
