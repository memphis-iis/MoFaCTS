<template name="classSelection">
  <div class="container class-selection-container">
    <h3 class="page-header-title">Join Courses</h3>

    <div class="card class-selection-card">
      <div class="card-body">
        <div class="class-selection-heading">
          <i class="fa fa-users class-selection-heading-icon"></i>
          <h5>Course Enrollment</h5>
        </div>

        {{#if hasSelectedClassContext}}
          <p class="class-selection-current">Current course: <strong>{{selectedClassDisplay}}</strong></p>
        {{else}}
          <p class="class-selection-current">No course selected. Join an available course to view assigned content.</p>
        {{/if}}

        {{#if classSelectionReady}}
          <div class="row g-2 align-items-end">
            <div class="col-md-5 col-12">
              <label class="form-label" for="classSelectionTeacherSelect">Instructor</label>
              <select id="classSelectionTeacherSelect" class="form-select">
                <option value="">Select instructor</option>
                {{#each classSelectionTeachers}}
                  <option value="{{this._id}}">{{this.displayIdentifier}}</option>
                {{/each}}
              </select>
            </div>

            <div class="col-md-5 col-12">
              <label class="form-label" for="classSelectionClassSelect">Course</label>
              <select id="classSelectionClassSelect" class="form-select">
                <option value="">Select course</option>
                {{#each classSelectionClasses}}
                  <option value="{{this.sectionId}}">
                    {{this.courseName}}{{#if this.sectionName}} - {{this.sectionName}}{{/if}}
                  </option>
                {{/each}}
              </select>
            </div>

            <div class="col-md-2 col-12 d-grid">
              <button type="button" id="saveClassSelectionButton" class="btn btn-primary">Save</button>
            </div>
          </div>
          <div class="class-selection-actions">
            <button type="button" id="backToHomeButton" class="btn btn-outline-secondary">Back to practice menu</button>
          </div>
        {{else}}
          <p class="class-selection-loading">Course options are loading...</p>
        {{/if}}
      </div>
    </div>
  </div>
</template>
