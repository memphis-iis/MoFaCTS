<template name="classSelection">
  <div class="class-selection-container" aria-busy="{{#if classSelectionBusy}}true{{else}}false{{/if}}">
    <h3 class="page-header-title">{{t 'home.joinCourses'}}</h3>

    <div class="card class-selection-card">
      <div class="card-body">
        <div class="class-selection-heading">
          <i class="fa fa-users class-selection-heading-icon"></i>
          <h5>{{t 'classSelection.courseEnrollment'}}</h5>
        </div>

        {{#if hasSelectedClassContext}}
          <p class="class-selection-current">{{currentCourseText}}</p>
        {{else}}
          <p class="class-selection-current">{{t 'classSelection.noCourseSelected'}}</p>
        {{/if}}

        {{#if classSelectionMessage}}
          {{> adminStatus variant=classSelectionMessage.variant text=classSelectionMessage.text}}
        {{/if}}

        {{#if classSelectionError}}
          {{> adminStatus variant="error" text=classSelectionError urgent=true}}
          <button type="button" class="btn btn-outline-danger class-selection-retry">{{t 'common.tryAgain'}}</button>
        {{else}}
          {{#if classSelectionEmpty}}
            {{> adminEmptyState text=(t 'classSelection.noAvailableCourses') icon="fa-users"}}
          {{/if}}
          <div class="row g-2 align-items-end">
            <div class="col-md-5 col-12">
              <label class="form-label" for="classSelectionTeacherSelect">{{t 'classSelection.instructor'}}</label>
              <select id="classSelectionTeacherSelect" class="form-select" disabled="{{classSelectionBusy}}">
                <option value="">{{t 'classSelection.selectInstructor'}}</option>
                {{#each classSelectionTeachers}}
                  <option value="{{this._id}}" {{teacherSelectedAttrs this._id}}>{{this.displayIdentifier}}</option>
                {{/each}}
              </select>
            </div>

            <div class="col-md-5 col-12">
              <label class="form-label" for="classSelectionClassSelect">{{t 'classSelection.course'}}</label>
              <select id="classSelectionClassSelect" class="form-select" disabled="{{classSelectionBusy}}">
                <option value="">{{t 'classSelection.selectCourse'}}</option>
                {{#each classSelectionClasses}}
                  <option value="{{this.sectionId}}" {{sectionSelectedAttrs this.sectionId}}>
                    {{this.courseName}}{{#if this.sectionName}} - {{this.sectionName}}{{/if}}
                  </option>
                {{/each}}
              </select>
            </div>

            <div class="col-md-2 col-12 d-grid">
              <button type="button" id="saveClassSelectionButton" class="btn btn-primary" disabled="{{classSelectionBusy}}" aria-busy="{{#if classSelectionBusy}}true{{else}}false{{/if}}">{{t 'classSelection.save'}}</button>
            </div>
          </div>
          <div class="class-selection-actions">
            <button type="button" id="backToHomeButton" class="btn btn-outline-secondary">{{t 'classSelection.backToPracticeMenu'}}</button>
          </div>
        {{/if}}
      </div>
    </div>
  </div>
</template>
