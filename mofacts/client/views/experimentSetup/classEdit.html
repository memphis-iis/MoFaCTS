<template name="classEdit">
{{#if isInRole 'admin, teacher'}}
    <div class="container admin-page">
      <h3 class="page-header-title class-edit-heading">Class Management</h3>

      {{#if isLoading}}
      <div class="text-center admin-loading-block">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <p class="admin-loading-text text-muted">Loading class data...</p>
      </div>
      {{else}}
      <!-- Add or Edit a Class Section -->
      <div class="admin-section">
        <div class="card admin-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-pencil admin-section-icon"></i>
              <h5>Add or Edit a Class</h5>
            </div>
            <div class="row g-3">
              <div class="col-12">
                <label for="class-select" class="form-label">Select existing class to edit</label>
                <select id="class-select" class="form-select">
                  <option selected="selected" value="">Add a class</option>
                  {{#each classes}}
                    <option value="{{this.courseName}}">{{this.courseName}}</option>
                  {{/each}}
                </select>
              </div>
              <div class="col-12">
                <label for="newClassName" class="form-label">Class name</label>
                <input class="form-control" type="text" placeholder="Enter classname here" id="newClassName" />
              </div>
              <div class="col-12">
                <label for="sectionNames" class="form-label">Section names (one per line)</label>
                <textarea class="form-control" rows="15" id="sectionNames" placeholder="Enter section names here"></textarea>
              </div>
              <div class="col-12 text-center">
                <button type='button' id='saveClass' class='btn btn-primary'>
                  <i class="fa fa-save"></i> Save Class
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Section Links Section -->
      <div class="admin-section">
        <div class="card admin-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-link admin-section-icon"></i>
              <h5>Section Links</h5>
            </div>
            {{#if sections}}
              <ul class="list-unstyled">
                {{#each sections}}
                  <li class="admin-list-row">
                    <i class="fa fa-external-link admin-inline-icon"></i>
                    <a href="{{baseLink}}classes/{{curTeacher}}/{{this.sectionId}}">{{this.courseName}} - {{this.sectionName}}</a>
                  </li>
                {{/each}}
              </ul>
            {{else}}
              <p class="text-muted text-center admin-empty-text">No sections created.</p>
            {{/if}}
          </div>
        </div>
      </div>
      {{/if}}
    </div>
{{/if}}
</template>
