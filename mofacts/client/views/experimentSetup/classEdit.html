<template name="classEdit">
{{#if isInRole 'admin, teacher'}}
    <div class="container admin-page">
      <h3 class="page-header-title class-edit-heading">Course Management</h3>

      {{#if classEditMessage}}
      <div class="admin-status admin-status-{{classEditMessage.level}} admin-message" role="status" aria-live="polite">
        <i class="fa {{classEditMessage.icon}}"></i>
        <div class="admin-status-text">{{classEditMessage.text}}</div>
      </div>
      {{/if}}

      {{#if isLoading}}
      <div class="text-center admin-loading-block">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <p class="admin-loading-text text-muted">Loading class data...</p>
      </div>
      {{else}}
      <!-- Add or Edit a Course Section -->
      <div class="admin-section">
        <div class="card admin-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-pencil admin-section-icon"></i>
              <h5>Add or Edit a Course</h5>
            </div>
            <div class="row g-3">
              <div class="col-12">
                <label for="class-select" class="form-label">Select existing course to edit</label>
                <select id="class-select" class="form-select">
                  <option selected="selected" value="">Add a course</option>
                  {{#each classes}}
                    <option value="{{this.courseId}}">{{this.courseName}}</option>
                  {{/each}}
                </select>
              </div>
              <div class="col-12">
                <label for="newClassName" class="form-label">Course name</label>
                <input class="form-control" type="text" placeholder="Enter course name" id="newClassName" />
              </div>
              <div class="col-md-4 col-12">
                <label for="courseVisibility" class="form-label">Visibility</label>
                <select id="courseVisibility" class="form-select">
                  <option value="private" selected>Private</option>
                  <option value="public">Public</option>
                </select>
                <div class="form-text">Private courses are visible to enrolled students; public courses are browsable by signed-in learners.</div>
              </div>
              <div class="col-md-4 col-12">
                <label for="courseBeginDate" class="form-label">Begin date</label>
                <input class="form-control" type="datetime-local" id="courseBeginDate" />
              </div>
              <div class="col-md-4 col-12">
                <label for="courseEndDate" class="form-label">End date</label>
                <input class="form-control" type="datetime-local" id="courseEndDate" />
              </div>
              <div class="col-12">
                <label for="courseTimezone" class="form-label">Course timezone</label>
                <select id="courseTimezone" class="form-select">
                  {{#each courseTimezoneOptions}}
                    <option value="{{this.value}}">{{this.label}}</option>
                  {{/each}}
                </select>
              </div>
              <div class="col-12">
                <label for="sectionNames" class="form-label">Section names (one per line)</label>
                <textarea class="form-control" rows="5" id="sectionNames" placeholder="Default: 001"></textarea>
              </div>
              {{#if classEditConfirmation}}
                <div class="col-12">
                  <div class="admin-inline-confirmation" role="alert">
                    <div>
                      <div class="admin-inline-confirmation-title">{{classEditConfirmation.title}}</div>
                      <div class="admin-inline-confirmation-message">{{classEditConfirmation.message}}</div>
                    </div>
                    <div class="admin-inline-confirmation-actions">
                      <button type="button" class="btn btn-sm btn-outline-secondary" id="cancelCourseDelete">Cancel</button>
                      <button type="button" class="btn btn-sm btn-danger" id="confirmCourseDelete">
                        <i class="fa fa-trash"></i> Delete
                      </button>
                    </div>
                  </div>
                </div>
              {{/if}}
              <div class="col-12 text-center">
                <button type='button' id='saveClass' class='btn btn-primary'>
                  <i class="fa fa-save"></i> Save Course
                </button>
                {{#if isEditingCourse}}
                  <button type='button' id='deleteCourse' class='btn btn-outline-danger'>
                    <i class="fa fa-trash"></i> Delete Course
                  </button>
                {{/if}}
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Section Links Section -->
      <div class="admin-section">
        <div class="card admin-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-link admin-section-icon"></i>
              <h5>Section Links</h5>
            </div>
            {{#if sections}}
              <ul class="list-unstyled">
                {{#each sections}}
                  <li class="admin-list-row">
                    <i class="fa fa-external-link admin-inline-icon"></i>
                    <a href="{{baseLink}}classes/{{this.teacherUserId}}/{{this.sectionId}}">{{this.courseName}} - {{this.sectionName}}</a>
                  </li>
                {{/each}}
              </ul>
            {{else}}
              <p class="text-muted text-center admin-empty-text">No sections created.</p>
            {{/if}}
          </div>
        </div>
      </div>
      {{/if}}
    </div>
{{/if}}
</template>
