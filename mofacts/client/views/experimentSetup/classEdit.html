<template name="classEdit">
{{#if isInRole 'admin, teacher'}}
    <div aria-busy="{{#if isLoading}}true{{else}}false{{/if}}">
      {{#if loadError}}
        {{> adminStatus variant="error" text=loadError urgent=true}}
      {{/if}}

      <!-- Add or Edit a Course Section -->
      <div class="admin-section">
        <div class="card admin-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-pencil admin-section-icon"></i>
              <h5>{{courseText 'courseManagement.addOrEditCourse'}}</h5>
            </div>
            <fieldset class="row g-3" disabled="{{#if isBusy}}disabled{{/if}}">
              <div class="col-12">
                <label for="class-select" class="form-label">{{courseText 'courseManagement.selectExistingCourse'}}</label>
                <select id="class-select" class="form-select">
                  <option selected="selected" value="">{{courseText 'courseManagement.addCourse'}}</option>
                  {{#each classes}}
                    <option value="{{this.courseId}}" {{selectedCourseAttrs this.courseId}}>{{this.courseName}}</option>
                  {{/each}}
                </select>
              </div>
              <div class="col-12">
                <label for="newClassName" class="form-label">{{courseText 'courseManagement.courseName'}}</label>
                <input class="form-control" type="text" placeholder="{{courseText 'courseManagement.courseNamePlaceholder'}}" id="newClassName" value="{{draftCourseName}}" />
              </div>
              <div class="col-md-4 col-12">
                <label for="courseVisibility" class="form-label">{{courseText 'courseManagement.visibility'}}</label>
                <select id="courseVisibility" class="form-select">
                  <option value="private" {{selectedVisibilityAttrs 'private'}}>{{courseText 'courseManagement.private'}}</option>
                  <option value="public" {{selectedVisibilityAttrs 'public'}}>{{courseText 'courseManagement.public'}}</option>
                </select>
                <div class="form-text">{{courseText 'courseManagement.visibilityHelp'}}</div>
              </div>
              <div class="col-md-4 col-12">
                <label for="courseBeginDate" class="form-label">{{courseText 'courseManagement.beginDate'}}</label>
                <input class="form-control" type="datetime-local" id="courseBeginDate" value="{{draftBeginDate}}" />
              </div>
              <div class="col-md-4 col-12">
                <label for="courseEndDate" class="form-label">{{courseText 'courseManagement.endDate'}}</label>
                <input class="form-control" type="datetime-local" id="courseEndDate" value="{{draftEndDate}}" />
              </div>
              <div class="col-12">
                <label for="courseTimezone" class="form-label">{{courseText 'courseManagement.courseTimezone'}}</label>
                <select id="courseTimezone" class="form-select">
                  {{#each courseTimezoneOptions}}
                    <option value="{{this.value}}" {{selectedTimezoneAttrs this.value}}>{{this.label}}</option>
                  {{/each}}
                </select>
              </div>
              <div class="col-12">
                <label for="sectionNames" class="form-label">{{courseText 'courseManagement.sectionNames'}}</label>
                <textarea class="form-control" rows="5" id="sectionNames" placeholder="{{courseText 'courseManagement.sectionNamesPlaceholder'}}">{{draftSectionNames}}</textarea>
              </div>
              {{#if classEditConfirmation}}
                <div class="col-12">
                  {{> adminInlineConfirmation confirmation=classEditConfirmation}}
                </div>
              {{/if}}
              {{#if classEditMessage}}
                <div class="col-12 admin-inline-feedback">
                  {{> adminStatus variant=messageVariant text=classEditMessage.text urgent=(equals messageVariant "error")}}
                </div>
              {{/if}}
              <div class="col-12 text-center">
                <button type='button' id='saveClass' class='btn btn-primary' aria-busy="{{#if saveBusy}}true{{else}}false{{/if}}">
                  <i class="fa fa-save"></i> {{courseText 'courseManagement.saveCourse'}}
                </button>
                {{#if isEditingCourse}}
                  <button type='button' id='deleteCourse' class='btn btn-outline-danger' {{classEditDeleteAttrs}}>
                    <i class="fa fa-trash"></i> {{courseText 'courseManagement.deleteCourse'}}
                  </button>
                {{/if}}
              </div>
            </fieldset>
          </div>
        </div>
      </div>

      <!-- Section Links Section -->
      <div class="admin-section">
        <div class="card admin-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-link admin-section-icon"></i>
              <h5>{{courseText 'courseManagement.sectionLinks'}}</h5>
            </div>
            {{#unless isLoading}}
              {{#if sections}}
                <ul class="list-unstyled">
                  {{#each sections}}
                    <li class="admin-list-row">
                      <i class="fa fa-external-link admin-inline-icon"></i>
                      <a href="{{baseLink}}classes/{{this.teacherUserId}}/{{this.sectionId}}">{{this.courseName}} - {{this.sectionName}}</a>
                    </li>
                  {{/each}}
                </ul>
              {{else}}
                <p class="text-muted text-center admin-empty-text">{{courseText 'courseManagement.noSections'}}</p>
              {{/if}}
            {{/unless}}
          </div>
        </div>
      </div>
    </div>
{{/if}}
</template>
