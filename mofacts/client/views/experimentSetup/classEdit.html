<template name="classEdit">
{{#if isInRole 'admin, teacher'}}
    <div class="container admin-page">
      <h3 class="page-header-title class-edit-heading">{{courseText 'courseManagement.title'}}</h3>

      {{#if classEditMessage}}
      <div class="admin-status admin-status-{{classEditMessage.level}} admin-message" role="status" aria-live="polite">
        <i class="fa {{classEditMessage.icon}}"></i>
        <div class="admin-status-text">{{classEditMessage.text}}</div>
      </div>
      {{/if}}

      {{#if isLoading}}
      <div class="text-center admin-loading-block">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">{{courseText 'common.loading'}}</span>
        </div>
        <p class="admin-loading-text text-muted">{{courseText 'courseManagement.loadingClassData'}}</p>
      </div>
      {{else}}
      <!-- Add or Edit a Course Section -->
      <div class="admin-section">
        <div class="card admin-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-pencil admin-section-icon"></i>
              <h5>{{courseText 'courseManagement.addOrEditCourse'}}</h5>
            </div>
            <div class="row g-3">
              <div class="col-12">
                <label for="class-select" class="form-label">{{courseText 'courseManagement.selectExistingCourse'}}</label>
                <select id="class-select" class="form-select">
                  <option selected="selected" value="">{{courseText 'courseManagement.addCourse'}}</option>
                  {{#each classes}}
                    <option value="{{this.courseId}}">{{this.courseName}}</option>
                  {{/each}}
                </select>
              </div>
              <div class="col-12">
                <label for="newClassName" class="form-label">{{courseText 'courseManagement.courseName'}}</label>
                <input class="form-control" type="text" placeholder="{{courseText 'courseManagement.courseNamePlaceholder'}}" id="newClassName" />
              </div>
              <div class="col-md-4 col-12">
                <label for="courseVisibility" class="form-label">{{courseText 'courseManagement.visibility'}}</label>
                <select id="courseVisibility" class="form-select">
                  <option value="private" selected>{{courseText 'courseManagement.private'}}</option>
                  <option value="public">{{courseText 'courseManagement.public'}}</option>
                </select>
                <div class="form-text">{{courseText 'courseManagement.visibilityHelp'}}</div>
              </div>
              <div class="col-md-4 col-12">
                <label for="courseBeginDate" class="form-label">{{courseText 'courseManagement.beginDate'}}</label>
                <input class="form-control" type="datetime-local" id="courseBeginDate" />
              </div>
              <div class="col-md-4 col-12">
                <label for="courseEndDate" class="form-label">{{courseText 'courseManagement.endDate'}}</label>
                <input class="form-control" type="datetime-local" id="courseEndDate" />
              </div>
              <div class="col-12">
                <label for="courseTimezone" class="form-label">{{courseText 'courseManagement.courseTimezone'}}</label>
                <select id="courseTimezone" class="form-select">
                  {{#each courseTimezoneOptions}}
                    <option value="{{this.value}}">{{this.label}}</option>
                  {{/each}}
                </select>
              </div>
              <div class="col-12">
                <label for="sectionNames" class="form-label">{{courseText 'courseManagement.sectionNames'}}</label>
                <textarea class="form-control" rows="5" id="sectionNames" placeholder="{{courseText 'courseManagement.sectionNamesPlaceholder'}}"></textarea>
              </div>
              {{#if classEditConfirmation}}
                <div class="col-12">
                  <div class="admin-inline-confirmation" role="alert">
                    <div>
                      <div class="admin-inline-confirmation-title">{{classEditConfirmation.title}}</div>
                      <div class="admin-inline-confirmation-message">{{classEditConfirmation.message}}</div>
                    </div>
                    <div class="admin-inline-confirmation-actions">
                      <button type="button" class="btn btn-sm btn-outline-secondary" id="cancelCourseDelete">{{courseText 'courseManagement.cancel'}}</button>
                      <button type="button" class="btn btn-sm btn-danger" id="confirmCourseDelete">
                        <i class="fa fa-trash"></i> {{courseText 'courseManagement.delete'}}
                      </button>
                    </div>
                  </div>
                </div>
              {{/if}}
              <div class="col-12 text-center">
                <button type='button' id='saveClass' class='btn btn-primary'>
                  <i class="fa fa-save"></i> {{courseText 'courseManagement.saveCourse'}}
                </button>
                {{#if isEditingCourse}}
                  <button type='button' id='deleteCourse' class='btn btn-outline-danger'>
                    <i class="fa fa-trash"></i> {{courseText 'courseManagement.deleteCourse'}}
                  </button>
                {{/if}}
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Section Links Section -->
      <div class="admin-section">
        <div class="card admin-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-link admin-section-icon"></i>
              <h5>{{courseText 'courseManagement.sectionLinks'}}</h5>
            </div>
            {{#if sections}}
              <ul class="list-unstyled">
                {{#each sections}}
                  <li class="admin-list-row">
                    <i class="fa fa-external-link admin-inline-icon"></i>
                    <a href="{{baseLink}}classes/{{this.teacherUserId}}/{{this.sectionId}}">{{this.courseName}} - {{this.sectionName}}</a>
                  </li>
                {{/each}}
              </ul>
            {{else}}
              <p class="text-muted text-center admin-empty-text">{{courseText 'courseManagement.noSections'}}</p>
            {{/if}}
          </div>
        </div>
      </div>
      {{/if}}
    </div>
{{/if}}
</template>
