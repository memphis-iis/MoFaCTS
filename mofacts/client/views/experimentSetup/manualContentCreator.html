<template name="manualContentCreator">
    <div class="container admin-page">
        <style>
            .manual-content-shell { display:grid; grid-template-columns:minmax(0,1fr) 300px; gap:var(--app-space-3); align-items:start; }
            .manual-stepper { display:flex; flex-wrap:wrap; gap:var(--app-space-2); margin-bottom:var(--app-space-3); }
            .manual-step-chip { display:inline-flex; align-items:center; gap:calc(0.45rem * var(--app-density-scale)); padding:calc(0.4rem * var(--app-density-scale)) calc(0.7rem * var(--app-density-scale)); border-radius:var(--border-radius-pill); border:1px solid var(--border-color); background:var(--learning-card-surface-color); color:var(--app-secondary-text-color); font-size:calc(var(--app-font-size-base) * 0.875); }
            .manual-step-chip.is-active { border-color:var(--app-accent-color); background:var(--app-selected-surface-color); color:var(--app-text-color); }
            .manual-step-chip.is-complete { border-color:var(--app-success-color); color:var(--app-success-color); }
            .manual-step-chip .step-number { width:1.35rem; height:1.35rem; border-radius:var(--border-radius-circle); display:inline-flex; align-items:center; justify-content:center; background:var(--app-muted-surface-color); font-size:calc(var(--app-font-size-base) * 0.75); font-weight:600; }
            .manual-step-chip.is-active .step-number { background:var(--app-accent-color); color:var(--app-primary-action-text-color); }
            .manual-step-chip.is-complete .step-number { background:var(--app-success-color); color:var(--learning-card-primary-action-text-color); }
            .manual-field-label { font-size:calc(var(--app-font-size-base) * 0.8); font-weight:600; text-transform:uppercase; letter-spacing:0.03em; color:var(--app-secondary-text-color); margin-bottom:calc(0.35rem * var(--app-density-scale)); }
            .manual-helper { font-size:calc(var(--app-font-size-base) * 0.8); color:var(--app-secondary-text-color); margin-top:calc(0.3rem * var(--app-density-scale)); }
            .manual-field-stack { display:grid; gap:var(--app-space-3); }
            .manual-inline-options { display:flex; flex-wrap:wrap; gap:calc(0.75rem * var(--app-density-scale)) var(--app-space-3); }
            .manual-summary-card { position:sticky; top:var(--app-space-3); }
            .manual-summary-grid, .manual-summary-item { display:grid; gap:calc(0.2rem * var(--app-density-scale)); }
            .manual-summary-label { font-size:calc(var(--app-font-size-base) * 0.75); text-transform:uppercase; letter-spacing:0.04em; color:var(--app-secondary-text-color); }
            .manual-summary-value { font-size:calc(var(--app-font-size-base) * 0.95); font-weight:600; color:var(--app-text-color); word-break:break-word; }
            .manual-actions { display:flex; justify-content:space-between; align-items:center; gap:calc(0.75rem * var(--app-density-scale)); margin-top:var(--app-space-3); padding-top:var(--app-space-3); border-top:1px solid var(--border-color); }
            .manual-actions-right { display:flex; gap:var(--app-space-2); flex-wrap:wrap; justify-content:flex-end; }
            .manual-step-intro { margin-bottom:var(--app-space-3); }
            .manual-step-intro h4 { margin-bottom:var(--app-space-1); }
            .manual-table-actions { display:flex; justify-content:space-between; align-items:center; gap:calc(0.75rem * var(--app-density-scale)); margin-bottom:calc(0.75rem * var(--app-density-scale)); }
            .manual-row-actions { display:inline-flex; gap:calc(0.35rem * var(--app-density-scale)); }
            .manual-alert-list { margin:0; padding-left:var(--app-space-3); }
            @media (max-width: 991px) { .manual-content-shell { grid-template-columns:1fr; } .manual-summary-card { position:static; } }
            @media (max-width: 768px) { .manual-actions { flex-direction:column-reverse; align-items:stretch; } .manual-actions-right { width:100%; } .manual-actions-right .btn, .manual-actions > .btn { width:100%; } .manual-inline-options { flex-direction:column; gap:var(--app-space-2); } }
        </style>

        <div class="manual-page-header">
            <div class="editor-page-header content-upload-empty-text">
                <a href="/contentUpload" class="btn btn-outline-secondary editor-back-button">
                    <i class="fa fa-arrow-left"></i> {{manualText 'manualCreator.back'}}
                </a>
                <h3 class="page-header-text editor-page-title">{{manualText 'manualCreator.title'}}</h3>
            </div>
            <div class="theme-action-row">
                <button type="button" class="btn btn-outline-primary" id="manual-save-draft" {{draftPersistenceAttrs}}>
                    <i class="fa fa-floppy-o"></i> {{saveDraftLabel}}
                </button>
                {{#if hasSavedDraft}}
                <button type="button" class="btn btn-outline-danger" id="manual-delete-draft" {{draftPersistenceAttrs}}>
                    <i class="fa fa-trash"></i> {{manualText 'manualCreator.deleteDraft'}}
                </button>
                {{/if}}
            </div>
        </div>

        {{#if draftPersistenceMessage}}
        <div class="admin-status admin-status-{{draftPersistenceMessageClass}} admin-form-row" role="status" aria-live="polite">
            {{#if draftPersistenceBusy}}
            <i class="fa fa-refresh fa-spin"></i>
            {{else}}
            <i class="fa {{draftPersistenceMessageIcon}}"></i>
            {{/if}}
            <div class="admin-status-text">{{draftPersistenceMessage}}</div>
        </div>
        {{/if}}

        {{#if manualConfirmation}}
        <div class="admin-inline-confirmation admin-form-row" role="alert">
            <i class="fa {{manualConfirmation.icon}}" aria-hidden="true"></i>
            <div>
                <div class="admin-inline-confirmation-title">{{manualConfirmation.title}}</div>
                <div class="admin-inline-confirmation-message">{{manualConfirmation.message}}</div>
            </div>
            <div class="admin-inline-confirmation-actions">
                <button type="button" class="btn btn-sm btn-outline-secondary" id="cancel-manual-confirmation">{{manualText 'manualCreator.cancel'}}</button>
                <button type="button" class="btn btn-sm {{manualConfirmation.confirmClass}}" id="confirm-manual-confirmation">
                    {{manualConfirmation.confirmLabel}}
                </button>
            </div>
        </div>
        {{/if}}

        <div class="manual-stepper">
            {{#each stepItems}}
            <div class="manual-step-chip {{#if isActive}}is-active{{/if}} {{#if isComplete}}is-complete{{/if}}">
                <span class="step-number">{{number}}</span>
                <span>{{label}}</span>
            </div>
            {{/each}}
        </div>

        <div class="manual-content-shell">
            <div>
                <div class="card">
                    <div class="card-body admin-form-row">
                        {{#if stepHasErrors}}
                        <div class="admin-status admin-status-warning admin-form-row">
                            <i class="fa fa-exclamation-triangle"></i>
                            <div class="admin-status-text">
                                <ul class="manual-alert-list">
                                    {{#each stepErrors}}
                                    <li>{{this}}</li>
                                    {{/each}}
                                </ul>
                            </div>
                        </div>
                        {{/if}}

                        {{#with state}}
                        {{#if isStep 1}}
                        <div class="manual-step-intro">
                                <h4>{{manualText 'manualCreator.lessonBasics'}}</h4>
                            <div class="text-muted">{{manualText 'manualCreator.basicsIntro'}}</div>
                        </div>
                        <div class="manual-field-stack">
                            <div>
                                <div class="manual-field-label">{{manualText 'manualCreator.lessonName'}}</div>
                                <input type="text" class="form-control" data-field="lessonName" value="{{lessonName}}" placeholder="{{manualText 'manualCreator.lessonNamePlaceholder'}}">
                            </div>
                            <div>
                                <div class="manual-field-label">{{manualText 'manualCreator.structure'}}</div>
                                <select class="form-select" data-field="structure">
                                    <option value="learning-only" selected="{{selectedIf structure 'learning-only'}}">{{manualText 'manualCreator.learningOnly'}}</option>
                                    <option value="instructions-learning" selected="{{selectedIf structure 'instructions-learning'}}">{{manualText 'manualCreator.instructionsLearning'}}</option>
                                    <option value="assessment-only" selected="{{selectedIf structure 'assessment-only'}}">{{manualText 'manualCreator.assessmentOnly'}}</option>
                                    <option value="instructions-assessment" selected="{{selectedIf structure 'instructions-assessment'}}">{{manualText 'manualCreator.instructionsAssessment'}}</option>
                                </select>
                            </div>
                            {{#if structureIncludesInstructions}}
                            <div>
                                <div class="manual-field-label">{{manualText 'manualCreator.instructionText'}}</div>
                                <textarea class="form-control" rows="4" data-field="instructionText" placeholder="{{manualText 'manualCreator.instructionTextPlaceholder'}}">{{instructionText}}</textarea>
                                <div class="manual-helper">{{manualText 'manualCreator.instructionTextHelper'}}</div>
                            </div>
                            {{/if}}
                            <div>
                                <div class="manual-field-label">{{manualText 'manualCreator.visibility'}}</div>
                                <div class="manual-inline-options">
                                    <label class="form-check editor-inline-check">
                                        <input class="form-check-input" type="radio" name="manual-visibility" data-field="visibility" value="private" checked="{{checkedIf visibility 'private'}}">
                                        <span class="form-check-label">{{manualText 'content.private'}}</span>
                                    </label>
                                    <label class="form-check editor-inline-check">
                                        <input class="form-check-input" type="radio" name="manual-visibility" data-field="visibility" value="public" checked="{{checkedIf visibility 'public'}}">
                                        <span class="form-check-label">{{manualText 'content.public'}}</span>
                                    </label>
                                </div>
                            </div>
                            <div>
                                <label class="form-check editor-inline-check">
                                    <input class="form-check-input" type="checkbox" data-field="experimentLinkEnabled" checked="{{boolChecked experimentLinkEnabled}}">
                                    <span class="form-check-label">{{manualText 'manualCreator.experimentLink'}}</span>
                                </label>
                                {{#if experimentLinkEnabled}}
                                <div class="admin-form-row-top">
                                    <div class="manual-field-label">{{manualText 'manualCreator.linkName'}}</div>
                                    <input type="text" class="form-control" data-field="experimentTarget" value="{{experimentTarget}}" placeholder="{{manualText 'manualCreator.linkNamePlaceholder'}}">
                                    <div class="manual-helper">{{experimentLinkPreviewText}}</div>
                                </div>
                                {{/if}}
                            </div>
                        </div>
                        {{/if}}

                        {{#if isStep 2}}
                        <div class="manual-step-intro">
                            <h4>{{manualText 'manualCreator.cardFormat'}}</h4>
                            <div class="text-muted">{{manualText 'manualCreator.cardFormatIntro'}}</div>
                        </div>
                        <div class="manual-field-stack">
                            <div>
                                <div class="manual-field-label">{{manualText 'manualCreator.prompt'}}</div>
                                <select class="form-select" data-field="promptType">
                                    <option value="text" selected="{{selectedIf promptType 'text'}}">{{manualText 'manualCreator.text'}}</option>
                                    <option value="image" selected="{{selectedIf promptType 'image'}}">{{manualText 'manualCreator.image'}}</option>
                                    <option value="audio" selected="{{selectedIf promptType 'audio'}}">{{manualText 'manualCreator.audio'}}</option>
                                    <option value="video" selected="{{selectedIf promptType 'video'}}">{{manualText 'manualCreator.video'}}</option>
                                    <option value="text-image" selected="{{selectedIf promptType 'text-image'}}">{{manualText 'manualCreator.textImage'}}</option>
                                </select>
                            </div>
                            <div>
                                <div class="manual-field-label">{{manualText 'manualCreator.response'}}</div>
                                <select class="form-select" data-field="responseType">
                                    <option value="typed" selected="{{selectedIf responseType 'typed'}}">{{manualText 'manualCreator.typedResponse'}}</option>
                                    <option value="multiple-choice" selected="{{selectedIf responseType 'multiple-choice'}}">{{manualText 'manualCreator.multipleChoice'}}</option>
                                </select>
                            </div>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <div class="manual-field-label">{{manualText 'manualCreator.cards'}}</div>
                                    <input type="number" min="1" class="form-control" data-field="cardCount" value="{{cardCount}}">
                                </div>
                                <div class="col-md-6">
                                    <div class="manual-field-label">{{manualText 'manualCreator.shuffle'}}</div>
                                    <label class="form-check admin-form-row-top">
                                        <input class="form-check-input" type="checkbox" data-field="shuffle" checked="{{boolChecked shuffle}}">
                                        <span class="form-check-label">{{manualText 'manualCreator.shuffleBeforeLearners'}}</span>
                                    </label>
                                </div>
                            </div>
                            {{#if isMultipleChoice}}
                            <div>
                                <div class="manual-field-label">{{manualText 'manualCreator.buttonOrder'}}</div>
                                <select class="form-select" data-field="buttonOrder">
                                    <option value="random" selected="{{selectedIf buttonOrder 'random'}}">{{manualText 'manualCreator.random'}}</option>
                                    <option value="fixed" selected="{{selectedIf buttonOrder 'fixed'}}">{{manualText 'manualCreator.fixed'}}</option>
                                </select>
                            </div>
                            {{/if}}
                        </div>
                        {{/if}}

                        {{#if isStep 3}}
                        <div class="manual-step-intro">
                            <h4>{{manualText 'manualCreator.audioAndDisplay'}}</h4>
                            <div class="text-muted">{{manualText 'manualCreator.audioDisplayIntro'}}</div>
                        </div>
                        <div class="manual-field-stack">
                            <div>
                                <label class="form-check editor-inline-check">
                                    <input class="form-check-input" type="checkbox" data-field="speechRecognitionEnabled" checked="{{boolChecked speechRecognitionEnabled}}">
                                    <span class="form-check-label">{{manualText 'manualCreator.speechRecognition'}}</span>
                                </label>
                                {{#if speechRecognitionEnabled}}
                                <div class="row g-3 admin-form-row-top">
                                    <div class="col-md-6">
                                        <div class="manual-field-label">{{manualText 'manualCreator.speechLanguage'}}</div>
                                        <input type="text" class="form-control" data-field="speechLanguage" value="{{speechLanguage}}" placeholder="en-US">
                                    </div>
                                    <div class="col-md-6">
                                        <div class="manual-field-label">{{manualText 'manualCreator.outOfGrammarSpeech'}}</div>
                                        <label class="form-check admin-form-row-top">
                                            <input class="form-check-input" type="checkbox" data-field="ignoreOutOfGrammar" checked="{{boolChecked ignoreOutOfGrammar}}">
                                            <span class="form-check-label">{{manualText 'manualCreator.ignoreOutOfGrammar'}}</span>
                                        </label>
                                    </div>
                                </div>
                                {{/if}}
                            </div>
                            <div>
                                <div class="manual-field-label">{{manualText 'manualCreator.textToSpeech'}}</div>
                                <select class="form-select" data-field="textToSpeechMode">
                                    <option value="none" selected="{{selectedIf textToSpeechMode 'none'}}">{{manualText 'manualCreator.neither'}}</option>
                                    <option value="prompts" selected="{{selectedIf textToSpeechMode 'prompts'}}">{{manualText 'manualCreator.prompts'}}</option>
                                    <option value="feedback" selected="{{selectedIf textToSpeechMode 'feedback'}}">{{manualText 'manualCreator.feedback'}}</option>
                                    <option value="both" selected="{{selectedIf textToSpeechMode 'both'}}">{{manualText 'manualCreator.both'}}</option>
                                </select>
                            </div>
                            <div>
                                <div class="manual-field-label">{{manualText 'manualCreator.topBar'}}</div>
                                <select class="form-select" data-field="topBarMode">
                                    <option value="time-score" selected="{{selectedIf topBarMode 'time-score'}}">{{manualText 'manualCreator.timeScore'}}</option>
                                    <option value="time" selected="{{selectedIf topBarMode 'time'}}">{{manualText 'manualCreator.time'}}</option>
                                    <option value="score" selected="{{selectedIf topBarMode 'score'}}">{{manualText 'manualCreator.score'}}</option>
                                    <option value="none" selected="{{selectedIf topBarMode 'none'}}">{{manualText 'manualCreator.neither'}}</option>
                                </select>
                            </div>
                            <div>
                                <label class="form-check editor-inline-check">
                                    <input class="form-check-input" type="checkbox" data-field="practiceTimingEnabled" checked="{{boolChecked practiceTimingEnabled}}">
                                    <span class="form-check-label">{{manualText 'manualCreator.practiceTimingLimits'}}</span>
                                </label>
                                <div class="manual-helper">{{manualText 'manualCreator.largeMaxUnlimited'}}</div>
                                {{#if practiceTimingEnabled}}
                                <div class="row g-3 admin-form-row-top">
                                    <div class="col-md-6">
                                        <div class="manual-field-label">{{manualText 'manualCreator.minPracticeTime'}}</div>
                                        <input type="text" class="form-control" data-field="minPracticeTime" value="{{minPracticeTime}}" placeholder="0">
                                    </div>
                                    <div class="col-md-6">
                                        <div class="manual-field-label">{{manualText 'manualCreator.maxPracticeTime'}}</div>
                                        <input type="text" class="form-control" data-field="maxPracticeTime" value="{{maxPracticeTime}}" placeholder="1000000">
                                    </div>
                                </div>
                                {{/if}}
                            </div>
                            <div>
                                <div class="manual-field-label">{{manualText 'manualCreator.tags'}}</div>
                                <input type="text" class="form-control" data-field="tags" value="{{tags}}" placeholder="{{manualText 'manualCreator.tagsPlaceholder'}}">
                                <div class="manual-helper">{{manualText 'manualCreator.tagsHelper'}}</div>
                            </div>
                        </div>
                        {{/if}}

                        {{#if isStep 4}}
                        <div class="manual-step-intro">
                            <h4>{{manualText 'manualCreator.starterContent'}}</h4>
                            <div class="text-muted">{{manualText 'manualCreator.starterContentIntro'}}</div>
                        </div>
                        <div class="manual-field-stack">
                            <div>
                                <div class="manual-field-label">{{manualText 'manualCreator.startingMode'}}</div>
                                <select class="form-select" data-field="seedMode">
                                    <option value="blank-rows" selected="{{selectedIf seedMode 'blank-rows'}}">{{manualText 'manualCreator.blankRows'}}</option>
                                    <option value="paste-table" selected="{{selectedIf seedMode 'paste-table'}}">{{manualText 'manualCreator.pastePromptAnswerTable'}}</option>
                                    <option value="example-duplicate" selected="{{selectedIf seedMode 'example-duplicate'}}">{{manualText 'manualCreator.oneExampleRowDuplicate'}}</option>
                                </select>
                            </div>
                            {{#if isSeedMode 'blank-rows'}}
                            <div class="manual-helper">{{manualText 'manualCreator.blankRowsHelper'}}</div>
                            {{/if}}
                            {{#if isSeedMode 'example-duplicate'}}
                            <div class="manual-helper">{{manualText 'manualCreator.exampleDuplicateHelper'}}</div>
                            {{/if}}
                            {{#if isSeedMode 'paste-table'}}
                            <div>
                                <div class="manual-field-label">{{manualText 'manualCreator.pasteTable'}}</div>
                                <textarea id="manual-seed-table-text" class="form-control" rows="6" placeholder="{{seedTablePlaceholder}}">{{seedTableText}}</textarea>
                                <div class="manual-helper">{{expectedColumnsText}}</div>
                            </div>
                            {{/if}}
                            <div class="manual-table-actions">
                                <div class="small text-muted">{{rowsRequestedText}}</div>
                                <button type="button" class="btn btn-outline-primary btn-sm" id="add-starter-row">
                                    <i class="fa fa-plus"></i> {{manualText 'manualCreator.addRow'}}
                                </button>
                            </div>
                            <div class="table-responsive">
                                <table class="table table-bordered">
                                    <thead>
                                        <tr>
                                            <th>#</th>
                                            {{#if showPromptTextColumn}}<th>{{promptTextLabel}}</th>{{/if}}
                                            {{#if showPromptMediaColumn}}<th>{{promptMediaLabel}}</th>{{/if}}
                                            <th>{{manualText 'manualCreator.answer'}}</th>
                                            {{#if isMultipleChoice}}<th>{{manualText 'manualCreator.choice2'}}</th><th>{{manualText 'manualCreator.choice3'}}</th><th>{{manualText 'manualCreator.choice4'}}</th>{{/if}}
                                            <th>{{manualText 'manualCreator.actions'}}</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {{#each rows}}
                                        <tr>
                                            <td>{{rowNumber}}</td>
                                            {{#if showPromptTextColumn}}
                                            <td><input type="text" class="form-control starter-row-input" data-row-id="{{id}}" data-field="promptText" value="{{promptText}}"></td>
                                            {{/if}}
                                            {{#if showPromptMediaColumn}}
                                            <td><input type="text" class="form-control starter-row-input" data-row-id="{{id}}" data-field="mediaRef" value="{{mediaRef}}"></td>
                                            {{/if}}
                                            <td><input type="text" class="form-control starter-row-input" data-row-id="{{id}}" data-field="answer" value="{{answer}}"></td>
                                            {{#if isMultipleChoice}}
                                            <td><input type="text" class="form-control starter-row-input" data-row-id="{{id}}" data-field="choice2" value="{{choice2}}"></td>
                                            <td><input type="text" class="form-control starter-row-input" data-row-id="{{id}}" data-field="choice3" value="{{choice3}}"></td>
                                            <td><input type="text" class="form-control starter-row-input" data-row-id="{{id}}" data-field="choice4" value="{{choice4}}"></td>
                                            {{/if}}
                                            <td>
                                                <div class="manual-row-actions">
                                                    <button type="button" class="btn btn-outline-secondary btn-sm duplicate-starter-row" data-row-id="{{id}}"><i class="fa fa-copy"></i></button>
                                                    <button type="button" class="btn btn-outline-danger btn-sm delete-starter-row" data-row-id="{{id}}"><i class="fa fa-trash"></i></button>
                                                </div>
                                            </td>
                                        </tr>
                                        {{/each}}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        {{/if}}

                        {{#if isStep 5}}
                            {{#if packageError}}
                            <div class="admin-status admin-status-error admin-form-row">
                                <i class="fa fa-exclamation-circle"></i>
                                <div class="admin-status-text">
                                    <div class="admin-status-title">{{manualText 'manualCreator.finalizeError'}}</div>
                                    <div>{{packageError}}</div>
                                </div>
                            </div>
                            {{/if}}

                            {{#if packageReady}}
                            <div class="manual-step-intro">
                                <h4>{{manualText 'manualCreator.validateAndFinalizeTitle'}}</h4>
                                <div class="text-muted">{{manualText 'manualCreator.finalizeIntro'}}</div>
                            </div>

                            <div class="card border-0 bg-light">
                                <div class="card-body">
                                    <div class="manual-field-stack">
                                        <div>
                                            <div class="manual-field-label">{{manualText 'manualCreator.packageStatus'}}</div>
                                            <div>{{manualText 'manualCreator.packageReadyMessage'}}</div>
                                        </div>
                                        <div>
                                            <div class="manual-field-label">{{manualText 'manualCreator.includedLessons'}}</div>
                                            <div>
                                                {{#each generationResult.manifest}}
                                                <div><strong>{{tdfName}}</strong>: {{cardCount}} {{manualText 'manualCreator.cards'}}{{#if mediaCount}}, {{mediaCount}} {{manualText 'manualCreator.media'}}{{/if}}{{#if skippedCount}}, {{skippedCount}} {{manualText 'manualCreator.skipped'}}{{/if}}</div>
                                                {{/each}}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {{#if uploadStatus}}
                            <div class="admin-status admin-form-row-top">
                                <i class="fa fa-spinner fa-spin"></i>
                                <div class="admin-status-text">
                                    <div class="admin-status-title">{{uploadStatus.message}}</div>
                                    <div class="admin-progress-row admin-form-row-top">
                                        <div class="admin-progress-track">
                                            <div class="admin-progress-bar progress-bar-striped progress-bar-animated"
                                                 style="width: {{uploadStatus.progress}}%">
                                                {{uploadStatus.progress}}%
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            {{/if}}

                            {{#if uploadError}}
                            <div class="admin-status admin-status-error admin-form-row-top">
                                <i class="fa fa-exclamation-triangle"></i>
                                <div class="admin-status-text">{{uploadError}}</div>
                            </div>
                            {{/if}}

                            {{#if uploadComplete}}
                            <div class="admin-status admin-status-success admin-form-row-top">
                                <i class="fa fa-check"></i>
                                <div class="admin-status-text">{{manualText 'manualCreator.lessonUploaded'}}</div>
                            </div>
                            {{/if}}

                            <div class="manual-actions">
                                <button type="button" class="btn btn-outline-secondary" id="manual-edit-draft">{{manualText 'manualCreator.backToDraft'}}</button>
                                <div class="manual-actions-right">
                                    {{#if uploadStatus}}
                                    <button type="button" class="btn btn-outline-secondary" id="manual-download-package" disabled>{{manualText 'manualCreator.downloadPackage'}}</button>
                                    <button type="button" class="btn btn-primary" id="manual-upload-package" disabled>{{manualText 'manualCreator.uploadToMofacts'}}</button>
                                    {{else}}
                                    <button type="button" class="btn btn-outline-secondary" id="manual-download-package">{{manualText 'manualCreator.downloadPackage'}}</button>
                                    <button type="button" class="btn btn-primary" id="manual-upload-package">{{manualText 'manualCreator.uploadToMofacts'}}</button>
                                    {{/if}}
                                    {{#if uploadComplete}}
                                    <button type="button" class="btn btn-success" id="manual-return-to-content">{{manualText 'manualCreator.returnToContentManager'}}</button>
                                    {{/if}}
                                </div>
                            </div>
                            {{else}}
                            <div class="manual-step-intro">
                                <h4>{{manualText 'manualCreator.editDraft'}}</h4>
                                <div class="text-muted">{{manualText 'manualCreator.editDraftIntro'}}</div>
                            </div>
                            {{> draftEditorWorkspace
                                lessons=draftLessons
                                onLessonsUpdate=updateDraftLessons
                                onBack=backToStarterContent
                                onSaveContinue=saveDraftAndContinue
                                heading=draftWorkspaceHeading
                                saveContinueLabel=draftWorkspaceSaveContinueLabel
                            }}
                            {{/if}}
                        {{/if}}
                        {{/with}}

                        {{#unless isStep 5}}
                        <div class="manual-actions">
                            <button type="button" class="btn btn-outline-secondary" id="manual-content-cancel">{{manualText 'manualCreator.cancel'}}</button>
                            <div class="manual-actions-right">
                                {{#if canGoBack}}
                                <button type="button" class="btn btn-secondary" id="manual-content-back">{{manualText 'manualCreator.back'}}</button>
                                {{/if}}
                                {{#unless isStep 5}}
                                <button type="button" class="btn btn-primary" id="manual-content-next">{{nextButtonLabel}}</button>
                                {{/unless}}
                            </div>
                        </div>
                        {{/unless}}
                    </div>
                </div>
            </div>

            <div class="manual-summary-card">
                <div class="card">
                    <div class="card-body">
                        <div class="manual-field-label admin-form-row">{{manualText 'manualCreator.summary'}}</div>
                        <div class="manual-summary-grid">
                            {{#with state}}
                            <div class="manual-summary-item"><div class="manual-summary-label">{{manualText 'manualCreator.name'}}</div><div class="manual-summary-value">{{#if lessonName}}{{lessonName}}{{else}}{{manualText 'manualCreator.untitled'}}{{/if}}</div></div>
                            <div class="manual-summary-item"><div class="manual-summary-label">{{manualText 'manualCreator.structure'}}</div><div class="manual-summary-value">{{structureSummary}}</div></div>
                            <div class="manual-summary-item"><div class="manual-summary-label">{{manualText 'manualCreator.prompt'}}</div><div class="manual-summary-value">{{promptSummary}}</div></div>
                            <div class="manual-summary-item"><div class="manual-summary-label">{{manualText 'manualCreator.response'}}</div><div class="manual-summary-value">{{responseSummary}}</div></div>
                            <div class="manual-summary-item"><div class="manual-summary-label">{{manualText 'manualCreator.cards'}}</div><div class="manual-summary-value">{{cardCount}}</div></div>
                            <div class="manual-summary-item"><div class="manual-summary-label">{{manualText 'manualCreator.visibility'}}</div><div class="manual-summary-value">{{visibilitySummary}}</div></div>
                            <div class="manual-summary-item"><div class="manual-summary-label">{{manualText 'manualCreator.link'}}</div><div class="manual-summary-value">{{#if experimentLinkEnabled}}{{#if experimentLinkPreview}}{{experimentLinkPreview}}{{else}}{{manualText 'manualCreator.pendingName'}}{{/if}}{{else}}{{manualText 'manualCreator.off'}}{{/if}}</div></div>
                            <div class="manual-summary-item"><div class="manual-summary-label">{{manualText 'manualCreator.topBar'}}</div><div class="manual-summary-value">{{topBarSummary}}</div></div>
                            <div class="manual-summary-item"><div class="manual-summary-label">{{manualText 'manualCreator.status'}}</div><div class="manual-summary-value">{{statusSummary}}</div></div>
                            {{/with}}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
