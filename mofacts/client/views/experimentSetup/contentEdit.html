<template name="contentEdit">
    <!-- Compact CSS for Stim Editor - Same as TDF Editor -->
    <style>
        /* Hide descriptions when mode is 'none' */
        #stim-editor-container.hide-descriptions .form-text,
        #stim-editor-container.hide-descriptions .je-desc,
        #stim-editor-container.hide-descriptions p.help-block,
        #stim-editor-container.hide-descriptions small.text-muted,
        #stim-editor-container.hide-descriptions [data-schemapath] > p,
        #stim-editor-container.hide-descriptions .je-object__container > p,
        #stim-editor-container.hide-descriptions .je-indented-panel > p {
            display: none !important;
        }

        /* Style array field descriptions (<p> tags) consistently with string field descriptions (<small>) */
        #stim-editor-container [data-schemapath] > p {
            font-size: 0.875em;
            color: var(--app-secondary-text-color);
            margin-top: 0.25rem;
            margin-bottom: 0.5rem;
        }

        /* Stim Editor - Reset Bootstrap spacing utilities, then apply minimal values */

        /* Minimal margin on Bootstrap margin utility elements */
        #stim-editor-container [class*="my-"],
        #stim-editor-container [class*="mb-"],
        #stim-editor-container [class*="mt-"] {
            margin: 0.25rem 0;
        }

        /* Minimal padding on Bootstrap padding utility elements */
        #stim-editor-container [class*="py-"],
        #stim-editor-container [class*="pb-"],
        #stim-editor-container [class*="pt-"] {
            padding: var(--app-space-1) var(--app-space-0);
        }

        /* Reset Bootstrap row gutters */
        #stim-editor-container .row {
            --bs-gutter-x: 0.5rem;
            --bs-gutter-y: 0.25rem;
            margin-bottom: 0.15rem;
        }

        /* Minimal container padding (after reset, so these win) */
        #stim-editor-container .card-body {
            padding: var(--app-space-2);
        }
        #stim-editor-container .card-header {
            padding: calc(0.35rem * var(--app-density-scale)) var(--app-space-2);
        }

        /* Remove margin from nested card.card-body elements (json-editor pattern) */
        #stim-editor-container .card.card-body {
            margin: 0;
            padding: var(--app-space-1);
        }

        /* Root Clusters container - gray background instead of blue */
        #stim-editor-container > [data-schemapath="root"] > .card {
            background-color: var(--app-subtle-surface-color) !important;
            color: var(--app-text-color);
            border-color: var(--border-color) !important;
        }
        #stim-editor-container > [data-schemapath="root"] > .card > .card-header {
            background-color: var(--app-muted-surface-color) !important;
            color: var(--app-text-color);
            border-color: var(--border-color) !important;
        }

        /* Base font size */
        #stim-editor-container,
        #stim-editor-container * {
            font-size: calc(var(--app-font-size-base) * 0.875) !important;
        }

        /* Headings - slightly larger but still compact */
        #stim-editor-container h1,
        #stim-editor-container h2,
        #stim-editor-container h3,
        #stim-editor-container h4,
        #stim-editor-container h5,
        #stim-editor-container h6,
        #stim-editor-container .card-header,
        #stim-editor-container .je-object__title,
        #stim-editor-container .h3.card-title {
            font-size: calc(var(--app-font-size-base) * 0.9) !important;
            font-weight: 600;
            margin-bottom: 0;
        }

        /* Property labels in table layout */
        #stim-editor-container table th,
        #stim-editor-container table td {
            font-size: calc(var(--app-font-size-base) * 0.875) !important;
            padding: var(--app-space-1) var(--app-space-2) !important;
        }

        /* First column (property names) - slightly bold */
        #stim-editor-container table th:first-child,
        #stim-editor-container table td:first-child {
            font-weight: 500;
        }

        /* Make labels and inputs side-by-side (2 columns) */
        #stim-editor-container .form-group {
            margin-bottom: 0.25rem;
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 0.5rem;
            align-items: center;
        }

        /* Textareas get full width with label on top (not side-by-side) */
        #stim-editor-container .form-group.has-textarea {
            grid-template-columns: 1fr;
            gap: 0.25rem;
            align-items: start;
        }

        /* Make the column div take full width when it contains a textarea */
        #stim-editor-container .row > [class*="col-"]:has(.has-textarea),
        #stim-editor-container .row > div[class*="col-"].has-textarea-parent {
            flex: 0 0 100%;
            max-width: 100%;
        }

        #stim-editor-container .form-group > label {
            margin-bottom: 0 !important;
            text-align: right;
            padding-right: var(--app-space-2);
        }

        /* Labels for textareas should be left-aligned on top */
        #stim-editor-container .form-group.has-textarea > label {
            text-align: left;
            padding-right: var(--app-space-0);
            font-weight: normal;
        }

        #stim-editor-container .form-group > .form-control,
        #stim-editor-container .form-group > .form-select,
        #stim-editor-container .form-group > input,
        #stim-editor-container .form-group > select,
        #stim-editor-container .form-group > textarea {
            margin-bottom: 0 !important;
        }

        #stim-editor-container .card {
            margin-bottom: 0.25rem;
        }

        #stim-editor-container .form-control,
        #stim-editor-container .form-select {
            padding: calc(0.2rem * var(--app-density-scale)) calc(0.4rem * var(--app-density-scale));
        }

        #stim-editor-container .btn-group {
            margin-bottom: 0;
        }

        #stim-editor-container .je-object__controls,
        #stim-editor-container .je-array__controls {
            margin-bottom: 0;
        }

        #stim-editor-container label.form-label {
            margin-bottom: 0.15rem;
        }

        /* Buttons */
        #stim-editor-container .btn,
        #stim-editor-container button {
            font-size: calc(var(--app-font-size-base) * 0.8) !important;
            padding: calc(0.2rem * var(--app-density-scale)) calc(0.4rem * var(--app-density-scale)) !important;
        }

        /* Style the Properties modal - distinguish in-use vs available */
        /* Use flexbox to reorder: available at top, in-use at bottom */
        #stim-editor-container .je-modal > div {
            display: flex;
            flex-direction: column;
        }

        #stim-editor-container .je-modal label {
            display: block;
            padding: var(--app-space-1) var(--app-space-2);
            margin: 0.1rem 0;
            border-radius: 3px;
        }

        /* In-use properties (checked) - muted style, pushed to bottom */
        #stim-editor-container .je-modal label:has(input[type="checkbox"]:checked) {
            background: var(--app-muted-surface-color);
            color: var(--app-secondary-text-color);
            order: 1;
        }

        /* Available properties (unchecked) - highlighted, stay at top */
        #stim-editor-container .je-modal label:has(input[type="checkbox"]:not(:checked)) {
            background: var(--app-success-surface-color);
            color: var(--app-text-color);
            order: 0;
        }

        /* Class variants mirror the checked/unchecked property states. */
        #stim-editor-container .je-modal label.property-in-use {
            background: var(--app-muted-surface-color);
            color: var(--app-secondary-text-color);
            order: 1;
        }
        #stim-editor-container .je-modal label.property-available {
            background: var(--app-success-surface-color);
            color: var(--app-text-color);
            order: 0;
        }

        /* Hide type switcher - properties should maintain their existing types */
        #stim-editor-container .je-switcher {
            display: none !important;
        }

        /* Hide labels that are siblings of type switchers (duplicate labels) */
        #stim-editor-container label:has(+ .je-switcher),
        #stim-editor-container .je-switcher + label,
        #stim-editor-container b:has(+ .je-switcher) {
            display: none !important;
        }

        /* Textareas for long content - ensure they work well in the grid layout */
        #stim-editor-container .form-group > textarea {
            margin-bottom: 0 !important;
            width: 100%;
            min-height: 60px;
        }

        /* Select elements fill their grid cell (same pattern as textareas) */
        #stim-editor-container .form-group > select,
        #stim-editor-container .form-group > .form-select {
            width: 100%;
        }

        /* Media field enhancements - compact inline layout */
        #stim-editor-container .media-field-wrapper {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            flex-wrap: nowrap;
        }

        #stim-editor-container .media-field-wrapper > input[type="text"] {
            flex: 0 1 auto;
            min-width: 150px;
            max-width: 250px;
        }

        #stim-editor-container .media-preview {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: var(--app-space-1);
            background: var(--app-subtle-surface-color);
            color: var(--app-text-color);
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        #stim-editor-container .media-preview:empty {
            display: none;
        }

        #stim-editor-container .media-preview img {
            max-width: 120px;
            max-height: 80px;
            object-fit: contain;
            border-radius: 3px;
        }

        #stim-editor-container .media-preview audio {
            height: 32px;
            max-width: 200px;
        }

        #stim-editor-container .media-preview video {
            max-height: 80px;
            max-width: 120px;
        }

        #stim-editor-container .media-drop-zone {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            border: 1px dashed var(--border-color);
            border-radius: 3px;
            padding: calc(0.15rem * var(--app-density-scale)) var(--app-space-2);
            color: var(--app-secondary-text-color);
            font-size: calc(var(--app-font-size-base) * 0.75) !important;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        #stim-editor-container .media-drop-zone:hover,
        #stim-editor-container .media-drop-zone.drag-over {
            border-color: var(--app-info-color);
            background: var(--app-info-surface-color);
            color: var(--app-info-color);
        }

        #stim-editor-container .media-drop-zone input[type="file"] {
            display: none;
        }

        #stim-editor-container .media-drop-zone .drop-icon {
            font-size: calc(var(--app-font-size-base) * 0.85) !important;
        }

        #stim-editor-container .media-drop-zone .drop-text {
            display: none;
        }

        #stim-editor-container .media-preview .media-error {
            color: var(--feedback-error-color);
            font-size: calc(var(--app-font-size-base) * 0.7) !important;
            white-space: nowrap;
        }

        #stim-editor-container .media-upload-progress {
            flex: 1;
            min-width: 100px;
        }

        #stim-editor-container .media-upload-status {
            width: 100%;
        }

        #stim-editor-container .media-upload-status-row {
            display: flex;
            align-items: center;
            gap: var(--app-space-2);
            margin-bottom: var(--app-space-1);
        }

        #stim-editor-container .media-upload-success {
            margin-left: var(--app-space-2);
        }

        /* =================================================================
           VALIDATION UI STYLES
           ================================================================= */

        /* Validation Summary Panel */
        .validation-summary {
            margin-bottom: var(--app-space-3);
        }

        .validation-summary .alert {
            padding: var(--app-space-3);
        }

        .validation-summary-row {
            display: flex;
            align-items: center;
        }

        .validation-summary-label,
        .validation-breaking-badge {
            margin-left: var(--app-space-2);
        }

        .validation-breaking-badge-sm {
            margin-left: var(--app-space-1);
        }

        .validation-alert {
            margin-bottom: var(--app-space-2);
        }

        .validation-summary .validation-list {
            list-style: none;
            padding-left: var(--app-space-0);
            margin-bottom: var(--app-space-0);
            font-size: calc(var(--app-font-size-base) * 0.875);
        }

        .validation-list-collapsed {
            margin-top: var(--app-space-2);
        }

        .validation-summary .validation-item {
            padding: var(--app-space-1) var(--app-space-0);
            border-bottom: 1px solid var(--border-color);
        }

        .validation-summary .validation-item:last-child {
            border-bottom: none;
        }

        .validation-summary .jump-to-field {
            font-weight: 500;
        }

        .validation-summary .jump-to-field:hover {
            text-decoration: underline !important;
        }

        /* Field-Level Error Styling */
        #stim-editor-container .validation-error-field {
            border-color: var(--feedback-error-color) !important;
            box-shadow: 0 0 0 0.2rem var(--app-error-shadow-color) !important;
        }

        #stim-editor-container .validation-warning-field {
            border-color: var(--app-warning-color) !important;
            box-shadow: 0 0 0 0.2rem var(--app-warning-shadow-color) !important;
        }

        .field-validation-message {
            margin-top: var(--app-space-1);
            font-size: calc(var(--app-font-size-base) * 0.75) !important;
            line-height: 1.2;
        }

        .field-validation-message-text {
            margin-left: var(--app-space-1);
        }

        .field-validation-message i {
            font-size: calc(var(--app-font-size-base) * 0.7);
        }

        /* Highlight Animation */
        .validation-highlight {
            animation: validation-pulse 0.5s ease-in-out 3;
        }

        @keyframes validation-pulse {
            0%, 100% {
                background-color: transparent;
            }
            50% {
                background-color: var(--app-warning-surface-color);
            }
        }

        /* Toggle Button Styling */
        .toggle-validation-details {
            margin-left: auto;
            padding: var(--app-space-0);
            color: inherit !important;
            text-decoration: none !important;
        }

        .toggle-validation-details:hover {
            opacity: 0.7;
        }

        /* =================================================================
           GENERATE INCORRECT RESPONSES MODAL - Ensure proper padding
           (targeted by ID to avoid affecting other modals)
           ================================================================= */
        #generateIncorrectModal .modal-body {
            padding: var(--app-space-3) var(--app-space-4);
        }
        #generateIncorrectModal .modal-header {
            padding: var(--app-space-3) var(--app-space-4);
        }
        #generateIncorrectModal .modal-footer {
            padding: calc(0.75rem * var(--app-density-scale)) var(--app-space-4);
        }
        #generateIncorrectModal .form-control {
            padding: calc(0.375rem * var(--app-density-scale)) calc(0.75rem * var(--app-density-scale));
        }
        #generateIncorrectModal .btn {
            padding: calc(0.375rem * var(--app-density-scale)) calc(0.75rem * var(--app-density-scale));
            font-size: var(--app-font-size-base);
        }

        .editor-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .editor-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .editor-verbosity {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .editor-verbosity .form-check {
            margin-bottom: 0;
        }

        .save-feedback {
            margin-right: auto;
            min-height: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.35rem;
            color: var(--app-success-color);
            font-size: calc(var(--app-font-size-base) * 0.875);
            opacity: 0;
            transition: opacity 0.15s ease;
            pointer-events: none;
        }

        .save-feedback.is-visible {
            opacity: 1;
        }

        /* Mobile layout adjustments */
        @media (max-width: 768px) {
            .editor-topbar {
                flex-direction: column;
                align-items: stretch;
            }

            .editor-status {
                justify-content: flex-start;
            }

            .editor-verbosity {
                justify-content: flex-start;
            }

            #stim-editor-container .form-group {
                grid-template-columns: 1fr;
                gap: 0.25rem;
                align-items: start;
            }

            #stim-editor-container .form-group > label {
                text-align: left;
                padding-right: var(--app-space-0);
                font-weight: 500;
                margin-bottom: 0.25rem !important;
            }

            #stim-editor-container .btn {
                padding: var(--app-space-2) calc(0.75rem * var(--app-density-scale)) !important;
                min-height: var(--app-button-height);
                font-size: calc(var(--app-font-size-base) * 0.875) !important;
            }

            #stim-editor-container .form-control,
            #stim-editor-container .form-select,
            #stim-editor-container input,
            #stim-editor-container textarea {
                font-size: var(--app-font-size-base) !important;
            }

            #stim-editor-container .media-field-wrapper {
                flex-wrap: wrap;
                flex-direction: column;
                align-items: stretch;
            }

            #stim-editor-container .media-field-wrapper > input[type="text"] {
                min-width: 100%;
                max-width: 100%;
                order: 1;
            }

            #stim-editor-container .media-preview {
                order: 2;
                width: 100%;
                justify-content: center;
            }

            #stim-editor-container .media-drop-zone {
                order: 3;
                width: 100%;
                justify-content: center;
                padding: var(--app-space-2);
            }
        }

        .mc-toolbar {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        @media (max-width: 576px) {
            .mc-toolbar {
                flex-direction: column;
            }

            .mc-toolbar .btn {
                width: 100%;
                min-height: var(--app-button-height);
            }

            .content-edit-actions {
                flex-direction: column-reverse !important;
            }

            .content-edit-actions .save-feedback {
                width: 100%;
                justify-content: center;
                margin-right: 0;
            }

            .content-edit-actions .btn {
                width: 100%;
                min-height: var(--app-button-height);
            }
        }

        .cluster-navigation {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
        }

        .cluster-nav-controls,
        .cluster-window-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        #cluster-window-size {
            width: auto;
        }

        @media (max-width: 768px) {
            .cluster-navigation {
                flex-direction: column;
            }

            .cluster-nav-controls .btn {
                min-height: var(--app-button-height);
                flex: 1 1 auto;
            }

            .cluster-counter {
                width: 100%;
                text-align: center;
                order: -1;
            }

            .nav-label {
                position: absolute;
                width: 1px;
                height: 1px;
                padding: var(--app-space-0);
                margin: -1px;
                overflow: hidden;
                clip: rect(0, 0, 0, 0);
                white-space: nowrap;
                border: 0;
            }

            .cluster-name {
                text-align: center;
            }

            #cluster-window-size {
                width: 80px !important;
            }
        }
    </style>

    <div>
        <!-- Header -->
        <div class="editor-page-header">
            <a href="/contentUpload" class="btn btn-outline-secondary editor-back-button">
                <i class="fa fa-arrow-left"></i> {{contentEditorText 'apkg.back'}}
            </a>
            <h3 class="page-header-text editor-page-title">
                {{editTitle}}
                {{#if conditionInfo}}
                    <small class="text-muted">
                        {{conditionSummary conditionInfo}}
                    </small>
                {{/if}}
                {{#if stimFileInfo}}
                    <small class="text-muted">
                        {{stimFileSummary stimFileInfo}}
                    </small>
                {{/if}}
            </h3>
        </div>

        {{#if editorLoadError}}
        <div class="admin-status admin-status-error" role="alert">
            <i class="fa fa-exclamation-circle" aria-hidden="true"></i>
            <div class="admin-status-text">{{editorLoadError}}</div>
        </div>
        <button type="button" class="btn btn-outline-danger content-editor-retry">{{contentEditorText 'common.tryAgain'}}</button>
        {{else}}
        {{#if noData}}
        <div class="admin-status admin-status-warning">
            <i class="fa fa-exclamation-triangle"></i>
            <div class="admin-status-text">{{contentEditorText 'contentEditor.noStimulusData'}}</div>
        </div>
        {{else}}

        {{#if editorMessage}}
        <div class="admin-status admin-status-{{editorMessage.type}} admin-form-row">
            <i class="fa {{editorMessage.icon}}"></i>
            <div class="admin-status-text">
                <div class="admin-status-title">{{editorMessage.title}}</div>
                <div>{{editorMessage.text}}</div>
            </div>
        </div>
        {{/if}}

        {{#if editorReady}}
        <!-- Tooltip toggle + unsaved state (mobile-friendly) -->
        <div class="editor-topbar admin-form-row">
            <div class="editor-status">
                {{#if hasChanges}}
                <span class="badge bg-warning text-dark unsaved-badge">{{contentEditorText 'tdfEditor.unsavedChanges'}}</span>
                {{/if}}
            </div>
            <div class="editor-verbosity">
                <span class="text-muted small">{{contentEditorText 'tdfEditor.descriptions'}}</span>
                <div class="form-check form-check-inline editor-inline-check">
                    <input class="form-check-input" type="radio" name="tooltipMode" id="tooltipNone" value="none" checked="{{noneChecked}}">
                    <label class="form-check-label small" for="tooltipNone">{{contentEditorText 'tdfEditor.none'}}</label>
                </div>
                <div class="form-check form-check-inline editor-inline-check">
                    <input class="form-check-input" type="radio" name="tooltipMode" id="tooltipBrief" value="brief" checked="{{briefChecked}}">
                    <label class="form-check-label small" for="tooltipBrief">{{contentEditorText 'tdfEditor.brief'}}</label>
                </div>
                <div class="form-check form-check-inline editor-inline-check">
                    <input class="form-check-input" type="radio" name="tooltipMode" id="tooltipVerbose" value="verbose" checked="{{verboseChecked}}">
                    <label class="form-check-label small" for="tooltipVerbose">{{contentEditorText 'tdfEditor.verbose'}}</label>
                </div>
            </div>
        </div>

        <!-- MC Conversion Toolbar -->
        <div class="mc-toolbar admin-form-row">
            <button id="generateIncorrectBtn" class="btn btn-outline-primary btn-sm" data-bs-toggle="modal" data-bs-target="#generateIncorrectModal">
                <i class="fa fa-random"></i> {{contentEditorText 'contentEditor.generateIncorrectResponses'}}
            </button>
            <button id="removeIncorrectBtn" class="btn btn-outline-danger btn-sm">
                <i class="fa fa-trash"></i> {{contentEditorText 'contentEditor.removeAllIncorrectResponses'}}
            </button>
        </div>
        {{#if removeIncorrectConfirmation}}
        <div class="admin-inline-confirmation admin-form-row-sm">
            <div>
                <div class="admin-inline-confirmation-title">{{contentEditorText 'contentEditor.removeIncorrectTitle'}}</div>
                <div class="admin-inline-confirmation-message">{{contentEditorText 'contentEditor.removeIncorrectMessage'}}</div>
            </div>
            <div class="admin-inline-confirmation-actions">
                <button type="button" class="btn btn-sm btn-outline-secondary" id="cancelRemoveIncorrectBtn">{{contentEditorText 'content.cancel'}}</button>
                <button type="button" class="btn btn-sm btn-danger" id="confirmRemoveIncorrectBtn">
                    <i class="fa fa-trash"></i> {{contentEditorText 'contentEditor.remove'}}
                </button>
            </div>
        </div>
        {{/if}}

        <!-- Generate Incorrect Responses Modal -->
        <div class="modal fade" id="generateIncorrectModal" tabindex="-1" aria-labelledby="generateIncorrectModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="generateIncorrectModalLabel">{{contentEditorText 'contentEditor.generateIncorrectResponses'}}</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="{{contentEditorText 'app.closeMenu'}}"></button>
                    </div>
                    <div class="modal-body">
                        <div class="admin-form-row">
                            <label for="distractorCount" class="form-label">{{contentEditorText 'contentEditor.distractorCountLabel'}}</label>
                            <input type="number" class="form-control" id="distractorCount" value="3" min="1" max="20">
                        </div>
                        <div class="admin-status admin-status-small content-upload-empty-text">
                            <i class="fa fa-info-circle"></i>
                            <div class="admin-status-text">
                                {{contentEditorText 'contentEditor.distractorHelp'}}
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{{contentEditorText 'content.cancel'}}</button>
                        <button type="button" class="btn btn-primary" id="confirmGenerateBtn">{{contentEditorText 'contentEditor.generate'}}</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="cluster-navigation admin-form-row-sm">
            <div class="cluster-nav-controls">
                <button class="btn btn-outline-secondary btn-sm cluster-nav" data-dir="prev" aria-label="{{contentEditorText 'contentEditor.previousCluster'}}">
                    <i class="fa fa-chevron-left"></i><span class="nav-label"> {{contentEditorText 'contentEditor.prev'}}</span>
                </button>
                <button class="btn btn-outline-secondary btn-sm cluster-nav" data-dir="next" aria-label="{{contentEditorText 'contentEditor.nextCluster'}}">
                    <span class="nav-label">{{contentEditorText 'contentEditor.next'}} </span><i class="fa fa-chevron-right"></i>
                </button>
                <span class="text-muted small cluster-counter">{{clusterCounterText}}</span>
            </div>
            <div class="cluster-window-controls">
                <label for="cluster-window-size" class="small text-muted content-upload-empty-text">{{contentEditorText 'contentEditor.show'}}</label>
                <select id="cluster-window-size" class="form-select form-select-sm">
                    <option value="1" selected="{{windowSizeSelected 1}}">1</option>
                    <option value="5" selected="{{windowSizeSelected 5}}">5</option>
                    <option value="10" selected="{{windowSizeSelected 10}}">10</option>
                    <option value="20" selected="{{windowSizeSelected 20}}">20</option>
                    <option value="50" selected="{{windowSizeSelected 50}}">50</option>
                </select>
                <span class="small text-muted">{{contentEditorText 'contentEditor.clustersAtATime'}}</span>
            </div>
            <div class="small text-muted text-truncate cluster-name">{{currentClusterName}}</div>
        </div>
        {{/if}}

        <!-- Validation Summary Panel -->
        <div id="stim-validation-summary"></div>

        <!-- JSON Editor container -->
        <div class="card admin-card editor-initial-surface" aria-busy="{{#if editorReady}}false{{else}}true{{/if}}">
            <div class="card-body admin-alert-compact">
                <div id="stim-editor-container"></div>
            </div>
        </div>

        {{#if editorReady}}
        <!-- Action buttons -->
        <div class="content-edit-actions">
            <div class="save-feedback {{#if saveFeedbackText}}is-visible{{/if}}" role="status" aria-live="polite" aria-atomic="true">
                {{#if saveFeedbackText}}
                <i class="fa fa-check-circle" aria-hidden="true"></i>
                <span>{{saveFeedbackText}}</span>
                {{/if}}
            </div>
            <a href="/contentUpload" class="btn btn-secondary">
                <i class="fa fa-times"></i> {{contentEditorText 'content.cancel'}}
            </a>
            <button class="btn btn-primary save-btn" disabled="{{saveDisabled}}">
                <i class="fa fa-save"></i> {{contentEditorText 'tdfEditor.saveChanges'}}
            </button>
        </div>
        {{/if}}

        {{/if}}
        {{/if}}
    </div>
</template>
