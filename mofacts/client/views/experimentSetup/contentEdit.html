<template name="contentEdit">

    <div>
        <!-- Header -->
        <div class="editor-page-header">
            <a href="/contentUpload" class="btn btn-outline-secondary editor-back-button">
                <i class="fa fa-arrow-left"></i> {{contentEditorText 'apkg.back'}}
            </a>
            <p class="editor-page-context">
                {{editTitle}}
                {{#if conditionInfo}}
                    <small class="text-muted">
                        {{conditionSummary conditionInfo}}
                    </small>
                {{/if}}
                {{#if stimFileInfo}}
                    <small class="text-muted">
                        {{stimFileSummary stimFileInfo}}
                    </small>
                {{/if}}
            </p>
        </div>

        {{#if editorLoadError}}
        <div class="admin-status admin-status-error" role="alert">
            <i class="fa fa-exclamation-circle" aria-hidden="true"></i>
            <div class="admin-status-text">{{editorLoadError}}</div>
        </div>
        <button type="button" class="btn btn-outline-danger content-editor-retry">{{contentEditorText 'common.tryAgain'}}</button>
        {{else}}
        {{#if noData}}
        <div class="admin-status admin-status-warning">
            <i class="fa fa-exclamation-triangle"></i>
            <div class="admin-status-text">{{contentEditorText 'contentEditor.noStimulusData'}}</div>
        </div>
        {{else}}

        {{#with initializationEditorMessage}}
        <div class="admin-inline-feedback admin-form-row-sm">{{> adminStatus variant=type title=title text=text urgent=true}}</div>
        {{/with}}

        {{#if editorReady}}
        <!-- Tooltip toggle + unsaved state (mobile-friendly) -->
        <div class="editor-topbar admin-form-row">
            <div class="editor-status">
                {{#if hasChanges}}
                <span class="badge bg-warning text-dark unsaved-badge">{{contentEditorText 'tdfEditor.unsavedChanges'}}</span>
                {{/if}}
            </div>
            <div class="editor-verbosity">
                <span class="text-muted small">{{contentEditorText 'tdfEditor.descriptions'}}</span>
                <div class="form-check form-check-inline editor-inline-check">
                    <input class="form-check-input" type="radio" name="tooltipMode" id="tooltipNone" value="none" checked="{{noneChecked}}">
                    <label class="form-check-label small" for="tooltipNone">{{contentEditorText 'tdfEditor.none'}}</label>
                </div>
                <div class="form-check form-check-inline editor-inline-check">
                    <input class="form-check-input" type="radio" name="tooltipMode" id="tooltipBrief" value="brief" checked="{{briefChecked}}">
                    <label class="form-check-label small" for="tooltipBrief">{{contentEditorText 'tdfEditor.brief'}}</label>
                </div>
                <div class="form-check form-check-inline editor-inline-check">
                    <input class="form-check-input" type="radio" name="tooltipMode" id="tooltipVerbose" value="verbose" checked="{{verboseChecked}}">
                    <label class="form-check-label small" for="tooltipVerbose">{{contentEditorText 'tdfEditor.verbose'}}</label>
                </div>
            </div>
        </div>
        {{#with toolbarEditorMessage}}
        <div class="admin-inline-feedback admin-form-row-sm">{{> adminStatus variant=type title=title text=text urgent=(equals type "error")}}</div>
        {{/with}}

        <!-- MC Conversion Toolbar -->
        <div class="mc-toolbar admin-form-row">
            <button id="generateIncorrectBtn" class="btn btn-outline-primary btn-sm" data-bs-toggle="modal" data-bs-target="#generateIncorrectModal">
                <i class="fa fa-random"></i> {{contentEditorText 'contentEditor.generateIncorrectResponses'}}
            </button>
            <button id="removeIncorrectBtn" class="btn btn-outline-danger btn-sm">
                <i class="fa fa-trash"></i> {{contentEditorText 'contentEditor.removeAllIncorrectResponses'}}
            </button>
        </div>
        {{#if removeIncorrectConfirmation}}
        <div class="admin-form-row-sm">{{> adminInlineConfirmation confirmation=removeIncorrectConfirmation}}</div>
        {{/if}}

        <!-- Generate Incorrect Responses Modal -->
        <div class="modal fade" id="generateIncorrectModal" tabindex="-1" aria-labelledby="generateIncorrectModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="generateIncorrectModalLabel">{{contentEditorText 'contentEditor.generateIncorrectResponses'}}</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="{{contentEditorText 'app.closeMenu'}}"></button>
                    </div>
                    <div class="modal-body">
                        <div class="admin-form-row">
                            <label for="distractorCount" class="form-label">{{contentEditorText 'contentEditor.distractorCountLabel'}}</label>
                            <input type="number" class="form-control" id="distractorCount" value="3" min="1" max="20">
                        </div>
                        <div class="admin-status admin-status-small content-upload-empty-text">
                            <i class="fa fa-info-circle"></i>
                            <div class="admin-status-text">
                                {{contentEditorText 'contentEditor.distractorHelp'}}
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{{contentEditorText 'content.cancel'}}</button>
                        <button type="button" class="btn btn-primary" id="confirmGenerateBtn">{{contentEditorText 'contentEditor.generate'}}</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="cluster-navigation admin-form-row-sm">
            <div class="cluster-nav-controls">
                <button class="btn btn-outline-secondary btn-sm cluster-nav" data-dir="prev" aria-label="{{contentEditorText 'contentEditor.previousCluster'}}">
                    <i class="fa fa-chevron-left"></i><span class="nav-label"> {{contentEditorText 'contentEditor.prev'}}</span>
                </button>
                <button class="btn btn-outline-secondary btn-sm cluster-nav" data-dir="next" aria-label="{{contentEditorText 'contentEditor.nextCluster'}}">
                    <span class="nav-label">{{contentEditorText 'contentEditor.next'}} </span><i class="fa fa-chevron-right"></i>
                </button>
                <span class="text-muted small cluster-counter">{{clusterCounterText}}</span>
            </div>
            <div class="cluster-window-controls">
                <label for="cluster-window-size" class="small text-muted content-upload-empty-text">{{contentEditorText 'contentEditor.show'}}</label>
                <select id="cluster-window-size" class="form-select form-select-sm">
                    <option value="1" selected="{{windowSizeSelected 1}}">1</option>
                    <option value="5" selected="{{windowSizeSelected 5}}">5</option>
                    <option value="10" selected="{{windowSizeSelected 10}}">10</option>
                    <option value="20" selected="{{windowSizeSelected 20}}">20</option>
                    <option value="50" selected="{{windowSizeSelected 50}}">50</option>
                </select>
                <span class="small text-muted">{{contentEditorText 'contentEditor.clustersAtATime'}}</span>
            </div>
            <div class="small text-muted text-truncate cluster-name">{{currentClusterName}}</div>
        </div>
        {{/if}}

        <!-- Validation Summary Panel -->
        <div id="stim-validation-summary"></div>
        {{#with validationEditorMessage}}
        <div class="admin-inline-feedback admin-form-row-sm">{{> adminStatus variant=type title=title text=text urgent=(equals type "error")}}</div>
        {{/with}}

        <!-- JSON Editor container -->
        <div class="card admin-card editor-initial-surface" aria-busy="{{#if editorReady}}false{{else}}true{{/if}}">
            <div class="card-body admin-alert-compact">
                <div id="stim-editor-container"></div>
                {{#with fieldEditorMessage}}
                <div class="admin-inline-feedback admin-form-row-top">{{> adminStatus variant=type title=title text=text urgent=(equals type "error")}}</div>
                {{/with}}
            </div>
        </div>

        {{#if editorReady}}
        <!-- Action buttons -->
        <div class="content-edit-actions">
            {{#with saveEditorMessage}}
            <div class="admin-inline-feedback">{{> adminStatus variant=type title=title text=text urgent=(equals type "error")}}</div>
            {{/with}}
            <div class="save-feedback {{#if saveFeedbackText}}is-visible{{/if}}" role="status" aria-live="polite" aria-atomic="true">
                {{#if saveFeedbackText}}
                <i class="fa fa-check-circle" aria-hidden="true"></i>
                <span>{{saveFeedbackText}}</span>
                {{/if}}
            </div>
            <a href="/contentUpload" class="btn btn-secondary">
                <i class="fa fa-times"></i> {{contentEditorText 'content.cancel'}}
            </a>
            <button class="btn btn-primary save-btn" disabled="{{saveDisabled}}">
                <i class="fa fa-save"></i> {{contentEditorText 'tdfEditor.saveChanges'}}
            </button>
        </div>
        {{/if}}

        {{/if}}
        {{/if}}
    </div>
</template>
