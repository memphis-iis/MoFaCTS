<!-- Content (TDF and Stim) File Uploading Template -->

<template name="contentUpload">
    <div class="content-upload-root">
        <!-- Upload Quota Status (for regular users) -->
        {{#if quotaStatusError}}
        {{> adminStatus variant="error" text=quotaStatusError urgent=true}}
        <button type="button" class="btn btn-outline-secondary btn-sm admin-form-row-sm" data-content-quota-retry="true">
            {{t 'common.tryAgain'}}
        </button>
        {{/if}}
        {{#unless quotaStatus.unlimited}}
        <div class="alert alert-info admin-card" role="alert">
            <i class="fa fa-info-circle admin-section-icon"></i>
            <strong>{{t 'content.uploadQuota'}}</strong>
            {{t 'content.uploadQuotaSummary' remaining=quotaStatus.remaining dailyLimit=quotaStatus.dailyLimit}}
            <span class="admin-inline-action text-muted">{{t 'content.maxFileSize' maxFileSize=quotaStatus.maxFileSize}}</span>
        </div>
        {{/unless}}

        <div class="admin-section">
            {{> aiContentCreator embedded=true}}
        </div>

        <!-- Upload Package (ZIP) Section -->
        <div class="admin-section content-package-upload-section">
            <div class="card admin-card content-package-upload-card">
                <div class="card-body content-package-upload-layout">
                    <div class="content-package-upload-copy">
                        <div class="admin-section-heading content-package-upload-heading">
                            <i class="fa fa-file-archive-o admin-section-icon"></i>
                            <h5>{{t 'content.uploadMofactsPackage'}}</h5>
                        </div>

                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="emailInsteadOfAlert">
                            <label class="form-check-label" for="emailInsteadOfAlert">
                                {{t 'content.emailUploadSummary'}}
                            </label>
                        </div>

                        {{#with packageUploadMessage}}
                          {{> adminStatus variant=level text=text}}
                        {{/with}}
                        {{#if uploadConfirmationOpen}}
                        <div class="admin-form-row-top">
                            {{> adminInlineConfirmation confirmation=inlineConfirmationView}}
                        </div>
                        {{/if}}
                    </div>

                    <div class="content-package-upload-target">
                        <label class="package-drop-zone" for="upload-file" tabindex="0">
                            <span class="package-drop-icon"><i class="fa fa-cloud-upload"></i></span>
                            <span class="package-drop-text">{{t 'content.dropFilesBrowse'}}</span>
                            <input type="file" name="upload-file" id="upload-file" value="" accept=".zip" multiple>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <div class="admin-section">
            <div class="card admin-card">
                <div class="card-body">
                    <div class="admin-section-heading">
                        <i class="fa fa-folder-open admin-section-icon"></i>
                        <h5>{{t 'content.uploadedContent'}}</h5>
                    </div>

            {{#with contentListUploadMessage}}
            {{> adminStatus className="admin-inline-feedback" variant=level text=text}}
            {{/with}}

            {{#if listErrorText}}
            {{> adminStatus variant="error" text=listErrorText urgent=true}}
            <button type="button" class="btn btn-outline-secondary btn-sm admin-form-row-sm" data-content-list-retry="true">
                {{t 'common.tryAgain'}}
            </button>
            {{/if}}
            {{#if summaryErrorText}}
            {{> adminStatus variant="warning" text=summaryErrorText urgent=false}}
            <button type="button" class="btn btn-outline-secondary btn-sm admin-form-row-sm" data-content-summary-retry="true">
                {{t 'common.tryAgain'}}
            </button>
            {{/if}}

            <div class="admin-table-wrapper">
                <div class="table-responsive table-display-shell content-upload-table-wrapper {{#if initialPaintDone}}has-initial-paint has-painted{{else}}before-initial-paint is-before-paint{{/if}} {{#if listDisplayReady}}is-ready{{else}}is-not-ready is-loading{{/if}} {{#if overlayVisible}}show-overlay show-loading-overlay{{/if}}" aria-busy="{{#if listDisplayReady}}false{{else}}true{{/if}}">
                    {{#unless initialPaintDone}}
                    <div class="table-shell-placeholder content-upload-initial-placeholder" aria-hidden="true"></div>
                    {{/unless}}
                    {{#if overlayVisible}}
                    <div class="table-shell-loading content-upload-loading" role="status" aria-live="polite">
                        <i class="fa fa-circle-o-notch fa-spin admin-section-icon" aria-hidden="true"></i>
                        {{t 'content.buildingTable'}}
                    </div>
                    {{/if}}
                    <table class="table table-striped table-bordered table-shell-content content-upload-table">
                        <colgroup>
                            <col class="content-upload-col-summary">
                            <col class="content-upload-col-actions">
                        </colgroup>
                        <thead>
                            <tr>
                                <th scope="col" class="table-col-summary">{{t 'content.summary'}}</th>
                                <th scope="col" class="table-col-actions">{{t 'courses.action'}}</th>
                            </tr>
                        </thead>
                    <tbody>
                        {{#each assets}}
                            <tr class="{{#if isPending}}pending-upload-row pending-{{pendingStatus}}{{/if}}">
                                <th scope="row" class="table-col-summary">
                                    <div class="asset-cell-content">
                                        <div class="asset-summary-primary">
                                            <div class="asset-title-row">
                                                <span class="asset-title">{{lessonName}}</span>
                                                {{#unless isPending}}
                                                    {{#if isOwnTdf}}
                                                    <span class="asset-public-private-row">
                                                        <span class="public-private-switch" title="{{t 'content.togglePublicPrivateTitle'}}">
                                                            <span class="public-private-switch-label public-private-switch-label-left small">{{t 'content.private'}}</span>
                                                            <span class="form-switch public-private-switch-control">
                                                                <input class="form-check-input public-private-toggle" type="checkbox" data-tdfid="{{_id}}" checked={{checkedIfPublic}} {{publicPrivateToggleAttrs}} aria-label="{{t 'content.togglePublicPrivateAria'}}">
                                                            </span>
                                                            <span class="public-private-switch-label public-private-switch-label-right small">{{t 'content.public'}}</span>
                                                        </span>
                                                    </span>
                                                    {{/if}}
                                                {{/unless}}
                                                {{#if isPending}}
                                                    {{#if (equals pendingStatus 'checking')}}
                                                    <span class="admin-badge">
                                                        <i class="fa fa-shield"></i> {{t 'content.checking'}}
                                                    </span>
                                                    {{/if}}
                                                    {{#if (equals pendingStatus 'uploading')}}
                                                    <span class="admin-badge">
                                                        <i class="fa fa-cloud-upload"></i> {{t 'content.uploadingProgress' progress=pendingProgress}}
                                                    </span>
                                                    {{/if}}
                                                    {{#if (equals pendingStatus 'processing')}}
                                                    <span class="admin-badge">
                                                        <i class="fa fa-cog fa-spin"></i> {{t 'content.processing'}}
                                                    </span>
                                                    {{/if}}
                                                    {{#if (equals pendingStatus 'completed')}}
                                                    <span class="admin-badge admin-badge-success">
                                                        <i class="fa fa-check"></i> {{t 'content.complete'}}
                                                    </span>
                                                    {{/if}}
                                                    {{#if (equals pendingStatus 'error')}}
                                                    <span class="admin-badge admin-badge-error">
                                                        <i class="fa fa-exclamation-triangle"></i> {{t 'content.failed'}}
                                                    </span>
                                                    {{/if}}
                                                {{/if}}
                                            </div>

                                            {{#unless isPending}}
                                                {{#if languageMetadataRows}}
                                                <div class="asset-language-metadata text-muted small">
                                                    {{#each languageMetadataRows}}
                                                        <span class="asset-language-metadata-item"><b>{{label}}:</b> {{value}}</span>
                                                    {{/each}}
                                                </div>
                                                {{/if}}
                                                {{#if conditions}}
                                                <div class="asset-conditions text-muted small">
                                                    &bull; {{t 'content.conditions'}}
                                                    {{#each conditions}}{{this.condition}} ({{this.count}}), {{/each}}
                                                </div>
                                                {{/if}}
                                            {{/unless}}
                                        </div>

                                        <!-- Error message display -->
                                        {{#if isPending}}
                                            {{#if pendingError}}
                                            <div class="asset-info-block asset-error admin-table-feedback">
                                                <b>{{t 'content.errorLabel'}}:</b> {{pendingError}}
                                            </div>
                                            {{/if}}
                                        {{else}}
                                            {{#if errors}}
                                            <div class="asset-info-block asset-error admin-table-feedback">
                                                <b>{{t 'content.errorLabel'}}:</b>
                                                {{#each errors}}
                                                    {{{this}}}
                                                {{/each}}
                                            </div>
                                            {{/if}}
                                        {{/if}}

                                        <!-- Progress bar for pending upload/processing state -->
                                        {{#if isPending}}
                                            {{#if (equals pendingStatus 'uploading')}}
                                            <div class="asset-info-block admin-progress-row content-upload-progress">
                                                <div class="progress">
                                                    <div class="progress-bar progress-bar-striped progress-bar-animated"
                                                         role="progressbar"
                                                         style="width: {{pendingProgress}}%"
                                                         aria-valuenow="{{pendingProgress}}"
                                                         aria-valuemin="0"
                                                         aria-valuemax="100">
                                                    </div>
                                                </div>
                                                <!-- Minimal metadata for pending uploads -->
                                                <div class="admin-progress-note">
                                                    {{t 'content.uploadStarted' fileName=fileName}}
                                                </div>
                                            </div>
                                            {{/if}}
                                            {{#if (equals pendingStatus 'processing')}}
                                            <div class="asset-info-block admin-progress-row content-upload-progress">
                                                <div class="progress">
                                                    <div class="progress-bar progress-bar-striped progress-bar-animated"
                                                         role="progressbar"
                                                         style="width: {{pendingProgress}}%"
                                                         aria-valuenow="{{pendingProgress}}"
                                                         aria-valuemin="0"
                                                         aria-valuemax="100">
                                                    </div>
                                                </div>
                                                <div class="admin-progress-note">
                                                    {{t 'content.processingPackage'}}
                                                </div>
                                            </div>
                                            {{/if}}
                                            {{#if (equals pendingStatus 'checking')}}
                                            <div class="asset-info-block admin-progress-row content-upload-progress">
                                                <div class="progress">
                                                    <div class="progress-bar progress-bar-striped progress-bar-animated"
                                                         role="progressbar"
                                                         style="width: 8%"
                                                         aria-valuenow="8"
                                                         aria-valuemin="0"
                                                         aria-valuemax="100">
                                                    </div>
                                                </div>
                                                <div class="admin-progress-note">
                                                    {{t 'content.checkingPackageIntegrity'}}
                                                </div>
                                            </div>
                                            {{/if}}
                                        {{else}}
                                        <!-- Regular TDF metadata -->
                                        <div class="asset-info-block asset-meta-row">
                                            <span class="asset-meta-item">
                                                {{#if detailsReady}}
                                                {{t 'content.stimuliCount' count=stimuliCount}}
                                                {{else}}
                                                <span class="text-muted">{{t 'content.stimuliCount' count='...'}}</span>
                                                {{/if}}
                                            </span>
                                            <button type="button" data-file="{{this._id}}" class="show-stimuli-btn asset-disclosure-button asset-meta-item" aria-controls="stimuli-{{this._id}}" aria-expanded="false">
                                                <i class="fa fa-file-o" aria-hidden="true"></i> {{t 'content.files'}}
                                                {{#if detailsReady}}({{stimFilesCount}}){{else}}(...){{/if}}
                                            </button>
                                            <button type="button" class="manage-media-btn asset-disclosure-button asset-meta-item" data-tdfid="{{this._id}}" data-stimsetid="{{this.stimuliSetId}}" aria-controls="media-manager-{{this._id}}" aria-expanded="false">
                                                <i class="fa fa-folder-open" aria-hidden="true"></i> {{t 'content.manageMedia'}}
                                                {{#if assetsCount}}({{assetsCount}}){{else}}(0){{/if}}
                                            </button>
                                        </div>
                                        <div hidden id="stimuli-{{this._id}}" class="asset-toggle-content">
                                            {{#if detailsReady}}
                                                {{#if stimFileInfo.length}}
                                                    {{#each this.stimFileInfo}}
                                                        <button type="button" data-tdfid="{{../_id}}" class="stim-download-btn btn-icon" {{contentCommandAttrs 'asset' ../_id}}><span class="fa fa-download" aria-hidden="true"></span> {{this.fileName}} </button>
                                                    {{/each}}
                                                {{else}}
                                                    <span class="text-muted small">{{t 'content.noStimulusFiles'}}</span>
                                                {{/if}}
                                            {{else}}
                                                <span class="text-muted small">{{t 'content.loadingFiles'}}</span>
                                            {{/if}}
                                            </div>
                                            <div hidden id="media-manager-{{this._id}}" class="media-manager-panel">
                                                <!-- Drop Zone -->
                                                <label class="media-drop-zone" for="media-file-input-{{this._id}}" data-tdfid="{{this._id}}" data-stimsetid="{{this.stimuliSetId}}">
                                                    <div class="drop-icon"><i class="fa fa-cloud-upload" aria-hidden="true"></i></div>
                                                    <div class="drop-text">{{t 'content.dropFilesBrowse'}}</div>
                                                    <input type="file" id="media-file-input-{{this._id}}" class="media-file-input" data-tdfid="{{this._id}}" data-stimsetid="{{this.stimuliSetId}}" multiple accept="image/*,audio/*,video/*">
                                                </label>

                                                <!-- Upload Progress (shown during uploads) -->
                                                <div class="media-upload-progress admin-progress-row" id="upload-progress-{{this._id}}" style="display: none;">
                                                    <div class="progress">
                                                        <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
                                                    </div>
                                                    <div class="upload-status admin-progress-note">{{t 'content.uploading'}}</div>
                                                </div>

                                                <!-- Action Bar -->
                                                <div class="media-action-bar">
                                                    <div class="form-check">
                                                        <input class="form-check-input select-all-media" type="checkbox" id="select-all-{{this._id}}" data-tdfid="{{this._id}}">
                                                        <label class="form-check-label small" for="select-all-{{this._id}}">{{t 'content.selectAll'}}</label>
                                                    </div>
                                                    <button type="button" class="btn btn-outline-danger btn-sm delete-selected-media" data-tdfid="{{this._id}}" disabled>
                                                        <i class="fa fa-trash"></i> {{t 'content.deleteSelected'}} (<span class="selected-count">0</span>)
                                                    </button>
                                                </div>
                                                {{#with (mediaUploadMessage _id)}}
                                                  <div class="admin-table-feedback">{{> adminStatus variant=level text=text}}</div>
                                                {{/with}}
                                                {{#if mediaConfirmationOpen _id}}
                                                <div class="admin-form-row-sm admin-table-feedback">
                                                    {{> adminInlineConfirmation confirmation=inlineConfirmationView}}
                                                </div>
                                                {{/if}}

                                                <!-- File List -->
                                                {{#if assetsReady}}
                                                {{#if this.assets.length}}
                                                <div class="table-responsive content-media-table-shell" role="region" aria-label="{{t 'content.manageMedia'}}" tabindex="0">
                                                    <table class="table table-striped table-bordered media-file-table">
                                                        <thead>
                                                            <tr>
                                                                <th scope="col" class="col-checkbox"><span class="sr-only">{{t 'content.selectAll'}}</span></th>
                                                                <th scope="col" class="col-type">{{t 'content.type'}}</th>
                                                                <th scope="col">{{t 'content.filename'}}</th>
                                                                <th scope="col" class="col-actions"><span class="sr-only">{{t 'courses.actions'}}</span></th>
                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            {{#each this.assets}}
                                                            <tr>
                                                                <td class="col-checkbox">
                                                                    <input type="checkbox" class="form-check-input media-select-checkbox" data-assetid="{{this._id}}" data-filename="{{this.filename}}" aria-label="{{t 'content.filename'}}: {{this.filename}}">
                                                                </td>
                                                                <td class="col-type">
                                                                    {{#if (equals this.fileType 'image')}}
                                                                        <i class="fa fa-picture-o type-icon image" title="{{t 'content.image'}}"></i>
                                                                    {{else}}
                                                                    {{#if (equals this.fileType 'audio')}}
                                                                        <i class="fa fa-music type-icon audio" title="{{t 'content.audio'}}"></i>
                                                                    {{else}}
                                                                    {{#if (equals this.fileType 'video')}}
                                                                        <i class="fa fa-film type-icon video" title="{{t 'content.video'}}"></i>
                                                                    {{else}}
                                                                        <i class="fa fa-file-o type-icon unknown" title="{{t 'content.file'}}"></i>
                                                                    {{/if}}
                                                                    {{/if}}
                                                                    {{/if}}
                                                                </td>
                                                                <th scope="row" class="filename">
                                                                    <a href="{{this.link}}" target="_blank" title="{{t 'content.openInNewTab'}}">{{this.filename}}</a>
                                                                </th>
                                                                <td class="col-actions">
                                                                    <button class="btn btn-outline-danger btn-sm btn-delete-media" data-assetid="{{this._id}}" data-filename="{{this.filename}}" title="{{t 'content.deleteThisFile'}}" aria-label="{{t 'content.deleteThisFile'}}: {{this.filename}}" {{contentCommandAttrs 'media' ../_id}}>
                                                                        <i class="fa fa-times" aria-hidden="true"></i>
                                                                    </button>
                                                                </td>
                                                            </tr>
                                                            {{/each}}
                                                        </tbody>
                                                    </table>
                                                </div>
                                                {{else}}
                                                <div class="media-empty-state">
                                                    <div class="empty-icon"><i class="fa fa-folder-open-o"></i></div>
                                                    <p class="content-upload-empty-text">{{t 'content.noMediaFiles'}}</p>
                                                </div>
                                                {{/if}}
                                                {{else}}
                                                <div class="media-empty-state">
                                                    <div class="empty-icon"><i class="fa fa-folder-open-o"></i></div>
                                                    <p class="content-upload-empty-text">{{t 'content.loadingMedia'}}</p>
                                                </div>
                                                {{/if}}
                                            </div>
                                        {{#if isOwnTdf}}
                                        <div class="asset-info-block asset-secondary-row">
                                            <button type="button" data-file="{{this._id}}" class="show-manage-access-btn asset-disclosure-button asset-secondary-disclosure text-muted small" aria-controls="manage-access-{{this._id}}" aria-expanded="false">
                                                <i class="fa fa-cog" aria-hidden="true"></i> {{t 'content.manageAccessOwnership'}}
                                            </button>
                                            <div hidden id="manage-access-{{this._id}}" class="asset-toggle-content border-top">
                                                <div class="row g-2 admin-form-row-sm">
                                                    <div class="col-md-8">
                                                        <label for="transfer-{{_id}}" class="form-label small admin-form-row-xs">
                                                            <i class="fa fa-exchange"></i> {{t 'content.transferOwnership'}}
                                                        </label>
                                                        <div class="input-group input-group-sm">
                                                            <input type="text" id="transfer-{{_id}}" class="form-control" placeholder="{{t 'content.enterNewOwnerEmail'}}" {{contentCommandAttrs 'access' _id}}>
                                                            <button type="button" value="{{_id}}" class="transfer-btn btn btn-outline-secondary" {{contentCommandAttrs 'access' _id}}>
                                                                <i class="fa fa-exchange"></i> {{t 'content.transfer'}}
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="row g-2">
                                                    <div class="col-md-8">
                                                        <label for="add-access-{{_id}}" class="form-label small admin-form-row-xs">
                                                            <i class="fa fa-plus"></i> {{t 'content.shareWithUsers'}}
                                                        </label>
                                                        <div class="input-group input-group-sm">
                                                            <input type="text" id="add-access-{{_id}}" data-id="{{_id}}" class="form-control js-accessor-input" placeholder="{{t 'content.enterUserEmails'}}" {{contentCommandAttrs 'access' _id}}>
                                                            <button type="button" value="{{_id}}" class="add-access-btn btn btn-outline-secondary" {{contentCommandAttrs 'access' _id}}>
                                                                <i class="fa fa-plus"></i> {{t 'content.add'}}
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="asset-accessors-section border-top">
                                                    <div class="small text-muted admin-form-row-xs">
                                                        <i class="fa fa-users"></i> {{t 'content.sharedUsers'}}
                                                        {{#if detailsReady}}({{accessorsCount}}){{else}}(...){{/if}}
                                                    </div>
                                                    {{#if detailsReady}}
                                                        {{#if accessors.length}}
                                                        <ul class="asset-accessors-list">
                                                        {{#each accessors}}
                                                            <li>
                                                            {{this.username}}
                                                            <button type="button" value="{{../_id}}" data-user="{{this.userId}}" class="remove-access-btn btn-icon" aria-label="{{t 'content.manageAccessOwnership'}}: {{this.username}}" {{contentCommandAttrs 'access' ../_id}}><span class="fa fa-minus" aria-hidden="true"></span></button>
                                                            </li>
                                                        {{/each}}
                                                        </ul>
                                                        {{else}}
                                                        <span class="text-muted small">{{t 'content.noSharedUsers'}}</span>
                                                        {{/if}}
                                                    {{else}}
                                                        <span class="text-muted small">{{t 'content.loadingUsers'}}</span>
                                                    {{/if}}
                                                </div>
                                                {{#if accessMessageText}}
                                                <div class="admin-table-feedback">
                                                    {{> adminStatus variant=accessMessageLevel text=accessMessageText urgent=(equals accessMessageLevel "error")}}
                                                </div>
                                                {{/if}}
                                            </div>
                                        </div>
                                        {{/if}}
                                        <div class="asset-info-block asset-selector-row">
                                            {{#if conditions}}
                                            <div class="condition-selector-wrapper">
                                                <label for="tdf-selector-{{_id}}" class="form-label small admin-form-row-xs">
                                                    {{t 'content.selectConditionToEdit'}}
                                                </label>
                                                <select id="tdf-selector-{{_id}}"
                                                        class="form-select form-select-sm condition-tdf-selector"
                                                        data-root-tdfid="{{_id}}">
                                                    <option value="{{_id}}">{{t 'content.rootTdf'}} ({{lessonName}})</option>
                                                    {{#each conditions}}
                                                        <option value="{{this.tdfId}}"
                                                                {{disabledAttr this.tdfId}}>
                                                            {{this.condition}}
                                                            {{#unless this.tdfId}} ({{t 'content.notFoundMarker'}}){{/unless}}
                                                        </option>
                                                    {{/each}}
                                                </select>
                                            </div>
                                            {{/if}}

                                            {{#if stimFiles}}
                                            <div class="condition-selector-wrapper">
                                                <label for="stim-selector-{{_id}}" class="form-label small admin-form-row-xs">
                                                    {{t 'content.selectStimFileToEdit'}}
                                                </label>
                                                <select id="stim-selector-{{_id}}"
                                                        class="form-select form-select-sm stim-file-selector"
                                                        data-tdf-id="{{_id}}">
                                                    {{#each stimFiles}}
                                                        <option value="{{this.stimId}}"
                                                                data-filename="{{this.filename}}"
                                                                {{disabledAttr this.exists}}>
                                                            {{this.filename}}
                                                            {{#unless this.exists}} ({{t 'content.notFoundMarker'}}){{/unless}}
                                                        </option>
                                                    {{/each}}
                                                </select>
                                            </div>
                                            {{/if}}
                                        </div>
                                        {{/if}}
                                    </div>
                                </th>
                                <td class="table-col-actions">
                                    {{#unless isPending}}
                                    <!-- Regular TDF action buttons -->
                                    <div class="content-upload-actions">
                                        <!-- Edit buttons - read from selectors if present -->
                                        <div class="action-buttons-row admin-icon-button-group">
                                                    <button id="content-edit-btn"
                                                            value="{{_id}}"
                                                            {{selectorDataAttr conditions}}
                                                            class="btn-icon"
                                                            title="{{t 'content.editStimuli'}}"
                                                            aria-label="{{t 'content.editStimuli'}}: {{lessonName}}">
                                                <span class="fa fa-pencil" aria-hidden="true"></span>
                                            </button>
                                            <button id="tdf-edit-btn"
                                                    value="{{_id}}"
                                                    {{selectorDataAttr conditions}}
                                                    class="btn-icon"
                                                    title="{{t 'content.editTdfSettings'}}"
                                                    aria-label="{{t 'content.editTdfSettings'}}: {{lessonName}}">
                                                <span class="fa fa-cog" aria-hidden="true"></span>
                                            </button>
                                            <button id="copy-tdf-btn" value="{{_id}}" class="btn-icon" title="{{t 'content.makePrivateCopy'}}" aria-label="{{t 'content.makePrivateCopy'}}: {{lessonName}}" {{contentCommandAttrs 'asset' _id}}><span class="fa fa-copy" aria-hidden="true"></span></button>
                                            <button id="tdf-download-btn" data-tdfid="{{_id}}" class="btn-icon" title="{{t 'content.downloadCurrentPackage'}}" aria-label="{{t 'content.downloadCurrentPackage'}}: {{lessonName}}" {{contentCommandAttrs 'asset' _id}}><span class="fa fa-download" aria-hidden="true"></span></button>
                                            <button id="package-delete-btn" value="{{packageAssetId}}" data-package-file="{{packageFile}}" data-filename="{{fileName}}" class="btn-icon" title="{{t 'content.deletePackage'}}" aria-label="{{t 'content.deletePackage'}}: {{lessonName}}" {{contentCommandAttrs 'asset' _id}}><span class="fa fa-trash" aria-hidden="true"></span></button>
                                            {{#if conditions}}
                                                <button id="reset-conditions-btn" value="{{_id}}" class="btn-icon" title="{{t 'content.resetConditions'}}" aria-label="{{t 'content.resetConditions'}}: {{lessonName}}"><span class="fa fa-refresh" aria-hidden="true"></span></button>
                                            {{/if}}
                                        </div>
                                    </div>
                                    {{/unless}}
                                </td>
                            </tr>
                            {{#if assetActionConfirmationOpen _id}}
                            <tr class="admin-feedback-row">
                                <td colspan="2">
                                    <div class="admin-table-feedback">
                                        {{> adminInlineConfirmation confirmation=inlineConfirmationView}}
                                    </div>
                                </td>
                            </tr>
                            {{/if}}
                            {{#with (assetUploadMessage _id)}}
                            <tr class="admin-feedback-row">
                                <td colspan="2"><div class="admin-table-feedback">{{> adminStatus variant=level text=text}}</div></td>
                            </tr>
                            {{/with}}
                        {{/each}}
                        {{#if listDisplayReady}}
                            {{#if showEmptyState}}
                            <tr>
                                <td colspan="2" class="text-center text-muted admin-empty-state">
                                    {{t 'content.noUploadedContent'}}
                                </td>
                            </tr>
                            {{/if}}
                        {{/if}}
                    </tbody>
                    </table>
                </div>
            </div>
            <div class="content-upload-load-more">
                {{#if canLoadMore}}
                <button class="btn btn-outline-secondary" id="load-more-tdfs">
                    <i class="fa fa-plus"></i> {{t 'content.loadMore'}}
                </button>
                {{/if}}
            </div>
                </div>
            </div>
        </div>

        <!-- Upload from Anki (.apkg) Section -->
        <div class="admin-section">
            <div class="card admin-card">
                <div class="card-body">
                    <div class="admin-section-heading">
                        <i class="fa fa-magic admin-section-icon"></i>
                        <h5>{{t 'content.importFromAnki'}}</h5>
                    </div>
                    <p class="text-muted admin-form-row">
                        {{t 'content.ankiImportDescription'}}
                    </p>
                    <div class="text-center">
                        <button type="button" class="btn btn-primary btn-lg" id="open-apkg-wizard">
                            <i class="fa fa-magic"></i> {{t 'content.configureAnkiImport'}}
                        </button>
                        <p class="text-muted small admin-form-row-top content-upload-empty-text">
                            {{t 'content.ankiWizardHelp'}}
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Anki Import Wizard (hidden by default) -->
        <div id="apkg-wizard-modal" style="display: none;">
            {{> apkgWizard}}
        </div>

        <!-- Upload from Canvas (.imscc) Section -->
        <div class="admin-section">
            <div class="card admin-card">
                <div class="card-body">
                    <div class="admin-section-heading">
                        <i class="fa fa-graduation-cap admin-section-icon"></i>
                        <h5>{{t 'content.importFromCanvas'}}</h5>
                    </div>
                    <p class="text-muted admin-form-row">
                        {{t 'content.canvasImportDescription'}}
                    </p>
                    <div class="text-center">
                        <button type="button" class="btn btn-primary btn-lg" id="open-imscc-wizard">
                            <i class="fa fa-graduation-cap"></i> {{t 'content.configureCanvasImport'}}
                        </button>
                        <p class="text-muted small admin-form-row-top content-upload-empty-text">
                            {{t 'content.canvasWizardHelp'}}
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Canvas IMSCC Import Wizard (hidden by default) -->
        <div id="imscc-wizard-modal" style="display: none;">
            {{> imsccWizard}}
        </div>

        {{#if showDeleteAllButton}}
        <div class="admin-section">
            <div class="card admin-card">
                <div class="card-body">
                    <div class="admin-section-heading">
                        <i class="fa fa-exclamation-triangle admin-section-icon content-upload-danger-icon"></i>
                        <h5>{{t 'content.adminFunctions'}}</h5>
                    </div>
                    <div class="alert alert-danger admin-form-row" role="alert">
                        <strong>{{t 'content.warning'}}</strong> {{t 'content.deleteAllWarning'}}
                    </div>
                    <div class="text-center">
                        <button class="btn btn-danger" id="deleteAllAssetsConfirm">
                            <i class="fa fa-trash"></i> {{t 'content.deleteAllUploadedFiles'}}
                        </button>
                    </div>
                    {{#if adminDangerConfirmationOpen}}
                    <div class="admin-form-row-top">
                        {{> adminInlineConfirmation confirmation=inlineConfirmationView}}
                    </div>
                    {{/if}}
                    {{#with adminUploadMessage}}{{> adminStatus variant=level text=text}}{{/with}}
                </div>
            </div>
        </div>
        {{/if}}
    </div>
</template>
