<template name="apkgWizard">
  <div class="apkg-wizard" id="apkg-wizard-container">
    <!-- Wizard Header -->
    <div class="wizard-header">
      <h3 class="page-header-title">Import from Anki (.apkg)</h3>
      <p class="text-muted">
        Convert Anki flashcard decks into MoFaCTS learning modules.
        Choose which fields to use and create one or more targeted TDFs.
      </p>
    </div>

    <!-- Step Indicators -->
    <div class="wizard-steps">
      <div class="step {{#if isStep 1}}active{{/if}} {{#if stepCompleted 1}}completed{{/if}}">
        <span class="step-number">1</span>
        <span class="step-label">Upload</span>
      </div>
      <div class="step {{#if isStep 2}}active{{/if}} {{#if stepCompleted 2}}completed{{/if}}">
        <span class="step-number">2</span>
        <span class="step-label">Setup</span>
      </div>
      <div class="step {{#if isStep 3}}active{{/if}} {{#if stepCompleted 3}}completed{{/if}}">
        <span class="step-number">3</span>
        <span class="step-label">Edit Draft</span>
      </div>
      <div class="step {{#if isStep 4}}active{{/if}} {{#if stepCompleted 4}}completed{{/if}}">
        <span class="step-number">4</span>
        <span class="step-label">Package</span>
      </div>
    </div>

    <!-- Wizard Content -->
    <div class="wizard-content">
      {{#if wizardMessage}}
      <div class="admin-status admin-status-{{wizardMessage.type}} wizard-card">
        <i class="fa {{wizardMessage.icon}}"></i>
        <div class="admin-status-text">
          <div class="admin-status-title">{{wizardMessage.title}}</div>
          <div>{{wizardMessage.text}}</div>
        </div>
      </div>
      {{/if}}

      {{#if inlineConfirmation}}
      <div class="admin-inline-confirmation wizard-card">
        <i class="fa {{inlineConfirmation.icon}}" aria-hidden="true"></i>
        <div>
          <div class="admin-inline-confirmation-title">{{inlineConfirmation.title}}</div>
          <div class="admin-inline-confirmation-message">{{inlineConfirmation.message}}</div>
        </div>
        <div class="admin-inline-confirmation-actions">
          <button type="button" class="btn btn-sm btn-outline-secondary" id="cancel-inline-confirmation">Cancel</button>
          <button type="button" class="btn btn-sm {{inlineConfirmation.confirmClass}}" id="confirm-inline-confirmation">
            {{inlineConfirmation.confirmLabel}}
          </button>
        </div>
      </div>
      {{/if}}

      <!-- Step 1: Upload & Analyze -->
      {{#if isStep 1}}
      <div class="wizard-step step-upload">
        <h4>Step 1: Select Anki Deck</h4>

        <div class="form-group">
          <label for="apkg-file-input">Choose .apkg file:</label>
          <input type="file" class="form-control" id="apkg-file-input" accept=".apkg">
          <small class="form-text text-muted">
            Select an Anki deck file (.apkg) from your computer
          </small>
        </div>


        {{#if analyzing}}
        <div class="admin-status">
          <i class="fa fa-spinner fa-spin"></i>
          <div class="admin-status-text">
            <div class="admin-status-title">Analyzing deck structure...</div>
            <div class="wizard-status-detail">
              <small>Parsing SQLite database</small><br>
              <small>Extracting fields and card templates</small><br>
              <small>Analyzing media files</small>
            </div>
          </div>
        </div>
        {{/if}}

        {{#if analyzeError}}
        <div class="admin-status admin-status-error">
          <i class="fa fa-exclamation-circle"></i>
          <div class="admin-status-text">
            <div class="admin-status-title">Error</div>
            <div>{{analyzeError}}</div>
          </div>
        </div>
        {{/if}}

        <div class="wizard-actions">
          <button class="btn btn-secondary" id="cancel-wizard">Cancel</button>
          {{#if analyzeDisabled}}
          <button class="btn btn-primary" id="analyze-deck" disabled>
            Analyze Deck →
          </button>
          {{else}}
          <button class="btn btn-primary" id="analyze-deck">
            Analyze Deck →
          </button>
          {{/if}}
        </div>
      </div>
      {{/if}}

      <!-- Step 2: Source Setup -->
      {{#if isStep 2}}
      <div class="wizard-step step-preview">
        <h4>Step 2: Configure Lesson Sources</h4>

        {{#if deckMetadata}}
        <div class="deck-info card wizard-card">
          <div class="card-body">
            <h5>{{deckMetadata.deckName}}</h5>
            <div class="row">
              <div class="col-md-3">
                <strong>Notes:</strong> {{deckMetadata.noteCount}}
              </div>
              <div class="col-md-3">
                <strong>Cards:</strong> {{deckMetadata.cardCount}}
              </div>
              <div class="col-md-3">
                <strong>Media:</strong> {{deckMetadata.mediaCount}}
              </div>
              <div class="col-md-3">
                <strong>Model:</strong> {{deckMetadata.modelName}}
              </div>
            </div>
            {{#if (eq importableNoteCount deckMetadata.noteCount)}}
            {{else}}
            <div class="wizard-status-detail small text-muted">
              Importable notes from the primary model: {{importableNoteCount}}
            </div>
            {{/if}}
          </div>
        </div>

        <h5>Available Fields:</h5>
        <div class="fields-list">
          {{#each deckMetadata.fields}}
          <div class="field-card card wizard-card-sm">
            <div class="card-body">
              <div class="row align-items-center">
                <div class="col-md-3">
                  <strong>{{plusOne index}}. {{name}}</strong>
                  <span class="badge badge-{{fieldTypeBadge type}}">{{type}}</span>
                </div>
                <div class="col-md-9">
                  {{#if sampleImage}}
                  <div class="field-preview wizard-card-sm">
                    <img src="{{sampleImage}}" alt="Preview" class="img-thumbnail" style="max-height: 80px; max-width: 120px;">
                  </div>
                  {{/if}}
                  <small class="text-muted">
                    {{#if (eq type "image")}}
                      <i class="fa fa-image"></i> Image field
                    {{else if (eq type "mixed")}}
                      <i class="fa fa-image"></i><i class="fa fa-font"></i> Image + Text
                    {{else}}
                      <i class="fa fa-font"></i> Text field
                    {{/if}}
                    {{#unless sampleImage}}
                    <br>
                    Samples: {{joinSamples samples}}
                    {{/unless}}
                  </small>
                </div>
              </div>
            </div>
          </div>
          {{/each}}
        </div>

        <!-- TDF Configurations -->
        <div class="tdf-configs">
          {{#each tdfConfigs}}
          <div class="tdf-config-card card wizard-card">
            <div class="card-header">
              <strong>TDF {{plusOne @index}}: {{#if name}}{{name}}{{else}}(unnamed){{/if}}</strong>
              {{#if isMultipleMode}}
              <button class="btn btn-sm btn-danger float-right remove-config" data-index="{{@index}}">
                <i class="fa fa-trash"></i> Remove
              </button>
              {{/if}}
            </div>
            <div class="card-body">

              <!-- TDF Name -->
              <div class="form-group">
                <label>TDF Name:</label>
                <input type="text" class="form-control tdf-name" data-index="{{@index}}"
                       value="{{name}}" placeholder="e.g., Countries_Flags">
              </div>

              <!-- Prompt Field -->
              <div class="form-group">
                <label>Prompt (what students see):</label>
                <select class="form-control prompt-field" data-index="{{@index}}" data-selected="{{prompt.field}}">
                  <option value="">-- Select field --</option>
                  {{#each deckFields}}
                  <option value="{{index}}">
                    {{plusOne index}}. {{name}} ({{type}})
                  </option>
                  {{/each}}
                </select>
              </div>

              <!-- Response Field -->
              <div class="form-group">
                <label>Response (correct answer):</label>
                <select class="form-control response-field" data-index="{{@index}}" data-selected="{{response.field}}">
                  <option value="">-- Select field --</option>
                  {{#each deckFields}}
                  <option value="{{index}}">
                    {{plusOne index}}. {{name}} ({{type}})
                  </option>
                  {{/each}}
                </select>
              </div>

              <div class="form-group">
                <label>Note Range (optional):</label>
                <input
                  type="text"
                  class="form-control source-range"
                  data-index="{{@index}}"
                  value="{{sourceRange}}"
                  placeholder='e.g., 0-999 or 0-499 1000-1499'>
                <small class="form-text text-muted">
                  Leave blank to use all notes. Uses zero-based note ranges in deck order.
                </small>
              </div>

              <div class="text-muted small wizard-card-sm">
                Uses <strong>{{selectedNoteCount this}}</strong> of {{importableNoteCount}} importable notes{{#if usingSubset this}} for this TDF{{/if}}.
              </div>

              {{#if validationError}}
              <div class="admin-status admin-status-warning admin-status-small">
                <i class="fa fa-exclamation-triangle"></i>
                <div class="admin-status-text">{{validationError}}</div>
              </div>
              {{/if}}

              {{#if isValid}}
              <div class="admin-status admin-status-success admin-status-small">
                <i class="fa fa-check"></i>
                <div class="admin-status-text">Configuration looks good.</div>
              </div>
              {{/if}}

            </div>
          </div>
          {{/each}}
        </div>

        <!-- Add Another TDF Button -->
        {{#unless hideAddButton}}
        <div class="text-center wizard-card">
          <button class="btn btn-outline-primary" id="add-tdf-config">
            <i class="fa fa-plus"></i> Add Another TDF Configuration
          </button>
          <p class="text-muted small wizard-status-detail">
            Want to create multiple learning modules from this deck?
          </p>
        </div>
        {{/unless}}

        <!-- Summary -->
        <div class="card bg-light">
          <div class="card-body">
            <h5>Summary:</h5>
            <ul>
              <li><strong>{{configCount}}</strong> TDF{{#if isMultipleMode}}s{{/if}} configured</li>
              <li><strong>{{totalCards}}</strong> total cards will be generated</li>
              {{#if totalMedia}}
              <li><strong>{{totalMedia}}</strong> media files will be included</li>
              {{/if}}
            </ul>
          </div>
        </div>

        <div class="wizard-actions wizard-actions-extra">
          <button class="btn btn-secondary" id="back-to-upload">← Back</button>
          {{#if allConfigsValid}}
          <button class="btn btn-primary" id="open-draft-editor">
            Open Draft Editor →
          </button>
          {{else}}
          <button class="btn btn-primary" id="open-draft-editor" disabled>
            Open Draft Editor →
          </button>
          {{/if}}
        </div>
        {{/if}}
      </div>
      {{/if}}

      <!-- Step 3: Draft Editor Workspace -->
      {{#if isStep 3}}
      <div class="wizard-step step-draft-editor">
        {{#if generateError}}
        <div class="admin-status admin-status-error">
          <i class="fa fa-exclamation-circle"></i>
          <div class="admin-status-text">
            <div class="admin-status-title">Packaging error</div>
            <div>{{generateError}}</div>
          </div>
        </div>
        {{/if}}
        {{> draftEditorWorkspace
          lessons=draftLessons
          onLessonsUpdate=updateDraftLessons
          onBack=backToSourceConfig
          onSaveContinue=saveDraftAndContinue
        }}
      </div>
      {{/if}}

      <!-- Step 4: Generate & Upload -->
      {{#if isStep 4}}
      <div class="wizard-step step-generate">
        <h4>Step 4: {{#if generationComplete}}Package Ready{{else}}Generating...{{/if}}</h4>

        {{#if generating}}
        <div class="admin-status">
          <i class="fa fa-spinner fa-spin"></i>
          <div class="admin-status-text">
            <div class="admin-status-title">Generating TDF{{#if isMultipleMode}}s{{/if}}...</div>
            <div class="admin-progress-row wizard-status-detail">
              <div class="admin-progress-track">
                <div class="admin-progress-bar progress-bar-striped progress-bar-animated"
                 style="width: {{generationProgress}}%">
                  {{generationProgress}}%
                </div>
              </div>
            </div>
            {{#if currentGenerationStep}}
            <div class="admin-progress-note">{{currentGenerationStep}}</div>
            {{/if}}
          </div>
        </div>
        {{/if}}

        {{#if generateError}}
        <div class="admin-status admin-status-error">
          <i class="fa fa-exclamation-circle"></i>
          <div class="admin-status-text">
            <div class="admin-status-title">Error</div>
            <div>{{generateError}}</div>
          <button class="btn btn-sm btn-secondary wizard-status-detail" id="back-to-config-error">
            ← Back to Configuration
          </button>
          </div>
        </div>
        {{/if}}

        {{#if generationComplete}}
        <div class="admin-status admin-status-success">
          <i class="fa fa-check"></i>
          <div class="admin-status-text">
            <div class="admin-status-title">Generation Complete!</div>
          </div>
        </div>

        {{#if generationResult.totalSkipped}}
        <div class="admin-status admin-status-warning">
          <i class="fa fa-exclamation-triangle"></i>
          <div class="admin-status-text">Skipped {{generationResult.totalSkipped}} cards while preparing the imported lessons.</div>
        </div>
        {{/if}}

        <div class="card wizard-card">
          <div class="card-header">
            <h5>Generated Files:</h5>
          </div>
          <div class="card-body">
            <ul>
              {{#each generationResult.manifest}}
              <li>
                <strong>{{tdfName}}</strong>: {{cardCount}} cards
                {{#if mediaCount}}, {{mediaCount}} media files{{/if}}
                {{#if skippedCount}}, {{skippedCount}} skipped{{/if}}
              </li>
              {{/each}}
            </ul>
            <div class="wizard-status-detail">
              <strong>Total:</strong> {{generationResult.totalCards}} cards,
              {{generationResult.totalMedia}} media files
              {{#if generationResult.totalSkipped}}, {{generationResult.totalSkipped}} skipped{{/if}}
            </div>
          </div>
        </div>

        {{#if uploadStatus}}
        <div class="admin-status wizard-card">
          <i class="fa fa-spinner fa-spin"></i>
          <div class="admin-status-text">
            <div class="admin-status-title">{{uploadStatus.message}}</div>
            <div class="admin-progress-row wizard-status-detail">
              <div class="admin-progress-track">
                <div class="admin-progress-bar progress-bar-striped progress-bar-animated"
                 style="width: {{uploadStatus.progress}}%">
                  {{uploadStatus.progress}}%
                </div>
              </div>
            </div>
          {{#if uploadStatus.hint}}
          <small class="admin-progress-note wizard-status-detail d-block">
            {{uploadStatus.hint}}
          </small>
          {{/if}}
          </div>
        </div>
        {{/if}}

        {{#if uploadError}}
        <div class="admin-status admin-status-error wizard-card">
          <i class="fa fa-exclamation-triangle"></i>
          <div class="admin-status-text">{{uploadError}}</div>
        </div>
        {{/if}}

        <div class="wizard-actions">
          {{#if uploadStatus}}
          <button class="btn btn-outline-secondary" id="download-package" disabled>
            <i class="fa fa-download"></i> Download Package
          </button>
          <button class="btn btn-primary" id="upload-to-mofacts" disabled>
            <i class="fa fa-upload"></i> Upload to MoFaCTS
          </button>
          {{else}}
          <button class="btn btn-outline-secondary" id="download-package">
            <i class="fa fa-download"></i> Download Package
          </button>
          <button class="btn btn-primary" id="upload-to-mofacts">
            <i class="fa fa-upload"></i> Upload to MoFaCTS
          </button>
          {{/if}}
        </div>

        {{#if uploadComplete}}
        <div class="admin-status admin-status-success wizard-card">
          <i class="fa fa-check"></i>
          <div class="admin-status-text">
            <div class="admin-status-title">Successfully uploaded to MoFaCTS!</div>
            <button class="btn btn-sm btn-primary wizard-status-detail" id="close-wizard">
              Close Wizard
            </button>
          </div>
        </div>
        {{/if}}

        {{/if}}
      </div>
      {{/if}}

    </div>
  </div>

  <style>
  .apkg-wizard {
    max-width: 900px;
    margin: var(--app-space-4) auto;
    padding: var(--app-space-4);
    background: var(--learning-card-surface-color);
    color: var(--app-text-color);
    border-radius: var(--app-border-radius-lg);
    box-shadow: var(--app-surface-shadow);
  }

  .apkg-wizard .wizard-header {
    text-align: center;
    margin-bottom: var(--app-space-5);
  }

  .apkg-wizard .wizard-steps {
    display: flex;
    justify-content: space-between;
    margin-bottom: var(--app-space-5);
    position: relative;
  }

  .apkg-wizard .wizard-steps::before {
    content: '';
    position: absolute;
    top: 20px;
    left: 10%;
    right: 10%;
    height: 2px;
    background: var(--border-color);
    z-index: 0;
  }

  .apkg-wizard .wizard-steps .step {
    flex: 1;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .apkg-wizard .wizard-steps .step-number {
    display: inline-block;
    width: 40px;
    height: 40px;
    line-height: 40px;
    border-radius: var(--border-radius-circle);
    background: var(--learning-card-surface-color);
    border: 2px solid var(--border-color);
    color: var(--app-secondary-text-color);
    font-weight: bold;
    margin-bottom: var(--app-space-1);
  }

  .apkg-wizard .wizard-steps .step.active .step-number {
    border-color: var(--app-info-color);
    background: var(--app-info-color);
    color: var(--app-primary-action-text-color);
  }

  .apkg-wizard .wizard-steps .step.completed .step-number {
    border-color: var(--app-success-color);
    background: var(--app-success-color);
    color: var(--learning-card-primary-action-text-color);
  }

  .apkg-wizard .wizard-steps .step-label {
    display: block;
    font-size: calc(var(--app-font-size-base) * 0.75);
    color: var(--app-secondary-text-color);
  }

  .apkg-wizard .wizard-content {
    min-height: 400px;
  }

  .apkg-wizard .wizard-actions {
    display: flex;
    justify-content: space-between;
    gap: var(--app-space-2);
    margin-top: var(--app-space-4);
    padding-top: var(--app-space-4);
    border-top: 1px solid var(--border-color);
  }

  .apkg-wizard .field-card {
    border-left: 3px solid var(--app-info-color);
  }

  .apkg-wizard .tdf-config-card {
    border-left: 4px solid var(--app-info-color);
  }

  .apkg-wizard .tdf-config-card.editing {
    border-left-color: var(--app-warning-color);
  }

  .apkg-wizard .badge-text { background: var(--app-secondary-surface-color); color: var(--app-secondary-text-color); }
  .apkg-wizard .badge-image { background: var(--app-media-image-color); color: var(--learning-card-primary-action-text-color); }
  .apkg-wizard .badge-mixed { background: var(--app-media-mixed-color); color: var(--learning-card-primary-action-text-color); }
  .apkg-wizard .badge-audio { background: var(--app-media-audio-color); color: var(--app-primary-action-text-color); }

  .apkg-wizard .fields-list {
    max-height: 400px;
    overflow-y: auto;
  }

  .apkg-wizard .wizard-card {
    margin-bottom: var(--app-space-3);
  }

  .apkg-wizard .wizard-status-detail {
    margin-top: var(--app-space-2);
  }

  .apkg-wizard .wizard-card-sm {
    margin-bottom: var(--app-space-2);
  }

  .apkg-wizard .wizard-actions-extra {
    margin-top: var(--app-space-3);
  }
  </style>
</template>
