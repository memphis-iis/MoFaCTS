<template name="apkgWizard">
  <div class="apkg-wizard" id="apkg-wizard-container">
    <!-- Wizard Header -->
    <div class="wizard-header">
      <p class="text-muted">
        {{apkgText 'apkg.subtitle'}}
      </p>
    </div>

    <!-- Step Indicators -->
    <div class="wizard-steps">
      <div class="step {{#if isStep 1}}active{{/if}} {{#if stepCompleted 1}}completed{{/if}}">
        <span class="step-number">1</span>
        <span class="step-label">{{apkgText 'apkg.stepUpload'}}</span>
      </div>
      <div class="step {{#if isStep 2}}active{{/if}} {{#if stepCompleted 2}}completed{{/if}}">
        <span class="step-number">2</span>
        <span class="step-label">{{apkgText 'apkg.stepSetup'}}</span>
      </div>
      <div class="step {{#if isStep 3}}active{{/if}} {{#if stepCompleted 3}}completed{{/if}}">
        <span class="step-number">3</span>
        <span class="step-label">{{apkgText 'apkg.stepEditDraft'}}</span>
      </div>
      <div class="step {{#if isStep 4}}active{{/if}} {{#if stepCompleted 4}}completed{{/if}}">
        <span class="step-number">4</span>
        <span class="step-label">{{apkgText 'apkg.stepPackage'}}</span>
      </div>
    </div>

    <!-- Wizard Content -->
    <div class="wizard-content">
      {{#if wizardMessage}}
      <div class="admin-status admin-status-{{wizardMessage.type}} wizard-card">
        <i class="fa {{wizardMessage.icon}}"></i>
        <div class="admin-status-text">
          <div class="admin-status-title">{{wizardMessage.title}}</div>
          <div>{{wizardMessage.text}}</div>
        </div>
      </div>
      {{/if}}

      {{#if inlineConfirmation}}
      <div class="wizard-card">
        {{> adminInlineConfirmation confirmation=inlineConfirmation}}
      </div>
      {{/if}}

      <!-- Step 1: Upload & Analyze -->
      {{#if isStep 1}}
      <div class="wizard-step step-upload">
        <h4>{{apkgText 'apkg.step1Title'}}</h4>

        <div class="form-group">
          <label for="apkg-file-input">{{apkgText 'apkg.chooseFile'}}</label>
          <input type="file" class="form-control" id="apkg-file-input" accept=".apkg">
          <small class="form-text text-muted">
            {{apkgText 'apkg.chooseFileHelp'}}
          </small>
        </div>


        {{#if analyzing}}
        <div class="admin-status">
          <i class="fa fa-spinner fa-spin"></i>
          <div class="admin-status-text">
            <div class="admin-status-title">{{apkgText 'apkg.analyzingDeck'}}</div>
            <div class="wizard-status-detail">
              <small>{{apkgText 'apkg.parsingSqlite'}}</small><br>
              <small>{{apkgText 'apkg.extractingFields'}}</small><br>
              <small>{{apkgText 'apkg.analyzingMedia'}}</small>
            </div>
          </div>
        </div>
        {{/if}}

        {{#if analyzeError}}
        <div class="admin-status admin-status-error">
          <i class="fa fa-exclamation-circle"></i>
          <div class="admin-status-text">
            <div class="admin-status-title">{{apkgText 'apkg.error'}}</div>
            <div>{{analyzeError}}</div>
          </div>
        </div>
        {{/if}}

        <div class="wizard-actions">
          <button class="btn btn-secondary" id="cancel-wizard">{{apkgText 'apkg.cancel'}}</button>
          {{#if analyzeDisabled}}
          <button class="btn btn-primary" id="analyze-deck" disabled>
            {{apkgText 'apkg.analyzeDeck'}} →
          </button>
          {{else}}
          <button class="btn btn-primary" id="analyze-deck">
            {{apkgText 'apkg.analyzeDeck'}} →
          </button>
          {{/if}}
        </div>
      </div>
      {{/if}}

      <!-- Step 2: Source Setup -->
      {{#if isStep 2}}
      <div class="wizard-step step-preview">
        <h4>{{apkgText 'apkg.step2Title'}}</h4>

        {{#if deckMetadata}}
        <div class="deck-info card wizard-card">
          <div class="card-body">
            <h5>{{deckMetadata.deckName}}</h5>
            <div class="row">
              <div class="col-md-3">
                <strong>{{apkgText 'apkg.notes'}}:</strong> {{deckMetadata.noteCount}}
              </div>
              <div class="col-md-3">
                <strong>{{apkgText 'apkg.cards'}}:</strong> {{deckMetadata.cardCount}}
              </div>
              <div class="col-md-3">
                <strong>{{apkgText 'apkg.media'}}:</strong> {{deckMetadata.mediaCount}}
              </div>
              <div class="col-md-3">
                <strong>{{apkgText 'apkg.model'}}:</strong> {{deckMetadata.modelName}}
              </div>
            </div>
            {{#if (eq importableNoteCount deckMetadata.noteCount)}}
            {{else}}
            <div class="wizard-status-detail small text-muted">
              {{apkgText 'apkg.importableNotes' count=importableNoteCount}}
            </div>
            {{/if}}
          </div>
        </div>

        <h5>{{apkgText 'apkg.availableFields'}}</h5>
        <div class="fields-list">
          {{#each deckMetadata.fields}}
          <div class="field-card card wizard-card-sm">
            <div class="card-body">
              <div class="row align-items-center">
                <div class="col-md-3">
                  <strong>{{plusOne index}}. {{name}}</strong>
                  <span class="badge badge-{{fieldTypeBadge type}}">{{type}}</span>
                </div>
                <div class="col-md-9">
                  {{#if sampleImage}}
                  <div class="field-preview wizard-card-sm">
                    <img src="{{sampleImage}}" alt="{{apkgText 'apkg.previewAlt'}}" class="img-thumbnail" style="max-height: 80px; max-width: 120px;">
                  </div>
                  {{/if}}
                  <small class="text-muted">
                    {{#if (eq type "image")}}
                      <i class="fa fa-image"></i> {{apkgText 'apkg.imageField'}}
                    {{else if (eq type "mixed")}}
                      <i class="fa fa-image"></i><i class="fa fa-font"></i> {{apkgText 'apkg.imageTextField'}}
                    {{else}}
                      <i class="fa fa-font"></i> {{apkgText 'apkg.textField'}}
                    {{/if}}
                    {{#unless sampleImage}}
                    <br>
                    {{joinSamples samples}}
                    {{/unless}}
                  </small>
                </div>
              </div>
            </div>
          </div>
          {{/each}}
        </div>

        <!-- TDF Configurations -->
        <div class="tdf-configs">
          {{#each tdfConfigs}}
          <div class="tdf-config-card card wizard-card">
            <div class="card-header">
              <strong>TDF {{plusOne @index}}: {{#if name}}{{name}}{{else}}{{apkgText 'apkg.unnamed'}}{{/if}}</strong>
              {{#if isMultipleMode}}
              <button class="btn btn-sm btn-danger float-right remove-config" data-index="{{@index}}">
                <i class="fa fa-trash"></i> {{apkgText 'apkg.remove'}}
              </button>
              {{/if}}
            </div>
            <div class="card-body">

              <!-- TDF Name -->
              <div class="form-group">
                <label for="apkg-tdf-name-{{@index}}">{{apkgText 'apkg.tdfName'}}</label>
                <input type="text" class="form-control tdf-name" id="apkg-tdf-name-{{@index}}" data-index="{{@index}}"
                       value="{{name}}" placeholder="{{apkgText 'apkg.tdfNamePlaceholder'}}">
              </div>

              <!-- Prompt Field -->
              <div class="form-group">
                <label for="apkg-prompt-field-{{@index}}">{{apkgText 'apkg.promptField'}}</label>
                <select class="form-control prompt-field" id="apkg-prompt-field-{{@index}}" data-index="{{@index}}" data-selected="{{prompt.field}}">
                  <option value="">{{apkgText 'apkg.selectField'}}</option>
                  {{#each deckFields}}
                  <option value="{{index}}">
                    {{plusOne index}}. {{name}} ({{type}})
                  </option>
                  {{/each}}
                </select>
              </div>

              <!-- Response Field -->
              <div class="form-group">
                <label for="apkg-response-field-{{@index}}">{{apkgText 'apkg.responseField'}}</label>
                <select class="form-control response-field" id="apkg-response-field-{{@index}}" data-index="{{@index}}" data-selected="{{response.field}}">
                  <option value="">{{apkgText 'apkg.selectField'}}</option>
                  {{#each deckFields}}
                  <option value="{{index}}">
                    {{plusOne index}}. {{name}} ({{type}})
                  </option>
                  {{/each}}
                </select>
              </div>

              <div class="form-group">
                <label for="apkg-source-range-{{@index}}">{{apkgText 'apkg.noteRange'}}</label>
                <input
                  type="text"
                  class="form-control source-range"
                  id="apkg-source-range-{{@index}}"
                  data-index="{{@index}}"
                  value="{{sourceRange}}"
                  placeholder="{{apkgText 'apkg.noteRangePlaceholder'}}">
                <small class="form-text text-muted">
                  {{apkgText 'apkg.noteRangeHelp'}}
                </small>
              </div>

              <div class="text-muted small wizard-card-sm">
                {{selectedNoteSummary this}}
              </div>

              {{#if validationError}}
              <div class="admin-status admin-status-warning admin-status-small">
                <i class="fa fa-exclamation-triangle"></i>
                <div class="admin-status-text">{{validationError}}</div>
              </div>
              {{/if}}

              {{#if isValid}}
              <div class="admin-status admin-status-success admin-status-small">
                <i class="fa fa-check"></i>
                <div class="admin-status-text">{{apkgText 'apkg.configurationLooksGood'}}</div>
              </div>
              {{/if}}

            </div>
          </div>
          {{/each}}
        </div>

        <!-- Add Another TDF Button -->
        {{#unless hideAddButton}}
        <div class="text-center wizard-card">
          <button class="btn btn-outline-primary" id="add-tdf-config">
            <i class="fa fa-plus"></i> {{apkgText 'apkg.addTdfConfiguration'}}
          </button>
          <p class="text-muted small wizard-status-detail">
            {{apkgText 'apkg.addTdfHelp'}}
          </p>
        </div>
        {{/unless}}

        <!-- Summary -->
        <div class="card bg-light">
          <div class="card-body">
            <h5>{{apkgText 'apkg.summary'}}</h5>
            <ul>
              <li>{{tdfConfiguredSummary}}</li>
              <li>{{totalCardsGeneratedSummary}}</li>
              {{#if totalMedia}}
              <li>{{mediaFilesIncludedSummary}}</li>
              {{/if}}
            </ul>
          </div>
        </div>

        <div class="wizard-actions wizard-actions-extra">
          <button class="btn btn-secondary" id="back-to-upload">← {{apkgText 'apkg.back'}}</button>
          {{#if allConfigsValid}}
          <button class="btn btn-primary" id="open-draft-editor">
            {{apkgText 'apkg.openDraftEditor'}} →
          </button>
          {{else}}
          <button class="btn btn-primary" id="open-draft-editor" disabled>
            {{apkgText 'apkg.openDraftEditor'}} →
          </button>
          {{/if}}
        </div>
        {{/if}}
      </div>
      {{/if}}

      <!-- Step 3: Draft Editor Workspace -->
      {{#if isStep 3}}
      <div class="wizard-step step-draft-editor">
        {{#if generateError}}
        <div class="admin-status admin-status-error">
          <i class="fa fa-exclamation-circle"></i>
          <div class="admin-status-text">
            <div class="admin-status-title">{{apkgText 'apkg.packagingError'}}</div>
            <div>{{generateError}}</div>
          </div>
        </div>
        {{/if}}
        {{> draftEditorWorkspace
          lessons=draftLessons
          onLessonsUpdate=updateDraftLessons
          onBack=backToSourceConfig
          onSaveContinue=saveDraftAndContinue
        }}
      </div>
      {{/if}}

      <!-- Step 4: Generate & Upload -->
      {{#if isStep 4}}
      <div class="wizard-step step-generate">
        <h4>{{step4Title}}</h4>

        {{#if generating}}
        <div class="admin-status">
          <i class="fa fa-spinner fa-spin"></i>
          <div class="admin-status-text">
            <div class="admin-status-title">{{generatingTdfsLabel}}</div>
            <div class="admin-progress-row wizard-status-detail">
              <div class="admin-progress-track">
                <div class="admin-progress-bar progress-bar-striped progress-bar-animated"
                 style="width: {{generationProgress}}%">
                  {{generationProgress}}%
                </div>
              </div>
            </div>
            {{#if currentGenerationStep}}
            <div class="admin-progress-note">{{currentGenerationStep}}</div>
            {{/if}}
          </div>
        </div>
        {{/if}}

        {{#if generateError}}
        <div class="admin-status admin-status-error">
          <i class="fa fa-exclamation-circle"></i>
          <div class="admin-status-text">
            <div class="admin-status-title">{{apkgText 'apkg.error'}}</div>
            <div>{{generateError}}</div>
          <button class="btn btn-sm btn-secondary wizard-status-detail" id="back-to-config-error">
            ← {{apkgText 'apkg.backToConfiguration'}}
          </button>
          </div>
        </div>
        {{/if}}

        {{#if generationComplete}}
        <div class="admin-status admin-status-success">
          <i class="fa fa-check"></i>
          <div class="admin-status-text">
            <div class="admin-status-title">{{apkgText 'apkg.generationComplete'}}</div>
          </div>
        </div>

        {{#if generationResult.totalSkipped}}
        <div class="admin-status admin-status-warning">
          <i class="fa fa-exclamation-triangle"></i>
          <div class="admin-status-text">{{skippedCardsSummary}}</div>
        </div>
        {{/if}}

        <div class="card wizard-card">
          <div class="card-header">
            <h5>{{apkgText 'apkg.generatedFiles'}}</h5>
          </div>
          <div class="card-body">
            <ul>
              {{#each generationResult.manifest}}
              <li>
                {{generatedManifestLine this}}
              </li>
              {{/each}}
            </ul>
            <div class="wizard-status-detail">
              {{generatedTotalLine}}
            </div>
          </div>
        </div>

        {{#if uploadStatus}}
        <div class="admin-status wizard-card">
          <i class="fa fa-spinner fa-spin"></i>
          <div class="admin-status-text">
            <div class="admin-status-title">{{uploadStatus.message}}</div>
            <div class="admin-progress-row wizard-status-detail">
              <div class="admin-progress-track">
                <div class="admin-progress-bar progress-bar-striped progress-bar-animated"
                 style="width: {{uploadStatus.progress}}%">
                  {{uploadStatus.progress}}%
                </div>
              </div>
            </div>
          {{#if uploadStatus.hint}}
          <small class="admin-progress-note wizard-status-detail d-block">
            {{uploadStatus.hint}}
          </small>
          {{/if}}
          </div>
        </div>
        {{/if}}

        {{#if uploadError}}
        <div class="admin-status admin-status-error wizard-card">
          <i class="fa fa-exclamation-triangle"></i>
          <div class="admin-status-text">{{uploadError}}</div>
        </div>
        {{/if}}

        <div class="wizard-actions">
          {{#if uploadStatus}}
          <button class="btn btn-outline-secondary" id="download-package" disabled>
            <i class="fa fa-download"></i> {{apkgText 'apkg.downloadPackage'}}
          </button>
          <button class="btn btn-primary" id="upload-to-mofacts" disabled>
            <i class="fa fa-upload"></i> {{apkgText 'apkg.uploadToMofacts'}}
          </button>
          {{else}}
          <button class="btn btn-outline-secondary" id="download-package">
            <i class="fa fa-download"></i> {{apkgText 'apkg.downloadPackage'}}
          </button>
          <button class="btn btn-primary" id="upload-to-mofacts">
            <i class="fa fa-upload"></i> {{apkgText 'apkg.uploadToMofacts'}}
          </button>
          {{/if}}
        </div>

        {{#if uploadComplete}}
        <div class="admin-status admin-status-success wizard-card">
          <i class="fa fa-check"></i>
          <div class="admin-status-text">
            <div class="admin-status-title">{{apkgText 'apkg.uploadedSuccess'}}</div>
            <button class="btn btn-sm btn-primary wizard-status-detail" id="close-wizard">
              {{apkgText 'apkg.closeWizard'}}
            </button>
          </div>
        </div>
        {{/if}}

        {{/if}}
      </div>
      {{/if}}

    </div>
  </div>
</template>
