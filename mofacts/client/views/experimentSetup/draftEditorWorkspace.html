<template name="draftEditorWorkspace">
  <style>
    #draft-tdf-editor-container .je-object__controls,
    #draft-tdf-editor-container .je-array__controls,
    #draft-content-editor-container .je-object__controls,
    #draft-content-editor-container .je-array__controls {
      display: inline-flex !important;
      gap: var(--app-space-1);
      margin-bottom: var(--app-space-0);
      vertical-align: middle;
    }

    #draft-tdf-editor-container .json-editor-btntype-properties,
    #draft-tdf-editor-container .json-editor-btntype-editjson,
    #draft-content-editor-container .json-editor-btntype-properties,
    #draft-content-editor-container .json-editor-btntype-editjson {
      display: inline-flex !important;
      align-items: center;
    }

    #draft-tdf-editor-container .form-label,
    #draft-content-editor-container .form-label {
      margin-bottom: calc(0.15rem * var(--app-density-scale));
      font-weight: 500;
    }

    .draft-workspace-title {
      margin-bottom: var(--app-space-1);
    }

    .draft-workspace-label {
      margin-bottom: var(--app-space-1);
    }

    .draft-workspace-tabs {
      margin-bottom: var(--app-space-3);
    }

    .draft-workspace-actions-row {
      margin-top: var(--app-space-3);
    }

    .draft-content-toolbar,
    .draft-content-toolbar-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: var(--app-space-2);
    }

    .draft-content-toolbar {
      justify-content: space-between;
      margin-bottom: var(--app-space-3);
    }

    .draft-content-window-label {
      margin-bottom: var(--app-space-0);
    }

    .draft-content-info {
      padding: var(--app-space-2) var(--app-space-3);
      margin-bottom: var(--app-space-3);
    }

    #draft-tdf-editor-container .je-switcher,
    #draft-content-editor-container .je-switcher {
      display: none !important;
    }

    #draft-tdf-editor-container label:has(+ .je-switcher),
    #draft-tdf-editor-container .je-switcher + label,
    #draft-tdf-editor-container b:has(+ .je-switcher),
    #draft-content-editor-container label:has(+ .je-switcher),
    #draft-content-editor-container .je-switcher + label,
    #draft-content-editor-container b:has(+ .je-switcher) {
      display: none !important;
    }
  </style>
  <div class="draft-editor-workspace">
    <div class="draft-workspace-header">
      <div>
        <h4 class="draft-workspace-title">{{workspaceHeading}}</h4>
        {{#if currentLesson}}
        <div class="text-muted small">
          <strong>{{currentLesson.title}}</strong>
          {{#if currentLesson.stats}}
          · {{currentLesson.stats.totalItems}} {{workspaceText 'manualCreator.items'}}
          {{#if currentLesson.stats.skippedItems}} · {{currentLesson.stats.skippedItems}} {{workspaceText 'manualCreator.skipped'}}{{/if}}
          {{/if}}
        </div>
        {{/if}}
      </div>
      {{#if hasMultipleLessons}}
      <div class="draft-lesson-select">
        <label class="small draft-workspace-label">{{workspaceText 'manualCreator.lesson'}}</label>
        <select class="form-control form-control-sm" id="draft-lesson-select">
          {{#each lessonOptions}}
          <option value="{{index}}" selected={{isSelected}}>{{label}}</option>
          {{/each}}
        </select>
      </div>
      {{/if}}
    </div>

    {{#if workspaceError}}
    <div class="alert alert-danger">
      {{workspaceError}}
    </div>
    {{/if}}

    <div class="draft-workspace-tabs btn-group" role="group">
      <button class="btn btn-outline-primary draft-tab {{#if isActiveTab 'tdf'}}active{{/if}}" data-tab="tdf">TDF</button>
      <button class="btn btn-outline-primary draft-tab {{#if isActiveTab 'content'}}active{{/if}}" data-tab="content">{{workspaceText 'manualCreator.contentTab'}}</button>
    </div>

    <div class="draft-editor-panel {{#unless isActiveTab 'tdf'}}d-none{{/unless}}">
      <div id="draft-tdf-editor-container"></div>
    </div>

    <div class="draft-editor-panel {{#unless isActiveTab 'content'}}d-none{{/unless}}">
      <div id="draft-content-editor-container"></div>
    </div>

    <div class="wizard-actions draft-workspace-actions-row">
      <button class="btn btn-secondary" id="draft-workspace-back">← {{workspaceText 'manualCreator.back'}}</button>
      <div class="draft-workspace-actions">
        <button class="btn btn-outline-secondary" id="draft-reset-defaults">{{workspaceText 'manualCreator.resetGeneratedDefaults'}}</button>
        <button class="btn btn-primary" id="draft-save-continue">{{saveContinueLabel}}</button>
      </div>
    </div>
  </div>
</template>
