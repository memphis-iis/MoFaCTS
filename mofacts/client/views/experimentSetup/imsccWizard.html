<template name="imsccWizard">
  <div class="imscc-wizard" id="imscc-wizard-container">
    <div class="wizard-header">
      <p class="text-muted">
        {{imsccText 'imscc.description'}}
      </p>
    </div>

    <div class="wizard-steps">
      <div class="step {{#if isStep 1}}active{{/if}} {{#if stepCompleted 1}}completed{{/if}}">
        <span class="step-number">1</span>
        <span class="step-label">{{imsccText 'imscc.stepUpload'}}</span>
      </div>
      <div class="step {{#if isStep 2}}active{{/if}} {{#if stepCompleted 2}}completed{{/if}}">
        <span class="step-number">2</span>
        <span class="step-label">{{imsccText 'imscc.stepSetup'}}</span>
      </div>
      <div class="step {{#if isStep 3}}active{{/if}} {{#if stepCompleted 3}}completed{{/if}}">
        <span class="step-number">3</span>
        <span class="step-label">{{imsccText 'imscc.stepEditDraft'}}</span>
      </div>
      <div class="step {{#if isStep 4}}active{{/if}}">
        <span class="step-number">4</span>
        <span class="step-label">{{imsccText 'imscc.stepPackage'}}</span>
      </div>
    </div>

    <div class="wizard-content">
      {{#if isStep 1}}
      <div class="wizard-step">
        <h4>{{imsccText 'imscc.step1Title'}}</h4>

        <div class="form-group">
          <label for="imscc-file-input">{{imsccText 'imscc.chooseFile'}}</label>
          <input type="file" class="form-control" id="imscc-file-input" accept=".imscc">
          <small class="form-text text-muted">
            {{imsccText 'imscc.chooseFileHelp'}}
          </small>
        </div>

        {{#if selectedFileName}}
        <div class="admin-status wizard-card">
          <i class="fa fa-file-archive-o"></i>
          <div class="admin-status-text">
            <div class="admin-status-title">{{imsccText 'imscc.selected'}}</div>
            <div>{{selectedFileName}}</div>
          </div>
        </div>
        {{/if}}

        {{#if analyzing}}
        <div class="admin-status">
          <i class="fa fa-spinner fa-spin"></i>
          <div class="admin-status-text">
            <div class="admin-status-title">{{imsccText 'imscc.analyzingPackage'}}</div>
            <div class="admin-progress-row wizard-status-detail">
              <div class="admin-progress-track">
                <div class="admin-progress-bar progress-bar-striped progress-bar-animated"
                 style="width: {{analyzeProgress}}%">
                  {{analyzeProgress}}%
                </div>
              </div>
            </div>
          </div>
        </div>
        {{/if}}

        {{#if analyzeError}}
        <div class="admin-status admin-status-error">
          <i class="fa fa-exclamation-circle"></i>
          <div class="admin-status-text">
            <div class="admin-status-title">{{imsccText 'apkg.error'}}</div>
            <div>{{analyzeError}}</div>
          </div>
        </div>
        {{/if}}

        <div class="wizard-actions">
          <button class="btn btn-secondary" id="cancel-imscc-wizard">{{imsccText 'content.cancel'}}</button>
          <button class="btn btn-primary" id="analyze-imscc" {{analyzeDisabledAttr}}>
            {{imsccText 'imscc.analyzePackage'}} ->
          </button>
        </div>
      </div>
      {{/if}}

      {{#if isStep 2}}
      <div class="wizard-step">
        <h4>{{imsccText 'imscc.step2Title'}}</h4>

        <div class="form-group imscc-mode-setting wizard-card">
          <div class="imscc-mode-setting-top">
            <strong>{{imsccText 'imscc.outputMode'}}</strong>
            <div class="imscc-mode-switch" title="{{imsccText 'imscc.toggleOutputModeTitle'}}">
              <span class="imscc-mode-switch-label imscc-mode-switch-label-left small">{{imsccText 'imscc.separate'}}</span>
              <span class="form-switch imscc-mode-switch-control">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="imscc-join-mode-toggle"
                  {{joinModeToggleAttrs}}
                  aria-label="{{imsccText 'imscc.toggleOutputModeAria'}}">
              </span>
              <span class="imscc-mode-switch-label imscc-mode-switch-label-right small">{{imsccText 'imscc.join'}}</span>
            </div>
          </div>
          <div class="imscc-mode-summary small text-muted">
            <strong>{{imsccText 'imscc.current'}}</strong> {{joinModeLabel}}.
            {{#if joinMode}}
            {{imsccText 'imscc.joinModeJoinedSummary'}}
            {{else}}
            {{imsccText 'imscc.joinModeSeparateSummary'}}
            {{/if}}
          </div>
        </div>

        {{#if metadata}}
        <div class="card wizard-card">
          <div class="card-body">
            <div class="row">
              <div class="col-md-4"><strong>{{imsccText 'imscc.file'}}</strong> {{metadata.fileName}}</div>
              <div class="col-md-4"><strong>{{imsccText 'imscc.quizzes'}}</strong> {{metadata.quizCount}}</div>
              <div class="col-md-4"><strong>{{imsccText 'imscc.selected'}}</strong> {{selectedConfigCount}}</div>
            </div>
          </div>
        </div>

        <div class="table-responsive" role="region" aria-label="{{imsccText 'imscc.selectedQuizzes'}}" tabindex="0">
          <table class="table table-striped table-bordered">
            <thead>
              <tr>
                <th scope="col">{{imsccText 'imscc.select'}}</th>
                <th scope="col">{{imsccText 'imscc.quizTitle'}}</th>
                <th scope="col">{{imsccText 'imscc.dueDate'}}</th>
                <th scope="col">{{imsccText 'imscc.questions'}}</th>
                <th scope="col">{{imsccText 'imscc.supported'}}</th>
                <th scope="col">{{imsccText 'imscc.unsupported'}}</th>
              </tr>
            </thead>
            <tbody>
              {{#each configs}}
              <tr>
                <td>
                  <input type="checkbox"
                         class="imscc-quiz-select"
                         data-ident="{{ident}}"
                         aria-label="{{imsccText 'imscc.select'}}: {{title}}"
                         {{selectedCheckedAttr}}>
                </td>
                <th scope="row">
                  <strong>{{title}}</strong>
                  {{#if unsupportedCount}}
                  <div class="small text-muted">
                    {{unsupportedTypesSummary unsupportedTypes}}
                  </div>
                  {{/if}}
                </th>
                <td>{{formatDueDate dueAt}}</td>
                <td>{{questionCount}}</td>
                <td>{{supportedCount}}</td>
                <td>{{unsupportedCount}}</td>
              </tr>
              {{/each}}
            </tbody>
          </table>
        </div>
        {{/if}}

        <div class="card bg-light wizard-card">
          <div class="card-body">
            <strong>{{imsccText 'imscc.selectedQuizzes'}}</strong> {{selectedConfigCount}}<br>
            <strong>{{imsccText 'imscc.supportedQuestionsToConvert'}}</strong> {{selectedSupportedCount}}
          </div>
        </div>

        {{#if joinMode}}
        <div class="card wizard-card">
          <div class="card-header">
            <strong>{{imsccText 'imscc.combinedPracticeSystem'}}</strong>
            <span class="badge badge-info imscc-inline-badge">{{joinedBadgeLabel}}</span>
          </div>
          <div class="card-body">
            <div class="row">
              <div class="col-md-6">
                <label for="imscc-joined-name">{{imsccText 'imscc.tdfName'}}</label>
                <input type="text" class="form-control" id="imscc-joined-name" value="{{joinedConfig.name}}">
              </div>
              <div class="col-md-6">
                <label>{{imsccText 'imscc.includedQuizzes'}}</label>
                <ul class="list-unstyled imscc-scroll-list">
                  {{#each configs}}
                    {{#if selected}}
                    <li class="small">{{title}} <span class="text-muted">({{supportedCountLabel supportedCount}})</span></li>
                    {{/if}}
                  {{/each}}
                </ul>
              </div>
            </div>
            <div class="imscc-field-group">
              <label for="imscc-joined-instructions">{{imsccText 'imscc.instructionsOptional'}}</label>
              <textarea class="form-control" id="imscc-joined-instructions" rows="3">{{joinedConfig.instructions}}</textarea>
            </div>
            {{#if joinedConfig.validationError}}
            <div class="admin-status admin-status-warning admin-status-small imscc-alert-flush">
              <i class="fa fa-exclamation-triangle"></i>
              <div class="admin-status-text">{{joinedConfig.validationError}}</div>
            </div>
            {{/if}}
          </div>
        </div>
        {{else}}
        {{#each configs}}
          {{#if selected}}
          <div class="card wizard-card">
            <div class="card-header">
              <strong>{{title}}</strong>
            </div>
            <div class="card-body">
              <div class="row">
                <div class="col-md-6">
                  <label for="imscc-tdf-name-{{ident}}">{{imsccText 'imscc.tdfName'}}</label>
                  <input type="text"
                         class="form-control imscc-tdf-name"
                         id="imscc-tdf-name-{{ident}}"
                         data-ident="{{ident}}"
                         value="{{name}}">
                </div>
                <div class="col-md-6">
                  <label>{{imsccText 'imscc.conversionSummary'}}</label>
                  <div class="form-control bg-light">
                    {{conversionSummaryLabel this}}
                  </div>
                </div>
              </div>
              <div class="imscc-field-group">
                <label for="imscc-instructions-{{ident}}">{{imsccText 'imscc.instructionsOptional'}}</label>
                <textarea class="form-control imscc-instructions"
                          id="imscc-instructions-{{ident}}"
                          rows="3"
                          data-ident="{{ident}}">{{instructions}}</textarea>
              </div>
              {{#if validationError}}
              <div class="admin-status admin-status-warning admin-status-small imscc-alert-flush">
                <i class="fa fa-exclamation-triangle"></i>
                <div class="admin-status-text">{{validationError}}</div>
              </div>
              {{/if}}
            </div>
          </div>
          {{/if}}
        {{/each}}

        {{#if hasValidationError}}
        <div class="admin-status admin-status-error">
          <i class="fa fa-exclamation-circle"></i>
          <div class="admin-status-text">{{imsccText 'imscc.fixValidationBeforeDraft'}}</div>
        </div>
        {{/if}}
        {{/if}}

        {{#if generating}}
        <div class="admin-status">
          <i class="fa fa-spinner fa-spin"></i>
          <div class="admin-status-text">
            <div class="admin-status-title">{{imsccText 'imscc.preparingEditableDraft'}}</div>
            <div class="admin-progress-row wizard-status-detail">
              <div class="admin-progress-track">
                <div class="admin-progress-bar progress-bar-striped progress-bar-animated"
                 style="width: {{generateProgress}}%">
                  {{generateProgress}}%
                </div>
              </div>
            </div>
          </div>
        </div>
        {{/if}}

        {{#if generateError}}
        <div class="admin-status admin-status-error">
          <i class="fa fa-exclamation-circle"></i>
          <div class="admin-status-text">
            <div class="admin-status-title">{{imsccText 'apkg.error'}}</div>
            <div>{{generateError}}</div>
          </div>
        </div>
        {{/if}}

        <div class="wizard-actions">
          <button class="btn btn-secondary" id="imscc-back-to-upload">&lt;- {{imsccText 'apkg.back'}}</button>
          <button class="btn btn-primary" id="open-imscc-draft-editor" {{generateDisabledAttr}}>
            {{imsccText 'apkg.openDraftEditor'}} ->
          </button>
        </div>
      </div>
      {{/if}}

      {{#if isStep 3}}
      <div class="wizard-step">
        {{#if generateError}}
        <div class="admin-status admin-status-error">
          <i class="fa fa-exclamation-circle"></i>
          <div class="admin-status-text">
            <div class="admin-status-title">{{imsccText 'imscc.packagingError'}}</div>
            <div>{{generateError}}</div>
          </div>
        </div>
        {{/if}}
        {{> draftEditorWorkspace
          lessons=draftLessons
          onLessonsUpdate=updateDraftLessons
          onBack=backToSourceConfig
          onSaveContinue=saveDraftAndContinue}}
      </div>
      {{/if}}

      {{#if isStep 4}}
      <div class="wizard-step">
        <h4>{{imsccText 'imscc.step4Title'}}</h4>

        {{#if generating}}
        <div class="admin-status">
          <i class="fa fa-spinner fa-spin"></i>
          <div class="admin-status-text">
            <div class="admin-status-title">{{imsccText 'imscc.generatingPackage'}}</div>
            <div class="admin-progress-row wizard-status-detail">
              <div class="admin-progress-track">
                <div class="admin-progress-bar progress-bar-striped progress-bar-animated"
                 style="width: {{generateProgress}}%">
                  {{generateProgress}}%
                </div>
              </div>
            </div>
          </div>
        </div>
        {{/if}}

        {{#if generateError}}
        <div class="admin-status admin-status-error">
          <i class="fa fa-exclamation-circle"></i>
          <div class="admin-status-text">
            <div class="admin-status-title">{{imsccText 'apkg.error'}}</div>
            <div>{{generateError}}</div>
          </div>
        </div>
        {{/if}}

        {{#if generationResult}}
        <div class="admin-status admin-status-success">
          <i class="fa fa-check"></i>
          <div class="admin-status-text">
            <div class="admin-status-title">{{imsccText 'imscc.packageGenerated'}}</div>
          </div>
        </div>

        <div class="card wizard-card">
          <div class="card-header">
            <h5 class="imscc-heading-flush">{{imsccText 'imscc.generationSummary'}}</h5>
          </div>
          <div class="card-body">
            <div><strong>{{imsccText 'imscc.totalCards'}}</strong> {{generationResult.totalCards}}</div>
            <div><strong>{{imsccText 'imscc.totalSkipped'}}</strong> {{generationResult.totalSkipped}}</div>
            <hr>
            <ul class="imscc-summary-list">
              {{#each generationResult.manifest}}
              <li>
                <strong>{{tdfName}}</strong> - {{manifestCardsLabel cardCount}}
                {{#if skippedCount}} ({{manifestSkippedLabel skippedCount}}){{/if}}
                {{#if mediaCount}}, {{manifestMediaFilesLabel mediaCount}}{{/if}}
              </li>
              {{/each}}
            </ul>
          </div>
        </div>
        {{/if}}

        {{#if uploadStatus}}
        <div class="admin-status">
          <i class="fa fa-spinner fa-spin"></i>
          <div class="admin-status-text">
            <div class="admin-status-title">{{uploadStatus.message}}</div>
            <div class="admin-progress-row wizard-status-detail">
              <div class="admin-progress-track">
                <div class="admin-progress-bar progress-bar-striped progress-bar-animated"
                 style="width: {{uploadStatus.progress}}%">
                  {{uploadStatus.progress}}%
                </div>
              </div>
            </div>
          </div>
        </div>
        {{/if}}

        {{#if uploadError}}
        <div class="admin-status admin-status-error">
          <i class="fa fa-exclamation-circle"></i>
          <div class="admin-status-text">{{uploadError}}</div>
        </div>
        {{/if}}

        {{#if uploadComplete}}
        <div class="admin-status admin-status-success">
          <i class="fa fa-check"></i>
          <div class="admin-status-text">{{imsccText 'imscc.uploadComplete'}}</div>
        </div>
        {{/if}}

        <div class="wizard-actions">
          <button class="btn btn-secondary" id="imscc-back-to-config" {{backToConfigDisabledAttr}}>&lt;- {{imsccText 'apkg.back'}}</button>
          <div>
            <button class="btn btn-outline-secondary" id="imscc-download-package" {{downloadDisabledAttr}}>
              <i class="fa fa-download"></i> {{imsccText 'imscc.downloadPackage'}}
            </button>
            <button class="btn btn-primary" id="imscc-upload-to-mofacts" {{uploadDisabledAttr}}>
              <i class="fa fa-upload"></i> {{imsccText 'imscc.uploadToMofacts'}}
            </button>
          </div>
        </div>

        <div class="wizard-actions">
          <button class="btn btn-secondary" id="close-imscc-wizard">{{imsccText 'imscc.closeWizard'}}</button>
        </div>
      </div>
      {{/if}}
    </div>
  </div>
</template>
