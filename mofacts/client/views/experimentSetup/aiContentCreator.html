<template name="aiContentCreator">
  <div class="ai-create-page {{embeddedClass}}">
    <section class="ai-create-card" role="region" aria-label="{{aiText 'aiCreator.regionLabel'}}">
      <header class="ai-create-header">
        <div class="ai-create-icon" aria-hidden="true">
          <i class="fa fa-magic"></i>
        </div>
        <div>
          <h2 class="ai-create-title">{{aiText 'aiCreator.title'}}</h2>
          <p class="ai-create-subtitle">{{aiText 'aiCreator.subtitle'}}</p>
        </div>
      </header>

      {{#unless hasOpenRouterConfig}}
      <div class="alert alert-warning ai-create-status">
        {{aiText 'aiCreator.openRouterRequired'}}
        <a href="/profile" class="btn btn-outline-primary btn-sm admin-inline-action">{{aiText 'aiCreator.goToProfile'}}</a>
      </div>
      {{/unless}}

      {{#if statusMessage}}
      <div class="alert {{statusClass}} ai-create-status" role="status">
        {{#if creating}}<i class="fa fa-refresh fa-spin"></i>{{/if}}
        {{statusMessage}}
      </div>
      {{/if}}

      <div class="ai-input-wrap">
        <label for="ai-source-text" class="ai-source-label">{{aiText 'aiCreator.sourceAriaLabel'}}</label>
        <textarea id="ai-source-text" class="ai-source-box" placeholder="{{aiText 'aiCreator.sourcePlaceholder'}}">{{sourceText}}</textarea>
        <div class="ai-source-meta">
          <span class="ai-char-count">{{sourceLength}}</span>
        </div>
      </div>

      <section class="ai-image-input" aria-labelledby="ai-image-source-label">
        <div class="ai-image-input-heading">
          <span id="ai-image-source-label" class="ai-source-label">{{aiText 'aiCreator.imageSourceLabel'}}</span>
          {{#if hasUploadedImages}}<span class="ai-image-count">{{uploadedImageSummary}}</span>{{/if}}
        </div>
        <div class="ai-image-drop-zone {{#if processingImages}}is-processing{{/if}}">
          <div class="ai-image-drop-copy">
            <i class="fa fa-cloud-upload" aria-hidden="true"></i>
            <strong>{{aiText 'aiCreator.imageDropPrompt'}}</strong>
            <span>{{aiText 'aiCreator.imageDropHelp'}}</span>
          </div>
          <div class="ai-image-picker-actions">
            <label class="btn btn-outline-primary btn-sm" for="ai-image-files">
              <i class="fa fa-picture-o" aria-hidden="true"></i>
              {{aiText 'aiCreator.chooseImages'}}
            </label>
            <label class="btn btn-outline-primary btn-sm" for="ai-image-folder">
              <i class="fa fa-folder-open" aria-hidden="true"></i>
              {{aiText 'aiCreator.chooseFolder'}}
            </label>
          </div>
          <input id="ai-image-files" class="ai-image-file-input" type="file" multiple accept="image/jpeg,image/png,image/webp,image/gif,image/bmp,image/avif,.zip,application/zip">
          <input id="ai-image-folder" class="ai-image-file-input" type="file" multiple accept="image/jpeg,image/png,image/webp,image/gif,image/bmp,image/avif" webkitdirectory directory>
        </div>

        {{#if hasUploadedImages}}
        <div class="ai-image-grid" role="list">
          {{#each uploadedImages}}
          <article class="ai-image-item" role="listitem">
            <img src="{{previewUrl}}" alt="{{originalName}}">
            <div class="ai-image-item-copy">
              <strong title="{{sourcePath}}">{{originalName}}</strong>
              <span>{{width}} × {{height}} · WebP</span>
            </div>
            <button type="button" class="ai-remove-image" data-image-id="{{id}}" aria-label="{{aiText 'aiCreator.removeImage' filename=originalName}}">
              <i class="fa fa-times" aria-hidden="true"></i>
            </button>
          </article>
          {{/each}}
        </div>
        {{/if}}
      </section>

      <fieldset class="ai-mode-fieldset">
        <legend class="ai-mode-label">{{aiText 'aiCreator.modeLabel'}}</legend>
        <div class="ai-mode-selector" role="group" aria-label="{{aiText 'aiCreator.modeGroupLabel'}}">
          {{#each modules}}
          <button type="button" class="ai-mode-card {{selectedClass}}" aria-pressed="{{pressed}}" data-module-id="{{id}}">
            <div class="ai-mode-icon" aria-hidden="true">
              <i class="fa {{icon}}"></i>
            </div>
            <div class="ai-mode-text">
              <strong>{{shortLabel}} ({{description}})</strong>
            </div>
          </button>
          {{/each}}
        </div>
      </fieldset>

      <footer class="ai-create-footer">
        <button type="button" class="ai-manual-link" id="ai-open-manual-creator">
          <i class="fa fa-plus" aria-hidden="true"></i>
          {{aiText 'aiCreator.advancedManual'}} <i class="fa fa-arrow-right" aria-hidden="true"></i>
        </button>
        <button type="button" class="btn btn-primary ai-create-submit" id="ai-create-submit" {{createAttrs}}>
          {{#if creating}}
            <i class="fa fa-refresh fa-spin" aria-hidden="true"></i>
            {{aiText 'aiCreator.creating'}}
          {{else}}
            <i class="fa fa-magic" aria-hidden="true"></i>
            {{aiText 'aiCreator.create'}}
          {{/if}}
        </button>
      </footer>
    </section>
  </div>
</template>
