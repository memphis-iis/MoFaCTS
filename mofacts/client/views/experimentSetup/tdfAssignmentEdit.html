<template name="tdfAssignmentEdit">
{{#if isInRole 'admin, teacher'}}
  <div>
    <div class="admin-section">
      <div class="card admin-card">
        <div class="card-body">
          <div class="admin-section-heading">
            <i class="fa fa-tasks admin-section-icon"></i>
            <h5>{{assignmentText 'courseAssignments.syllabus'}}</h5>
          </div>

          <div class="row g-3">
            <div class="col-12">
              <label for="class-select" class="form-label">{{assignmentText 'courseAssignments.course'}}</label>
              <select id="class-select" class="form-select" disabled="{{editorBusy}}">
                <option selected="selected" value="" disabled="true">{{assignmentText 'courseAssignments.selectCourse'}}</option>
                {{#each courses}}
                  <option value="{{this._id}}" {{selectedCourseAttrs this._id}}>{{this.courseName}}</option>
                {{/each}}
              </select>
            </div>

            {{#if editorError}}
              <div class="col-12">
                {{> adminStatus variant="error" text=editorError urgent=true}}
              </div>
            {{/if}}

            <div class="col-lg-4 col-12">
              <label for="assignmentSearch" class="form-label fw-bold">{{assignmentText 'courseAssignments.addLesson'}}</label>
              <input id="assignmentSearch" class="form-control" type="search" placeholder="{{assignmentText 'courseAssignments.searchPlaceholder'}}" disabled="{{editorBusy}}">
              <div class="assignment-picker-list">
                {{#each filteredAssignableTdfs}}
                  <button type="button" class="assignment-picker-row add-assignment" data-tdfid="{{this.TDFId}}" disabled="{{editorBusy}}">
                    <span class="assignment-picker-title">{{this.displayName}}</span>
                    <span class="assignment-picker-meta">{{this.fileName}}</span>
                  </button>
                {{/each}}
              </div>
            </div>

            <div class="col-lg-8 col-12">
              <div class="assignment-editor-header">
                <span class="fw-bold">{{assignmentText 'courseAssignments.selectedAssignments'}}</span>
                <span class="text-muted">{{#if isDirty}}{{assignmentText 'courseAssignments.unsavedChanges'}}{{else}}{{assignmentText 'courseAssignments.saved'}}{{/if}}</span>
              </div>

              {{#if isLoading}}
                {{> adminStatus variant="info" text=(assignmentText 'courseAssignments.loadingAssignments')}}
              {{else}}
                {{#if hasAssignmentRows}}
                  <div class="assignment-row-list">
                    {{#each assignmentRows}}
                      <div class="assignment-editor-row" data-assignment-index="{{@index}}">
                        <div class="assignment-row-order">
                          <span class="fa fa-bars" title="{{assignmentText 'courseAssignments.dragHandle'}}" aria-hidden="true"></span>
                          <button type="button" class="btn btn-sm btn-outline-secondary move-assignment-up" title="{{assignmentText 'courseAssignments.moveUp'}}" aria-label="{{assignmentText 'courseAssignments.moveUp'}}" disabled="{{editorBusy}}">
                            <span class="fa fa-arrow-up" aria-hidden="true"></span>
                          </button>
                          <button type="button" class="btn btn-sm btn-outline-secondary move-assignment-down" title="{{assignmentText 'courseAssignments.moveDown'}}" aria-label="{{assignmentText 'courseAssignments.moveDown'}}" disabled="{{editorBusy}}">
                            <span class="fa fa-arrow-down" aria-hidden="true"></span>
                          </button>
                        </div>
                        <div class="assignment-row-main">
                          <div class="assignment-row-title">{{this.title}}</div>
                          <div class="assignment-row-meta">{{this.fileName}}</div>
                          <div class="assignment-row-controls">
                            <div class="form-check form-switch assignment-required-wrap">
                              <input id="{{rowControlId 'assignment-required'}}" class="form-check-input assignment-required" type="checkbox" checked="{{isRequiredChecked}}" disabled="{{editorBusy}}">
                              <label class="form-check-label" for="{{rowControlId 'assignment-required'}}">{{assignmentText 'courseAssignments.required'}}</label>
                            </div>
                            <div class="assignment-date-control">
                              <label for="{{rowControlId 'assignment-release'}}">{{assignmentText 'courseAssignments.visibleOn'}}</label>
                              <input id="{{rowControlId 'assignment-release'}}" class="form-control form-control-sm assignment-release" type="datetime-local" value="{{releaseInputValue}}" disabled="{{editorBusy}}">
                              <button type="button" class="btn btn-sm btn-link clear-release" disabled="{{editorBusy}}">{{assignmentText 'courseAssignments.clear'}}</button>
                            </div>
                            <div class="assignment-date-control">
                              <label for="{{rowControlId 'assignment-due'}}">{{assignmentText 'courseAssignments.dueOn'}}</label>
                              <input id="{{rowControlId 'assignment-due'}}" class="form-control form-control-sm assignment-due" type="datetime-local" value="{{dueInputValue}}" disabled="{{editorBusy}}">
                              <button type="button" class="btn btn-sm btn-link clear-due" disabled="{{editorBusy}}">{{assignmentText 'courseAssignments.clear'}}</button>
                            </div>
                          </div>
                        </div>
                        <button type="button" class="btn btn-sm btn-outline-danger remove-assignment" title="{{assignmentText 'courseAssignments.remove'}}" aria-label="{{assignmentText 'courseAssignments.remove'}}" disabled="{{editorBusy}}">
                          <span class="fa fa-trash" aria-hidden="true"></span>
                        </button>
                      </div>
                    {{/each}}
                  </div>
                {{else}}
                  {{> adminEmptyState icon="fa-list" text=(assignmentText 'courseAssignments.noAssignments')}}
                {{/if}}
              {{/if}}
            </div>

            <div class="col-12 assignment-save-bar">
              <button id="reloadAssignments" type="button" class="btn btn-outline-secondary" disabled="{{editorBusy}}">
                <i class="fa fa-refresh"></i> {{assignmentText 'courseAssignments.reset'}}
              </button>
              <button id="saveAssignment" type="button" class="btn btn-primary" disabled="{{editorBusy}}" aria-busy="{{#if saveBusy}}true{{else}}false{{/if}}">
                <i class="fa fa-save"></i> {{assignmentText 'courseAssignments.saveAssignments'}}
              </button>
              {{#if saveError}}
                <div class="admin-inline-feedback assignment-save-feedback">
                  {{> adminStatus variant="error" text=saveError urgent=true}}
                </div>
              {{/if}}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
{{/if}}
</template>
