<template name="instructorReporting">
{{#if isInRole 'admin, teacher'}}
  <div>
    {{#if reportingMessage}}
      {{> adminStatus variant=messageVariant text=reportingMessage.text urgent=false}}
    {{/if}}

    {{#if loadError}}
      {{> adminStatus variant="error" text=loadError urgent=true}}
    {{/if}}

    <div id="mainContent">
      <!-- Class Selection Section -->
      <div class="admin-section">
        <div class="card admin-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-users admin-section-icon"></i>
              <h5>{{reportingText 'reporting.classSelection'}}</h5>
            </div>
            <label for="class-select" class="form-label">{{reportingText 'reporting.selectClass'}}</label>
            <select id="class-select" class="form-select" disabled="{{initialLoading}}">
              <option selected="selected" value="{{INVALID}}" disabled="true">{{reportingText 'reporting.selectClass'}}</option>
              {{#each classes}}
                <option value="{{this._id}}" {{selectedClassAttrs this._id}}>{{this.courseName}}</option>
              {{/each}}
            </select>
          </div>
        </div>
      </div>

      <!-- Select Module Section -->
      <div class="admin-section">
        <div class="card admin-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-book admin-section-icon"></i>
              <h5>{{reportingText 'reporting.selectModule'}}</h5>
            </div>
            <label for="tdf-select" class="form-label">{{reportingText 'reporting.selectModule'}}</label>
            <select id="tdf-select" disabled="{{tdfSelectDisabled}}" class="form-select">
              <option selected="selected" value="{{INVALID}}" disabled="true">{{reportingText 'reporting.selectModule'}}</option>
              {{#each curInstructorReportingTdfs}}
                <option value="{{this.TDFId}}" {{selectedTdfAttrs this.TDFId}}>{{this.displayName}}</option>
              {{/each}}
            </select>
            {{#if initialLoading}}
              {{> adminStatus variant="info" text=(reportingText 'reporting.loadingReports')}}
            {{/if}}
          </div>
        </div>
      </div>

      {{#if selectedTdfDueDate}}
      <!-- Practice Deadline Section -->
      <div class="admin-section">
        <div class="card admin-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-calendar admin-section-icon"></i>
              <h5>{{reportingText 'reporting.practiceDeadline'}}</h5>
            </div>
            <label for="practice-deadline-date" class="form-label">{{reportingText 'reporting.practiceDeadline'}}</label>
            <input type="date" id="practice-deadline-date" name="practice-deadline-date-select" value="{{deadlineDateValue}}" disabled="{{deadlineDisabled}}" class="form-control">
          </div>
        </div>
      </div>

      <!-- Filter By Due Date Section -->
      <div class="admin-section">
        <div class="card admin-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-filter admin-section-icon"></i>
              <h5>{{reportingText 'reporting.filterByDueDate' date=selectedTdfDueDate}}</h5>
            </div>
            <div class="row g-3">
              <div class="col-12">
                <div class="form-check">
                  <input type="checkbox" class="form-check-input" id="due-date-filter" name="due-date-filter-select" checked="{{dueDateFilterChecked}}" disabled="{{performanceLoading}}">
                  <label class="form-check-label" for="due-date-filter">
                    {{reportingText 'reporting.enableDueDateFilter'}}
                  </label>
                </div>
              </div>
              <div class="col-12">
                <label for="exception-date" class="form-label">{{reportingText 'reporting.exceptionDate'}}</label>
                <input type="date" id="exception-date" name="exception-date-select" value="{{exceptionDateValue}}" class="form-control" disabled="{{exceptionBusy}}">
              </div>
            </div>
          </div>
        </div>
      </div>
      {{/if}}

      <!-- Class Data Section -->
      <div class="admin-section">
        <div class="card admin-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-table admin-section-icon"></i>
              <h5>{{reportingText 'reporting.classData'}}</h5>
            </div>
            {{#if performanceLoading}}
              {{> adminStatus variant="info" text=(reportingText 'reporting.loadingReports')}}
            {{/if}}
            {{> adminTableShell label=classReportingTableLabel tableTemplate="instructorReportingClassTable" tableData=classReportingTableData}}
          </div>
        </div>
      </div>
    </div>
  </div>
{{/if}}

</template>

<template name="instructorReportingClassTable">
  <table class="table table-striped table-bordered instructor-reporting-table" aria-busy="{{#if performanceLoading}}true{{else}}false{{/if}}">
    <thead>
      <tr>
        <th scope="col" class="table-col-medium">{{reportingText 'reporting.student'}}</th>
        <th scope="col" class="table-col-narrow text-center">{{reportingText 'reporting.percentCorrect'}}</th>
        <th scope="col" class="table-col-narrow text-center">{{reportingText 'reporting.count'}}</th>
        <th scope="col" class="table-col-narrow text-center">{{reportingText 'reporting.totalTimeMin'}}</th>
        <th scope="col" class="table-col-small">{{reportingText 'reporting.exceptions'}}</th>
        <th scope="col" class="table-col-small">{{reportingText 'reporting.actions'}}</th>
      </tr>
    </thead>
    <tbody>
      {{#if performanceLoading}}
        <tr>
          <td colspan="6" class="text-center text-muted admin-table-status-cell">{{reportingText 'reporting.loadingReports'}}</td>
        </tr>
      {{else}}
        {{#if loadError}}
          <tr>
            <td colspan="6" class="text-center text-danger admin-table-status-cell">{{loadError}}</td>
          </tr>
        {{else}}
          {{#if dueDateFilter}}
          <tr>
            <th scope="rowgroup" colspan="6" class="instructor-reporting-group-row">
              {{reportingText 'reporting.completedBeforeDueDate'}}
            </th>
          </tr>
          {{/if}}
          {{#if hasMetRows}}
            {{#each metRows}}
              {{> instructorReportingStudentRow row=this exceptionBusy=../exceptionBusy allowAddException=false}}
            {{/each}}
          {{else}}
            <tr><td colspan="6" class="text-center text-muted admin-table-status-cell">{{reportingText 'reporting.noDataAvailable'}}</td></tr>
          {{/if}}
          {{#if dueDateFilter}}
          <tr>
            <th scope="rowgroup" colspan="6" class="instructor-reporting-group-row">
              {{reportingText 'reporting.completedAfterDueDate'}}
            </th>
          </tr>
          {{#if hasNotMetRows}}
            {{#each notMetRows}}
              {{> instructorReportingStudentRow row=this exceptionBusy=../exceptionBusy allowAddException=true}}
            {{/each}}
          {{else}}
            <tr><td colspan="6" class="text-center text-muted admin-table-status-cell">{{reportingText 'reporting.noDataAvailable'}}</td></tr>
          {{/if}}
          {{/if}}
        {{/if}}
      {{/if}}
    </tbody>
    <tfoot id="classReportingTotal">
      <tr>
        <th scope="row">{{reportingText 'reporting.totals'}}</th>
        <td class="text-center">{{totals.percentCorrect}}</td>
        <td class="text-center">{{totals.count}}</td>
        <td class="text-center">{{totals.totalTimeMins}}</td>
        <td></td>
        <td></td>
      </tr>
    </tfoot>
  </table>
</template>

<template name="instructorReportingStudentRow">
  <tr id="{{row.userId}}">
    <th scope="row">
      <button type="button" class="btn btn-sm btn-link instructor-reporting-student-link" data-username="{{row.username}}">
        {{row.username}}
      </button>
    </th>
    <td class="text-center">{{row.percentCorrect}}</td>
    <td class="text-center">{{row.count}}</td>
    <td class="text-center">{{row.totalTimeMins}}</td>
    <td>
      {{#if row.exception}}
        <span class="instructor-reporting-exception">{{row.exception}}</span>
      {{/if}}
    </td>
    <td>
      {{#if row.exception}}
        <button type="button" class="btn btn-sm btn-link remove-exception" data-userid="{{row.userId}}" aria-label="{{exceptionActionLabel 'reporting.removeException' row}}" disabled="{{exceptionBusy}}">{{reportingText 'reporting.removeException'}}</button>
      {{else}}
        {{#if allowAddException}}
          <button type="button" class="btn btn-sm btn-link add-exception" data-userid="{{row.userId}}" aria-label="{{exceptionActionLabel 'reporting.addException' row}}" disabled="{{exceptionBusy}}">{{reportingText 'reporting.addException'}}</button>
        {{/if}}
      {{/if}}
    </td>
  </tr>
</template>
