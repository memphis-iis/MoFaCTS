<template name="instructorReporting">
  <style>
    /* Chrome, Safari, Edge, Opera */
  input::-webkit-outer-spin-button,
  input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: var(--app-space-0);
  }

  /* Firefox */
  input[type=number] {
    -moz-appearance: textfield;
  }

  .instructor-reporting-group-row {
    font-weight: 600;
    background-color: var(--app-muted-surface-color);
    color: var(--app-text-color);
  }

  .instructor-reporting-exception {
    color: var(--feedback-error-color);
  }
  </style>
{{#if isInRole 'admin, teacher'}}
  <div class="container admin-page">
    <h3 class="page-header-title">Instructor Reporting</h3>

    <div id="mainContent">
      <!-- Class Selection Section -->
      <div class="admin-section">
        <div class="card admin-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-users admin-section-icon"></i>
              <h5>Class Selection</h5>
            </div>
            <select id="class-select" class="form-select">
              <option selected="selected" value="{{INVALID}}" disabled="true">Select a class</option>
              {{#each classes}}
                <option value="{{this._id}}">{{this.courseName}}</option>
              {{/each}}
            </select>
          </div>
        </div>
      </div>

      <!-- Select Chapter Section -->
      <div class="admin-section">
        <div class="card admin-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-book admin-section-icon"></i>
              <h5>Select Chapter</h5>
            </div>
            <select id="tdf-select" disabled="true" class="form-select">
              <option selected="selected" value="{{INVALID}}" disabled="true">Select a lesson</option>
              {{#each curInstructorReportingTdfs}}
                <option value="{{this.TDFId}}">{{this.displayName}}</option>
              {{/each}}
            </select>
            {{#if performanceLoading}}
              <p class="text-muted text-center admin-loading-text">Loading reports...</p>
            {{/if}}
          </div>
        </div>
      </div>

      {{#if selectedTdfDueDate}}
      <!-- Practice Deadline Section -->
      <div class="admin-section">
        <div class="card admin-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-calendar admin-section-icon"></i>
              <h5>Practice Deadline</h5>
            </div>
            <input type="date" id="practice-deadline-date" name="practice-deadline-date-select" disabled="true" class="form-control">
          </div>
        </div>
      </div>

      <!-- Filter By Due Date Section -->
      <div class="admin-section">
        <div class="card admin-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-filter admin-section-icon"></i>
              <h5>Filter By Due Date ({{selectedTdfDueDate}})</h5>
            </div>
            <div class="row g-3">
              <div class="col-12">
                <div class="form-check">
                  <input type="checkbox" class="form-check-input" id="due-date-filter" name="due-date-filter-select">
                  <label class="form-check-label" for="due-date-filter">
                    Enable due date filter
                  </label>
                </div>
              </div>
              <div class="col-12">
                <label for="exception-date" class="form-label">Exception Date</label>
                <input type="date" id="exception-date" name="exception-date-select" class="form-control">
              </div>
            </div>
          </div>
        </div>
      </div>
      {{/if}}

      <!-- Class Data Section -->
      <div class="admin-section">
        <div class="card admin-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-table admin-section-icon"></i>
              <h5>Class Data</h5>
            </div>
            <div class="admin-table-wrapper">
              <div class="table-responsive">
                <table class="table table-striped table-bordered">
            <thead>
              <tr>
                <th class="table-col-medium">Student</th>
                <th class="table-col-narrow text-center">% Correct</th>
                <th class="table-col-narrow text-center">Count</th>
                <th class="table-col-narrow text-center">Total Time (min)</th>
                <th class="table-col-small">Exceptions</th>
                <th class="table-col-small">Actions</th>
              </tr>
            </thead>
            <tbody>
          {{#if dueDateFilter}}
          <tr>
            <td colspan="6" class="instructor-reporting-group-row">
              Completed Before Due Date
            </td>
          </tr>
          {{/if}}
          {{#if curClassStudentPerformance}}
            {{#each curClassStudentPerformance}}
              <tr id="{{this.userId}}">
                <td><a onclick="navigateToStudentReporting('{{this.username}}')">{{this.username}}</a></td>
                <td class="text-center">{{this.percentCorrect}}</td>
                <td class="text-center">{{this.count}}</td>
                <td class="text-center">{{this.totalTimeMins}}</td>
                <td>
                  {{#if this.exception}}
                    {{this.exception}}
                  {{/if}}
                </td>
                <td>
                {{#if this.exception}}
                  <a data-userid="{{this.userId}}" id="remove-exception">Remove Exception</a>
                {{else}}
                {{/if}}
                </td>
              </tr>
            {{/each}}
          {{else}}
            <tr><td colspan="6">No data available</td></tr>
          {{/if}}
          {{#if dueDateFilter}}
          <tr>
            <td colspan="6" class="instructor-reporting-group-row">
              Completed After Due Date
            </td>
          </tr>
            {{#if curClassStudentPerformanceAfterFilter}}
              {{#each curClassStudentPerformanceAfterFilter}}
              <tr>
                <td><a onclick="navigateToStudentReporting('{{this.username}}')">{{this.username}}</a></td>
                <td class="text-center">{{this.percentCorrect}}</td>
                <td class="text-center">{{this.count}}</td>
                <td class="text-center">{{this.totalTimeMins}}</td>
                <td>
                  {{#if this.exception}}
                    <span class="instructor-reporting-exception">{{this.exception}}</span>
                  {{/if}}
                </td>
                <td>
                  {{#if this.exception}}
                    <a data-userid="{{this.userId}}" id="remove-exception">Remove Exception</a>
                  {{else}}
                    <a data-userid="{{this.userId}}" id="add-exception">Add Exception</a>
                  {{/if}}
                </td>
              </tr>
              {{/each}}
            {{else}}
              <tr><td colspan="6">No data available</td></tr>
            {{/if}}
          {{/if}}
            </tbody>
          <tfoot id="classReportingTotal">
            <tr>
              <td>Totals</td>
              <td class="text-center">{{curClassPerformance.percentCorrect}}</td>
              <td class="text-center">{{curClassPerformance.count}}</td>
              <td class="text-center">{{curClassPerformance.totalTimeMins}}</td>
              <td></td>
              <td></td>
            </tr>
          </tfoot>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
{{/if}}

</template>
