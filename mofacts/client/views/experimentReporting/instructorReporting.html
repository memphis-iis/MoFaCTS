<template name="instructorReporting">
  <style>
    /* Chrome, Safari, Edge, Opera */
  input::-webkit-outer-spin-button,
  input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: var(--app-space-0);
  }

  /* Firefox */
  input[type=number] {
    -moz-appearance: textfield;
  }

  .instructor-reporting-group-row {
    font-weight: 600;
    background-color: var(--app-muted-surface-color);
    color: var(--app-text-color);
  }

  .instructor-reporting-exception {
    color: var(--feedback-error-color);
  }
  </style>
{{#if isInRole 'admin, teacher'}}
  <div>
    <h3 class="page-header-title">{{reportingText 'reporting.instructorReporting'}}</h3>

    {{#if reportingMessage}}
    <div class="admin-status admin-status-{{reportingMessage.level}} admin-message" role="status" aria-live="polite">
      <i class="fa {{reportingMessage.icon}}" aria-hidden="true"></i>
      <div class="admin-status-text">{{reportingMessage.text}}</div>
    </div>
    {{/if}}

    <div id="mainContent">
      <!-- Class Selection Section -->
      <div class="admin-section">
        <div class="card admin-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-users admin-section-icon"></i>
              <h5>{{reportingText 'reporting.classSelection'}}</h5>
            </div>
            <select id="class-select" class="form-select">
              <option selected="selected" value="{{INVALID}}" disabled="true">{{reportingText 'reporting.selectClass'}}</option>
              {{#each classes}}
                <option value="{{this._id}}">{{this.courseName}}</option>
              {{/each}}
            </select>
          </div>
        </div>
      </div>

      <!-- Select Module Section -->
      <div class="admin-section">
        <div class="card admin-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-book admin-section-icon"></i>
              <h5>{{reportingText 'reporting.selectModule'}}</h5>
            </div>
            <select id="tdf-select" disabled="true" class="form-select">
              <option selected="selected" value="{{INVALID}}" disabled="true">{{reportingText 'reporting.selectModule'}}</option>
              {{#each curInstructorReportingTdfs}}
                <option value="{{this.TDFId}}">{{this.displayName}}</option>
              {{/each}}
            </select>
            {{#if performanceLoading}}
              <p class="text-muted text-center admin-loading-text">{{reportingText 'reporting.loadingReports'}}</p>
            {{/if}}
          </div>
        </div>
      </div>

      {{#if selectedTdfDueDate}}
      <!-- Practice Deadline Section -->
      <div class="admin-section">
        <div class="card admin-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-calendar admin-section-icon"></i>
              <h5>{{reportingText 'reporting.practiceDeadline'}}</h5>
            </div>
            <input type="date" id="practice-deadline-date" name="practice-deadline-date-select" disabled="true" class="form-control">
          </div>
        </div>
      </div>

      <!-- Filter By Due Date Section -->
      <div class="admin-section">
        <div class="card admin-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-filter admin-section-icon"></i>
              <h5>{{reportingText 'reporting.filterByDueDate' date=selectedTdfDueDate}}</h5>
            </div>
            <div class="row g-3">
              <div class="col-12">
                <div class="form-check">
                  <input type="checkbox" class="form-check-input" id="due-date-filter" name="due-date-filter-select">
                  <label class="form-check-label" for="due-date-filter">
                    {{reportingText 'reporting.enableDueDateFilter'}}
                  </label>
                </div>
              </div>
              <div class="col-12">
                <label for="exception-date" class="form-label">{{reportingText 'reporting.exceptionDate'}}</label>
                <input type="date" id="exception-date" name="exception-date-select" class="form-control">
              </div>
            </div>
          </div>
        </div>
      </div>
      {{/if}}

      <!-- Class Data Section -->
      <div class="admin-section">
        <div class="card admin-card">
          <div class="card-body">
            <div class="admin-section-heading">
              <i class="fa fa-table admin-section-icon"></i>
              <h5>{{reportingText 'reporting.classData'}}</h5>
            </div>
            <div class="admin-table-wrapper">
              <div class="table-responsive">
                <table class="table table-striped table-bordered">
            <thead>
              <tr>
                <th class="table-col-medium">{{reportingText 'reporting.student'}}</th>
                <th class="table-col-narrow text-center">{{reportingText 'reporting.percentCorrect'}}</th>
                <th class="table-col-narrow text-center">{{reportingText 'reporting.count'}}</th>
                <th class="table-col-narrow text-center">{{reportingText 'reporting.totalTimeMin'}}</th>
                <th class="table-col-small">{{reportingText 'reporting.exceptions'}}</th>
                <th class="table-col-small">{{reportingText 'reporting.actions'}}</th>
              </tr>
            </thead>
            <tbody>
          {{#if dueDateFilter}}
          <tr>
            <td colspan="6" class="instructor-reporting-group-row">
              {{reportingText 'reporting.completedBeforeDueDate'}}
            </td>
          </tr>
          {{/if}}
          {{#if curClassStudentPerformance}}
            {{#each curClassStudentPerformance}}
              <tr id="{{this.userId}}">
                <td><a onclick="navigateToStudentReporting('{{this.username}}')">{{this.username}}</a></td>
                <td class="text-center">{{this.percentCorrect}}</td>
                <td class="text-center">{{this.count}}</td>
                <td class="text-center">{{this.totalTimeMins}}</td>
                <td>
                  {{#if this.exception}}
                    {{this.exception}}
                  {{/if}}
                </td>
                <td>
                {{#if this.exception}}
                  <a data-userid="{{this.userId}}" id="remove-exception">{{reportingText 'reporting.removeException'}}</a>
                {{else}}
                {{/if}}
                </td>
              </tr>
            {{/each}}
          {{else}}
            <tr><td colspan="6">{{reportingText 'reporting.noDataAvailable'}}</td></tr>
          {{/if}}
          {{#if dueDateFilter}}
          <tr>
            <td colspan="6" class="instructor-reporting-group-row">
              {{reportingText 'reporting.completedAfterDueDate'}}
            </td>
          </tr>
            {{#if curClassStudentPerformanceAfterFilter}}
              {{#each curClassStudentPerformanceAfterFilter}}
              <tr>
                <td><a onclick="navigateToStudentReporting('{{this.username}}')">{{this.username}}</a></td>
                <td class="text-center">{{this.percentCorrect}}</td>
                <td class="text-center">{{this.count}}</td>
                <td class="text-center">{{this.totalTimeMins}}</td>
                <td>
                  {{#if this.exception}}
                    <span class="instructor-reporting-exception">{{this.exception}}</span>
                  {{/if}}
                </td>
                <td>
                  {{#if this.exception}}
                    <a data-userid="{{this.userId}}" id="remove-exception">{{reportingText 'reporting.removeException'}}</a>
                  {{else}}
                    <a data-userid="{{this.userId}}" id="add-exception">{{reportingText 'reporting.addException'}}</a>
                  {{/if}}
                </td>
              </tr>
              {{/each}}
            {{else}}
              <tr><td colspan="6">{{reportingText 'reporting.noDataAvailable'}}</td></tr>
            {{/if}}
          {{/if}}
            </tbody>
          <tfoot id="classReportingTotal">
            <tr>
              <td>{{reportingText 'reporting.totals'}}</td>
              <td class="text-center">{{curClassPerformance.percentCorrect}}</td>
              <td class="text-center">{{curClassPerformance.count}}</td>
              <td class="text-center">{{curClassPerformance.totalTimeMins}}</td>
              <td></td>
              <td></td>
            </tr>
          </tfoot>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
{{/if}}

</template>
