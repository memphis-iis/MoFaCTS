<template name="dataDownload">
    <div class="container" style="margin-top: 1rem;">
        <h3 style="margin-top: 0; text-align: center;">Download Data</h3>

    <div class="admin-section">
        <div class="card mb-4">
            <div class="card-body">
                <div class="d-flex align-items-center mb-3">
                    <i class="fa fa-download me-2" style="font-size: 1.25rem; color: var(--accent-color);"></i>
                    <h5 class="m-0">Data Downloads</h5>
                </div>
                <div class="mb-3 text-center">
                    <a class="btn btn-primary" id="userDataDownloadLink" target="_blank" href>
                        <i class="fa fa-download"></i> Download all data for TDFs you own
                    </a>
                </div>
                <div class="admin-table-wrapper">
                    <div class="table-responsive data-download-table-wrapper">
                        <table class="table table-striped table-bordered data-download-table">
                            <thead>
                                <tr>
                                    <th scope="col" class="table-col-icon text-center">Link</th>
                                    <th scope="col" class="table-col-large">Lesson Name</th>
                                    <th scope="col" class="table-col-medium">File Name</th>
                                </tr>
                            </thead>
                            <tbody>
                                {{#if isLoading}}
                                <tr>
                                    <td colspan="3" class="text-center py-4">
                                        <i class="fa fa-spinner fa-spin"></i> Loading...
                                    </td>
                                </tr>
                                {{else}}
                                {{#each dataDownloads}}
                                <tr>
                                    <td class="text-center">
                                        <button class="btn-icon data-download-link" type="button" data-fileName="{{this.content.fileName}}" data-fileId="{{this._id}}" title="Download data file">
                                            <span class="fa fa-download" aria-hidden="true"></span>
                                        </button>
                                        {{#if this.hasConditionChildren}}
                                        <button
                                          class="btn-icon root-omnibus-download-link"
                                          type="button"
                                          data-fileName="{{this.content.fileName}}"
                                          title="Download omnibus data for this root (all conditions)"
                                        >
                                            <span class="fa fa-sitemap" aria-hidden="true"></span>
                                        </button>
                                        {{/if}}
                                    </td>
                                    <td>{{this.content.tdfs.tutor.setspec.lessonname}}</td>
                                    <td>
                                        {{#if this.content.fileName}}
                                            {{this.content.fileName}}
                                            {{#if this.hasConditionChildren}}
                                            <span class="text-muted small"> (root, {{this.conditionCount}} conditions)</span>
                                            {{/if}}
                                        {{else}}
                                            (missing)
                                        {{/if}}
                                    </td>
                                </tr>
                                {{else}}
                                <tr>
                                    <td colspan="3" class="text-center text-muted py-3">No data files available</td>
                                </tr>
                                {{/each}}
                                {{/if}}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>
</template>
