<template name="dataDownload">
    <div>
    <div class="admin-section">
        <div class="card admin-card">
            <div class="card-body">
                <div class="admin-section-heading">
                    <i class="fa fa-history admin-section-icon"></i>
                    <h5>{{reportingText 'reporting.yourLearningHistory'}}</h5>
                </div>
                <div class="admin-form-row text-center">
                    <button class="btn btn-primary" id="ownHistoryDownloadButton" type="button" disabled="{{historyDownloadBusy}}" aria-busy="{{#if historyDownloadBusy}}true{{else}}false{{/if}}">
                        <i class="fa fa-download"></i> {{reportingText 'reporting.downloadYourHistory'}}
                    </button>
                </div>
                {{#if historyDownloadMessage}}
                <div class="admin-inline-feedback">{{> adminStatus variant=historyDownloadMessage.level text=historyDownloadMessage.text urgent=(equals historyDownloadMessage.level "error")}}</div>
                {{/if}}
            </div>
        </div>
    </div>

    <div class="admin-section">
        <div class="card admin-card">
            <div class="card-body">
                <div class="admin-section-heading">
                    <i class="fa fa-download admin-section-icon"></i>
                    <h5>{{reportingText 'reporting.dataFromOwnedTdfs'}}</h5>
                </div>
                <div class="admin-form-row text-center">
                    <button class="btn btn-primary" id="userDataDownloadLink" type="button" disabled="{{ownedDownloadBusy}}" aria-busy="{{#if ownedDownloadBusy}}true{{else}}false{{/if}}">
                        <i class="fa fa-download"></i> {{reportingText 'reporting.downloadOwnedTdfData'}}
                    </button>
                </div>
                {{#if ownedDownloadMessage}}
                <div class="admin-inline-feedback">{{> adminStatus variant=ownedDownloadMessage.level text=ownedDownloadMessage.text urgent=(equals ownedDownloadMessage.level "error")}}</div>
                {{/if}}
                {{#if loadErrorText}}
                  <div class="admin-inline-feedback">
                    {{> adminStatus variant="error" text=loadErrorText urgent=true}}
                    <button type="button" class="btn btn-outline-secondary btn-sm admin-form-row-sm" data-download-load-retry="true">{{reportingText 'common.tryAgain'}}</button>
                  </div>
                {{else}}
                  {{> adminTableShell label=downloadFilesTableLabel tableTemplate="dataDownloadFilesTable" tableData=downloadFilesTableData}}
                {{/if}}
            </div>
        </div>
    </div>
    </div>
</template>

<template name="dataDownloadFilesTable">
    <table class="table table-striped table-bordered data-download-table" aria-busy="{{#if isLoading}}true{{else}}false{{/if}}">
        <thead>
            <tr>
                <th scope="col" class="table-col-icon text-center">{{reportingText 'reporting.link'}}</th>
                <th scope="col" class="table-col-large">{{reportingText 'reporting.lessonName'}}</th>
                <th scope="col" class="table-col-medium">{{reportingText 'reporting.fileName'}}</th>
            </tr>
        </thead>
        <tbody>
            {{#if isLoading}}
            <tr>
                <td colspan="3" class="text-center text-muted admin-table-status-cell">{{reportingText 'reporting.loading'}}</td>
            </tr>
            {{else}}
                {{#if loadErrorText}}
                <tr>
                    <td colspan="3" class="text-center text-danger admin-table-status-cell">{{loadErrorText}}</td>
                </tr>
                {{else}}
                    {{#each rows}}
                    <tr>
                        <td class="text-center">
                            <button
                              class="btn-icon data-download-link"
                              type="button"
                              data-fileName="{{this.content.fileName}}"
                              data-fileId="{{this._id}}"
                              aria-label="{{downloadFileAriaLabel this}}"
                              title="{{reportingText 'reporting.downloadDataFile'}}"
                              disabled="{{#if this.downloadBusy}}disabled{{/if}}"
                              aria-busy="{{#if this.downloadBusy}}true{{else}}false{{/if}}">
                                <span class="fa fa-download" aria-hidden="true"></span>
                            </button>
                            {{#if this.hasConditionChildren}}
                            <button
                              class="btn-icon root-omnibus-download-link"
                              type="button"
                              data-fileName="{{this.content.fileName}}"
                              data-fileId="{{this._id}}"
                              aria-label="{{rootOmnibusAriaLabel this}}"
                              title="{{reportingText 'reporting.downloadRootOmnibus'}}"
                              disabled="{{#if this.downloadBusy}}disabled{{/if}}"
                              aria-busy="{{#if this.downloadBusy}}true{{else}}false{{/if}}">
                                <span class="fa fa-sitemap" aria-hidden="true"></span>
                            </button>
                            {{/if}}
                        </td>
                        <td>{{this.disp}}</td>
                        <td>
                            {{#if this.content.fileName}}
                                {{this.content.fileName}}
                                {{#if this.hasConditionChildren}}
                                <span class="text-muted small"> {{reportingText 'reporting.rootConditions' count=this.conditionCount}}</span>
                                {{/if}}
                            {{else}}
                                {{reportingText 'reporting.missing'}}
                            {{/if}}
                        </td>
                    </tr>
                    {{#if this.downloadMessage}}
                    <tr class="admin-feedback-row">
                        <td colspan="3"><div class="admin-table-feedback">{{> adminStatus variant=this.downloadMessage.level text=this.downloadMessage.text urgent=(equals this.downloadMessage.level "error")}}</div></td>
                    </tr>
                    {{/if}}
                    {{else}}
                    <tr>
                        <td colspan="3" class="text-center text-muted admin-table-status-cell">{{reportingText 'reporting.noDataFiles'}}</td>
                    </tr>
                    {{/each}}
                {{/if}}
            {{/if}}
        </tbody>
    </table>
</template>
