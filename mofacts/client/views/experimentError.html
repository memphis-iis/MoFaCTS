<template name="experimentError">
  <main class="experiment-error-page" style="min-height: 70vh;">
    <section class="text-center" style="max-width: 680px;" role="alert" aria-live="assertive">
      <h1 class="page-header-title experiment-error-title">{{experimentErrorTitle}}</h1>
      <p class="lead experiment-error-message">{{experimentErrorMessage}}</p>
      <p class="experiment-error-note">{{experimentErrorNote}}</p>
    </section>
  </main>
</template>
