<template name="experimentError">
  <main class="d-flex align-items-center justify-content-center px-3" style="min-height: 70vh;">
    <section class="text-center" style="max-width: 680px;" role="alert" aria-live="assertive">
      <h1 class="page-header-title mb-3">{{experimentErrorTitle}}</h1>
      <p class="lead mb-3">{{experimentErrorMessage}}</p>
      <p class="mb-0">{{experimentErrorNote}}</p>
    </section>
  </main>
</template>
