<!-- Theme Settings Template -->

<template name="theme">
    {{#if isInRole 'admin'}}
        <div class="container theme-settings-container">
            <h3 class="page-header-title">{{themeText 'theme.settingsTitle'}}</h3>

            {{#if themeMessage}}
                <div class="admin-status admin-status-{{themeMessage.level}} admin-message" role="status" aria-live="polite">
                    <i class="fa {{themeMessage.icon}}"></i>
                    <div class="admin-status-text">{{themeMessage.text}}</div>
                </div>
            {{/if}}

            {{#if themeConfirmation}}
                <div class="admin-inline-confirmation admin-form-row" role="alert">
                    <div>
                        <div class="admin-inline-confirmation-title">{{themeConfirmation.title}}</div>
                        <div class="admin-inline-confirmation-message">{{themeConfirmation.message}}</div>
                    </div>
                    <div class="admin-inline-confirmation-actions">
                        <button type="button" class="btn btn-sm btn-outline-secondary" id="cancel-theme-confirmation">{{themeText 'theme.cancel'}}</button>
                        <button type="button" class="btn btn-sm {{themeConfirmation.confirmClass}}" id="confirm-theme-confirmation">
                            {{themeConfirmation.confirmLabel}}
                        </button>
                    </div>
                </div>
            {{/if}}

            <div class="admin-section">
                <div class="card admin-card">
                    <div class="card-body">
                        <div class="theme-library-header">
                            <div>
                                <h5>{{themeText 'theme.library'}}</h5>
                                <div class="text-muted small">
                                    {{themeText 'theme.activeServerTheme' theme=currentTheme.properties.themeName}} {{#if currentTheme.metadata.name}}<span class="text-muted">({{currentTheme.metadata.name}})</span>{{/if}}
                                </div>
                            </div>
                            <div class="theme-action-row">
                                <button type="button" id="exportActiveTheme" class="btn btn-secondary">{{themeText 'theme.exportActiveTheme'}}</button>
                                <button type="button" id="themeResetButton" class="btn">{{themeText 'theme.resetDefaultTheme'}}</button>
                            </div>
                        </div>

                        <div class="theme-library-list">
                            {{#if hasThemeLibrary}}
                                {{#each availableThemes}}
                                    <div class="theme-pill border rounded {{themePillModifier id}}">
                                        <div>
                                            <div class="fw-semibold">{{metadata.name}}</div>
                                            <span class="badge bg-light text-dark theme-origin-badge">{{themeOrigin metadata.origin}}</span>
                                        </div>
                                        <div class="btn-group btn-group-sm flex-wrap">
                                            <button type="button" class="btn set-active-theme {{themeActivateButtonClass id}}" data-id="{{id}}" {{themeActivationAttrs id}}>{{themeActivateButtonLabel id}}</button>
                                            <button type="button" class="btn btn-secondary duplicate-theme" data-id="{{id}}" data-name="{{metadata.name}}">{{themeText 'theme.duplicate'}}</button>
                                            {{#unless (isSystemTheme metadata.origin)}}
                                                <button type="button" class="btn btn-secondary rename-theme" data-id="{{id}}" data-name="{{metadata.name}}">{{themeText 'theme.rename'}}</button>
                                                <button type="button" class="btn btn-secondary delete-theme" data-id="{{id}}" data-name="{{metadata.name}}">{{themeText 'theme.delete'}}</button>
                                            {{/unless}}
                                            <button type="button" class="btn btn-secondary export-theme" data-id="{{id}}" data-name="{{metadata.name}}">{{themeText 'theme.export'}}</button>
                                        </div>
                                    </div>
                                {{/each}}
                            {{else}}
                                <div class="admin-status admin-empty-text">
                                    <i class="fa fa-info-circle"></i>
                                    <div class="admin-status-text">{{themeText 'theme.noThemesRegistered'}}</div>
                                </div>
                            {{/if}}
                        </div>

                        <div class="theme-import-row border-top">
                            <span class="text-muted">{{themeText 'theme.importThemeJson'}}</span>
                            <input type="file" class="form-control theme-import-input" id="themeImportInput" accept=".json,application/json">
                            <button type="button" class="btn" id="themeImportButton">{{themeText 'theme.import'}}</button>
                        </div>

                        {{> themeGenerationWizard}}
                    </div>
                </div>

                <div class="row theme-name-row align-items-center">
                    <div class="col-auto">
                        <label for="themeName" class="form-label admin-empty-text">{{themeText 'theme.themeNameLabel'}}</label>
                    </div>
                    <div class="col-auto">
                        <input type="text" id="themeName" class="currentThemeProp form-control theme-name-input" value="{{currentTheme.properties.themeName}}" data-id="themeName">
                    </div>
                </div>

                <!-- Main Layout & Text -->
                <div class="theme-section">
                    <h5 class="theme-section-header">{{themeText 'theme.mainLayoutText'}}</h5>
                    <div class="row row-cols-2">
                        <div class="col text-end">
                            {{themeText 'theme.pageBackgroundColor'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.app_background_color}}" data-id="app_background_color">
                            <input type="color" class="currentThemePropColor" value="{{themeColorPickerValue "app_background_color"}}" data-id="app_background_color">
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.bodyTextColor'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.app_text_color}}" data-id="app_text_color">
                            <input type="color" class="currentThemePropColor" value="{{themeColorPickerValue "app_text_color"}}" data-id="app_text_color">
                            {{#with (getContrastInfo "app_text_color" "app_background_color")}}
                                <small class="form-text {{#unless passes}}text-warning{{/unless}}">
                                    {{themeText 'theme.contrastLabel'}} <strong>{{ratio}}:1</strong>
                                    <span class="badge bg-{{badgeClass}}">{{#if passes}}✓{{else}}⚠{{/if}} WCAG {{level}}</span>
                                </small>
                            {{/with}}
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.pageHeaderTextColor'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.app_page_header_text_color}}" data-id="app_page_header_text_color">
                            <input type="color" class="currentThemePropColor" value="{{themeColorPickerValue "app_page_header_text_color"}}" data-id="app_page_header_text_color">
                            {{#with (getContrastInfo "app_page_header_text_color" "app_background_color")}}
                                <small class="form-text {{#unless passes}}text-warning{{/unless}}">
                                    {{themeText 'theme.contrastLabel'}} <strong>{{ratio}}:1</strong>
                                    <span class="badge bg-{{badgeClass}}">{{#if passes}}✓{{else}}⚠{{/if}} WCAG {{level}}</span>
                                </small>
                            {{/with}}
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.bodyFontFamily'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.app_font_family}}" data-id="app_font_family" placeholder="&quot;Atkinson Hyperlegible&quot;, &quot;Segoe UI&quot;, sans-serif">
                            <small class="form-text text-muted">
                                {{themeText 'theme.bodyFontFamilyHelp'}}
                            </small>
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.headingBrandFontFamily'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.app_heading_font_family}}" data-id="app_heading_font_family" placeholder="Fraunces, Georgia, serif">
                            <small class="form-text text-muted">
                                {{themeText 'theme.headingBrandFontFamilyHelp'}}
                            </small>
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.webFontStylesheetUrl'}}
                        </div>
                        <div class="col">
                            <input type="url" class="currentThemeProp form-control" value="{{currentTheme.properties.app_font_stylesheet_url}}" data-id="app_font_stylesheet_url" placeholder="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&amp;family=Fraunces:wght@700;800&amp;display=swap">
                            <small class="form-text text-muted">
                                {{themeText 'theme.webFontStylesheetUrlHelp'}}
                            </small>
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.baseFontSize'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.app_font_size_base}}" data-id="app_font_size_base" placeholder="16px">
                            <small class="form-text text-muted">
                                {{themeText 'theme.baseFontSizeHelp'}}
                            </small>
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.spacingDensityScale'}}
                        </div>
                        <div class="col">
                            <input type="number" class="currentThemeProp form-control" value="{{currentTheme.properties.app_density_scale}}" data-id="app_density_scale" min="0.5" max="2" step="0.05" placeholder="1">
                            <small class="form-text text-muted">
                                {{themeText 'theme.spacingDensityScaleHelp'}}
                            </small>
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.navigationHeaderBackground'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.navigation_surface_color}}" data-id="navigation_surface_color">
                            <input type="color" class="currentThemePropColor" value="{{themeColorPickerValue "navigation_surface_color"}}" data-id="navigation_surface_color">
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.navigationHeaderTextColor'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.navigation_text_color}}" data-id="navigation_text_color">
                            <input type="color" class="currentThemePropColor" value="{{themeColorPickerValue "navigation_text_color"}}" data-id="navigation_text_color">
                            {{#with (getContrastInfo "navigation_text_color" "navigation_surface_color")}}
                                <small class="form-text {{#unless passes}}text-warning{{/unless}}">
                                    {{themeText 'theme.contrastLabel'}} <strong>{{ratio}}:1</strong>
                                    <span class="badge bg-{{badgeClass}}">{{#if passes}}✓{{else}}⚠{{/if}} WCAG {{level}}</span>
                                </small>
                            {{/with}}
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.cardBackgroundColor'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.learning_card_surface_color}}" data-id="learning_card_surface_color">
                            <input type="color" class="currentThemePropColor" value="{{themeColorPickerValue "learning_card_surface_color"}}" data-id="learning_card_surface_color">
                            <small class="form-text text-muted">
                                {{themeText 'theme.cardBackgroundColorHelp'}}
                            </small>
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.stimulusBoxBackground'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.learning_card_stimulus_surface_color}}" data-id="learning_card_stimulus_surface_color">
                            <input type="color" class="currentThemePropColor" value="{{themeColorPickerValue "learning_card_stimulus_surface_color"}}" data-id="learning_card_stimulus_surface_color">
                            <small class="form-text text-muted">
                                {{themeText 'theme.stimulusBoxBackgroundHelp'}}
                            </small>
                        </div>
                    </div>
                </div>

                <!-- Buttons & Interactive -->
                <div class="theme-section">
                    <h5 class="theme-section-header">{{themeText 'theme.buttonsInteractiveElements'}}</h5>
                    <div class="row row-cols-2">
                        <div class="col text-end">
                            {{themeText 'theme.defaultButtonBackground'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.app_primary_action_surface_color}}" data-id="app_primary_action_surface_color">
                            <input type="color" class="currentThemePropColor" value="{{themeColorPickerValue "app_primary_action_surface_color"}}" data-id="app_primary_action_surface_color">
                            <small class="form-text text-muted">
                                {{themeText 'theme.defaultButtonBackgroundHelp'}}
                            </small>
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.defaultButtonTextColor'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.app_primary_action_text_color}}" data-id="app_primary_action_text_color">
                            <input type="color" class="currentThemePropColor" value="{{themeColorPickerValue "app_primary_action_text_color"}}" data-id="app_primary_action_text_color">
                            {{#with (getContrastInfo "app_primary_action_text_color" "app_primary_action_surface_color")}}
                                <small class="form-text {{#unless passes}}text-warning{{/unless}}">
                                    {{themeText 'theme.contrastLabel'}} <strong>{{ratio}}:1</strong>
                                    <span class="badge bg-{{badgeClass}}">{{#if passes}}✓{{else}}⚠{{/if}} WCAG {{level}}</span>
                                </small>
                            {{/with}}
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.practiceButtonBackground'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.learning_card_primary_action_surface_color}}" data-id="learning_card_primary_action_surface_color">
                            <input type="color" class="currentThemePropColor" value="{{themeColorPickerValue "learning_card_primary_action_surface_color"}}" data-id="learning_card_primary_action_surface_color">
                            <small class="form-text text-muted">
                                {{themeText 'theme.practiceButtonBackgroundHelp'}}
                            </small>
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.practiceButtonTextColor'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.learning_card_primary_action_text_color}}" data-id="learning_card_primary_action_text_color">
                            <input type="color" class="currentThemePropColor" value="{{themeColorPickerValue "learning_card_primary_action_text_color"}}" data-id="learning_card_primary_action_text_color">
                            {{#with (getContrastInfo "learning_card_primary_action_text_color" "learning_card_primary_action_surface_color")}}
                                <small class="form-text {{#unless passes}}text-warning{{/unless}}">
                                    {{themeText 'theme.contrastLabel'}} <strong>{{ratio}}:1</strong>
                                    <span class="badge bg-{{badgeClass}}">{{#if passes}}✓{{else}}⚠{{/if}} WCAG {{level}}</span>
                                </small>
                            {{/with}}
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.accentColor'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.app_accent_color}}" data-id="app_accent_color">
                            <input type="color" class="currentThemePropColor" value="{{themeColorPickerValue "app_accent_color"}}" data-id="app_accent_color">
                            <small class="form-text text-muted">
                                {{themeText 'theme.accentColorHelp'}}
                            </small>
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.practiceMenuAccuracyBarFill'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.practice_menu_accuracy_bar_fill_color}}" data-id="practice_menu_accuracy_bar_fill_color">
                            <input type="color" class="currentThemePropColor" value="{{themeColorPickerValue "practice_menu_accuracy_bar_fill_color"}}" data-id="practice_menu_accuracy_bar_fill_color">
                            <small class="form-text text-muted">
                                {{themeText 'theme.practiceMenuAccuracyBarFillHelp'}}
                            </small>
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.practiceMenuAccuracyBarTrack'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.practice_menu_accuracy_bar_track_color}}" data-id="practice_menu_accuracy_bar_track_color">
                            <small class="form-text text-muted">
                                {{themeText 'theme.practiceMenuAccuracyBarTrackHelp'}}
                            </small>
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.buttonHeight'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.app_button_height}}" data-id="app_button_height" placeholder="44px">
                            <small class="form-text text-muted">
                                <strong>{{themeText 'theme.defaultValue' value='44px'}}</strong> - {{themeText 'theme.sharedMinimumButtonHeight'}}
                            </small>
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.textInputHeight'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.app_text_input_height}}" data-id="app_text_input_height" placeholder="36px">
                            <small class="form-text text-muted">
                                <strong>{{themeText 'theme.defaultValue' value='36px'}}</strong> - {{themeText 'theme.sharedMinimumTextInputHeight'}}
                            </small>
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.buttonBorderDarkness'}}
                        </div>
                        <div class="col">
                            <input type="number" class="currentThemeProp form-control" value="{{currentTheme.properties.app_button_border_darkness}}" data-id="app_button_border_darkness" min="0" max="50" step="5" placeholder="20">
                            <small class="form-text text-muted">
                                <strong>{{themeText 'theme.defaultValue' value='20%'}}</strong> - {{themeText 'theme.buttonBorderDarknessHelp'}}<br>
                                <em>{{themeText 'theme.rangeLabel'}}</em> {{themeText 'theme.buttonDarknessRange'}}<br>
                                <em>{{themeText 'theme.appliesToLabel'}}</em> {{themeText 'theme.buttonBorderDarknessAppliesTo'}}
                            </small>
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.buttonHoverDarkness'}}
                        </div>
                        <div class="col">
                            <input type="number" class="currentThemeProp form-control" value="{{currentTheme.properties.app_button_hover_darkness}}" data-id="app_button_hover_darkness" min="0" max="50" step="5" placeholder="15">
                            <small class="form-text text-muted">
                                <strong>{{themeText 'theme.defaultValue' value='15%'}}</strong> - {{themeText 'theme.buttonHoverDarknessHelp'}}<br>
                                <em>{{themeText 'theme.rangeLabel'}}</em> {{themeText 'theme.buttonHoverDarknessRange'}}<br>
                                <em>{{themeText 'theme.appliesToLabel'}}</em> {{themeText 'theme.buttonHoverDarknessAppliesTo'}}
                            </small>
                        </div>
                    </div>
                </div>

                <!-- Menus & Secondary -->
                <div class="theme-section">
                    <h5 class="theme-section-header">{{themeText 'theme.menusSecondaryElements'}}</h5>
                    <div class="row row-cols-2">
                        <div class="col text-end">
                            {{themeText 'theme.secondaryBackground'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.app_secondary_surface_color}}" data-id="app_secondary_surface_color">
                            <input type="color" class="currentThemePropColor" value="{{themeColorPickerValue "app_secondary_surface_color"}}" data-id="app_secondary_surface_color">
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.secondaryText'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.app_secondary_text_color}}" data-id="app_secondary_text_color">
                            <input type="color" class="currentThemePropColor" value="{{themeColorPickerValue "app_secondary_text_color"}}" data-id="app_secondary_text_color">
                            {{#with (getContrastInfo "app_secondary_text_color" "app_secondary_surface_color")}}
                                <small class="form-text {{#unless passes}}text-warning{{/unless}}">
                                    {{themeText 'theme.contrastLabel'}} <strong>{{ratio}}:1</strong>
                                    <span class="badge bg-{{badgeClass}}">{{#if passes}}✓{{else}}⚠{{/if}} WCAG {{level}}</span>
                                </small>
                            {{/with}}
                        </div>
                    </div>
                </div>

                <!-- Alerts & Feedback -->
                <div class="theme-section">
                    <h5 class="theme-section-header">{{themeText 'theme.alertsFeedback'}}</h5>
                    <div class="row row-cols-2">
                        <div class="col text-end">
                            {{themeText 'theme.successColor'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.feedback_correct_color}}" data-id="feedback_correct_color">
                            <input type="color" class="currentThemePropColor" value="{{themeColorPickerValue "feedback_correct_color"}}" data-id="feedback_correct_color">
                            <small class="form-text text-muted">
                                {{themeText 'theme.successColorHelp'}}
                            </small>
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.alertColor'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.feedback_error_color}}" data-id="feedback_error_color">
                            <input type="color" class="currentThemePropColor" value="{{themeColorPickerValue "feedback_error_color"}}" data-id="feedback_error_color">
                            <small class="form-text text-muted">
                                {{themeText 'theme.alertColorHelp'}}
                            </small>
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.audioIconColorDisabled'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.learning_card_audio_icon_disabled_color}}" data-id="learning_card_audio_icon_disabled_color">
                            <input type="color" class="currentThemePropColor" value="{{themeColorPickerValue "learning_card_audio_icon_disabled_color"}}" data-id="learning_card_audio_icon_disabled_color">
                            <small class="form-text text-muted">
                                {{themeText 'theme.audioIconColorDisabledHelp'}}
                            </small>
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.audioControlColor'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.learning_card_audio_control_color}}" data-id="learning_card_audio_control_color">
                            <input type="color" class="currentThemePropColor" value="{{themeColorPickerValue "learning_card_audio_control_color"}}" data-id="learning_card_audio_control_color">
                            <small class="form-text text-muted">
                                {{themeText 'theme.audioControlColorHelp'}}
                            </small>
                        </div>
                    </div>
                </div>

                <!-- Card Surfaces & Overlays -->
                <div class="theme-section">
                    <h5 class="theme-section-header">{{themeText 'theme.cardSurfacesOverlays'}}</h5>
                    <div class="row row-cols-2">
                        <div class="col text-end">
                            {{themeText 'theme.videoOverlaySurface'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.media_video_overlay_surface_color}}" data-id="media_video_overlay_surface_color" placeholder="rgba(255, 255, 255, 0.98)">
                            <small class="form-text text-muted">
                                {{themeText 'theme.videoOverlaySurfaceHelp'}}
                            </small>
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.videoOverlayBackdrop'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.media_video_overlay_backdrop_color}}" data-id="media_video_overlay_backdrop_color" placeholder="rgba(0, 0, 0, 0.6)">
                            <small class="form-text text-muted">
                                {{themeText 'theme.videoOverlayBackdropHelp'}}
                            </small>
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.surfaceShadow'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.app_surface_shadow}}" data-id="app_surface_shadow" placeholder="0 4px 12px rgba(0, 0, 0, 0.18)">
                            <small class="form-text text-muted">
                                {{themeText 'theme.surfaceShadowHelp'}}
                            </small>
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.performanceDividerColor'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.learning_card_performance_divider_color}}" data-id="learning_card_performance_divider_color" placeholder="rgba(15, 23, 42, 0.15)">
                            <small class="form-text text-muted">
                                {{themeText 'theme.performanceDividerColorHelp'}}
                            </small>
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.loadingOverlayColor'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.app_loading_overlay_color}}" data-id="app_loading_overlay_color" placeholder="rgba(245, 245, 245, 0.95)">
                            <small class="form-text text-muted">
                                {{themeText 'theme.loadingOverlayColorHelp'}}
                            </small>
                        </div>
                    </div>
                </div>

                <!-- Border Radius & Layout -->
                <div class="theme-section">
                    <h5 class="theme-section-header">{{themeText 'theme.borderRadiusCorners'}}</h5>
                    <div class="row row-cols-2">
                        <div class="col text-end">
                            {{themeText 'theme.smallBorderRadius'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.app_border_radius_sm}}" data-id="app_border_radius_sm" placeholder="8px">
                            <small class="form-text text-muted">
                                <strong>{{themeText 'theme.defaultValue' value='8px'}}</strong> - {{themeText 'theme.smallUiElements'}}<br>
                                <em>{{themeText 'theme.usedForLabel'}}</em> {{themeText 'theme.smallRadiusUsedFor'}}
                            </small>
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.largeBorderRadius'}}
                        </div>
                        <div class="col">
                            <input type="text" class="currentThemeProp form-control" value="{{currentTheme.properties.app_border_radius_lg}}" data-id="app_border_radius_lg" placeholder="12px">
                            <small class="form-text text-muted">
                                <strong>{{themeText 'theme.defaultValue' value='12px'}}</strong> - {{themeText 'theme.largeContainers'}}<br>
                                <em>{{themeText 'theme.usedForLabel'}}</em> {{themeText 'theme.largeRadiusUsedFor'}}
                            </small>
                        </div>
                    </div>
                </div>

                <!-- Animation -->
                <div class="theme-section">
                    <h5 class="theme-section-header">{{themeText 'theme.animationSpeeds'}}</h5>
                    <div class="row row-cols-2">
                        <div class="col text-end">
                            {{themeText 'theme.transitionSpeedInstant'}}
                        </div>
                        <div class="col">
                            <input type="number" class="currentThemeProp form-control" value="{{themeEditorValue 'app_transition_instant'}}" data-id="app_transition_instant" min="0" max="500" step="10" placeholder="10">
                            <small class="form-text text-muted">
                                <strong>{{themeText 'theme.defaultValue' value='10ms'}}</strong> - {{themeText 'theme.transitionInstantHelp'}}
                            </small>
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.transitionSpeedFast'}}
                        </div>
                        <div class="col">
                            <input type="number" class="currentThemeProp form-control" value="{{themeEditorValue 'app_transition_fast'}}" data-id="app_transition_fast" min="0" max="500" step="10" placeholder="100">
                            <small class="form-text text-muted">
                                <strong>{{themeText 'theme.defaultValue' value='100ms'}}</strong> - {{themeText 'theme.quickTransitions'}}<br>
                                <em>{{themeText 'theme.usedForLabel'}}</em> {{themeText 'theme.fastTransitionUsedFor'}}
                            </small>
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.transitionSpeedSmooth'}}
                        </div>
                        <div class="col">
                            <input type="number" class="currentThemeProp form-control" value="{{themeEditorValue 'app_transition_smooth'}}" data-id="app_transition_smooth" min="0" max="1000" step="50" placeholder="200">
                            <small class="form-text text-muted">
                                <strong>{{themeText 'theme.defaultValue' value='200ms'}}</strong> - {{themeText 'theme.mainContentTransitions'}}<br>
                                <em>{{themeText 'theme.usedForLabel'}}</em> {{themeText 'theme.smoothTransitionUsedFor'}}
                            </small>
                        </div>
                    </div>
                </div>

                <!-- Branding -->
                <div class="theme-section">
                    <h5 class="theme-section-header">{{themeText 'theme.branding'}}</h5>
                    <div class="row row-cols-2">
                        <div class="col text-end">
                            {{themeText 'theme.brandLabel'}}
                        </div>
                        <div class="col">
                            <input type="text" class="form-control currentThemeProp" value="{{currentTheme.properties.brand_display_label}}" data-id="brand_display_label">
                            <small class="form-text text-muted">
                                {{themeText 'theme.brandLabelHelp'}}
                            </small>
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.homePageUnderlayImage'}}
                        </div>
                        <div class="col">
                            <input type="file" class="form-control admin-form-row-sm" id="homeUnderlayUpload" accept="image/*">
                            <input type="text" class="form-control currentThemeProp" value="{{currentTheme.properties.practice_menu_underlay_image_url}}" data-id="practice_menu_underlay_image_url" placeholder="https://example.com/underlay.jpg">
                            <small class="form-text text-muted">
                                {{themeText 'theme.homeUnderlayHelp'}}
                            </small>
                            {{#if currentTheme.properties.practice_menu_underlay_image_url}}
                            <div class="theme-preview-stack">
                                <button type="button" id="clearHomeUnderlay" class="btn btn-secondary btn-sm">{{themeText 'theme.clearUnderlayImage'}}</button>
                                <img src="{{currentTheme.properties.practice_menu_underlay_image_url}}"
                                     alt="{{themeText 'theme.homeUnderlayPreviewAlt'}}"
                                     class="img-thumbnail theme-underlay-preview"
                                     loading="lazy"
                                     decoding="async"
                                     fetchpriority="low">
                            </div>
                            {{/if}}
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.homeWelcomeBackHtml'}}
                        </div>
                        <div class="col">
                            <textarea class="form-control currentThemeProp" rows="5" data-id="practice_menu_welcome_html">{{currentTheme.properties.practice_menu_welcome_html}}</textarea>
                            <small class="form-text text-muted">
                                {{themeText 'theme.homeWelcomeBackHtmlHelp'}}
                            </small>
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.homeFirstPracticeHtml'}}
                        </div>
                        <div class="col">
                            <textarea class="form-control currentThemeProp" rows="5" data-id="practice_menu_first_practice_welcome_html">{{currentTheme.properties.practice_menu_first_practice_welcome_html}}</textarea>
                            <small class="form-text text-muted">
                                {{themeText 'theme.homeFirstPracticeHtmlHelp'}}
                            </small>
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.logoAndFavicon'}}
                        </div>
                        <div class="col">
                            <input type="file" class="form-control" id="logoUpload" accept="image/*">
                            <input type="text" class="form-control currentThemeProp admin-form-row-top" value="{{currentTheme.properties.brand_logo_url}}" data-id="brand_logo_url" placeholder="/images/themes/brain-logo.png">
                            <small class="form-text text-muted">
                                {{themeText 'theme.logoHelp'}}
                            </small>
                            {{#if currentTheme.properties.brand_logo_url}}
                            <button type="button" id="clearLogo" class="btn btn-secondary btn-sm admin-form-row-top">{{themeText 'theme.clearLogo'}}</button>
                            <div class="admin-form-row-top">
                                <img src="{{currentTheme.properties.brand_logo_url}}"
                                     alt="{{themeText 'theme.logoPreviewAlt'}}"
                                     class="img-thumbnail theme-logo-preview"
                                     loading="lazy"
                                     decoding="async"
                                     fetchpriority="low">
                            </div>
                            {{/if}}
                        </div>
                        <div class="col text-end">
                            {{themeText 'theme.signInDescription'}}
                        </div>
                        <div class="col">
                            <textarea class="form-control currentThemeProp" rows="3" data-id="auth_sign_in_description">{{currentTheme.properties.auth_sign_in_description}}</textarea>
                            <small class="form-text text-muted">
                                {{themeText 'theme.signInDescriptionHelp'}}
                            </small>
                        </div>
                    </div>
                </div>

                <!-- Custom Help Page -->
                <div class="theme-section">
                    <h5 class="theme-section-header">{{themeText 'theme.customHelpPage'}}</h5>
                    <div class="row">
                        <div class="col-12">
                            <p class="text-muted admin-form-row">
                                {{themeText 'theme.customHelpDescription'}}
                            </p>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-8 offset-md-2">
                            <div class="admin-form-row">
                                <label for="helpFileUpload" class="form-label">{{themeText 'theme.chooseMarkdownFile'}}</label>
                                <input type="file" class="form-control" id="helpFileUpload" accept=".md">
                                <small class="form-text text-muted">{{themeText 'theme.maxFileSizeOneMb'}}</small>
                            </div>
                            {{#if customHelpPageEnabled}}
                            <div class="alert alert-success admin-form-row">
                                <strong>{{themeText 'theme.customHelpPageActive'}}</strong>
                                {{#if customHelpPageUploadedAt}}
                                <br>
                                <small>{{themeText 'theme.uploadedAt' uploadedAt=(formatDate customHelpPageUploadedAt)}}</small>
                                {{/if}}
                            </div>
                            {{/if}}
                            <div class="d-grid theme-action-stack">
                                <button type="button" id="uploadHelpFileButton" class="btn">
                                    {{themeText 'theme.uploadCustomHelpFile'}}
                                </button>
                                {{#if customHelpPageEnabled}}
                                <button type="button" id="removeHelpFileButton" class="btn btn-secondary">
                                    {{themeText 'theme.removeCustomHelpUseDefaultWiki'}}
                                </button>
                                {{/if}}
                            </div>
                            <div class="admin-form-row-top text-center">
                                <span id="helpFileUploadStatus" class="text-muted"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    {{/if}}
</template>
