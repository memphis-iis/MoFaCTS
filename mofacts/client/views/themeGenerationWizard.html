<template name="themeGenerationWizard">
    <div class="theme-wizard-panel border-top">
        <div class="theme-library-header">
            <div>
                <h5>{{themeWizardText 'themeWizard.generateTheme'}}</h5>
                <div class="text-muted small">{{themeWizardText 'themeWizard.description'}}</div>
            </div>
            <button type="button" class="btn btn-secondary toggle-theme-wizard">{{wizardToggleLabel}}</button>
        </div>

        {{#if wizardOpen}}
            <div class="theme-wizard-grid">
                <div class="theme-wizard-control-group">
                    <label class="form-label">{{themeWizardText 'themeWizard.themeName'}}</label>
                    <input type="text" class="form-control theme-wizard-name" value="{{wizardName}}">
                </div>

                <div class="theme-wizard-control-group">
                    <label class="form-label">{{themeWizardText 'themeWizard.baseTheme'}}</label>
                    <select class="form-control theme-wizard-base-theme">
                        {{#each baseThemes}}
                            <option value="{{id}}" {{attrs}}>{{name}}</option>
                        {{/each}}
                    </select>
                </div>

                <div class="theme-wizard-control-group">
                    <label class="form-label">{{themeWizardText 'themeWizard.sourcePalette'}}</label>
                    <div class="theme-wizard-palette">
                        {{#each paletteSlots}}
                            <div class="theme-wizard-palette-slot" data-index="{{index}}">
                                <input type="color" class="theme-wizard-slot-color" value="{{value}}">
                                <input type="text" class="form-control theme-wizard-slot-hex" value="{{value}}" placeholder="#7ED957">
                                <input type="text" class="form-control theme-wizard-slot-label" value="{{label}}" placeholder="{{themeWizardText 'themeWizard.labelPlaceholder'}}">
                                <button type="button" class="btn btn-secondary btn-sm theme-wizard-remove-color" data-index="{{index}}" {{removeAttrs}}>{{themeWizardText 'themeWizard.remove'}}</button>
                            </div>
                        {{/each}}
                    </div>
                    <div class="theme-action-row admin-form-row-top">
                        <button type="button" class="btn btn-secondary btn-sm theme-wizard-add-color">{{themeWizardText 'themeWizard.addColor'}}</button>
                        <button type="button" class="btn btn-secondary btn-sm theme-wizard-from-active">{{themeWizardText 'themeWizard.extractActiveTheme'}}</button>
                        <button type="button" class="btn btn-secondary btn-sm theme-wizard-from-default">{{themeWizardText 'themeWizard.startDefault'}}</button>
                    </div>
                    {{#with wizardFeedback 'palette'}}{{> adminStatus}}{{/with}}
                </div>

                <div class="theme-wizard-control-group">
                    <label class="form-label">{{themeWizardText 'themeWizard.pasteColors'}}</label>
                    <textarea class="form-control theme-wizard-paste" rows="3" placeholder="#7ed957&#10;rgb(0, 0, 0)"></textarea>
                    <button type="button" class="btn btn-secondary btn-sm admin-form-row-top theme-wizard-apply-paste">{{themeWizardText 'themeWizard.fillPalette'}}</button>
                    {{#with wizardFeedback 'paste'}}{{> adminStatus}}{{/with}}
                </div>

                <div class="theme-wizard-control-group">
                    <label class="form-label">{{themeWizardText 'themeWizard.uploadPaletteJson'}}</label>
                    <input type="file" class="form-control theme-wizard-json-upload" accept=".json,application/json">
                    {{#with wizardFeedback 'json'}}{{> adminStatus}}{{/with}}
                </div>

                <div class="theme-wizard-control-group">
                    <label class="form-label">{{themeWizardText 'themeWizard.polarity'}}</label>
                    <select class="form-control theme-wizard-polarity">
                        <option value="light" {{polarityAttrs 'light'}}>{{themeWizardText 'themeWizard.light'}}</option>
                        <option value="dark" {{polarityAttrs 'dark'}}>{{themeWizardText 'themeWizard.dark'}}</option>
                    </select>
                </div>

                <div class="theme-wizard-control-group">
                    <label class="form-label">{{themeWizardText 'themeWizard.contrastPriority' percent=contrastPriorityPercent}}</label>
                    <input type="range" class="form-range theme-wizard-contrast" min="0" max="100" step="5" value="{{contrastPriorityPercent}}">
                </div>

                <div class="theme-wizard-control-group">
                    <label class="form-label">{{themeWizardText 'themeWizard.density' percent=densityPercent}}</label>
                    <input type="range" class="form-range theme-wizard-density" min="25" max="200" step="5" value="{{densityPercent}}">
                </div>

                <div class="theme-wizard-control-group">
                    <label class="form-label">{{themeWizardText 'themeWizard.paletteExpansion'}}</label>
                    <label class="theme-wizard-check"><input type="checkbox" class="theme-wizard-expansion" data-key="allowTints" {{expansionAttrs 'allowTints'}}> {{themeWizardText 'themeWizard.allowTints'}}</label>
                    <label class="theme-wizard-check"><input type="checkbox" class="theme-wizard-expansion" data-key="allowShades" {{expansionAttrs 'allowShades'}}> {{themeWizardText 'themeWizard.allowShades'}}</label>
                    <label class="theme-wizard-check"><input type="checkbox" class="theme-wizard-expansion" data-key="allowMutedVariants" {{expansionAttrs 'allowMutedVariants'}}> {{themeWizardText 'themeWizard.allowMutedVariants'}}</label>
                    <label class="theme-wizard-check"><input type="checkbox" class="theme-wizard-expansion" data-key="allowGeneratedCompanions" {{expansionAttrs 'allowGeneratedCompanions'}}> {{themeWizardText 'themeWizard.allowGeneratedCompanions'}}</label>
                </div>
            </div>

            {{#if paletteStats}}
                <div class="theme-wizard-stats">
                    <span>{{themeWizardText 'themeWizard.colors' value=paletteStats.colorCount}}</span>
                    <span>{{themeWizardText 'themeWizard.darkest' value=paletteStats.darkestColor}}</span>
                    <span>{{themeWizardText 'themeWizard.lightest' value=paletteStats.lightestColor}}</span>
                    <span>{{themeWizardText 'themeWizard.medianLuminance' value=paletteStats.medianLuminance}}</span>
                    <span>{{themeWizardText 'themeWizard.chromatic' value=paletteStats.chromaticColorCount}}</span>
                    <span>{{themeWizardText 'themeWizard.neutral' value=paletteStats.neutralColorCount}}</span>
                </div>
            {{/if}}

            {{#if generatedPreview}}
                <div class="theme-wizard-preview" style="{{generatedPreview.previewStyle}}">
                    <div class="theme-wizard-preview-nav" style="{{generatedPreview.navStyle}}">{{themeWizardText 'themeWizard.navigation'}}</div>
                    <div class="theme-wizard-preview-card" style="{{generatedPreview.cardStyle}}">
                        <div class="theme-wizard-preview-stimulus" style="{{generatedPreview.stimulusStyle}}">{{themeWizardText 'themeWizard.stimulus'}}</div>
                        <button type="button" class="btn theme-wizard-preview-button" style="{{generatedPreview.buttonStyle}}">{{themeWizardText 'themeWizard.primary'}}</button>
                        <div class="theme-wizard-feedback-row">
                            <span style="{{generatedPreview.correctStyle}}">{{themeWizardText 'feedback.correct'}}</span>
                            <span style="{{generatedPreview.errorStyle}}">{{themeWizardText 'themeWizard.error'}}</span>
                        </div>
                        <div class="theme-wizard-accuracy" style="{{generatedPreview.trackStyle}}">
                            <div class="theme-wizard-accuracy-fill" style="{{generatedPreview.fillStyle}}"></div>
                        </div>
                    </div>
                </div>
                <div class="theme-wizard-stats">
                    <span>{{themeWizardText 'themeWizard.readability' value=generatedPreview.readability}}</span>
                    <span>{{themeWizardText 'themeWizard.surfaceSeparation' value=generatedPreview.surfaceSeparation}}</span>
                    <span>{{themeWizardText 'themeWizard.feedback' value=generatedPreview.feedbackDistinctiveness}}</span>
                    <span>{{themeWizardText 'themeWizard.paletteFidelity' value=generatedPreview.paletteFidelity}}</span>
                    <span>{{themeWizardText 'themeWizard.aaAaa' aa=generatedPreview.aaCount aaa=generatedPreview.aaaCount}}</span>
                </div>
                <details class="theme-wizard-explain">
                    <summary>{{themeWizardText 'themeWizard.explain'}}</summary>
                    <ul>
                        {{#each generatedPreview.explanation}}
                            <li>{{this}}</li>
                        {{/each}}
                    </ul>
                </details>

                <details class="theme-wizard-explain">
                    <summary>{{themeWizardText 'themeWizard.advancedDiagnostics'}}</summary>
                    <div class="theme-wizard-diagnostics-grid">
                        <div>
                            <h6>{{themeWizardText 'themeWizard.wcagMatrix'}}</h6>
                            {{#each generatedPreview.contrastRows}}
                                <div class="theme-wizard-diagnostic-row">
                                    <span>{{relationship}}</span>
                                    <span>{{ratio}}:1 / min {{minimum}}</span>
                                </div>
                            {{/each}}
                        </div>
                        <div>
                            <h6>{{themeWizardText 'themeWizard.deltaEMatrix'}}</h6>
                            {{#each generatedPreview.distinctnessRows}}
                                <div class="theme-wizard-diagnostic-row">
                                    <span>{{relationship}}</span>
                                    <span>{{deltaE}} / min {{minimumDeltaE}}</span>
                                </div>
                            {{/each}}
                        </div>
                        <div>
                            <h6>{{themeWizardText 'themeWizard.luminanceProfile'}}</h6>
                            {{#each generatedPreview.luminanceRows}}
                                <div class="theme-wizard-diagnostic-row">
                                    <span>{{role}}</span>
                                    <span>{{luminance}}</span>
                                </div>
                            {{/each}}
                        </div>
                        <div>
                            <h6>{{themeWizardText 'themeWizard.colorRoles'}}</h6>
                            {{#each generatedPreview.colorRows}}
                                <div class="theme-wizard-diagnostic-row">
                                    <span>{{role}}</span>
                                    <span>{{value}}</span>
                                </div>
                            {{/each}}
                        </div>
                    </div>
                </details>
            {{/if}}

            <div class="theme-action-row admin-form-row-top">
                <div class="admin-command-region">
                    <button type="button" class="btn theme-wizard-preview-generate">{{themeWizardText 'themeWizard.previewGeneratedTheme'}}</button>
                    {{#with wizardFeedback 'preview'}}{{> adminStatus}}{{/with}}
                </div>
                <div class="admin-command-region">
                    <button type="button" class="btn theme-wizard-create-activate">{{themeWizardText 'themeWizard.generateTheme'}}</button>
                    {{#with wizardFeedback 'create'}}{{> adminStatus}}{{/with}}
                </div>
            </div>
        {{/if}}
    </div>
</template>
