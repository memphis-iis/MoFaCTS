<template name="profile">
  <div class="profile-page">
    <div class="profile-layout">
      <section class="profile-section">
        <div class="profile-section-heading">
          <span class="fa fa-lock profile-section-icon" aria-hidden="true"></span>
          <h2>{{t 'profile.privateAccountInformation'}}</h2>
        </div>

        <div class="profile-field">
          <label for="profileEmail">{{t 'profile.email'}}</label>
          <input id="profileEmail" type="email" value="{{email}}" readonly>
          <p>{{t 'profile.emailHelp'}}</p>
        </div>

        <div class="profile-field">
          <label for="profileName">{{t 'profile.name'}}</label>
          <input id="profileName" type="text" maxlength="100" value="{{name}}">
          <p>{{t 'profile.nameHelp'}}</p>
        </div>

        <div class="profile-field">
          <label for="profileUiLocale">{{t 'profile.interfaceLanguage'}}</label>
          <select id="profileUiLocale" value="{{uiLocale}}">
            {{#each uiLocaleOptions}}
              <option value="{{locale}}" {{selectedAttrs}}>{{label}}</option>
            {{/each}}
          </select>
          <p>{{t 'profile.interfaceLanguageHelp'}}</p>
          {{#if profileLocaleStatusMessage}}
            <div class="admin-inline-feedback">{{> adminStatus variant="error" text=profileLocaleStatusMessage urgent=true}}</div>
          {{/if}}
        </div>
      </section>

      <section class="profile-section">
        <div class="profile-section-heading">
          <span class="fa fa-user-circle profile-section-icon" aria-hidden="true"></span>
          <h2>{{t 'profile.publicProfile'}}</h2>
        </div>

        <div class="profile-avatar-row">
          <div class="profile-avatar-preview" aria-label="{{t 'profile.avatarPreview'}}">
            {{#if previewIsImage}}
              <img src="{{previewImageData}}" alt="" aria-hidden="true">
            {{else}}
              {{#if previewIsIcon}}
                <span class="fa {{previewIconClass}}" aria-hidden="true"></span>
              {{else}}
                {{previewInitials}}
              {{/if}}
            {{/if}}
          </div>

          <div class="profile-avatar-controls">
            <div class="profile-field">
              <label for="profileDisplayName">{{t 'profile.displayName'}}</label>
              <input id="profileDisplayName" type="text" maxlength="60" value="{{displayName}}">
              <p>{{t 'profile.displayNameHelp'}}</p>
              {{#if contentCreatorDisplayNameRequired}}
                {{> adminStatus variant="warning" text=(t 'profile.displayNameRequiredForContent') urgent=true}}
              {{/if}}
            </div>

            <div class="profile-segmented-control" role="group" aria-label="{{t 'profile.avatarType'}}">
              <button type="button" class="{{#if avatarTypeIs 'initials'}}active{{/if}}" data-avatar-type="initials" aria-pressed="{{avatarTypePressed 'initials'}}">{{t 'profile.initials'}}</button>
              <button type="button" class="{{#if avatarTypeIs 'icon'}}active{{/if}}" data-avatar-type="icon" aria-pressed="{{avatarTypePressed 'icon'}}">{{t 'profile.icon'}}</button>
              <button type="button" class="{{#if avatarTypeIs 'image'}}active{{/if}}" data-avatar-type="image" aria-pressed="{{avatarTypePressed 'image'}}">{{t 'profile.picture'}}</button>
            </div>

            <div class="profile-icon-grid" aria-label="{{t 'profile.avatarIcons'}}">
              {{#each avatarOptions}}
                <button type="button" class="{{#if avatarIconSelected id}}active{{/if}}" data-avatar-icon="{{id}}" title="{{label}}" aria-label="{{label}}" aria-pressed="{{avatarIconPressed id}}">
                  <span class="fa {{avatarIconClass id}}" aria-hidden="true"></span>
                </button>
              {{/each}}
            </div>

            <div class="profile-avatar-image-actions">
              <input id="profileAvatarUpload" type="file" accept="image/jpeg,image/png,image/webp" hidden>
              <button id="profileAvatarUploadButton" type="button">
                <span class="fa fa-upload" aria-hidden="true"></span>
                {{t 'profile.uploadPicture'}}
              </button>
              {{#if previewIsImage}}
                <button id="profileAvatarRemoveImage" type="button">
                  <span class="fa fa-trash" aria-hidden="true"></span>
                  {{t 'profile.removePicture'}}
                </button>
              {{/if}}
            </div>
            {{#if profileAvatarStatusMessage}}
              <div class="admin-inline-feedback">{{> adminStatus variant=profileAvatarStatusVariant text=profileAvatarStatusMessage}}</div>
            {{/if}}
          </div>
        </div>
      </section>

      <section class="profile-section">
        <div class="profile-section-heading">
          <span class="fa fa-plug profile-section-icon" aria-hidden="true"></span>
          <h2>{{t 'profile.aiProvider'}}</h2>
        </div>

        {{#if hasOpenRouterKey}}
          <div class="profile-key-status" role="status">
            <span class="fa fa-check-circle" aria-hidden="true"></span>
            {{t 'profile.keySaved'}}
          </div>
        {{/if}}

        <div class="profile-field">
          <label for="openRouterApiKey">{{t 'profile.openRouterApiKey'}}</label>
          <input id="openRouterApiKey" type="password" autocomplete="new-password" placeholder="{{#if hasOpenRouterKey}}{{t 'profile.replaceSavedKeyPlaceholder'}}{{else}}{{t 'profile.apiKeyPlaceholder'}}{{/if}}">
          <p>{{t 'profile.openRouterApiKeyHelp'}}</p>
        </div>

        <div class="profile-field">
          <label for="openRouterDefaultModel">{{t 'profile.openRouterModel'}}</label>
          <select id="openRouterDefaultModel" value="{{openRouterDefaultModel}}" aria-describedby="{{openRouterModelDescribedBy}}" {{openRouterModelSelectAttrs}}>
            {{#each openRouterModelOptions}}
              <option value="{{value}}" {{selectedAttrs}}>{{label}}</option>
            {{/each}}
          </select>
          <p id="openRouterModelHelp">{{t 'profile.openRouterModelHelp'}}</p>
        </div>

        {{#if openRouterModelCatalogMessage}}
          <div id="openRouterModelCatalogStatus" class="profile-alert {{openRouterModelCatalogMessageClass}}" role="status">{{openRouterModelCatalogMessage}}</div>
        {{/if}}

        {{#if showOpenRouterReasoningLevel}}
        <div class="profile-field">
          <label for="openRouterReasoningLevel">{{t 'profile.openRouterReasoningLevel'}}</label>
          <select id="openRouterReasoningLevel" aria-describedby="openRouterReasoningLevelHelp" {{openRouterReasoningSelectAttrs}}>
            {{#each openRouterReasoningLevelOptions}}
              <option value="{{value}}" {{selectedAttrs}}>{{label}}</option>
            {{/each}}
          </select>
          <p id="openRouterReasoningLevelHelp">{{t 'profile.openRouterReasoningLevelHelp'}}</p>
        </div>
        {{/if}}

        {{#if openRouterStatusMessage}}
          {{> adminStatus className="profile-alert" variant=openRouterStatusVariant text=openRouterStatusMessage urgent=(equals openRouterStatusVariant "error")}}
        {{/if}}
        <div class="profile-actions profile-openrouter-actions">
          <button id="openRouterTest" type="button" {{testingAttrs}}>
            <span class="fa fa-flask" aria-hidden="true"></span>
            {{#if testing}}{{t 'profile.checking'}}{{else}}{{t 'profile.checkConfiguration'}}{{/if}}
          </button>
          {{#if hasOpenRouterKey}}
            <button id="openRouterDeleteKey" type="button" class="profile-danger-action" {{savingAttrs}}>
              <span class="fa fa-trash" aria-hidden="true"></span>
              {{t 'profile.deleteKey'}}
            </button>
          {{/if}}
        </div>
      </section>

      <div class="profile-actions">
        <button id="profileSave" type="button" class="profile-primary-action" {{savingAttrs}}>
          <span class="fa fa-save" aria-hidden="true"></span>
          {{#if saving}}{{t 'profile.saving'}}{{else}}{{t 'profile.saveProfile'}}{{/if}}
        </button>
        {{#if profileSaveStatusMessage}}
          <div class="admin-inline-feedback">{{> adminStatus variant=profileSaveStatusVariant text=profileSaveStatusMessage urgent=(equals profileSaveStatusVariant "error")}}</div>
        {{/if}}
      </div>
      {{> adminInlineConfirmation confirmation=profileConfirmationView}}
    </div>
  </div>
</template>
