<!-- User Administration Template -->

<template name="adminControls">
    <div>
        {{#if loadErrorText}}
        {{> adminStatus variant="error" text=loadErrorText urgent=true}}
        <button type="button" class="btn btn-outline-secondary btn-sm admin-form-row-sm" data-admin-load-retry="true">
            {{t 'common.tryAgain'}}
        </button>
        {{/if}}

        {{#if isInRole 'admin'}}
        <!-- Server Status Section -->
        <div class="admin-section">
            <div class="card admin-card">
                <div class="card-body">
                    <div class="admin-section-heading">
                        <i class="fa fa-server admin-section-icon"></i>
                        <h5>{{t 'admin.serverStatus'}}</h5>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <strong>{{t 'admin.serverStorageSpace'}}</strong>
                        </div>
                        <div class="col-md-6">
                            {{#if serverStatusReady}}
                                {{#if serverStatus.error}}
                                <span class="admin-badge admin-badge-error">{{serverStatus.error}}</span>
                                {{else}}
                                {{serverStorageSummary}}
                                {{/if}}
                            {{else}}
                                {{t 'common.loading'}}
                            {{/if}}
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stimulus display cache refresh section -->
        <div class="admin-section">
            <div class="card admin-card admin-maintenance-card">
                <div class="card-body">
                    <div class="admin-maintenance-row">
                        <div class="admin-maintenance-copy">
                            <div class="admin-section-heading admin-section-heading-compact">
                                <i class="fa fa-refresh admin-section-icon"></i>
                                <h5>{{t 'admin.stimulusDisplayCache'}}</h5>
                            </div>
                            <p class="admin-maintenance-description">
                                {{t 'admin.stimulusDisplayCacheDescription'}}
                            </p>
                        </div>
                        <div class="admin-maintenance-action">
                            <button type="button" id="updateStimDisplayTypeMap" class="btn btn-primary" disabled="{{cacheCommandBusy}}" aria-busy="{{#if cacheCommandBusy}}true{{else}}false{{/if}}">
                                <i class="fa fa-refresh"></i> {{t 'admin.rebuildDisplayCache'}}
                            </button>
                        </div>
                    </div>
                    {{#if cacheMessage}}
                    <div class="admin-inline-feedback admin-form-row-top">{{> adminStatus variant=cacheMessage.level text=cacheMessage.text urgent=(equals cacheMessage.level "error")}}</div>
                    {{/if}}
                </div>
            </div>
        </div>

        <!-- Server Verbosity Level Section -->
        <div class="admin-section">
            <div class="card admin-card admin-verbosity-card">
                <div class="card-body">
                    <div class="admin-section-heading admin-verbosity-heading">
                        <div>
                            <div class="admin-section-heading">
                                <i class="fa fa-cog admin-section-icon"></i>
                                <h5>{{t 'admin.serverLogging'}}</h5>
                            </div>
                            <p class="admin-verbosity-intro">{{t 'admin.serverLoggingDescription'}}</p>
                        </div>
                    </div>
                    <fieldset class="admin-verbosity-fieldset">
                        <legend class="sr-only">{{t 'admin.serverLogging'}}</legend>
                        <div class="admin-verbosity-options">
                            <label class="admin-verbosity-option" for="verbosityRadio0">
                                <span class="admin-verbosity-option-control">
                                    <input class="form-check-input serverVerbosityRadio" type="radio" name="serverVerbosityRadio" id="verbosityRadio0" data-verbosity="0" checked="{{serverVerbosityChecked '0'}}" disabled="{{serverVerbosityDisabled}}">
                                </span>
                                <span class="admin-verbosity-option-copy">
                                    <span class="admin-verbosity-option-title">{{t 'admin.routineServerLogs'}}</span>
                                    <span class="admin-verbosity-option-description">{{t 'admin.routineServerLogsDescription'}}</span>
                                </span>
                            </label>
                            <label class="admin-verbosity-option" for="verbosityRadio1">
                                <span class="admin-verbosity-option-control">
                                    <input class="form-check-input serverVerbosityRadio" type="radio" name="serverVerbosityRadio" id="verbosityRadio1" data-verbosity="1" checked="{{serverVerbosityChecked '1'}}" disabled="{{serverVerbosityDisabled}}">
                                </span>
                                <span class="admin-verbosity-option-copy">
                                    <span class="admin-verbosity-option-title">{{t 'admin.timingInstrumentation'}}</span>
                                    <span class="admin-verbosity-option-description">{{t 'admin.timingInstrumentationDescription'}}</span>
                                </span>
                            </label>
                            <label class="admin-verbosity-option" for="verbosityRadio2">
                                <span class="admin-verbosity-option-control">
                                    <input class="form-check-input serverVerbosityRadio" type="radio" name="serverVerbosityRadio" id="verbosityRadio2" data-verbosity="2" checked="{{serverVerbosityChecked '2'}}" disabled="{{serverVerbosityDisabled}}">
                                </span>
                                <span class="admin-verbosity-option-copy">
                                    <span class="admin-verbosity-option-title">{{t 'admin.serverLogsAndTiming'}}</span>
                                    <span class="admin-verbosity-option-description">{{t 'admin.serverLogsAndTimingDescription'}}</span>
                                </span>
                            </label>
                        </div>
                    </fieldset>
                    {{#if serverVerbosityMessage}}
                    <div class="admin-inline-feedback admin-form-row-top">{{> adminStatus variant=serverVerbosityMessage.level text=serverVerbosityMessage.text urgent=(equals serverVerbosityMessage.level "error")}}</div>
                    {{/if}}
                </div>
            </div>
        </div>
        {{/if}}

        <!-- Client Verbosity Level Section -->
        <div class="admin-section">
            <div class="card admin-card admin-verbosity-card">
                <div class="card-body">
                    <div class="admin-section-heading admin-verbosity-heading">
                        <div>
                            <div class="admin-section-heading">
                                <i class="fa fa-desktop admin-section-icon"></i>
                                <h5>{{t 'admin.browserConsoleLogging'}}</h5>
                            </div>
                            <p class="admin-verbosity-intro">{{t 'admin.browserConsoleLoggingDescription'}}</p>
                        </div>
                    </div>
                    <fieldset class="admin-verbosity-fieldset">
                        <legend class="sr-only">{{t 'admin.browserConsoleLogging'}}</legend>
                        <div class="admin-verbosity-options">
                            <label class="admin-verbosity-option" for="clientVerbosityRadio0">
                                <span class="admin-verbosity-option-control">
                                    <input class="form-check-input clientVerbosityRadio" type="radio" name="clientVerbosityRadio" id="clientVerbosityRadio0" data-verbosity="0" checked="{{clientVerbosityChecked '0'}}" disabled="{{clientVerbosityDisabled}}">
                                </span>
                                <span class="admin-verbosity-option-copy">
                                    <span class="admin-verbosity-option-title">{{t 'admin.off'}}</span>
                                    <span class="admin-verbosity-option-description">{{t 'admin.clientOffDescription'}}</span>
                                </span>
                            </label>
                            <label class="admin-verbosity-option" for="clientVerbosityRadio1">
                                <span class="admin-verbosity-option-control">
                                    <input class="form-check-input clientVerbosityRadio" type="radio" name="clientVerbosityRadio" id="clientVerbosityRadio1" data-verbosity="1" checked="{{clientVerbosityChecked '1'}}" disabled="{{clientVerbosityDisabled}}">
                                </span>
                                <span class="admin-verbosity-option-copy">
                                    <span class="admin-verbosity-option-title">{{t 'admin.importantDiagnostics'}}</span>
                                    <span class="admin-verbosity-option-description">{{t 'admin.importantDiagnosticsDescription'}}</span>
                                </span>
                            </label>
                            <label class="admin-verbosity-option" for="clientVerbosityRadio2">
                                <span class="admin-verbosity-option-control">
                                    <input class="form-check-input clientVerbosityRadio" type="radio" name="clientVerbosityRadio" id="clientVerbosityRadio2" data-verbosity="2" checked="{{clientVerbosityChecked '2'}}" disabled="{{clientVerbosityDisabled}}">
                                </span>
                                <span class="admin-verbosity-option-copy">
                                    <span class="admin-verbosity-option-title">{{t 'admin.detailedTrace'}}</span>
                                    <span class="admin-verbosity-option-description">{{t 'admin.detailedTraceDescription'}}</span>
                                </span>
                            </label>
                        </div>
                    </fieldset>
                    {{#if clientVerbosityMessage}}
                    <div class="admin-inline-feedback admin-form-row-top">{{> adminStatus variant=clientVerbosityMessage.level text=clientVerbosityMessage.text urgent=(equals clientVerbosityMessage.level "error")}}</div>
                    {{/if}}
                </div>
            </div>
        </div>
    </div>
</template>
