<!-- User Administration Template -->

<template name="adminControls">
    <div class="container admin-page">
        <h3 class="page-header-title">Admin Control Panel</h3>

        {{#if adminMessage}}
        <div class="alert {{adminMessage.className}} admin-message" role="status" aria-live="polite">
            {{adminMessage.text}}
        </div>
        {{/if}}

        {{#if isInRole 'admin'}}
        <!-- Server Status Section -->
        <div class="admin-section">
            <div class="card admin-card">
                <div class="card-body">
                    <div class="admin-section-heading">
                        <i class="fa fa-server admin-section-icon"></i>
                        <h5>Server Status</h5>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <strong>Server Storage Space:</strong>
                        </div>
                        <div class="col-md-6">
                            {{#if serverStatus.error}}
                            <span class="text-danger">{{serverStatus.error}}</span>
                            {{else}}
                            Used {{serverStatus.diskSpacePercent}}%, Remaining {{serverStatus.remainingSpace}} of {{serverStatus.diskSpace}} GB
                            {{/if}}
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stimulus display cache refresh section -->
        <div class="admin-section">
            <div class="card admin-card admin-maintenance-card">
                <div class="card-body">
                    <div class="admin-maintenance-row">
                        <div class="admin-maintenance-copy">
                            <div class="admin-section-heading admin-section-heading-compact">
                                <i class="fa fa-refresh admin-section-icon"></i>
                                <h5>Stimulus Display Cache</h5>
                            </div>
                            <p class="admin-maintenance-description">
                                Rebuilds the server snapshot that tells lesson screens whether each stimulus set contains text, cloze, audio, image, or video content. Use after direct content repairs or imports if lesson display choices do not match the current content.
                            </p>
                        </div>
                        <div class="admin-maintenance-action">
                            <button type="button" id="updateStimDisplayTypeMap" class="btn btn-primary">
                                <i class="fa fa-refresh"></i> Rebuild Display Cache
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Server Verbosity Level Section -->
        <div class="admin-section">
            <div class="card admin-card admin-verbosity-card">
                <div class="card-body">
                    <div class="admin-section-heading admin-verbosity-heading">
                        <div>
                            <div class="admin-section-heading">
                                <i class="fa fa-cog admin-section-icon"></i>
                                <h5>Server Logging</h5>
                            </div>
                            <p class="admin-verbosity-intro">Controls server-side diagnostic output from MoFaCTS methods and startup/runtime services.</p>
                        </div>
                    </div>
                    <div class="admin-verbosity-options">
                        <label class="admin-verbosity-option" for="verbosityRadio0">
                            <span class="admin-verbosity-option-control">
                                <input class="form-check-input serverVerbosityRadio" type="radio" name="serverVerbosityRadio" id="verbosityRadio0">
                            </span>
                            <span class="admin-verbosity-option-copy">
                                <span class="admin-verbosity-option-title">Routine Server Logs</span>
                                <span class="admin-verbosity-option-description">Shows normal serverConsole messages. Use for general operational debugging.</span>
                            </span>
                        </label>
                        <label class="admin-verbosity-option" for="verbosityRadio1">
                            <span class="admin-verbosity-option-control">
                                <input class="form-check-input serverVerbosityRadio" type="radio" name="serverVerbosityRadio" id="verbosityRadio1">
                            </span>
                            <span class="admin-verbosity-option-copy">
                                <span class="admin-verbosity-option-title">Timing Instrumentation</span>
                                <span class="admin-verbosity-option-description">Suppresses routine server logs and leaves timing-focused diagnostics for performance checks.</span>
                            </span>
                        </label>
                        <label class="admin-verbosity-option" for="verbosityRadio2">
                            <span class="admin-verbosity-option-control">
                                <input class="form-check-input serverVerbosityRadio" type="radio" name="serverVerbosityRadio" id="verbosityRadio2">
                            </span>
                            <span class="admin-verbosity-option-copy">
                                <span class="admin-verbosity-option-title">Server Logs and Timing</span>
                                <span class="admin-verbosity-option-description">Most detailed server mode: combines routine diagnostics with timing instrumentation.</span>
                            </span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
        {{/if}}

        <!-- Client Verbosity Level Section -->
        <div class="admin-section">
            <div class="card admin-card admin-verbosity-card">
                <div class="card-body">
                    <div class="admin-section-heading admin-verbosity-heading">
                        <div>
                            <div class="admin-section-heading">
                                <i class="fa fa-desktop admin-section-icon"></i>
                                <h5>Browser Console Logging</h5>
                            </div>
                            <p class="admin-verbosity-intro">Controls MoFaCTS clientConsole output in learner/admin browsers after the setting is loaded.</p>
                        </div>
                    </div>
                    <div class="admin-verbosity-options">
                        <label class="admin-verbosity-option" for="clientVerbosityRadio0">
                            <span class="admin-verbosity-option-control">
                                <input class="form-check-input clientVerbosityRadio" type="radio" name="clientVerbosityRadio" id="clientVerbosityRadio0">
                            </span>
                            <span class="admin-verbosity-option-copy">
                                <span class="admin-verbosity-option-title">Off</span>
                                <span class="admin-verbosity-option-description">No clientConsole output. Best default for normal use and learner sessions.</span>
                            </span>
                        </label>
                        <label class="admin-verbosity-option" for="clientVerbosityRadio1">
                            <span class="admin-verbosity-option-control">
                                <input class="form-check-input clientVerbosityRadio" type="radio" name="clientVerbosityRadio" id="clientVerbosityRadio1">
                            </span>
                            <span class="admin-verbosity-option-copy">
                                <span class="admin-verbosity-option-title">Important Diagnostics</span>
                                <span class="admin-verbosity-option-description">Shows level-1 client messages such as errors, blocked states, and major runtime decisions.</span>
                            </span>
                        </label>
                        <label class="admin-verbosity-option" for="clientVerbosityRadio2">
                            <span class="admin-verbosity-option-control">
                                <input class="form-check-input clientVerbosityRadio" type="radio" name="clientVerbosityRadio" id="clientVerbosityRadio2">
                            </span>
                            <span class="admin-verbosity-option-copy">
                                <span class="admin-verbosity-option-title">Detailed Trace</span>
                                <span class="admin-verbosity-option-description">Includes level-1 messages plus level-2 flow traces for deeper debugging.</span>
                            </span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
