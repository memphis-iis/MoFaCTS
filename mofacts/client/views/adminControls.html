<!-- User Administration Template -->

<template name="adminControls">
    <div class="container" style="margin-top: 1rem;">
        <h3 class="page-header-title">Admin Control Panel</h3>

        {{#if adminMessage}}
        <div class="alert {{adminMessage.className}} mb-3" role="status" aria-live="polite">
            {{adminMessage.text}}
        </div>
        {{/if}}

        {{#if isInRole 'admin'}}
        <!-- Server Status Section -->
        <div class="admin-section">
            <div class="card mb-4">
                <div class="card-body">
                    <div class="d-flex align-items-center mb-3">
                        <i class="fa fa-server me-2" style="font-size: 1.25rem; color: var(--accent-color);"></i>
                        <h5 class="m-0">Server Status</h5>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <strong>Server Storage Space:</strong>
                        </div>
                        <div class="col-md-6">
                            {{#if serverStatus.error}}
                            <span class="text-danger">{{serverStatus.error}}</span>
                            {{else}}
                            Used {{serverStatus.diskSpacePercent}}%, Remaining {{serverStatus.remainingSpace}} of {{serverStatus.diskSpace}} GB
                            {{/if}}
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stimulus display cache refresh section -->
        <div class="admin-section">
            <div class="card mb-4">
                <div class="card-body">
                    <div class="d-flex align-items-center mb-3">
                        <i class="fa fa-refresh me-2" style="font-size: 1.25rem; color: var(--accent-color);"></i>
                        <h5 class="m-0">Stimulus Display Cache</h5>
                    </div>
                    <div class="text-center">
                        <button type="button" id="updateStimDisplayTypeMap" class="btn btn-primary">
                            <i class="fa fa-refresh"></i> Refresh Cache
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Server Verbosity Level Section -->
        <div class="admin-section">
            <div class="card mb-4">
                <div class="card-body">
                    <div class="d-flex align-items-center mb-3">
                        <i class="fa fa-cog me-2" style="font-size: 1.25rem; color: var(--accent-color);"></i>
                        <h5 class="m-0">Server Verbosity Level</h5>
                    </div>
                    <div class="row g-3">
                        <div class="col-12">
                            <div class="form-check">
                                <input class="form-check-input serverVerbosityRadio" type="radio" name="serverVerbosityRadio" id="verbosityRadio0">
                                <label class="form-check-label" for="verbosityRadio0">
                                    Server Logs Only
                                </label>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="form-check">
                                <input class="form-check-input serverVerbosityRadio" type="radio" name="serverVerbosityRadio" id="verbosityRadio1">
                                <label class="form-check-label" for="verbosityRadio1">
                                    Function Times Only
                                </label>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="form-check">
                                <input class="form-check-input serverVerbosityRadio" type="radio" name="serverVerbosityRadio" id="verbosityRadio2">
                                <label class="form-check-label" for="verbosityRadio2">
                                    Server Logs and Function Times
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        {{/if}}

        <!-- Client Verbosity Level Section -->
        <div class="admin-section">
            <div class="card mb-4">
                <div class="card-body">
                    <div class="d-flex align-items-center mb-3">
                        <i class="fa fa-desktop me-2" style="font-size: 1.25rem; color: var(--accent-color);"></i>
                        <h5 class="m-0">Client Verbosity Level</h5>
                    </div>
                    <div class="row g-3">
                        <div class="col-12">
                            <div class="form-check">
                                <input class="form-check-input clientVerbosityRadio" type="radio" name="clientVerbosityRadio" id="clientVerbosityRadio0">
                                <label class="form-check-label" for="clientVerbosityRadio0">
                                    No Logging (fastest)
                                </label>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="form-check">
                                <input class="form-check-input clientVerbosityRadio" type="radio" name="clientVerbosityRadio" id="clientVerbosityRadio1">
                                <label class="form-check-label" for="clientVerbosityRadio1">
                                    Function Calls Only (slower)
                                </label>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="form-check">
                                <input class="form-check-input clientVerbosityRadio" type="radio" name="clientVerbosityRadio" id="clientVerbosityRadio2">
                                <label class="form-check-label" for="clientVerbosityRadio2">
                                    Full Logging (slowest)
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
