<!-- User Administration Template -->

<template name="userAdmin">
{{#if isInRole 'admin,teacher'}}
    <div class="container" style="margin-top: 1rem;">
        <h3 style="margin-top: 0; text-align: center;">User Admin</h3>

        <!-- User List Section -->
        <div class="admin-section">
            <div class="card mb-4">
                <div class="card-body">
                    <div class="d-flex align-items-center mb-3">
                        <i class="fa fa-users me-2" style="font-size: 1.25rem; color: var(--accent-color);"></i>
                        <h5 class="m-0">User List</h5>
                    </div>
                    <div class="mb-3">
                        <label for="filter" class="form-label">Filter users</label>
                        <input type="text" name="filter" id="filter" class="form-control" value="{{currentFilter}}" placeholder="Filter by email">
                    </div>

                    {{#if isLoading}}
                    <div class="text-center py-4">
                        <i class="fa fa-spinner fa-spin fa-2x"></i>
                        <p class="mt-2 text-muted">Loading users...</p>
                    </div>
                    {{else}}
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <small class="text-muted">Showing {{showingRange}} users</small>
                        <div class="btn-group" role="group">
                            <button type="button" id="prevPage" class="btn btn-sm btn-outline-secondary" {{prevPageAttrs}}>
                                <i class="fa fa-chevron-left"></i> Prev
                            </button>
                            <span class="btn btn-sm btn-outline-secondary disabled">Page {{currentPage}} of {{totalPages}}</span>
                            <button type="button" id="nextPage" class="btn btn-sm btn-outline-secondary" {{nextPageAttrs}}>
                                Next <i class="fa fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                    <div class="admin-table-wrapper">
                        <div class="table-responsive">
                            <table class="table table-striped table-bordered">
                                <thead>
                                    <tr>
                                        <th class="table-col-medium">Email / ID</th>
                                        <th class="table-col-large">Roles</th>
                                        {{#if canManageUsers}}
                                        <th class="table-col-medium">Actions</th>
                                        {{/if}}
                                    </tr>
                                </thead>
                                <tbody>
                                {{#each userRoleEditList}}
                                <tr>
                                    <td>{{displayIdentifier}}</td>

                                    <td>
                                        <div class="btn-group btn-group-sm" role="group" aria-label="Role toggles">
                                            <button
                                                type="button"
                                                class="btn btn-sm {{#if admin}}btn-success{{else}}btn-outline-secondary{{/if}} btn-user-change"
                                                data-userid="{{_id}}"
                                                data-rolename="admin"
                                                data-roleaction="{{#if admin}}remove{{else}}add{{/if}}"
                                            >
                                                <i class="fa {{#if admin}}fa-check{{else}}fa-minus{{/if}}"></i>
                                                Admin
                                            </button>
                                            <button
                                                type="button"
                                                class="btn btn-sm {{#if teacher}}btn-success{{else}}btn-outline-secondary{{/if}} btn-user-change"
                                                data-userid="{{_id}}"
                                                data-rolename="teacher"
                                                data-roleaction="{{#if teacher}}remove{{else}}add{{/if}}"
                                            >
                                                <i class="fa {{#if teacher}}fa-check{{else}}fa-minus{{/if}}"></i>
                                                Teacher
                                            </button>
                                        </div>
                                    </td>
                                    {{#if canManageUsers}}
                                    <td>
                                        <button
                                            type="button"
                                            class="btn btn-sm btn-outline-danger btn-user-delete"
                                            data-userid="{{_id}}"
                                            data-displayidentifier="{{displayIdentifier}}"
                                        >
                                            <i class="fa fa-trash"></i>
                                            Delete
                                        </button>
                                    </td>
                                    {{/if}}
                                </tr>
                                {{/each}}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    {{/if}}
                </div>
            </div>
        </div>

        <!-- Import User File Section -->
        <div class="admin-section">
            <div class="card mb-4">
                <div class="card-body">
                    <div class="d-flex align-items-center mb-3">
                        <i class="fa fa-upload me-2" style="font-size: 1.25rem; color: var(--accent-color);"></i>
                        <h5 class="m-0">Import User File</h5>
                    </div>
                    <p class="text-muted small mb-3">CSV format: header row, then email in column 1 and password in column 2. Passwords must be at least 8 characters.</p>
                    <div class="row g-3">
                        <div class="col-12">
                            <input type="file" class="form-control" name="upload-users" id="upload-users" value="" placeholder="Users File">
                            <span class='label label-info file-info mt-2 d-block text-muted small' id="users-file-info"></span>
                        </div>
                        <div class="col-md-6 text-center">
                            <button type='button' id='doUploadUsers' class='btn btn-primary'>
                                <i class="fa fa-users"></i> Batch Import Users
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
{{else}}
    <div class="container" style="margin-top: 1rem;">
        <h3 style="margin-top: 0; text-align: center;">User Admin</h3>
        <div class="alert alert-warning mt-4" role="alert">
            <i class="fa fa-exclamation-triangle"></i>
            <strong>Access Denied:</strong> You do not have permission to access this function.
        </div>
    </div>
{{/if}}
</template>
