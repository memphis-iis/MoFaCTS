<!-- User Administration Template -->

<template name="userAdmin">
{{#if isInRole 'admin'}}
    <div>
        <div class="admin-section">
            <div class="card admin-card">
                <div class="card-body">
                    <div class="admin-section-heading">
                        <i class="fa fa-key admin-section-icon"></i>
                        <h5>{{userAdminText 'admin.apiKeyAlternatives'}}</h5>
                    </div>
                    <div class="admin-api-key-grid">
                        <div class="admin-api-key-group">
                            <div class="admin-api-key-fields">
                                <div>
                                    <label for="adminOpenRouterKey" class="form-label">{{userAdminText 'profile.openRouterApiKey'}}</label>
                                    <input id="adminOpenRouterKey" type="password" class="form-control" autocomplete="new-password" placeholder="{{openRouterKeyPlaceholder}}" aria-describedby="adminOpenRouterKeyStatus">
                                    <small id="adminOpenRouterKeyStatus" class="text-muted d-block admin-form-row-top">{{openRouterKeyStatus}}</small>
                                </div>
                                <div>
                                    <label for="adminOpenRouterModel" class="form-label">{{userAdminText 'profile.openRouterModel'}}</label>
                                    <select id="adminOpenRouterModel" class="form-control" value="{{adminOpenRouterModel}}" aria-describedby="{{adminOpenRouterModelDescribedBy}}" {{adminOpenRouterModelSelectAttrs}}>
                                        {{#each adminOpenRouterModelOptions}}
                                        <option value="{{value}}" {{selectedAttrs}}>{{label}}</option>
                                        {{/each}}
                                    </select>
                                    <small id="adminOpenRouterModelStatus" class="text-muted d-block admin-form-row-top">{{openRouterModelStatus}}</small>
                                </div>
                                {{#if showAdminOpenRouterReasoningLevel}}
                                <div>
                                    <label for="adminOpenRouterReasoningLevel" class="form-label">{{userAdminText 'profile.openRouterReasoningLevel'}}</label>
                                    <select id="adminOpenRouterReasoningLevel" class="form-control" value="{{adminOpenRouterReasoningLevel}}" aria-describedby="adminOpenRouterReasoningLevelHelp" {{adminOpenRouterReasoningSelectAttrs}}>
                                        {{#each adminOpenRouterReasoningLevelOptions}}
                                        <option value="{{value}}" {{selectedAttrs}}>{{label}}</option>
                                        {{/each}}
                                    </select>
                                    <small id="adminOpenRouterReasoningLevelHelp" class="text-muted d-block admin-form-row-top">{{userAdminText 'profile.openRouterReasoningLevelHelp'}}</small>
                                </div>
                                {{/if}}
                            </div>
                            {{#if openRouterModelCatalogMessage}}
                            <div id="adminOpenRouterCatalogStatus" class="admin-status admin-status-{{openRouterModelCatalogAlertClass}} admin-status-small admin-form-row-sm" role="status" aria-live="polite">
                                <i class="fa {{openRouterModelCatalogIcon}}" aria-hidden="true"></i>
                                <div class="admin-status-text">{{openRouterModelCatalogMessage}}</div>
                            </div>
                            {{/if}}
                            <div class="admin-api-key-actions">
                                <button type="button" id="saveAdminOpenRouterAlternative" class="btn btn-sm btn-primary" {{apiKeyActionAttrs 'openrouter'}}>
                                    <i class="fa fa-save"></i> {{userAdminText 'admin.saveOpenRouter'}}
                                </button>
                                <button type="button" class="btn btn-sm btn-outline-danger btn-admin-api-key-delete" data-provider="openrouter" {{apiKeyActionAttrs 'openrouter'}}>
                                    <i class="fa fa-trash"></i> {{userAdminText 'admin.deleteKey'}}
                                </button>
                            </div>
                            {{#with (providerApiKeyFeedback 'openrouter')}}
                            <div class="admin-inline-feedback admin-form-row-sm">
                                {{> adminStatus variant=variant text=text urgent=(equals variant "error")}}
                            </div>
                            {{/with}}
                        </div>
                        <div class="admin-api-key-group">
                            <div class="admin-api-key-fields">
                                <div>
                                    <label for="adminGoogleTtsKey" class="form-label">{{userAdminText 'admin.googleTtsKey'}}</label>
                                    <input id="adminGoogleTtsKey" type="password" class="form-control" autocomplete="new-password" placeholder="{{googleTtsKeyPlaceholder}}" aria-describedby="adminGoogleTtsKeyStatus">
                                    <small id="adminGoogleTtsKeyStatus" class="text-muted d-block admin-form-row-top">{{googleTtsKeyStatus}}</small>
                                </div>
                            </div>
                            <div class="admin-api-key-actions">
                                <button type="button" class="btn btn-sm btn-primary btn-admin-api-key-save" data-provider="googleTts" data-input="#adminGoogleTtsKey" {{apiKeyActionAttrs 'googleTts'}}>
                                    <i class="fa fa-save"></i> {{userAdminText 'admin.saveTts'}}
                                </button>
                                <button type="button" class="btn btn-sm btn-outline-danger btn-admin-api-key-delete" data-provider="googleTts" {{apiKeyActionAttrs 'googleTts'}}>
                                    <i class="fa fa-trash"></i> {{userAdminText 'admin.deleteTts'}}
                                </button>
                            </div>
                            {{#with (providerApiKeyFeedback 'googleTts')}}
                            <div class="admin-inline-feedback admin-form-row-sm">
                                {{> adminStatus variant=variant text=text urgent=(equals variant "error")}}
                            </div>
                            {{/with}}
                        </div>
                        <div class="admin-api-key-group">
                            <div class="admin-api-key-fields">
                                <div>
                                    <label for="adminGoogleSpeechKey" class="form-label">{{userAdminText 'admin.googleSrKey'}}</label>
                                    <input id="adminGoogleSpeechKey" type="password" class="form-control" autocomplete="new-password" placeholder="{{googleSpeechKeyPlaceholder}}" aria-describedby="adminGoogleSpeechKeyStatus">
                                    <small id="adminGoogleSpeechKeyStatus" class="text-muted d-block admin-form-row-top">{{googleSpeechKeyStatus}}</small>
                                </div>
                            </div>
                            <div class="admin-api-key-actions">
                                <button type="button" class="btn btn-sm btn-primary btn-admin-api-key-save" data-provider="googleSpeech" data-input="#adminGoogleSpeechKey" {{apiKeyActionAttrs 'googleSpeech'}}>
                                    <i class="fa fa-save"></i> {{userAdminText 'admin.saveSr'}}
                                </button>
                                <button type="button" class="btn btn-sm btn-outline-danger btn-admin-api-key-delete" data-provider="googleSpeech" {{apiKeyActionAttrs 'googleSpeech'}}>
                                    <i class="fa fa-trash"></i> {{userAdminText 'admin.deleteSr'}}
                                </button>
                            </div>
                            {{#with (providerApiKeyFeedback 'googleSpeech')}}
                            <div class="admin-inline-feedback admin-form-row-sm">
                                {{> adminStatus variant=variant text=text urgent=(equals variant "error")}}
                            </div>
                            {{/with}}
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- User List Section -->
        <div class="admin-section">
            <div class="card admin-card">
                <div class="card-body">
                    <div class="admin-section-heading">
                        <i class="fa fa-users admin-section-icon"></i>
                        <h5>{{userAdminText 'admin.userList'}}</h5>
                    </div>
                    <div class="admin-form-row">
                        <label for="filter" class="form-label">{{userAdminText 'admin.filterUsers'}}</label>
                        <input type="text" name="filter" id="filter" class="form-control" value="{{currentFilter}}" placeholder="{{userAdminText 'admin.filterByEmail'}}">
                    </div>

                    <div aria-busy="{{#if isLoading}}true{{else}}false{{/if}}" inert="{{#if isLoading}}inert{{/if}}">
                    <div class="d-flex justify-content-between align-items-center admin-form-row">
                        <div>
                            <small class="text-muted d-block">{{showingUsersText}}</small>
                            <small class="text-muted d-block">{{usageAggregateSummary}}</small>
                        </div>
                        <div class="btn-group" role="group">
                            <button type="button" id="composeNewsEmail" class="btn btn-sm btn-outline-primary" {{newsEmailAttrs}}>
                                <i class="fa {{#if isPreparingNewsEmail}}fa-spinner fa-spin{{else}}fa-envelope{{/if}}"></i>
                                {{userAdminText 'admin.composeNewsEmail'}}
                            </button>
                            <button type="button" id="refreshUsageCaches" class="btn btn-sm btn-outline-primary" {{refreshUsageAttrs}}>
                                <i class="fa {{#if isRefreshingUsage}}fa-spinner fa-spin{{else}}fa-refresh{{/if}}"></i>
                                {{userAdminText 'admin.refreshUsage'}}
                            </button>
                            <button type="button" id="prevPage" class="btn btn-sm btn-outline-secondary" {{prevPageAttrs}}>
                                <i class="fa fa-chevron-left"></i> {{userAdminText 'admin.prev'}}
                            </button>
                            <span class="btn btn-sm btn-outline-secondary disabled">{{pageOfText}}</span>
                            <button type="button" id="nextPage" class="btn btn-sm btn-outline-secondary" {{nextPageAttrs}}>
                                {{userAdminText 'admin.next'}} <i class="fa fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                    {{#if usageRefreshMessage}}
                    <div class="admin-status admin-status-{{usageRefreshAlertClass}} admin-status-small admin-form-row-sm" role="status" aria-live="polite">
                        <i class="fa {{usageRefreshIcon}}" aria-hidden="true"></i>
                        <div class="admin-status-text">{{usageRefreshMessage}}</div>
                    </div>
                    {{/if}}
                    {{#if newsEmailMessage}}
                    <div class="admin-status admin-status-{{newsEmailAlertClass}} admin-status-small admin-form-row-sm" role="status" aria-live="polite">
                        <i class="fa {{newsEmailIcon}}" aria-hidden="true"></i>
                        <div class="admin-status-text">{{newsEmailMessage}}</div>
                    </div>
                    {{/if}}
                    {{> adminTableShell label=userAdminTableLabel tableTemplate="userAdminTable" tableData=userAdminTableData}}
                    </div>
                    {{#if userListMessage}}
                    <div class="admin-inline-feedback admin-form-row-sm">
                        {{> adminStatus variant=userListMessageVariant text=userListMessage urgent=userListMessageUrgent}}
                    </div>
                    {{/if}}
                </div>
            </div>
        </div>

        <!-- Import User File Section -->
        <div class="admin-section">
            <div class="card admin-card">
                <div class="card-body">
                    <div class="admin-section-heading">
                        <i class="fa fa-upload admin-section-icon"></i>
                        <h5>{{userAdminText 'admin.importUserFile'}}</h5>
                    </div>
                    <p class="text-muted small admin-form-row">{{userAdminText 'admin.importUserFileDescription'}}</p>
                    {{#if importMessage}}
                    <div class="admin-inline-feedback admin-form-row-sm">
                        {{> adminStatus variant=importMessageVariant text=importMessage urgent=importMessageUrgent}}
                    </div>
                    {{/if}}
                    <div class="row g-3">
                        <div class="col-12">
                            <label for="upload-users" class="form-label">{{userAdminText 'admin.usersFile'}}</label>
                            <input type="file" class="form-control" name="upload-users" id="upload-users" value="" aria-describedby="users-file-info">
                            <span class='label label-info file-info admin-form-row-top d-block text-muted small' id="users-file-info" role="status" aria-live="polite"></span>
                        </div>
                        <div class="col-md-6 text-center">
                            <button type='button' id='doUploadUsers' class='btn btn-primary'>
                                <i class="fa fa-users"></i> {{userAdminText 'admin.batchImportUsers'}}
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
{{else}}
    <div>
        <div class="admin-status admin-status-warning admin-denied-alert" role="alert">
            <i class="fa fa-exclamation-triangle" aria-hidden="true"></i>
            <div class="admin-status-text"><strong>{{userAdminText 'admin.accessDenied'}}</strong> {{userAdminText 'admin.accessDeniedMessage'}}</div>
        </div>
    </div>
{{/if}}
</template>

<template name="userAdminTable">
    <table class="table table-striped table-bordered user-admin-table" aria-busy="{{#if isLoading}}true{{else}}false{{/if}}">
        <thead>
            <tr>
                {{> userAdminSortableHeader field="identifier" label=(userAdminText 'admin.emailId') sortField=sortField sortDirection=sortDirection}}
                {{> userAdminSortableHeader field="totalTrials" label=(userAdminText 'admin.totalTrials') sortField=sortField sortDirection=sortDirection}}
                {{> userAdminSortableHeader field="weightedAccuracy" label=(userAdminText 'admin.accuracy') sortField=sortField sortDirection=sortDirection}}
                {{> userAdminSortableHeader field="totalTimeMinutes" label=(userAdminText 'admin.totalTime') sortField=sortField sortDirection=sortDirection}}
                {{> userAdminSortableHeader field="averageSessionDays" label=(userAdminText 'admin.avgSessionDays') sortField=sortField sortDirection=sortDirection}}
                {{> userAdminSortableHeader field="averageItemsPracticed" label=(userAdminText 'admin.avgItems') sortField=sortField sortDirection=sortDirection}}
                {{> userAdminSortableHeader field="lastActivityDate" label=(userAdminText 'admin.lastActivity') sortField=sortField sortDirection=sortDirection}}
                {{> userAdminSortableHeader field="cacheUpdated" label=(userAdminText 'admin.cacheUpdated') sortField=sortField sortDirection=sortDirection}}
                <th scope="col" class="table-col-large"><span class="user-admin-header-label">{{userAdminText 'admin.roles'}}</span></th>
                {{#if canManageUsers}}
                <th scope="col" class="table-col-medium"><span class="user-admin-header-label">{{userAdminText 'admin.actions'}}</span></th>
                {{/if}}
            </tr>
        </thead>
        <tbody>
        {{#if isLoading}}
            <tr>
                <td colspan="{{userAdminTableColumnCount canManageUsers}}" class="text-center text-muted admin-table-status-cell">{{userAdminText 'common.loading'}}</td>
            </tr>
        {{else}}
            {{#each rows}}
            <tr>
                <th scope="row">{{displayIdentifier}}</th>
                <td class="{{usageCellClass}}">{{totalTrialsDisplay}}</td>
                <td class="{{usageCellClass}}">{{accuracyDisplay}}</td>
                <td class="{{usageCellClass}}">{{totalTimeDisplay}}</td>
                <td class="{{usageCellClass}}">{{averageSessionDaysDisplay}}</td>
                <td class="{{usageCellClass}}">{{averageItemsPracticedDisplay}}</td>
                <td class="{{usageCellClass}}">{{lastActivityDisplay}}</td>
                <td class="{{usageCellClass}}">{{cacheUpdatedDisplay}}</td>
                <td>
                    <div class="btn-group" role="group" aria-label="{{roleTogglesLabel this}}">
                        <button
                            type="button"
                            class="btn btn-sm {{#if admin}}btn-success{{else}}btn-outline-secondary{{/if}} btn-user-change"
                            data-userid="{{_id}}"
                            data-rolename="admin"
                            data-roleaction="{{#if admin}}remove{{else}}add{{/if}}"
                            aria-label="{{roleToggleLabel 'admin.adminRole' this}}"
                            {{roleActionAttrs _id}}
                        >
                            <i class="fa {{#if admin}}fa-check{{else}}fa-minus{{/if}}" aria-hidden="true"></i>
                            {{userAdminText 'admin.adminRole'}}
                        </button>
                        <button
                            type="button"
                            class="btn btn-sm {{#if teacher}}btn-success{{else}}btn-outline-secondary{{/if}} btn-user-change"
                            data-userid="{{_id}}"
                            data-rolename="teacher"
                            data-roleaction="{{#if teacher}}remove{{else}}add{{/if}}"
                            aria-label="{{roleToggleLabel 'admin.teacherRole' this}}"
                            {{roleActionAttrs _id}}
                        >
                            <i class="fa {{#if teacher}}fa-check{{else}}fa-minus{{/if}}" aria-hidden="true"></i>
                            {{userAdminText 'admin.teacherRole'}}
                        </button>
                    </div>
                </td>
                {{#if ../canManageUsers}}
                <td>
                    <button
                        type="button"
                        class="btn btn-sm btn-outline-danger btn-user-delete"
                        data-userid="{{_id}}"
                        data-displayidentifier="{{displayIdentifier}}"
                        aria-label="{{deleteUserActionLabel this}}"
                        {{deleteActionAttrs _id}}
                    >
                        <i class="fa fa-trash" aria-hidden="true"></i>
                        {{userAdminText 'admin.delete'}}
                    </button>
                </td>
                {{/if}}
            </tr>
            {{#if hasUserRowFeedback _id}}
            <tr class="admin-feedback-row">
                <td colspan="{{userAdminTableColumnCount ../canManageUsers}}">
                    <div class="admin-table-feedback">
                        {{#if deleteUserConfirmationOpen _id}}
                        {{> adminInlineConfirmation confirmation=(deleteUserConfirmationView _id)}}
                        {{/if}}
                        {{#with roleCommandFeedback _id}}
                            {{> adminStatus id=id variant=variant text=text urgent=urgent}}
                        {{/with}}
                        {{#with deleteCommandFeedback _id}}
                            {{> adminStatus id=id variant=variant text=text urgent=urgent}}
                        {{/with}}
                    </div>
                </td>
            </tr>
            {{/if}}
            {{else}}
            <tr>
                <td colspan="{{userAdminTableColumnCount canManageUsers}}" class="text-center text-muted admin-table-status-cell">{{userAdminText 'reporting.noDataAvailable'}}</td>
            </tr>
            {{/each}}
        {{/if}}
        </tbody>
    </table>
</template>

<template name="userAdminSortableHeader">
    <th scope="col" class="table-col-medium" aria-sort="{{sortAria field}}">
        <button type="button" class="btn btn-link btn-sm user-admin-sort-button" data-sortfield="{{field}}">
            <span class="user-admin-header-label">{{label}}</span>
            <span aria-hidden="true">{{sortIndicator field}}</span>
        </button>
    </th>
</template>
