<!-- User Administration Template -->

<template name="userAdmin">
{{#if isInRole 'admin'}}
    <div class="container admin-page">
        <h3 class="page-header-title">User Admin</h3>

        <div class="admin-section">
            <div class="card admin-card">
                <div class="card-body">
                    <div class="admin-section-heading">
                        <i class="fa fa-key admin-section-icon"></i>
                        <h5>API Key Alternatives</h5>
                    </div>
                    {{#if apiKeyMessage}}
                    <div class="alert {{apiKeyAlertClass}} admin-alert-compact" role="alert">
                        {{apiKeyMessage}}
                    </div>
                    {{/if}}
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label for="adminOpenRouterKey" class="form-label">OpenRouter API Key</label>
                            <input id="adminOpenRouterKey" type="password" class="form-control" autocomplete="new-password" placeholder="{{openRouterKeyPlaceholder}}">
                            <small class="text-muted d-block admin-form-row-top">{{openRouterKeyStatus}}</small>
                        </div>
                        <div class="col-md-4">
                            <label for="adminOpenRouterModel" class="form-label">OpenRouter Model</label>
                            <input id="adminOpenRouterModel" type="text" class="form-control" maxlength="160" value="{{adminOpenRouterModel}}" placeholder="openai/gpt-4.1-mini">
                            <small class="text-muted d-block admin-form-row-top">{{openRouterModelStatus}}</small>
                        </div>
                        <div class="col-md-4 d-flex align-items-end">
                            <div class="btn-group" role="group">
                                <button type="button" id="saveAdminOpenRouterAlternative" class="btn btn-sm btn-primary" {{apiKeyActionAttrs}}>
                                    <i class="fa fa-save"></i> Save OpenRouter
                                </button>
                                <button type="button" class="btn btn-sm btn-outline-danger btn-admin-api-key-delete" data-provider="openrouter" {{apiKeyActionAttrs}}>
                                    <i class="fa fa-trash"></i> Delete Key
                                </button>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label for="adminGoogleTtsKey" class="form-label">Google TTS Key</label>
                            <input id="adminGoogleTtsKey" type="password" class="form-control" autocomplete="new-password" placeholder="{{googleTtsKeyPlaceholder}}">
                            <small class="text-muted d-block admin-form-row-top">{{googleTtsKeyStatus}}</small>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="button" class="btn btn-sm btn-primary btn-admin-api-key-save" data-provider="googleTts" data-input="#adminGoogleTtsKey" {{apiKeyActionAttrs}}>
                                <i class="fa fa-save"></i> Save TTS
                            </button>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="button" class="btn btn-sm btn-outline-danger btn-admin-api-key-delete" data-provider="googleTts" {{apiKeyActionAttrs}}>
                                <i class="fa fa-trash"></i> Delete TTS
                            </button>
                        </div>
                        <div class="col-md-4">
                            <label for="adminGoogleSpeechKey" class="form-label">Google SR Key</label>
                            <input id="adminGoogleSpeechKey" type="password" class="form-control" autocomplete="new-password" placeholder="{{googleSpeechKeyPlaceholder}}">
                            <small class="text-muted d-block admin-form-row-top">{{googleSpeechKeyStatus}}</small>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="button" class="btn btn-sm btn-primary btn-admin-api-key-save" data-provider="googleSpeech" data-input="#adminGoogleSpeechKey" {{apiKeyActionAttrs}}>
                                <i class="fa fa-save"></i> Save SR
                            </button>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="button" class="btn btn-sm btn-outline-danger btn-admin-api-key-delete" data-provider="googleSpeech" {{apiKeyActionAttrs}}>
                                <i class="fa fa-trash"></i> Delete SR
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- User List Section -->
        <div class="admin-section">
            <div class="card admin-card">
                <div class="card-body">
                    <div class="admin-section-heading">
                        <i class="fa fa-users admin-section-icon"></i>
                        <h5>User List</h5>
                    </div>
                    <div class="admin-form-row">
                        <label for="filter" class="form-label">Filter users</label>
                        <input type="text" name="filter" id="filter" class="form-control" value="{{currentFilter}}" placeholder="Filter by email">
                    </div>

                    {{#if isLoading}}
                    <div class="text-center admin-empty-state">
                        <i class="fa fa-spinner fa-spin fa-2x"></i>
                        <p class="admin-form-row-top text-muted">Loading users...</p>
                    </div>
                    {{else}}
                    <div class="d-flex justify-content-between align-items-center admin-form-row">
                        <div>
                            <small class="text-muted d-block">Showing {{showingRange}} users</small>
                            <small class="text-muted d-block">{{usageAggregateSummary}}</small>
                        </div>
                        <div class="btn-group" role="group">
                            <button type="button" id="composeNewsEmail" class="btn btn-sm btn-outline-primary" {{newsEmailAttrs}}>
                                <i class="fa {{#if isPreparingNewsEmail}}fa-spinner fa-spin{{else}}fa-envelope{{/if}}"></i>
                                Compose News Email
                            </button>
                            <button type="button" id="refreshUsageCaches" class="btn btn-sm btn-outline-primary" {{refreshUsageAttrs}}>
                                <i class="fa {{#if isRefreshingUsage}}fa-spinner fa-spin{{else}}fa-refresh{{/if}}"></i>
                                Refresh Usage
                            </button>
                            <button type="button" id="prevPage" class="btn btn-sm btn-outline-secondary" {{prevPageAttrs}}>
                                <i class="fa fa-chevron-left"></i> Prev
                            </button>
                            <span class="btn btn-sm btn-outline-secondary disabled">Page {{currentPage}} of {{totalPages}}</span>
                            <button type="button" id="nextPage" class="btn btn-sm btn-outline-secondary" {{nextPageAttrs}}>
                                Next <i class="fa fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                    {{#if usageRefreshMessage}}
                    <div class="alert {{usageRefreshAlertClass}} admin-alert-compact" role="alert">
                        {{usageRefreshMessage}}
                    </div>
                    {{/if}}
                    {{#if newsEmailMessage}}
                    <div class="alert {{newsEmailAlertClass}} admin-alert-compact" role="alert">
                        {{newsEmailMessage}}
                    </div>
                    {{/if}}
                    <div class="admin-table-wrapper">
                        <div class="table-responsive">
                            <table class="table table-striped table-bordered user-admin-table">
                                <thead>
                                    <tr>
                                        <th class="table-col-medium sortable-useradmin" data-sortfield="identifier"><span class="user-admin-header-label">Email / ID {{sortIndicator 'identifier'}}</span></th>
                                        <th class="table-col-medium sortable-useradmin" data-sortfield="totalTrials"><span class="user-admin-header-label">Total Trials {{sortIndicator 'totalTrials'}}</span></th>
                                        <th class="table-col-medium sortable-useradmin" data-sortfield="weightedAccuracy"><span class="user-admin-header-label">Accuracy {{sortIndicator 'weightedAccuracy'}}</span></th>
                                        <th class="table-col-medium sortable-useradmin" data-sortfield="totalTimeMinutes"><span class="user-admin-header-label">Total Time {{sortIndicator 'totalTimeMinutes'}}</span></th>
                                        <th class="table-col-medium sortable-useradmin" data-sortfield="averageSessionDays"><span class="user-admin-header-label">Avg Session Days {{sortIndicator 'averageSessionDays'}}</span></th>
                                        <th class="table-col-medium sortable-useradmin" data-sortfield="averageItemsPracticed"><span class="user-admin-header-label">Avg Items {{sortIndicator 'averageItemsPracticed'}}</span></th>
                                        <th class="table-col-medium sortable-useradmin" data-sortfield="lastActivityDate"><span class="user-admin-header-label">Last Activity {{sortIndicator 'lastActivityDate'}}</span></th>
                                        <th class="table-col-medium sortable-useradmin" data-sortfield="cacheUpdated"><span class="user-admin-header-label">Cache Updated {{sortIndicator 'cacheUpdated'}}</span></th>
                                        <th class="table-col-large"><span class="user-admin-header-label">Roles</span></th>
                                        {{#if canManageUsers}}
                                        <th class="table-col-medium"><span class="user-admin-header-label">Actions</span></th>
                                        {{/if}}
                                    </tr>
                                </thead>
                                <tbody>
                                {{#each userRoleEditList}}
                                <tr>
                                    <td>{{displayIdentifier}}</td>
                                    <td class="{{usageCellClass}}">{{totalTrialsDisplay}}</td>
                                    <td class="{{usageCellClass}}">{{accuracyDisplay}}</td>
                                    <td class="{{usageCellClass}}">{{totalTimeDisplay}}</td>
                                    <td class="{{usageCellClass}}">{{averageSessionDaysDisplay}}</td>
                                    <td class="{{usageCellClass}}">{{averageItemsPracticedDisplay}}</td>
                                    <td class="{{usageCellClass}}">{{lastActivityDisplay}}</td>
                                    <td class="{{usageCellClass}}">{{cacheUpdatedDisplay}}</td>

                                    <td>
                                        <div class="btn-group" role="group" aria-label="Role toggles">
                                            <button
                                                type="button"
                                                class="btn btn-sm {{#if admin}}btn-success{{else}}btn-outline-secondary{{/if}} btn-user-change"
                                                data-userid="{{_id}}"
                                                data-rolename="admin"
                                                data-roleaction="{{#if admin}}remove{{else}}add{{/if}}"
                                            >
                                                <i class="fa {{#if admin}}fa-check{{else}}fa-minus{{/if}}"></i>
                                                Admin
                                            </button>
                                            <button
                                                type="button"
                                                class="btn btn-sm {{#if teacher}}btn-success{{else}}btn-outline-secondary{{/if}} btn-user-change"
                                                data-userid="{{_id}}"
                                                data-rolename="teacher"
                                                data-roleaction="{{#if teacher}}remove{{else}}add{{/if}}"
                                            >
                                                <i class="fa {{#if teacher}}fa-check{{else}}fa-minus{{/if}}"></i>
                                                Teacher
                                            </button>
                                        </div>
                                    </td>
                                    {{#if canManageUsers}}
                                    <td>
                                        <button
                                            type="button"
                                            class="btn btn-sm btn-outline-danger btn-user-delete"
                                            data-userid="{{_id}}"
                                            data-displayidentifier="{{displayIdentifier}}"
                                        >
                                            <i class="fa fa-trash"></i>
                                            Delete
                                        </button>
                                    </td>
                                    {{/if}}
                                </tr>
                                {{/each}}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    {{/if}}
                </div>
            </div>
        </div>

        <!-- Import User File Section -->
        <div class="admin-section">
            <div class="card admin-card">
                <div class="card-body">
                    <div class="admin-section-heading">
                        <i class="fa fa-upload admin-section-icon"></i>
                        <h5>Import User File</h5>
                    </div>
                    <p class="text-muted small admin-form-row">CSV format: header row, then email in column 1 and password in column 2. Passwords must be at least 8 characters.</p>
                    <div class="row g-3">
                        <div class="col-12">
                            <input type="file" class="form-control" name="upload-users" id="upload-users" value="" placeholder="Users File">
                            <span class='label label-info file-info admin-form-row-top d-block text-muted small' id="users-file-info"></span>
                        </div>
                        <div class="col-md-6 text-center">
                            <button type='button' id='doUploadUsers' class='btn btn-primary'>
                                <i class="fa fa-users"></i> Batch Import Users
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
{{else}}
    <div class="container admin-page">
        <h3 class="page-header-title">User Admin</h3>
        <div class="alert alert-warning admin-denied-alert" role="alert">
            <i class="fa fa-exclamation-triangle"></i>
            <strong>Access Denied:</strong> You do not have permission to access this function.
        </div>
    </div>
{{/if}}
</template>
