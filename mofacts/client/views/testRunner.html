<template name="testRunner">
  <div>
    <div class="admin-section">
      <div class="card admin-card">
        <div class="card-body">
          <div class="admin-header-action-row">
            <div>
              <div class="admin-section-heading admin-section-heading-compact">
                <i class="fa fa-check-circle admin-section-icon"></i>
                <h5>{{testText 'adminTests.deploymentReadiness'}}</h5>
              </div>
              <div class="text-muted small">
                {{testText 'adminTests.description'}}
              </div>
            </div>
            {{#if readinessPending}}
              <button type="button" class="btn btn-primary run-deployment-readiness" disabled aria-busy="true">
                <i class="fa fa-spinner fa-spin" aria-hidden="true"></i>
                {{testText 'adminTests.runReadinessChecks'}}
              </button>
            {{else}}
              <button type="button" class="btn btn-primary run-deployment-readiness" aria-busy="false">
                <i class="fa fa-check-circle" aria-hidden="true"></i>
                {{testText 'adminTests.runReadinessChecks'}}
              </button>
            {{/if}}
          </div>

          <div id="deployment-readiness-output" class="admin-output-region" aria-live="polite">
            {{#with readinessOutput}}
              {{> Template.dynamic template=template data=data}}
            {{/with}}
          </div>
        </div>
      </div>
    </div>

    <div class="admin-section">
      <div class="card admin-card">
        <div class="card-body">
          <div class="admin-header-action-row">
            <div>
              <div class="admin-section-heading admin-section-heading-compact">
                <i class="fa fa-plug admin-section-icon" aria-hidden="true"></i>
                <h5>OpenRouter strict-schema preflight</h5>
              </div>
              <div class="text-muted small">
                Makes a real authenticated request and verifies the configured model can honor the current strict JSON contract.
              </div>
            </div>
            {{#if openRouterPreflightPending}}
              <button type="button" class="btn btn-primary run-openrouter-strict-preflight" disabled aria-busy="true">
                <i class="fa fa-spinner fa-spin" aria-hidden="true"></i>
                Testing OpenRouter
              </button>
            {{else}}
              <button type="button" class="btn btn-primary run-openrouter-strict-preflight" aria-busy="false">
                <i class="fa fa-plug" aria-hidden="true"></i>
                Test OpenRouter
              </button>
            {{/if}}
          </div>

          <div id="openrouter-strict-preflight-output" class="admin-output-region" aria-live="polite">
            {{#with openRouterPreflightOutput}}
              {{> Template.dynamic template=template data=data}}
            {{/with}}
          </div>
        </div>
      </div>
    </div>

    <div class="admin-section">
      <div class="card admin-card">
        <div class="card-body">
          <div class="admin-header-action-row">
            <div>
              <div class="admin-section-heading admin-section-heading-compact">
                <i class="fa fa-flask admin-section-icon" aria-hidden="true"></i>
                <h5>AI Content Prompt Lab</h5>
              </div>
              <div class="text-muted small">Edit the complete non-secret OpenRouter request. Requests and results are not retained.</div>
            </div>
            {{#if promptLabPending}}
              <button type="button" class="btn btn-primary run-ai-content-prompt-lab" disabled aria-busy="true">Running...</button>
            {{else}}
              <button type="button" class="btn btn-primary run-ai-content-prompt-lab" aria-busy="false">Run</button>
            {{/if}}
          </div>
          <label for="ai-content-prompt-lab-request" class="form-label">OpenRouter request JSON</label>
          <textarea id="ai-content-prompt-lab-request" class="form-control admin-form-monospace" rows="24" spellcheck="false">{{promptLabRequest}}</textarea>
          {{#if promptLabError}}
            <label for="ai-content-prompt-lab-error" class="form-label admin-form-row-top">Complete error details</label>
            <textarea id="ai-content-prompt-lab-error" class="form-control admin-form-monospace is-invalid" rows="10" readonly>{{promptLabError}}</textarea>
          {{/if}}
          {{#if promptLabResult}}
            <label for="ai-content-prompt-lab-result" class="form-label admin-form-row-top">Raw request, provider response, parsed result, validation, and usage</label>
            <textarea id="ai-content-prompt-lab-result" class="form-control admin-form-monospace" rows="24" readonly>{{promptLabResult}}</textarea>
          {{/if}}
          {{#if promptLabPairs}}
            <label for="ai-content-prompt-lab-pairs" class="form-label admin-form-row-top">Successfully validated pair array</label>
            <textarea id="ai-content-prompt-lab-pairs" class="form-control admin-form-monospace" rows="14" readonly>{{promptLabPairs}}</textarea>
          {{/if}}
        </div>
      </div>
    </div>

    <div class="admin-section">
      <div class="card admin-card">
        <div class="card-body">
          <div class="admin-header-action-row">
            <div>
              <div class="admin-section-heading admin-section-heading-compact">
                <i class="fa fa-wikipedia-w admin-section-icon" aria-hidden="true"></i>
                <h5>Wikimedia Discovery Lab</h5>
              </div>
              <div class="text-muted small">Wikipedia identifies the requested collection members and their associated images during one traversal. Every query, grounded link, selection, and rejection is shown; results are not retained.</div>
            </div>
            {{#if wikimediaLabPending}}
              <button type="button" class="btn btn-primary run-wikimedia-discovery-lab" disabled aria-busy="true">Running...</button>
            {{else}}
              <button type="button" class="btn btn-primary run-wikimedia-discovery-lab" aria-busy="false">Run Discovery</button>
            {{/if}}
          </div>
          <label for="wikimedia-lab-notes" class="form-label">Notes</label>
          <textarea id="wikimedia-lab-notes" class="form-control" rows="3">{{wikimediaLabNotes}}</textarea>
          {{#if wikimediaLabError}}
            <label for="wikimedia-lab-error" class="form-label admin-form-row-top">Discovery error details</label>
            <textarea id="wikimedia-lab-error" class="form-control admin-form-monospace is-invalid" rows="12" readonly>{{wikimediaLabError}}</textarea>
          {{/if}}
          {{#if wikimediaLabResult}}
            <label for="wikimedia-lab-result" class="form-label admin-form-row-top">Traversal result and diagnostics</label>
            <textarea id="wikimedia-lab-result" class="form-control admin-form-monospace" rows="24" readonly>{{wikimediaLabResult}}</textarea>
          {{/if}}
        </div>
      </div>
    </div>

    <div class="admin-section">
      <div class="card admin-card">
        <div class="card-body">
          <div class="admin-header-action-row">
            <div>
              <div class="admin-section-heading admin-section-heading-compact">
                <i class="fa fa-comments admin-section-icon"></i>
                <h5>{{testText 'adminTests.sparcLiveEvaluation'}}</h5>
              </div>
              <div class="text-muted small">
                {{testText 'adminTests.sparcLiveDescription'}}
              </div>
            </div>
            <div class="admin-actions">
              {{#if sparcLiveHasSavedJson}}
                <button type="button" class="btn btn-outline-primary download-sparc-live-evaluation">
                  <i class="fa fa-download" aria-hidden="true"></i>
                  {{testText 'adminTests.downloadSparcLiveLog'}}
                </button>
              {{/if}}
              {{#if sparcLivePending}}
                <button type="button" class="btn btn-primary run-sparc-live-evaluation" disabled aria-busy="true">
                  <i class="fa fa-spinner fa-spin" aria-hidden="true"></i>
                  {{testText 'adminTests.runSparcLiveEvaluation'}}
                </button>
              {{else}}
                <button type="button" class="btn btn-primary run-sparc-live-evaluation" aria-busy="false">
                  <i class="fa fa-comments" aria-hidden="true"></i>
                  {{testText 'adminTests.runSparcLiveEvaluation'}}
                </button>
              {{/if}}
            </div>
          </div>

          <div id="sparc-live-evaluation-output" class="admin-output-region" aria-live="polite">
            {{#with sparcLiveOutput}}
              {{> Template.dynamic template=template data=data}}
            {{/with}}
          </div>
          <pre id="sparc-live-evaluation-saved-json" hidden>{{sparcLiveSavedJson}}</pre>
        </div>
      </div>
    </div>
  </div>
</template>

<template name="testRunnerReadinessResult">
  {{> adminStatus variant=summaryVariant text=summaryText urgent=summaryUrgent}}
  {{#if checks.length}}
    {{> adminTableShell
      label=tableLabel
      tableTemplate="testRunnerReadinessTable"
      tableData=this}}
  {{else}}
    {{> adminEmptyState text=emptyText icon="fa-list-alt"}}
  {{/if}}
</template>

<template name="testRunnerSparcLiveResult">
  {{> adminStatus variant=summaryVariant text=summaryText urgent=summaryUrgent}}
  {{> adminTableShell
    label=tableLabel
    tableTemplate="testRunnerSparcLiveTable"
    tableData=this}}
</template>

<template name="testRunnerSparcLiveTable">
  <table class="table table-sm table-bordered admin-readiness-table">
    <thead>
      <tr>
        <th scope="col">{{checkLabel}}</th>
        <th scope="col">{{graduationLabel}}</th>
        <th scope="col">{{robustnessLabel}}</th>
        <th scope="col" class="admin-table-message-column">{{messageLabel}}</th>
      </tr>
    </thead>
    <tbody>
      {{#each runs}}
        <tr class="{{rowClass}}">
          <td>{{run}}</td>
          <td>{{displayStudentOutcome}}</td>
          <td>{{displayRobustnessOutcome}}</td>
          <td><div class="admin-table-feedback">{{message}}</div></td>
        </tr>
      {{/each}}
    </tbody>
  </table>
</template>

<template name="testRunnerReadinessTable">
  <table class="table table-sm table-bordered admin-readiness-table">
    <thead>
      <tr>
        <th scope="col">{{checkLabel}}</th>
        <th scope="col">{{statusLabel}}</th>
        <th scope="col" class="admin-table-message-column">{{messageLabel}}</th>
      </tr>
    </thead>
    <tbody>
      {{#each checks}}
        <tr class="{{rowClass}}">
          <td>{{name}}</td>
          <td>{{displayStatus}}</td>
          <td><div class="admin-table-feedback">{{message}}</div></td>
        </tr>
      {{/each}}
    </tbody>
  </table>
</template>
