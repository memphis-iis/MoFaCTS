<template name="testRunner">
  <div>
    <div class="admin-section">
      <div class="card admin-card">
        <div class="card-body">
          <div class="admin-header-action-row">
            <div>
              <div class="admin-section-heading admin-section-heading-compact">
                <i class="fa fa-check-circle admin-section-icon"></i>
                <h5>{{testText 'adminTests.deploymentReadiness'}}</h5>
              </div>
              <div class="text-muted small">
                {{testText 'adminTests.description'}}
              </div>
            </div>
            {{#if readinessPending}}
              <button type="button" class="btn btn-primary run-deployment-readiness" disabled aria-busy="true">
                <i class="fa fa-spinner fa-spin" aria-hidden="true"></i>
                {{testText 'adminTests.runReadinessChecks'}}
              </button>
            {{else}}
              <button type="button" class="btn btn-primary run-deployment-readiness" aria-busy="false">
                <i class="fa fa-check-circle" aria-hidden="true"></i>
                {{testText 'adminTests.runReadinessChecks'}}
              </button>
            {{/if}}
          </div>

          <div id="deployment-readiness-output" class="admin-output-region" aria-live="polite">
            {{#with readinessOutput}}
              {{> Template.dynamic template=template data=data}}
            {{/with}}
          </div>
        </div>
      </div>
    </div>

    <div class="admin-section">
      <div class="card admin-card">
        <div class="card-body">
          <div class="admin-header-action-row">
            <div>
              <div class="admin-section-heading admin-section-heading-compact">
                <i class="fa fa-comments admin-section-icon"></i>
                <h5>{{testText 'adminTests.sparcLiveEvaluation'}}</h5>
              </div>
              <div class="text-muted small">
                {{testText 'adminTests.sparcLiveDescription'}}
              </div>
            </div>
            <div class="admin-actions">
              {{#if sparcLiveHasSavedJson}}
                <button type="button" class="btn btn-outline-primary download-sparc-live-evaluation">
                  <i class="fa fa-download" aria-hidden="true"></i>
                  {{testText 'adminTests.downloadSparcLiveLog'}}
                </button>
              {{/if}}
              {{#if sparcLivePending}}
                <button type="button" class="btn btn-primary run-sparc-live-evaluation" disabled aria-busy="true">
                  <i class="fa fa-spinner fa-spin" aria-hidden="true"></i>
                  {{testText 'adminTests.runSparcLiveEvaluation'}}
                </button>
              {{else}}
                <button type="button" class="btn btn-primary run-sparc-live-evaluation" aria-busy="false">
                  <i class="fa fa-comments" aria-hidden="true"></i>
                  {{testText 'adminTests.runSparcLiveEvaluation'}}
                </button>
              {{/if}}
            </div>
          </div>

          <div id="sparc-live-evaluation-output" class="admin-output-region" aria-live="polite">
            {{#with sparcLiveOutput}}
              {{> Template.dynamic template=template data=data}}
            {{/with}}
          </div>
          <pre id="sparc-live-evaluation-saved-json" hidden>{{sparcLiveSavedJson}}</pre>
        </div>
      </div>
    </div>
  </div>
</template>

<template name="testRunnerReadinessResult">
  {{> adminStatus variant=summaryVariant text=summaryText urgent=summaryUrgent}}
  {{#if checks.length}}
    {{> adminTableShell
      label=tableLabel
      tableTemplate="testRunnerReadinessTable"
      tableData=this}}
  {{else}}
    {{> adminEmptyState text=emptyText icon="fa-list-alt"}}
  {{/if}}
</template>

<template name="testRunnerSparcLiveResult">
  {{> adminStatus variant=summaryVariant text=summaryText urgent=summaryUrgent}}
  {{> adminTableShell
    label=tableLabel
    tableTemplate="testRunnerSparcLiveTable"
    tableData=this}}
</template>

<template name="testRunnerSparcLiveTable">
  <table class="table table-sm table-bordered admin-readiness-table">
    <thead>
      <tr>
        <th scope="col">{{checkLabel}}</th>
        <th scope="col">{{graduationLabel}}</th>
        <th scope="col">{{robustnessLabel}}</th>
        <th scope="col" class="admin-table-message-column">{{messageLabel}}</th>
      </tr>
    </thead>
    <tbody>
      {{#each runs}}
        <tr class="{{rowClass}}">
          <td>{{run}}</td>
          <td>{{displayStudentOutcome}}</td>
          <td>{{displayRobustnessOutcome}}</td>
          <td><div class="admin-table-feedback">{{message}}</div></td>
        </tr>
      {{/each}}
    </tbody>
  </table>
</template>

<template name="testRunnerReadinessTable">
  <table class="table table-sm table-bordered admin-readiness-table">
    <thead>
      <tr>
        <th scope="col">{{checkLabel}}</th>
        <th scope="col">{{statusLabel}}</th>
        <th scope="col" class="admin-table-message-column">{{messageLabel}}</th>
      </tr>
    </thead>
    <tbody>
      {{#each checks}}
        <tr class="{{rowClass}}">
          <td>{{name}}</td>
          <td>{{displayStatus}}</td>
          <td><div class="admin-table-feedback">{{message}}</div></td>
        </tr>
      {{/each}}
    </tbody>
  </table>
</template>
