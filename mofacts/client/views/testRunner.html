<template name="testRunner">
  <div class="container" style="margin-top: 1rem;">
    <h3 class="page-header-title">Admin Tests</h3>

    <div class="admin-section">
      <div class="card mb-4">
        <div class="card-body">
          <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-3">
            <div>
              <div class="d-flex align-items-center mb-2">
                <i class="fa fa-check-circle me-2" style="font-size: 1.25rem; color: var(--app-accent-color);"></i>
                <h5 class="m-0">Deployment Readiness</h5>
              </div>
              <div class="text-muted small">
                Run admin-only readiness checks for the deployed MoFaCTS environment.
              </div>
            </div>
            <button type="button" class="btn btn-primary run-deployment-readiness">
              <i class="fa fa-check-circle"></i> Run Readiness Checks
            </button>
          </div>

          <div id="deployment-readiness-output" class="mt-3"></div>
        </div>
      </div>
    </div>
  </div>
</template>
