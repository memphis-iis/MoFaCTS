<template name="testRunner">
  <div class="container mt-4">
    <div class="row">
      <div class="col-12">
        <h1 class="page-header-text">
          <i class="fa fa-desktop"></i> Svelte Card Layout Tester
        </h1>
        <p class="lead">Preview card layouts, modes, and configurations without running a full experiment.</p>
        <hr>
      </div>
    </div>

    <div class="row mt-4">
      <div class="col-12">
        <div class="card">
          <div class="card-body">
            <button class="btn btn-primary open-svelte-tester">
              <i class="fa fa-eye"></i> Open Svelte Card Tester
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="svelte-tester-container" style="display: none;">
      {{> svelteCardTester}}
    </div>
  </div>
</template>
