<template name="testRunner">
  <div class="container admin-page">
    <h3 class="page-header-title">{{testText 'home.adminTests'}}</h3>

    <div class="admin-section">
      <div class="card admin-card">
        <div class="card-body">
          <div class="admin-header-action-row">
            <div>
              <div class="admin-section-heading admin-section-heading-compact">
                <i class="fa fa-check-circle admin-section-icon"></i>
                <h5>{{testText 'adminTests.deploymentReadiness'}}</h5>
              </div>
              <div class="text-muted small">
                {{testText 'adminTests.description'}}
              </div>
            </div>
            <button type="button" class="btn btn-primary run-deployment-readiness">
              <i class="fa fa-check-circle"></i> {{testText 'adminTests.runReadinessChecks'}}
            </button>
          </div>

          <div id="deployment-readiness-output" class="admin-output-region"></div>
        </div>
      </div>
    </div>
  </div>
</template>
