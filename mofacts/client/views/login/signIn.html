<template name="signIn">
    <div class="auth-page page-loading" id="signInContainer">
        <div class="auth-shell">
            <div class="auth-card card">
                <div class="card-body auth-card-body">
                    <div class="auth-brand">
                        <h2 class="auth-system-name">
                            {{#if currentTheme.properties.brand_logo_url}}
                                <span class="navbar-brand-icon"
                                      aria-hidden="true"
                                      style="--navbar-brand-icon-image: url('{{currentTheme.properties.brand_logo_url}}');"></span>
                            {{/if}}
                            <span>{{systemName}}</span>
                        </h2>
                        {{#if isExperiment}}
                            <h1 class="auth-title experiment-portal-title">{{t 'auth.experimentPortal'}}</h1>
                        {{else}}
                            <h1 class="auth-title sign-in-title">{{t 'auth.signIn'}}</h1>
                        {{/if}}
                        <p class="auth-description">{{auth_sign_in_description}}</p>
                    </div>

                    {{#if serverErrorMessage}}
                    <p id="serverErrors" class="auth-message auth-message-error" role="alert" aria-live="polite">{{serverErrorMessage}}</p>
                    {{#if showVerificationHelp}}
                    <div class="auth-helper-text">
                        <a href="/auth/verify-email" class="auth-link">{{t 'auth.goToEmailVerification'}}</a>
                    </div>
                    {{/if}}
                    {{/if}}

                    {{#if isExperiment}}
                    <form class="auth-form" novalidate>
                        <div class="auth-field">
                            <label class="form-label auth-label" for="signInUsername">{{experimentLoginLabel}}</label>
                            <input type="text" id="signInUsername" value="" placeholder="{{experimentLoginText}}" maxlength="254" class="form-control sign-in-input accept-enter-key {{experimentUsernameInputStateClass}}" autocomplete="username" aria-invalid="{{experimentUsernameAriaInvalid}}" aria-describedby="{{experimentUsernameDescribedBy}}">
                            {{#if experimentUsernameError}}
                            <span id="experimentUsernameError" class="auth-field-message" role="alert">{{experimentUsernameError}}</span>
                            {{/if}}
                        </div>
                        {{#if experimentPasswordRequired}}
                        <div class="auth-field">
                            <label class="form-label auth-label" for="password">{{t 'auth.password'}}</label>
                            <input type="password" id="password" value="" placeholder="{{t 'auth.password'}}" maxlength="254" class="form-control sign-in-input accept-enter-key {{experimentPasswordInputStateClass}}" autocomplete="current-password" aria-invalid="{{experimentPasswordAriaInvalid}}" aria-describedby="{{experimentPasswordDescribedBy}}">
                            {{#if experimentPasswordError}}
                            <span id="experimentPasswordError" class="auth-field-message" role="alert">{{experimentPasswordError}}</span>
                            {{/if}}
                        </div>
                        {{/if}}
                        <button type="submit" id="experimentSignin" class="btn auth-primary-btn w-100">{{t 'auth.continue'}}</button>
                    </form>
                    {{else}}
                    <form class="auth-form" novalidate>
                        <div class="sign-in-form-grid">
                            <div class="sign-in-form-row">
                                <label class="form-label auth-label" for="signInUsername">{{t 'auth.email'}}</label>
                                <input type="text" id="signInUsername" value="" placeholder="name@example.com" maxlength="254" class="form-control sign-in-input accept-enter-key {{normalEmailInputStateClass}}" autocomplete="username email" aria-invalid="{{normalEmailAriaInvalid}}" aria-describedby="{{normalEmailDescribedBy}}">
                                {{#if normalEmailError}}
                                <span id="normalEmailError" class="auth-field-message" role="alert">{{normalEmailError}}</span>
                                {{/if}}
                            </div>
                            <div class="sign-in-form-row">
                                <label class="form-label auth-label" for="password">{{t 'auth.password'}}</label>
                                <div class="sign-in-form-input-cell">
                                    <input type="password" id="password" value="" placeholder="{{t 'auth.password'}}" maxlength="254" class="form-control sign-in-input accept-enter-key {{normalPasswordInputStateClass}}" autocomplete="current-password" aria-invalid="{{normalPasswordAriaInvalid}}" aria-describedby="{{normalPasswordDescribedBy}}">
                                    <div class="auth-inline-actions">
                                        <a href="/auth/forgot-password" class="auth-link small">{{t 'auth.forgotPassword'}}</a>
                                    </div>
                                    {{#if normalPasswordError}}
                                    <span id="normalPasswordError" class="auth-field-message" role="alert">{{normalPasswordError}}</span>
                                    {{/if}}
                                </div>
                            </div>
                        </div>
                        <button type="submit" id="signInButton" class="btn auth-primary-btn w-100">{{t 'auth.logIn'}}</button>
                    </form>

                    <div class="auth-divider" role="presentation">
                        <span>{{t 'auth.otherWaysToSignIn'}}</span>
                    </div>

                    <div class="auth-secondary-actions">
                        <button type="button" id="signInButtonOAuth" class="btn btn-secondary auth-provider-btn w-100">
                            <img width="20" height="20" class="auth-provider-icon" alt="" aria-hidden="true" loading="eager" decoding="async" fetchpriority="low" src="/images/google-logo.svg" />
                            <span>{{t 'auth.signInWithGoogle'}}</span>
                        </button>
                        <button type="button" id="signInWithMicrosoftSSO" class="btn btn-secondary auth-provider-btn w-100">
                            <img width="20" height="20" class="auth-provider-icon" alt="" aria-hidden="true" loading="eager" decoding="async" fetchpriority="low" src="/images/microsoft-logo.svg" />
                            <span>{{t 'auth.signInWithMicrosoft'}}</span>
                        </button>
                        {{#if canShowMemphisSaml}}
                        <button type="button" id="signInWithMemphisSaml" class="btn btn-secondary auth-provider-btn w-100">
                            <img width="20" height="20" class="auth-provider-icon" alt="" aria-hidden="true" loading="eager" decoding="async" fetchpriority="low" src="/images/microsoft-logo.svg" />
                            <span>{{memphisSamlButtonLabel}}</span>
                        </button>
                        {{/if}}
                    </div>

                    {{#if canShowSignUp}}
                    <div class="auth-supporting-action">
                        <span class="text-muted">{{t 'auth.needAccount'}}</span>
                        <a href="/auth/signup" id="signUpButton" class="auth-link">{{t 'auth.signUp'}}</a>
                    </div>
                    {{/if}}
                    {{/if}}
                </div>
            </div>
        </div>

        {{#unless isExperiment}}
        {{> footer}}
        {{/unless}}
    </div>
</template>
