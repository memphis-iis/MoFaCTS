<template name="verifyEmail">
    <div class="auth-page">
        <div class="auth-shell">
            <div class="auth-card card">
                <div class="card-body auth-card-body">
                    <div class="auth-brand">
                        <h2 class="auth-system-name">{{systemName}}</h2>
                        <h1 class="auth-title">{{t 'auth.verifyEmailTitle'}}</h1>
                        <p class="auth-description">{{t 'auth.verifyEmailDescription'}}</p>
                        <p class="auth-description auth-description-secondary">{{t 'auth.verifyEmailSpamHelp'}}</p>
                    </div>
                    <p class="auth-message {{verificationStatusClass}}">{{verificationStatusMessage}}</p>
                    {{#if verificationErrorMessage}}
                    <p class="auth-message auth-message-error">{{verificationErrorMessage}}</p>
                    {{/if}}
                    {{#if showVerificationResend}}
                    <div class="auth-form">
                        <div class="auth-field">
                            <label class="form-label auth-label" for="verificationEmailAddress">{{t 'auth.email'}}</label>
                            <input class="form-control" type="text" id="verificationEmailAddress" value="" placeholder="name@example.com" autocomplete="username email">
                        </div>
                        <button type="button" id="resendVerificationEmailButton" class="btn auth-primary-btn w-100">{{t 'auth.resendVerificationEmail'}}</button>
                    </div>
                    {{/if}}
                    <div class="auth-supporting-action">
                        <a href="/auth/login" class="auth-link">{{t 'auth.returnToSignIn'}}</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
