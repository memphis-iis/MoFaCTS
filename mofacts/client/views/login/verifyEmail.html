<template name="verifyEmail">
    <div class="auth-page">
        <div class="auth-shell">
            <div class="auth-card card">
                <div class="card-body auth-card-body">
                    <div class="auth-brand">
                        <h2 class="auth-system-name mt-0">{{systemName}}</h2>
                        <h1 class="auth-title">Verify email</h1>
                        <p class="auth-description">Verify your email address to finish activating your account.</p>
                    </div>
                    <p class="auth-message {{verificationStatusClass}} mb-0">{{verificationStatusMessage}}</p>
                    {{#if verificationErrorMessage}}
                    <p class="auth-message auth-message-error mb-0">{{verificationErrorMessage}}</p>
                    {{/if}}
                    {{#if showVerificationResend}}
                    <div class="auth-form">
                        <div class="auth-field">
                            <label class="form-label auth-label" for="verificationEmailAddress">Email</label>
                            <input class="form-control" type="text" id="verificationEmailAddress" value="" placeholder="name@example.com" autocomplete="username email">
                        </div>
                        <button type="button" id="resendVerificationEmailButton" class="btn auth-primary-btn w-100">Resend Verification Email</button>
                    </div>
                    {{/if}}
                    <div class="auth-supporting-action">
                        <a href="/auth/login" class="auth-link">Return to sign in</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
