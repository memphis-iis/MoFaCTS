<template name="resetPassword">
    <div class="auth-page">
        <div class="auth-shell">
            <div class="auth-card card">
                <div class="card-body auth-card-body">
                    <div class="auth-brand">
                        <h2 class="auth-system-name mt-0">{{systemName}}</h2>
                        <h1 class="auth-title">Reset password</h1>
                        <p class="auth-description">Reset your password to get back into your account.</p>
                    </div>

                    {{#if resetPasswordStatusMessage}}
                    <p class="auth-message auth-message-success mb-0">{{resetPasswordStatusMessage}}</p>
                    {{/if}}
                    {{#if resetPasswordErrorMessage}}
                    <p class="auth-message auth-message-error mb-0">{{resetPasswordErrorMessage}}</p>
                    {{/if}}

                    <div id="sendPasswordEmail" class="auth-form">
                        <p class="auth-description auth-description-secondary mb-0">Enter your email address and we’ll send you a password reset link.</p>
                        <div class="auth-field">
                            <label class="form-label auth-label" for="email">Email</label>
                            <input class="form-control accept-enter-key" type="text" id="email" value="" placeholder="name@example.com" autocomplete="username email">
                        </div>
                        <button type="button" id="sendSecret" class="btn auth-primary-btn w-100">Send Reset Link</button>
                    </div>

                    <div id="resetPasswordForm" class="auth-form" hidden>
                        {{#if resetPasswordLinkReady}}
                        <div class="auth-field">
                            <label class="form-label auth-label" for="email2">Email</label>
                            <input class="form-control accept-enter-key" type="text" id="email2" value="" placeholder="Email Address" autocomplete="username email">
                            {{#unless resetPasswordHasPrefilledEmail}}
                            <div class="auth-helper-text">Enter the email address for the account you are resetting.</div>
                            {{/unless}}
                        </div>
                        <div class="auth-field">
                            <label class="form-label auth-label" for="password">New password</label>
                            <input class="form-control accept-enter-key" type="password" id="password" value="" placeholder="Enter a new password" autocomplete="new-password">
                            <div class="auth-helper-text">Use at least {{minPasswordLength}} characters.</div>
                        </div>
                        <div class="auth-field">
                            <label class="form-label auth-label" for="passwordVerify">Confirm new password</label>
                            <input class="form-control accept-enter-key" type="password" id="passwordVerify" value="" placeholder="Repeat new password" autocomplete="new-password">
                        </div>
                        <button type="button" id="resetPasswordButton" class="btn auth-primary-btn w-100">Reset Password</button>
                        {{else}}
                        <p class="auth-description auth-description-secondary mb-0">Open the password reset link from your email to choose a new password.</p>
                        {{/if}}
                    </div>

                    <div class="auth-supporting-action">
                        <a href="/auth/login" class="auth-link">Return to sign in</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
