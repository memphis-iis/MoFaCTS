<template name="resetPassword">
    <div class="auth-page">
        <div class="auth-shell">
            <div class="auth-card card">
                <div class="card-body auth-card-body">
                    <div class="auth-brand">
                        <h2 class="auth-system-name">{{systemName}}</h2>
                        <h1 class="auth-title">{{t 'auth.resetPassword'}}</h1>
                        <p class="auth-description">{{t 'auth.resetPasswordDescription'}}</p>
                    </div>

                    <div id="sendPasswordEmail" class="auth-form">
                        <p class="auth-description auth-description-secondary">{{t 'auth.resetEmailInstruction'}}</p>
                        <div class="auth-field">
                            <label class="form-label auth-label" for="email">{{t 'auth.email'}}</label>
                            <input class="form-control accept-enter-key" type="text" id="email" value="" placeholder="name@example.com" autocomplete="username email" {{resetFieldErrorAttrs 'request-email' 'request-email-error'}}>
                            {{#if requestEmailErrorMessage}}<span id="request-email-error" class="auth-field-message" role="alert">{{requestEmailErrorMessage}}</span>{{/if}}
                        </div>
                        <button type="button" id="sendSecret" class="btn auth-primary-btn w-100">{{t 'auth.sendResetLink'}}</button>
                        {{#if resetPasswordStatusMessage}}<p class="auth-message auth-message-success">{{resetPasswordStatusMessage}}</p>{{/if}}
                        {{#if resetFormErrorMessage}}<p class="auth-message auth-message-error" role="alert">{{resetFormErrorMessage}}</p>{{/if}}
                    </div>

                    <div id="resetPasswordForm" class="auth-form" hidden>
                        {{#if resetPasswordLinkReady}}
                        <div class="auth-field">
                            <label class="form-label auth-label" for="email2">{{t 'auth.email'}}</label>
                            <input class="form-control accept-enter-key" type="text" id="email2" value="" placeholder="{{t 'auth.emailAddress'}}" autocomplete="username email" {{resetFieldErrorAttrs 'reset-email' 'reset-email-error'}}>
                            {{#unless resetPasswordHasPrefilledEmail}}
                            <div class="auth-helper-text">{{t 'auth.resetEmailHelp'}}</div>
                            {{/unless}}
                            {{#if resetEmailErrorMessage}}<span id="reset-email-error" class="auth-field-message" role="alert">{{resetEmailErrorMessage}}</span>{{/if}}
                        </div>
                        <div class="auth-field">
                            <label class="form-label auth-label" for="password">{{t 'auth.newPassword'}}</label>
                            <input class="form-control accept-enter-key" type="password" id="password" value="" placeholder="{{t 'auth.enterNewPassword'}}" autocomplete="new-password" {{resetFieldErrorAttrs 'password' 'reset-password-error'}}>
                            <div class="auth-helper-text">{{t 'auth.passwordMinLength' min=minPasswordLength}}</div>
                            {{#if resetPasswordFieldErrorMessage}}<span id="reset-password-error" class="auth-field-message" role="alert">{{resetPasswordFieldErrorMessage}}</span>{{/if}}
                        </div>
                        <div class="auth-field">
                            <label class="form-label auth-label" for="passwordVerify">{{t 'auth.confirmNewPassword'}}</label>
                            <input class="form-control accept-enter-key" type="password" id="passwordVerify" value="" placeholder="{{t 'auth.repeatNewPassword'}}" autocomplete="new-password" {{resetFieldErrorAttrs 'password-verify' 'reset-password-verify-error'}}>
                            {{#if resetPasswordVerifyErrorMessage}}<span id="reset-password-verify-error" class="auth-field-message" role="alert">{{resetPasswordVerifyErrorMessage}}</span>{{/if}}
                        </div>
                        <button type="button" id="resetPasswordButton" class="btn auth-primary-btn w-100">{{t 'auth.resetPassword'}}</button>
                        {{#if resetPasswordStatusMessage}}<p class="auth-message auth-message-success">{{resetPasswordStatusMessage}}</p>{{/if}}
                        {{#if resetFormErrorMessage}}<p class="auth-message auth-message-error" role="alert">{{resetFormErrorMessage}}</p>{{/if}}
                        {{else}}
                        <p class="auth-description auth-description-secondary">{{t 'auth.openResetLink'}}</p>
                        {{/if}}
                    </div>

                    <div class="auth-supporting-action">
                        <a href="/auth/login" class="auth-link">{{t 'auth.returnToSignIn'}}</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
