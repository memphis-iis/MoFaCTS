<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="60" x2="1520" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F1626"/>
      <stop offset="0.5" stop-color="#0D2330"/>
      <stop offset="1" stop-color="#1B312A"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(290 230) rotate(22) scale(520 340)">
      <stop stop-color="#2CD9C5" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#2CD9C5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1280 700) rotate(-16) scale(540 360)">
      <stop stop-color="#FFB86E" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#FFB86E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8BE7DA" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFD391" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#173345" stop-opacity="0.84"/>
      <stop offset="1" stop-color="#102432" stop-opacity="0.74"/>
    </linearGradient>
    <linearGradient id="panelAlt" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#223E36" stop-opacity="0.84"/>
      <stop offset="1" stop-color="#1B302C" stop-opacity="0.76"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#041018" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#97E5D8"/>
    </marker>
    <style>
      .title { font: 700 46px 'Avenir Next', 'Segoe UI Semibold', 'Trebuchet MS', sans-serif; fill: #F7FBFC; }
      .subtitle { font: 500 18px 'Avenir Next', 'Segoe UI', 'Trebuchet MS', sans-serif; fill: #BEDADD; }
      .kicker { font: 700 14px 'IBM Plex Mono', 'Consolas', monospace; fill: #93E6DA; letter-spacing: 1.2px; }
      .section { font: 700 26px 'Avenir Next', 'Segoe UI Semibold', 'Trebuchet MS', sans-serif; fill: #F8FBFC; }
      .body { font: 500 18px 'Avenir Next', 'Segoe UI', 'Trebuchet MS', sans-serif; fill: #ECF7F7; }
      .small { font: 500 15px 'Avenir Next', 'Segoe UI', 'Trebuchet MS', sans-serif; fill: #C8DFE1; }
      .chip { font: 700 16px 'IBM Plex Mono', 'Consolas', monospace; fill: #F8FCFC; }
      .edge { font: 600 16px 'Avenir Next', 'Segoe UI', 'Trebuchet MS', sans-serif; fill: #A7DED6; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glowLeft)"/>
  <rect width="1600" height="900" fill="url(#glowRight)"/>

  <text x="96" y="90" class="title">MoFaCTS Svelte App Architecture</text>
  <text x="96" y="126" class="subtitle">Platform shell, interactive runtime, and learning data.</text>

  <g filter="url(#shadow)">
    <rect x="120" y="218" width="320" height="350" rx="30" fill="url(#panel)" stroke="url(#stroke)"/>
    <text x="152" y="258" class="kicker">PLATFORM SHELL</text>
    <text x="152" y="304" class="section">Meteor App Host</text>
    <text x="152" y="350" class="body">
      <tspan x="152" dy="0">Routes, auth, and layout.</tspan>
    </text>
    <text x="152" y="400" class="small">
      <tspan x="152" dy="0">Meteor and FlowRouter manage</tspan>
      <tspan x="152" dy="22">startup and navigation.</tspan>
    </text>
    <text x="152" y="474" class="small">
      <tspan x="152" dy="0">It mounts the Svelte card</tspan>
      <tspan x="152" dy="22">experience.</tspan>
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="500" y="186" width="600" height="414" rx="36" fill="url(#panel)" stroke="url(#stroke)" stroke-width="1.4"/>
    <text x="536" y="226" class="kicker">INTERACTIVE CORE</text>
    <text x="536" y="274" class="section">Svelte Learning Runtime</text>
    <text x="536" y="320" class="body">
      <tspan x="536" dy="0">A focused card runtime.</tspan>
    </text>
    <text x="536" y="390" class="small">
      <tspan x="536" dy="0">Svelte renders the interface.</tspan>
    </text>
    <text x="536" y="438" class="small">
      <tspan x="536" dy="0">XState drives trial flow.</tspan>
    </text>
    <text x="536" y="486" class="small">
      <tspan x="536" dy="0">Services handle audio, media,</tspan>
      <tspan x="536" dy="22">resume, and state sync.</tspan>
    </text>

    <rect x="556" y="534" width="486" height="42" rx="21" fill="#183844" stroke="#82E0D8" stroke-opacity="0.35"/>
    <text x="799" y="561" text-anchor="middle" class="small">UI + state machine + services</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1160" y="218" width="320" height="350" rx="30" fill="url(#panelAlt)" stroke="url(#stroke)"/>
    <text x="1192" y="258" class="kicker">CONTENT + PERSISTENCE</text>
    <text x="1192" y="304" class="section">Learning Data Layer</text>
    <text x="1192" y="350" class="body">
      <tspan x="1192" dy="0">Content, settings, media,</tspan>
      <tspan x="1192" dy="24">and history define a session.</tspan>
    </text>
    <text x="1192" y="414" class="small">
      <tspan x="1192" dy="0">Server APIs deliver what the</tspan>
      <tspan x="1192" dy="22">runtime needs.</tspan>
    </text>
    <text x="1192" y="474" class="small">
      <tspan x="1192" dy="0">Shared models keep client and</tspan>
      <tspan x="1192" dy="22">server aligned.</tspan>
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="314" y="652" width="972" height="144" rx="30" fill="#112637" fill-opacity="0.9" stroke="url(#stroke)"/>
    <text x="350" y="690" class="kicker">SHARED DOMAIN MODEL</text>
    <text x="350" y="732" class="section">Shared Rules and Types</text>
    <text x="350" y="774" class="small">
      <tspan x="350" dy="0">Common contracts define session state, card behavior, settings, and themes.</tspan>
    </text>
  </g>

  <path d="M440 396C472 396 480 396 500 396" stroke="#97E5D8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="448" y="378" class="edge">mounts</text>

  <path d="M1100 396C1122 396 1136 396 1160 396" stroke="#97E5D8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="1032" y="378" class="edge">session data</text>

  <path d="M800 600C800 624 800 624 800 652" stroke="#97E5D8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="700" y="634" class="edge">shared rules</text>

  <path d="M1286 568C1286 612 1160 620 1036 660" stroke="#97E5D8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="1160" y="622" class="edge">common model</text>
</svg>
