services:
  playwright-mcp:
    environment:
      BASE_URL: http://localhost:3100

  mongo-mcp:
    environment:
      MONGO_URI: mongodb://mongodb:27017/MoFACT-meteor3
      DB_NAME: MoFACT-meteor3
    networks:
      - mofacts_app

networks:
  mofacts_app:
    external: true
    name: deploy_mofacts
